<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CozyWolf – LinkedIn Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CozyWolf – LinkedIn-Banner (1584 × 396)
     Farben hier zentral anpassbar:
     ============================================================ */
  :root {
    --pink:      #EC4899;  /* CozyWolf-Hauptfarbe (der pinke Wolf) */
    --pink-soft: #FBA6D0;  /* helles Pink für weiche Formen        */
    --magenta:   #A21247;  /* tiefes Magenta (Wolf-Ring, Akzent)   */
    --navy:      #1E2A5A;  /* Navy (Hoodie / Text)                 */
    --cream:     #FFF6F1;  /* warmer, cremiger Hintergrund         */
    --cream-2:   #FFE8F1;  /* zarter Pink-Schimmer für den Verlauf */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #d9d4dd;              /* neutral drumherum (nicht im Export) */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Quicksand', system-ui, sans-serif;
  }

  /* ── Fester Banner-Container: exakt LinkedIn-Format ─────────── */
  .banner {
    position: relative;
    width: 1584px;
    height: 396px;
    overflow: hidden;
    background:
      radial-gradient(130% 150% at 88% 15%, var(--cream-2) 0%, var(--cream) 52%),
      var(--cream);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Weiche, runde Deko-Formen (Bokeh) ─────────────────────── */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(2px);
    pointer-events: none;
  }
  .blob.b1 { width: 520px; height: 520px; right: -90px;  top: -170px;
             background: radial-gradient(circle, rgba(236,72,153,0.22), transparent 68%); }
  .blob.b2 { width: 360px; height: 360px; right: 300px; bottom: -160px;
             background: radial-gradient(circle, rgba(162,18,71,0.14), transparent 70%); }
  .blob.b3 { width: 300px; height: 300px; left: 44%;    top: -130px;
             background: radial-gradient(circle, rgba(251,166,208,0.35), transparent 70%); }

  /* Verstreute, runde Quiz-Punkte – verspielt & cozy */
  .dot { position: absolute; border-radius: 50%; opacity: 0.55; pointer-events: none; }
  .d1 { width: 16px; height: 16px; background: var(--pink);      top: 70px;  left: 44%; }
  .d2 { width: 10px; height: 10px; background: var(--magenta);   top: 300px; left: 48%; opacity: 0.4; }
  .d3 { width: 22px; height: 22px; background: var(--pink-soft); top: 250px; right: 470px; }
  .d4 { width: 12px; height: 12px; background: var(--navy);      top: 96px;  right: 430px; opacity: 0.3; }
  .d5 { width: 14px; height: 14px; background: var(--pink);      top: 40px;  right: 250px; opacity: 0.5; }

  /* ── Textblock (rechts der Mitte, Profilbild-Zone bleibt frei) ─ */
  .content {
    position: absolute;
    left: 360px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    max-width: 760px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--magenta);
    background: rgba(236, 72, 153, 0.10);
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .eyebrow .paw { font-size: 16px; }

  .wordmark {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 104px;
    line-height: 0.98;
    letter-spacing: -0.5px;
    background: linear-gradient(100deg, var(--pink) 0%, var(--magenta) 92%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    margin-top: 14px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.25;
    color: var(--navy);
  }
  .subtitle b { color: var(--pink); font-weight: 700; }

  /* ── URL dezent am rechten oberen Rand ─────────────────────── */
  .url {
    position: absolute;
    top: 30px;
    right: 48px;
    z-index: 4;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--navy);
    opacity: 0.72;
  }
  .url::before { content: "🌐 "; }

  /* ── Wolf-Mascot rechts als Blickfang ──────────────────────── */
  .wolf {
    position: absolute;
    right: 46px;
    top: 50%;
    transform: translateY(-50%);
    height: 372px;
    width: auto;
    z-index: 2;
    filter: drop-shadow(0 18px 28px rgba(162, 18, 71, 0.28));
  }

  /* ── Optionale Hilfslinie: LinkedIn-Profilbild-Zone (unten links).
        Zum Prüfen `.banner` die Klasse `show-guide` geben – im Export AUS. ── */
  .guide {
    position: absolute;
    left: 0; bottom: 0;
    width: 250px; height: 250px;
    border: 2px dashed rgba(30, 42, 90, 0.35);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px; color: rgba(30,42,90,0.6);
    text-align: center;
    z-index: 5;
  }
  .banner.show-guide .guide { display: flex; }
</style>
</head>
