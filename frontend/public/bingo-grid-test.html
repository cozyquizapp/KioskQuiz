<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D0A06;
      color: #e2e8f0;
      font-family: 'Nunito', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #cbd5e1;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      font-size: 13px;
      transition: all 0.12s;
      user-select: none;
    }
    .btn:hover  { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.3); }
    .btn.active { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.45); color: #fff; }
    .btn.go     { border-color: rgba(34,197,94,0.5); color: #4ade80; }
    .btn.go:hover { background: rgba(34,197,94,0.08); }
    .btn.danger { border-color: rgba(239,68,68,0.4); color: #f87171; }
    .btn.danger:hover { background: rgba(239,68,68,0.08); }
    .btn:disabled { opacity: 0.35; cursor: default; }

    /* Top bar */
    .topbar {
      display: flex; gap: 8px; flex-wrap: wrap;
      align-items: center; justify-content: center;
      margin-bottom: 14px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.08); }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 170px 1fr 170px;
      gap: 14px;
      max-width: 820px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 650px) { .layout { grid-template-columns: 1fr; } }

    /* Question card */
    .q-card {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 4px;
    }
    .q-meta { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .q-cat {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px;
      font-weight: 800; font-size: 15px;
    }
    .q-instruction { font-size: 12px; color: #94a3b8; margin-top: 8px; }

    /* Winner selector */
    .winner-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
    .winner-btn {
      padding: 7px 14px; border-radius: 8px;
      border: 2px solid transparent;
      font-weight: 800; font-size: 13px;
      cursor: pointer; transition: all 0.12s;
      font-family: inherit;
    }
    .winner-btn.sel { border-color: #fff !important; color: #fff !important; filter: brightness(1.1); }

    /* Action chooser (phase 2) */
    .action-box {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .action-title { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .action-hint  { font-size: 11px; color: #64748b; margin-top: 7px; }

    /* Joker flash */
    .joker-flash {
      width: 100%; text-align: center; padding: 7px;
      border-radius: 8px;
      background: rgba(251,191,36,0.10);
      border: 1px solid rgba(251,191,36,0.22);
      color: #fbbf24; font-size: 12px; font-weight: 700;
      display: none;
    }

    /* Phase banner */
    .phase-banner {
      width: 100%; text-align: center; padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .phase-banner h2 { font-size: 20px; margin-bottom: 6px; }
    .phase-banner p  { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }

    /* Grid */
    .grid { display: grid; gap: 5px; }
    .cell {
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 13px;
      transition: transform 0.10s, border-color 0.12s;
      user-select: none; aspect-ratio: 1;
    }
    .cell.interactive { cursor: pointer; }
    .cell.interactive:hover { transform: scale(1.08); }
    .cell.placeable:hover  { border-color: rgba(255,255,255,0.35) !important; }
    .cell.stealable:hover  { border-color: #ef4444 !important; box-shadow: 0 0 0 1px rgba(239,68,68,0.3); }

    /* Team panel */
    .team-panel { display: flex; flex-direction: column; gap: 7px; }
    .panel-lbl  { font-size: 10px; color: #475569; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .team-card  {
      padding: 9px 11px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      cursor: pointer; transition: all 0.12s;
    }
    .team-card.acting { background: rgba(255,255,255,0.08); }
    .tc-row  { display: flex; align-items: center; gap: 5px; }
    .tc-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .tc-name { font-weight: 800; font-size: 13px; }
    .tc-stat { font-size: 11px; color: #64748b; margin-top: 2px; }
    .fbar    { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.07); margin-top: 5px; overflow: hidden; }
    .fbar-fill { height: 100%; border-radius: 2px; transition: width 0.25s; }
    .badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 999px; font-size: 10px; font-weight: 800; }
    .badge-j { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge-s { background: rgba(239,68,68,0.12); color: #f87171; }

    /* Log */
    .log-wrap  { width: 100%; }
    .log-lbl   { font-size: 10px; color: #334155; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .log       { max-height: 100px; overflow-y: auto; border-radius: 7px; background: rgba(0,0,0,0.2); padding: 5px 8px; }
    .log-entry { font-size: 11px; color: #475569; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-entry:first-child { color: #94a3b8; }

    .occ { font-size: 11px; color: #334155; text-align: center; }

    .center-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span style="font-size:12px;font-weight:700;color:#64748b">Teams:</span>
  <button class="btn" id="btn-t2" onclick="setTeamCount(2)">2</button>
  <button class="btn active" id="btn-t3" onclick="setTeamCount(3)">3</button>
  <button class="btn" id="btn-t4" onclick="setTeamCount(4)">4</button>
  <div class="sep"></div>
  <button class="btn danger" onclick="resetGame()">↺ Reset</button>
  <div class="sep"></div>
  <span class="setup-label">Speed</span>
  <button class="btn" id="spd-slow"  onclick="setSpeed(1200)">🐢</button>
  <button class="btn active" id="spd-mid" onclick="setSpeed(500)">▶</button>
  <button class="btn" id="spd-fast"  onclick="setSpeed(120)">⚡</button>
  <button class="btn go" id="sim-btn" onclick="toggleSim()">▶ Auto-Sim</button>
</div>

<div class="layout">
  <!-- Left -->
  <div class="team-panel" id="panel-left">
    <div class="panel-lbl">Teams</div>
  </div>

  <!-- Center -->
  <div class="center-col" id="center-col">
    <!-- filled by JS -->
  </div>

  <!-- Right -->
  <div class="team-panel" id="panel-right">
    <div class="panel-lbl">&nbsp;</div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const COLORS = ['#3B82F6','#EF4444','#F97316','#22C55E'];
const NAMES  = ['Blau','Rot','Orange','Grün'];
const GRID_SIZES = {2:4, 3:5, 4:6};
const CATS = [
  { name:'Schätzchen', emoji:'🍯', color:'#F59E0B' },
  { name:'Mu-cho',     emoji:'🎵', color:'#3B82F6' },
  { name:'Bunte Tüte', emoji:'🎁', color:'#EF4444' },
  { name:'10 von 10',  emoji:'🔟', color:'#22C55E' },
  { name:'Cheese',     emoji:'🧀', color:'#8B5CF6' },
];

// ── State ────────────────────────────────────────────────────────────────────
let S = {};

function initGame(tc) {
  const gs = GRID_SIZES[tc];
  S = {
    teamCount: tc,
    gridSize:  gs,
    grid: Array.from({length:gs}, () => Array(gs).fill(null)),
    phase:    1,   // 1-3
    question: 1,   // 1-5 within phase
    // flowState: 'select-winner' | 'placing' | 'phase-transition' | 'done'
    flowState: 'select-winner',
    selectedWinners: [],   // teams clicked as winners
    pendingWinners:  [],   // queue still to place
    actingTeam: null,
    mode: 'place',         // 'place' | 'steal' (phase 2)
    placedThisTurn: 0,     // how many placed this action (phase 2: max 2)
    teams: Array.from({length:tc}, () => ({ jokers:0, stealsInP2:0, jokersThisPhase:0 })),
    known2x2: new Set(),
    log: [],
  };
  [2,3,4].forEach(n => document.getElementById('btn-t'+n).classList.toggle('active', n===tc));
  render();
}

function setTeamCount(n) { stopSim(); initGame(n); }
function resetGame()      { stopSim(); initGame(S.teamCount); }
function stopSim() {
  if(simTimer){clearTimeout(simTimer);simTimer=null;}
  const btn=document.getElementById('sim-btn');
  if(btn){btn.textContent='▶ Auto-Sim';btn.classList.remove('danger');btn.classList.add('go');}
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fieldCounts() {
  const c = Array(S.teamCount).fill(0);
  for (let r=0;r<S.gridSize;r++)
    for (let cc=0;cc<S.gridSize;cc++)
      if (S.grid[r][cc]!==null) c[S.grid[r][cc]]++;
  return c;
}
function totalCells()  { return S.gridSize*S.gridSize; }

// Largest connected territory per team (BFS)
function connectedScores() {
  const scores = Array(S.teamCount).fill(0);
  const visited = Array.from({length:S.gridSize}, ()=>Array(S.gridSize).fill(false));
  for(let r=0;r<S.gridSize;r++) {
    for(let c=0;c<S.gridSize;c++) {
      if(visited[r][c]||S.grid[r][c]===null) continue;
      const team=S.grid[r][c];
      // BFS
      const queue=[[r,c]]; visited[r][c]=true; let size=0;
      while(queue.length) {
        const [cr,cc]=queue.shift(); size++;
        [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]].forEach(([nr,nc])=>{
          if(nr>=0&&nr<S.gridSize&&nc>=0&&nc<S.gridSize&&!visited[nr][nc]&&S.grid[nr][nc]===team) {
            visited[nr][nc]=true; queue.push([nr,nc]);
          }
        });
      }
      if(size>scores[team]) scores[team]=size;
    }
  }
  return scores;
}

function lastPlaceIdx() {
  const c=connectedScores(); let min=Infinity,idx=0;
  c.forEach((v,i)=>{ if(v<min){min=v;idx=i;} }); return idx;
}
function addLog(e) { S.log.unshift(e); if(S.log.length>60) S.log.pop(); }
function cat() { return CATS[S.question-1]; }
function phaseLabel() {
  return ['','Phase 1 — 1 Feld setzen','Phase 2 — 2 setzen oder 1 klauen (max 2×)','Phase 3 — Freies Klauen'][S.phase];
}

// ── 2×2 joker check ──────────────────────────────────────────────────────────
function checkJoker(team) {
  let got=false;
  for(let r=0;r<S.gridSize-1;r++)
    for(let c=0;c<S.gridSize-1;c++) {
      const key=r+','+c+','+team;
      if(S.known2x2.has(key)) continue;
      if(S.grid[r][c]===team&&S.grid[r][c+1]===team&&
         S.grid[r+1][c]===team&&S.grid[r+1][c+1]===team) {
        S.known2x2.add(key);
        if(S.teams[team].jokersThisPhase>=2) {
          addLog('🃏 2×2 erkannt — Joker-Limit (2/Phase) erreicht für '+NAMES[team]);
        } else {
          S.teams[team].jokers++;
          S.teams[team].jokersThisPhase++;
          got=true;
          addLog('🃏 2×2! '+NAMES[team]+' bekommt Joker ('+S.teams[team].jokersThisPhase+'/2 diese Phase)');
        }
      }
    }
  if(got) { const el=document.getElementById('joker-flash'); if(el){el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2500);} }
}

// ── Phase 3 bonus ─────────────────────────────────────────────────────────────
function applyPhase3Bonus() {
  // Instead of automatic fields: last-place team chooses their comeback action
  const last=lastPlaceIdx();
  const counts=fieldCounts();
  const maxCount=Math.max(...counts);
  // Only trigger if last team is meaningfully behind
  if(counts[last]>=maxCount){ addLog('🎁 Kein Bonus nötig — Teams ausgeglichen'); return; }
  S.bonusTeam=last;
  S.bonusAction=null;   // 'place' | 'steal' | 'swap'
  S.bonusCount=0;       // progress within chosen action
  S.swapFirst=null;     // first cell selected for swap
  S.flowState='phase3-bonus';
  addLog('🎁 '+NAMES[last]+' (Letzter) darf Comeback-Aktion wählen');
}

// ── Flow control ─────────────────────────────────────────────────────────────
function toggleWinner(i) {
  if(S.flowState!=='select-winner') return;
  const idx=S.selectedWinners.indexOf(i);
  if(idx>=0) S.selectedWinners.splice(idx,1); else S.selectedWinners.push(i);
  render();
}

function confirmWinners() {
  if(!S.selectedWinners.length) { addLog('Niemand hat gewonnen — Frage überspringen?'); return; }
  S.pendingWinners=[...S.selectedWinners];
  S.selectedWinners=[];
  startNextPendingWinner();
}

function skipQuestion() {
  addLog('— Frage '+S.question+' übersprungen (niemand richtig)');
  advanceQuestion();
}

function startNextPendingWinner() {
  if(!S.pendingWinners.length){ advanceQuestion(); return; }
  S.actingTeam=S.pendingWinners.shift();
  S.placedThisTurn=0;
  S.mode='place';
  S.flowState='placing';
  addLog('→ '+NAMES[S.actingTeam]+' ist dran (Phase '+S.phase+')');
  render();
}

function advanceQuestion() {
  if(S.question>=5) {
    // End of phase
    if(S.phase>=3){ S.flowState='done'; render(); return; }
    S.flowState='phase-transition';
    render();
    return;
  }
  S.question++;
  S.flowState='select-winner';
  S.selectedWinners=[];
  render();
}

function nextPhase() {
  S.phase++;
  S.question=1;
  S.flowState='select-winner';
  S.selectedWinners=[];
  // reset per-phase steal counters
  S.teams.forEach(t=>{ t.stealsInP2=0; t.jokersThisPhase=0; });
  S.known2x2=new Set(); // reset so formations can give jokers again in new phase
  addLog('════ Phase '+S.phase+' beginnt ════');
  if(S.phase===3) applyPhase3Bonus();
  render();
}

// ── Mode setter (phase 2) ─────────────────────────────────────────────────────
function setMode(mode) {
  if(S.phase!==2) return;
  const team=S.actingTeam;
  if(mode==='steal'&&S.teams[team].stealsInP2>=2){addLog('⚠ Bereits 2× geklaut');return;}
  S.mode=mode; S.placedThisTurn=0;
  render();
}

// ── Cell click ───────────────────────────────────────────────────────────────
function handleBonusCell(r,c) {
  const owner=S.grid[r][c];
  const team=S.bonusTeam;

  if(S.bonusAction==='place') {
    if(owner!==null){addLog('Feld belegt!');return;}
    S.grid[r][c]=team; S.bonusCount++;
    addLog(NAMES[team]+' setzt Bonus-Feld ('+S.bonusCount+'/2)');
    checkJoker(team);
    if(S.bonusCount>=2) finishBonus();
    else render();

  } else if(S.bonusAction==='steal') {
    if(owner===null||owner===team){addLog('Gegnerfeld wählen!');return;}
    addLog(NAMES[team]+' klaut Bonus von '+NAMES[owner]);
    S.grid[r][c]=team; S.bonusCount++;
    checkJoker(team);
    finishBonus();

  } else if(S.bonusAction==='swap') {
    if(owner===null||owner===team){addLog('Feld eines anderen Teams wählen!');return;}
    if(!S.swapFirst) {
      S.swapFirst={r,c,team:owner};
      addLog('Tausch: erstes Feld gewählt ('+NAMES[owner]+' auf '+r+','+c+') — jetzt zweites Feld eines anderen Teams');
      render();
    } else {
      if(owner===S.swapFirst.team){addLog('Zweites Feld muss von einem anderen Team sein!');return;}
      // Swap the two cells
      const a=S.swapFirst;
      S.grid[a.r][a.c]=owner;
      S.grid[r][c]=a.team;
      addLog('Tausch: '+NAMES[a.team]+'↔'+NAMES[owner]+' — Felder getauscht');
      S.bonusCount++;
      finishBonus();
    }
  }
}

function finishBonus() {
  S.flowState='select-winner';
  S.bonusAction=null; S.bonusCount=0; S.swapFirst=null; S.bonusTeam=null;
  render();
}

function setBonusAction(action) {
  S.bonusAction=action; S.bonusCount=0; S.swapFirst=null;
  render();
}

function handleCell(r,c) {
  if(S.flowState==='phase3-bonus') { handleBonusCell(r,c); return; }
  if(S.flowState!=='placing') return;
  const owner=S.grid[r][c];
  const team=S.actingTeam;
  const p=S.phase;

  if(p===1) {
    if(owner!==null){addLog('Feld belegt!');return;}
    S.grid[r][c]=team;
    addLog(NAMES[team]+' setzt ('+r+','+c+')');
    checkJoker(team);
    startNextPendingWinner();

  } else if(p===2) {
    if(S.mode==='place') {
      // Clicking an opponent field in place-mode: only allow steal if no field placed yet (entweder-oder!)
      if(owner!==null && owner!==team) {
        if(S.placedThisTurn>0){addLog('⚠ Bereits angefangen zu setzen — kein Klauen mehr diese Aktion');return;}
        if(S.teams[team].stealsInP2>=2){addLog('⚠ Bereits 2× geklaut diese Phase');return;}
        addLog(NAMES[team]+' klaut von '+NAMES[owner]+' ('+r+','+c+')');
        S.grid[r][c]=team; S.teams[team].stealsInP2++;
        S.mode='steal';
        checkJoker(team);
        startNextPendingWinner();
        return;
      }
      if(owner!==null){addLog('Feld belegt!');return;}
      S.grid[r][c]=team; S.placedThisTurn++;
      addLog(NAMES[team]+' setzt ('+r+','+c+') ['+S.placedThisTurn+'/2]');
      checkJoker(team);
      if(S.placedThisTurn>=2) startNextPendingWinner();
      else render();
    } else { // steal mode explicitly chosen
      if(owner===null){addLog('Kein Gegnerfeld!');return;}
      if(owner===team){addLog('Eigenes Feld!');return;}
      if(S.teams[team].stealsInP2>=2){addLog('Bereits 2× geklaut!');return;}
      addLog(NAMES[team]+' klaut von '+NAMES[owner]+' ('+r+','+c+')');
      S.grid[r][c]=team; S.teams[team].stealsInP2++;
      checkJoker(team);
      startNextPendingWinner();
    }

  } else { // phase 3
    if(owner===team){addLog('Eigenes Feld!');return;}
    if(owner===null) {
      S.grid[r][c]=team;
      addLog(NAMES[team]+' setzt ('+r+','+c+')');
      checkJoker(team);
    } else {
      addLog(NAMES[team]+' klaut von '+NAMES[owner]+' ('+r+','+c+')');
      S.grid[r][c]=team;
      checkJoker(team);
    }
    startNextPendingWinner();
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderCenter();
  renderTeams();
  renderLog();
}

function renderCenter() {
  const col=document.getElementById('center-col');
  col.innerHTML='';

  // Phase transition screen
  if(S.flowState==='phase3-bonus') {
    const team=S.bonusTeam;
    const card=el('div','q-card');
    card.style.borderColor=hexAlpha(COLORS[team],0.4);
    const meta=el('div','q-meta'); meta.textContent='Comeback-Aktion — vor Phase 3';
    card.appendChild(meta);
    const title=el('div'); title.style.cssText='font-weight:800;font-size:16px;margin-bottom:4px';
    title.innerHTML='<span style="color:'+COLORS[team]+'">'+NAMES[team]+'</span> wählt eine Aktion:';
    card.appendChild(title);

    if(!S.bonusAction) {
      // Choice screen
      const desc=el('div'); desc.style.cssText='font-size:12px;color:#94a3b8;margin-bottom:10px';
      desc.textContent='Als letztes Team darf '+NAMES[team]+' eine Comeback-Aktion wählen:';
      card.appendChild(desc);
      const row=el('div'); row.style.cssText='display:flex;gap:8px;flex-wrap:wrap';
      const opts=[
        {action:'place', label:'✦ 2 freie Felder', desc:'2 leere Felder frei wählen'},
        {action:'steal', label:'⚡ 1 Feld klauen', desc:'1 beliebiges Gegnerfeld nehmen'},
        {action:'swap',  label:'⇄ 2 Felder tauschen', desc:'Feld von Team A mit Feld von Team B tauschen'},
      ];
      opts.forEach(o=>{
        const btn=document.createElement('button');
        btn.className='btn';
        btn.style.cssText='display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 14px';
        btn.innerHTML='<span style="font-size:13px">'+o.label+'</span><span style="font-size:11px;color:#64748b;font-weight:400">'+o.desc+'</span>';
        btn.onclick=()=>setBonusAction(o.action);
        row.appendChild(btn);
      });
      card.appendChild(row);
    } else {
      // Action in progress
      const hints={
        place: 'Klick auf '+( 2-S.bonusCount)+' leere Felder',
        steal: 'Klick auf ein beliebiges Gegnerfeld',
        swap:  S.swapFirst ? 'Erstes Feld: '+NAMES[S.swapFirst.team]+' ('+S.swapFirst.r+','+S.swapFirst.c+') — jetzt Feld eines anderen Teams klicken' : 'Klick auf Feld von Team A (wird getauscht)',
      };
      const hint=el('div'); hint.style.cssText='font-size:13px;color:#94a3b8;margin-bottom:8px';
      hint.textContent=hints[S.bonusAction];
      card.appendChild(hint);
      const back=el('button','btn'); back.textContent='← Zurück';
      back.onclick=()=>{ S.bonusAction=null; S.swapFirst=null; render(); };
      card.appendChild(back);
    }
    col.appendChild(card);
    col.appendChild(buildGrid());
    col.appendChild(buildOcc());
    col.appendChild(buildLog());
    return;
  }

  if(S.flowState==='phase-transition') {
    const banner=el('div','phase-banner');
    const labels=['','Runde 2 beginnt','Phase 3 beginnt'];
    const descs=['',
      'Pro Frage: 2 Felder setzen ODER 1 Feld klauen (max 2× pro Team)',
      'Freies Klauen! Das letzte Team wählt zuerst seine Comeback-Aktion.'
    ];
    banner.innerHTML='<h2>'+labels[S.phase]+'</h2><p>'+descs[S.phase]+'</p>';
    const btn=el('button','btn go');
    btn.textContent=S.phase<3?'Phase '+(S.phase+1)+' starten ▶':'Spiel beenden';
    btn.onclick=()=>{ if(S.phase<3)nextPhase(); else{S.flowState='done';render();} };
    banner.appendChild(btn);
    col.appendChild(banner);
    return;
  }

  if(S.flowState==='done') {
    const banner=el('div','phase-banner');
    const conn=connectedScores();
    const counts=fieldCounts();
    const winner=conn.indexOf(Math.max(...conn));
    const scoreStr=NAMES.slice(0,S.teamCount).map((n,i)=>
      '<span style="color:'+COLORS[i]+'">'+n+'</span>: '+conn[i]+' verbunden ('+counts[i]+' total)'
    ).join(' · ');
    banner.innerHTML='<h2>Spiel vorbei!</h2><p style="margin-bottom:6px">Größtes zusammenhängendes Gebiet:</p><p style="font-size:12px">'+scoreStr+'</p><p style="margin-top:8px;color:#4ade80;font-weight:800">🏆 '+NAMES[winner]+' gewinnt!</p>';
    const btn=el('button','btn danger');
    btn.textContent='↺ Neu starten';
    btn.onclick=resetGame;
    banner.style.marginBottom='4px';
    banner.appendChild(btn);
    col.appendChild(banner);
    col.appendChild(buildGrid());
    col.appendChild(buildOcc());
    col.appendChild(buildLog());
    return;
  }

  // Question card
  const qcard=el('div','q-card');
  const meta=el('div','q-meta');
  meta.textContent='Phase '+S.phase+' · Frage '+S.question+'/5 · '+phaseLabel();
  qcard.appendChild(meta);

  const catEl=el('div','q-cat');
  catEl.style.background=hexAlpha(cat().color,0.15);
  catEl.style.color=cat().color;
  catEl.style.border='1px solid '+hexAlpha(cat().color,0.3);
  catEl.textContent=cat().emoji+' '+cat().name;
  qcard.appendChild(catEl);

  if(S.flowState==='select-winner') {
    const instr=el('div','q-instruction');
    instr.textContent='Wer hat diese Frage richtig beantwortet?';
    qcard.appendChild(instr);

    const row=el('div','winner-row');
    for(let i=0;i<S.teamCount;i++) {
      const wb=document.createElement('button');
      wb.className='winner-btn'+(S.selectedWinners.includes(i)?' sel':'');
      wb.style.background=hexAlpha(COLORS[i],0.15);
      wb.style.color=COLORS[i];
      wb.style.borderColor=hexAlpha(COLORS[i],0.4);
      wb.textContent=NAMES[i];
      wb.onclick=()=>toggleWinner(i);
      row.appendChild(wb);
    }
    qcard.appendChild(row);

    const actions=el('div');
    actions.style.cssText='display:flex;gap:8px;margin-top:10px;flex-wrap:wrap';
    const confirmBtn=el('button','btn go');
    confirmBtn.textContent='Weiter →';
    confirmBtn.onclick=confirmWinners;
    confirmBtn.disabled=S.selectedWinners.length===0;
    const skipBtn=el('button','btn');
    skipBtn.textContent='Niemand / Überspringen';
    skipBtn.onclick=skipQuestion;
    actions.appendChild(confirmBtn);
    actions.appendChild(skipBtn);
    qcard.appendChild(actions);

  } else if(S.flowState==='placing') {
    const instr=el('div','q-instruction');
    const team=S.actingTeam;
    const remaining=S.pendingWinners.length;
    instr.innerHTML='<span style="color:'+COLORS[team]+';font-weight:800">'+NAMES[team]+'</span> setzt'+(remaining?' (danach noch '+remaining+' Team'+( remaining>1?'s':'')+')':'');
    qcard.appendChild(instr);
  }

  col.appendChild(qcard);

  // Phase 2 action chooser
  if(S.flowState==='placing'&&S.phase===2) {
    const box=el('div','action-box');
    const t=el('div','action-title'); t.textContent='Aktion wählen';
    box.appendChild(t);
    const row=el('div'); row.style.cssText='display:flex;gap:7px';
    const pb=el('button','btn'+(S.mode==='place'?' active':''));
    pb.textContent='✦ 2 Felder setzen'; pb.onclick=()=>setMode('place');
    const sb=el('button','btn'+(S.mode==='steal'?' active':''));
    sb.textContent='⚡ 1 Klauen';
    const t2=S.teams[S.actingTeam];
    // Lock both buttons once an action has started (entweder-oder)
    if(S.placedThisTurn>0){ pb.disabled=true; sb.disabled=true; pb.title='Bereits Feld gesetzt'; }
    else if(t2.stealsInP2>=2){sb.disabled=true;sb.title='Bereits 2× geklaut diese Phase';}
    sb.onclick=()=>setMode('steal');
    row.appendChild(pb); row.appendChild(sb);
    box.appendChild(row);
    const hint=el('div','action-hint');
    if(S.mode==='place') hint.textContent='Klick auf '+(2-S.placedThisTurn)+' leere Felder';
    else hint.textContent='Klick auf ein Gegner-Feld';
    box.appendChild(hint);
    col.appendChild(box);
  }

  // Joker flash
  const jf=el('div','joker-flash'); jf.id='joker-flash'; jf.textContent='🃏 2×2-Formation! Joker vergeben.';
  col.appendChild(jf);

  // Grid
  col.appendChild(buildGrid());
  col.appendChild(buildOcc());
  col.appendChild(buildLog());
}

function buildGrid() {
  const gridEl=el('div','grid');
  const maxPx=Math.min(window.innerWidth-380,300);
  const cellPx=Math.max(32,Math.floor((maxPx-(S.gridSize-1)*5)/S.gridSize));
  gridEl.style.gridTemplateColumns='repeat('+S.gridSize+','+cellPx+'px)';

  const p=S.phase;
  const placing=S.flowState==='placing';
  const inBonus=S.flowState==='phase3-bonus' && S.bonusAction;
  const team=S.actingTeam;
  const bonusTeam=S.bonusTeam;

  for(let r=0;r<S.gridSize;r++) {
    for(let c=0;c<S.gridSize;c++) {
      const owner=S.grid[r][c];
      const cell=el('div','cell');
      cell.style.width=cellPx+'px'; cell.style.height=cellPx+'px';
      cell.style.fontSize=Math.max(10,cellPx*0.24)+'px';

      if(owner!==null) {
        cell.style.background=COLORS[owner];
        cell.style.borderColor=hexAlpha(COLORS[owner],0.6);
        cell.style.color='rgba(0,0,0,0.4)';
        cell.textContent=NAMES[owner][0];
        // Highlight first swap selection
        if(inBonus && S.bonusAction==='swap' && S.swapFirst && S.swapFirst.r===r && S.swapFirst.c===c) {
          cell.style.outline='3px solid #fff';
        }
      }

      if(inBonus) {
        const a=S.bonusAction;
        if(a==='place' && owner===null) { cell.classList.add('interactive','placeable'); }
        else if(a==='steal' && owner!==null && owner!==bonusTeam) { cell.classList.add('interactive','stealable'); }
        else if(a==='swap' && owner!==null && owner!==bonusTeam) {
          // For second swap pick: must be different team than first
          if(!S.swapFirst || owner!==S.swapFirst.team) cell.classList.add('interactive','stealable');
        }
        if(cell.classList.contains('interactive')) cell.onclick=()=>handleCell(r,c);
      } else if(placing) {
        cell.classList.add('interactive');
        if(owner===null) {
          const canPlace=p===1||(p===2&&S.mode==='place')||p===3;
          if(canPlace) cell.classList.add('placeable');
        } else if(owner!==team) {
          const canSteal=(p===2&&S.teams[team].stealsInP2<2)||p===3;
          if(canSteal) cell.classList.add('stealable');
        }
        cell.onclick=()=>handleCell(r,c);
      }
      gridEl.appendChild(cell);
    }
  }
  return gridEl;
}

function buildOcc() {
  const d=el('div','occ');
  const counts=fieldCounts();
  const filled=counts.reduce((a,b)=>a+b,0);
  const total=totalCells();
  d.textContent=filled+' / '+total+' Felder belegt ('+Math.round(filled/total*100)+'%)';
  return d;
}

function buildLog() {
  const w=el('div','log-wrap');
  const lbl=el('div','log-lbl'); lbl.textContent='Log';
  const log=el('div','log');
  log.innerHTML=S.log.map(e=>'<div class="log-entry">'+e+'</div>').join('');
  w.appendChild(lbl); w.appendChild(log);
  return w;
}

function renderTeams() {
  const counts=fieldCounts();
  const total=totalCells();
  const lastIdx=lastPlaceIdx();
  const leftEl=document.getElementById('panel-left');
  const rightEl=document.getElementById('panel-right');
  leftEl.innerHTML='<div class="panel-lbl">Teams</div>';
  rightEl.innerHTML='<div class="panel-lbl">&nbsp;</div>';

  const conn=connectedScores();
  const maxConn=Math.max(...conn,1);

  for(let i=0;i<S.teamCount;i++) {
    const acting=S.flowState==='placing'&&S.actingTeam===i;
    const card=el('div','team-card'+(acting?' acting':''));
    card.style.borderColor=acting?COLORS[i]:'rgba(255,255,255,0.07)';
    const pct=total>0?Math.round(counts[i]/total*100):0;
    const connPct=Math.round(conn[i]/maxConn*100);
    const jb=S.teams[i].jokers>0?'<span class="badge badge-j">🃏'+S.teams[i].jokers+'</span> ':'';
    const sb=S.phase===2&&S.teams[i].stealsInP2>0?'<span class="badge badge-s">⚡'+S.teams[i].stealsInP2+'/2</span> ':'';
    const last=i===lastIdx&&S.teamCount>1?'<span style="font-size:10px;color:#64748b"> letzter</span>':'';
    card.innerHTML=
      '<div class="tc-row"><div class="tc-dot" style="background:'+COLORS[i]+'"></div>'+
      '<div class="tc-name" style="color:'+COLORS[i]+'">'+NAMES[i]+last+'</div>'+jb+sb+'</div>'+
      '<div class="tc-stat">'+conn[i]+' verbunden · '+counts[i]+' total ('+pct+'%)</div>'+
      '<div class="fbar"><div class="fbar-fill" style="width:'+connPct+'%;background:'+COLORS[i]+'"></div></div>';
    (i%2===0?leftEl:rightEl).appendChild(card);
  }
}

function renderLog() {
  // Log is now part of center-col, rebuilt on each render
}

// ── Utils ────────────────────────────────────────────────────────────────────
function el(tag,cls) { const e=document.createElement(tag); if(cls)e.className=cls; return e; }
function hexAlpha(hex,a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

// ── Simulation ───────────────────────────────────────────────────────────────
let simSpeed = 500;
let simTimer = null;

function setSpeed(ms) {
  simSpeed = ms;
  ['slow','mid','fast'].forEach(k => document.getElementById('spd-'+k).classList.remove('active'));
  if(ms>=1000) document.getElementById('spd-slow').classList.add('active');
  else if(ms<=150) document.getElementById('spd-fast').classList.add('active');
  else document.getElementById('spd-mid').classList.add('active');
}

function toggleSim() {
  const btn = document.getElementById('sim-btn');
  if(simTimer) {
    clearTimeout(simTimer); simTimer=null;
    btn.textContent='▶ Auto-Sim'; btn.classList.remove('danger'); btn.classList.add('go');
  } else {
    btn.textContent='⏹ Stop'; btn.classList.remove('go'); btn.classList.add('danger');
    simStep();
  }
}

function simStep() {
  const btn = document.getElementById('sim-btn');
  if(!btn || !btn.textContent.includes('Stop')) return;

  if(S.flowState==='done') { toggleSim(); return; }

  // Execute one logical step
  if(S.flowState==='phase-transition') {
    nextPhase();
  } else if(S.flowState==='phase3-bonus') {
    if(!S.bonusAction) {
      // Pick random action
      const actions=['place','steal','swap'];
      // Only steal/swap if opponent cells exist
      const hasOpponent = S.grid.some(row=>row.some(c=>c!==null&&c!==S.bonusTeam));
      const choices = hasOpponent ? actions : ['place'];
      setBonusAction(choices[Math.floor(Math.random()*choices.length)]);
    } else {
      simExecuteBonus();
    }
  } else if(S.flowState==='select-winner') {
    // Randomly pick winners: each team 65% chance, at least sometimes nobody
    const winners=[];
    for(let i=0;i<S.teamCount;i++) if(Math.random()<0.65) winners.push(i);
    if(winners.length===0) {
      skipQuestion();
    } else {
      S.selectedWinners=winners;
      confirmWinners();
    }
  } else if(S.flowState==='placing') {
    simExecutePlacing();
    return; // placing may need multiple steps, don't schedule next yet
  }

  simTimer = setTimeout(()=>{ simTimer=null; simStep(); }, simSpeed);
}

function simExecuteBonus() {
  const team=S.bonusTeam;
  const a=S.bonusAction;
  if(a==='place') {
    const cell=simRandomEmpty();
    if(cell) { S.grid[cell[0]][cell[1]]=team; S.bonusCount++; checkJoker(team); addLog(NAMES[team]+' Bonus-Feld ('+S.bonusCount+'/2)'); }
    if(S.bonusCount>=2||!cell) finishBonus();
    else { render(); simTimer=setTimeout(()=>{ simTimer=null; simStep(); },simSpeed); return; }
  } else if(a==='steal') {
    const cell=simRandomOpponent(team);
    if(cell) { addLog(NAMES[team]+' klaut Bonus von '+NAMES[S.grid[cell[0]][cell[1]]]); S.grid[cell[0]][cell[1]]=team; checkJoker(team); }
    finishBonus();
  } else if(a==='swap') {
    // Find two cells from different opponent teams
    const opp=simAllOpponentCells(team);
    const teams=[...new Set(opp.map(c=>S.grid[c[0]][c[1]]))];
    if(teams.length>=2) {
      const cellsA=opp.filter(c=>S.grid[c[0]][c[1]]===teams[0]);
      const cellsB=opp.filter(c=>S.grid[c[0]][c[1]]===teams[1]);
      const a0=cellsA[Math.floor(Math.random()*cellsA.length)];
      const b0=cellsB[Math.floor(Math.random()*cellsB.length)];
      const tmp=S.grid[a0[0]][a0[1]];
      S.grid[a0[0]][a0[1]]=S.grid[b0[0]][b0[1]];
      S.grid[b0[0]][b0[1]]=tmp;
      addLog(NAMES[team]+' tauscht Felder zwischen '+NAMES[S.grid[b0[0]][b0[1]]]+' und '+NAMES[S.grid[a0[0]][a0[1]]]);
    }
    finishBonus();
  }
  render();
  simTimer=setTimeout(()=>{ simTimer=null; simStep(); },simSpeed);
}

function simExecutePlacing() {
  const team=S.actingTeam;
  const p=S.phase;

  if(p===1) {
    const cell=simSmartEmpty(team);
    if(cell) { S.grid[cell[0]][cell[1]]=team; checkJoker(team); addLog(NAMES[team]+' setzt'); }
    startNextPendingWinner();
  } else if(p===2) {
    // Decide: steal or place 2?
    const canSteal=S.teams[team].stealsInP2<2&&simRandomOpponent(team);
    const doSteal=canSteal&&Math.random()<0.4&&S.placedThisTurn===0;
    if(doSteal) {
      const cell=simRandomOpponent(team);
      if(cell) { addLog(NAMES[team]+' klaut von '+NAMES[S.grid[cell[0]][cell[1]]]); S.grid[cell[0]][cell[1]]=team; S.teams[team].stealsInP2++; S.mode='steal'; checkJoker(team); }
      startNextPendingWinner();
    } else {
      const cell=simSmartEmpty(team);
      if(cell) { S.grid[cell[0]][cell[1]]=team; S.placedThisTurn++; addLog(NAMES[team]+' setzt ['+S.placedThisTurn+'/2]'); checkJoker(team); }
      if(S.placedThisTurn>=2||!cell) startNextPendingWinner();
      else { render(); simTimer=setTimeout(()=>{ simTimer=null; simStep(); },simSpeed/2); return; }
    }
  } else { // phase 3
    const doSteal=Math.random()<0.55&&simRandomOpponent(team);
    if(doSteal) {
      const cell=simRandomOpponent(team);
      if(cell) { addLog(NAMES[team]+' klaut von '+NAMES[S.grid[cell[0]][cell[1]]]); S.grid[cell[0]][cell[1]]=team; checkJoker(team); }
    } else {
      const cell=simSmartEmpty(team);
      if(cell) { S.grid[cell[0]][cell[1]]=team; addLog(NAMES[team]+' setzt'); checkJoker(team); }
      else {
        // board full, must steal
        const sc=simRandomOpponent(team);
        if(sc) { addLog(NAMES[team]+' klaut (Board voll) von '+NAMES[S.grid[sc[0]][sc[1]]]); S.grid[sc[0]][sc[1]]=team; checkJoker(team); }
      }
    }
    startNextPendingWinner();
  }
  render();
  simTimer=setTimeout(()=>{ simTimer=null; simStep(); },simSpeed);
}

// Prefer cells adjacent to own territory
function simSmartEmpty(team) {
  const adj=[];
  const free=[];
  for(let r=0;r<S.gridSize;r++)
    for(let c=0;c<S.gridSize;c++)
      if(S.grid[r][c]===null) {
        free.push([r,c]);
        const neighbors=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
        if(neighbors.some(([nr,nc])=>nr>=0&&nr<S.gridSize&&nc>=0&&nc<S.gridSize&&S.grid[nr][nc]===team))
          adj.push([r,c]);
      }
  const pool=adj.length?adj:free;
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}

function simRandomEmpty() {
  const free=[];
  for(let r=0;r<S.gridSize;r++) for(let c=0;c<S.gridSize;c++) if(S.grid[r][c]===null) free.push([r,c]);
  return free.length?free[Math.floor(Math.random()*free.length)]:null;
}

function simRandomOpponent(team) {
  const opp=simAllOpponentCells(team);
  return opp.length?opp[Math.floor(Math.random()*opp.length)]:null;
}

function simAllOpponentCells(team) {
  const opp=[];
  for(let r=0;r<S.gridSize;r++) for(let c=0;c<S.gridSize;c++) if(S.grid[r][c]!==null&&S.grid[r][c]!==team) opp.push([r,c]);
  return opp;
}

// Init
initGame(3);
