<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid v2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#0a0d14;
  min-height:100vh; color:#f1f5f9;
  font-family:'Space Grotesk',sans-serif;
  display:flex; align-items:center; justify-content:center;
  padding:32px; overflow:hidden;
}

.board-wrap { position:relative; }

.city-grid {
  display:grid; gap:3px; position:relative;
}

.tile {
  position:relative; cursor:pointer; overflow:visible;
}
.tile.owned { cursor:default; }

.tile-base {
  position:absolute; inset:0; border-radius:3px;
  transition:background .25s, border-color .25s, box-shadow .25s;
}

.tile-svg {
  position:absolute; bottom:0; left:0; right:0;
  pointer-events:none; overflow:visible;
}

/* Rise animation — building grows up from ground */
@keyframes buildRise {
  0%   { transform:scaleY(0); opacity:0; }
  65%  { transform:scaleY(1.06); opacity:1; }
  82%  { transform:scaleY(.97); }
  100% { transform:scaleY(1); opacity:1; }
}
.rising {
  transform-origin:50% 100%;
  animation:buildRise .6s cubic-bezier(.34,1.4,.64,1) forwards;
}

@keyframes homeGlow {
  0%,100% { box-shadow:var(--g-base); }
  50%      { box-shadow:var(--g-peak); }
}

/* Score bar */
.score-bar {
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:16px;
}
.team-pill {
  display:flex; align-items:center; gap:7px; padding:6px 14px; border-radius:8px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06);
  cursor:pointer; transition:all .2s; user-select:none; font-size:12px;
}
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 16px var(--tc-glow); }
.tp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tp-name { font-weight:700; }
.tp-count { color:#253040; font-weight:600; margin-left:2px; }

.outline-svg { position:absolute; inset:0; pointer-events:none; overflow:visible; z-index:50; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;">
  <div style="font-size:11px;color:#2a3550;letter-spacing:.08em;margin-bottom:14px;">QUARTER QUIZ — CITY GRID v2 · Eigene Gebäude-Formen</div>
  <div class="board-wrap" id="board-wrap">
    <div class="city-grid" id="grid"></div>
    <svg class="outline-svg" id="outline-svg"></svg>
  </div>
  <div class="score-bar" id="scorebar"></div>
  <div style="font-size:11px;color:#1a2236;margin-top:12px;letter-spacing:.05em;">Team wählen → Feld klicken</div>
</div>

<script>
const SIZE=7, CELL=76, GAP=3;
const NS='http://www.w3.org/2000/svg';

// ─────────────────────────────────────────────
// TEAMS — each has a unique building SHAPE
// ─────────────────────────────────────────────
const TEAMS=[
  {color:'#00aaff', r:0,  g:170,b:255, name:'Die Clique',  shape:'circle'},
  {color:'#ff0080', r:255,g:0,  b:128, name:'Rote Karte',  shape:'triangle'},
  {color:'#00dd66', r:0,  g:221,b:102, name:'Grüne Hölle', shape:'hex'},
  {color:'#ffcc00', r:255,g:204,b:0,   name:'Oranje',      shape:'diamond'},
];
let activeTeam=0;

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
function seed(r,c,t,home=false){ state[r][c]={teamIdx:t,home}; }
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);seed(0,2,0);
seed(0,6,1,true);seed(0,5,1);seed(1,6,1);seed(1,5,1);seed(0,4,1);
seed(6,0,2,true);seed(5,0,2);seed(6,1,2);seed(5,1,2);seed(6,2,2);
seed(6,6,3,true);seed(5,6,3);seed(6,5,3);seed(5,5,3);

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function rca(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjCount(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return 0;
  return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;
}
function isEdgeCell(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return false;
  return[[-1,0],[1,0],[0,-1],[0,1]].some(([dr,dc])=>!same(r+dr,c+dc,ti));
}

// Building height: home=tall, connected=medium, edge=medium-low, lone=short
function getHeight(r,c){
  const cell=state[r][c]; if(!cell) return 0;
  if(cell.home) return CELL*.82;
  const adj=adjCount(r,c);
  if(adj>=3) return CELL*.52;
  if(adj>=1) return CELL*.38;
  return CELL*.28;
}

// Color shading helpers
function hexToRgb(hex){
  return{
    r:parseInt(hex.slice(1,3),16),
    g:parseInt(hex.slice(3,5),16),
    b:parseInt(hex.slice(5,7),16)
  };
}
function shadeHex(hex,f){
  const{r,g,b}=hexToRgb(hex);
  return`#${[r,g,b].map(v=>Math.min(255,Math.round(v*f)).toString(16).padStart(2,'0')).join('')}`;
}
function rgbaHex(hex,a){
  const{r,g,b}=hexToRgb(hex);
  return`rgba(${r},${g},${b},${a})`;
}

// ─────────────────────────────────────────────
// ISO BUILDING RENDERER
// Each shape type gets its own extruded 3D version
// Coordinate system: origin = center-bottom of tile
// Buildings extend upward (negative y)
// Iso projection: camera slightly above and to the right
//   - right face: x goes right, slightly down
//   - left face: x goes left, slightly down
//   - top face: flat-ish roof
// ─────────────────────────────────────────────

// Project a point from "building space" to screen space
// bx = -1..1 (left-right), by = 0..1 (bottom-top), bz = -1..1 (front-back)
// Returns screen {x, y} relative to building anchor (center-bottom)
const ISO_SCALE_X = CELL * 0.38;  // horizontal spread
const ISO_SCALE_Z = CELL * 0.18;  // depth foreshortening
const ISO_SCALE_Y = 1.0;          // vertical (height multiplied by building h)

function proj(bx, by, bz, H){
  return {
    x: bx * ISO_SCALE_X + bz * ISO_SCALE_Z,
    y: -by * H           + bz * ISO_SCALE_Z * 0.5
  };
}

function pt(p){ return`${p.x.toFixed(1)},${p.y.toFixed(1)}`; }
function polygon(pts, fill, stroke, sw=.8){
  return`<polygon points="${pts.map(pt).join(' ')}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/>`;
}

// ── CIRCLE → CYLINDER ──
function shapeCylinder(cx, cy, H, color){
  const rx = ISO_SCALE_X * 0.72;   // ellipse x-radius
  const ry = rx * 0.28;            // ellipse y-radius (foreshortened)
  const dark  = shadeHex(color, .45);
  const mid   = shadeHex(color, .68);
  const light = shadeHex(color, 1.0);
  const stroke= shadeHex(color, .35);

  // Left wall (dark)
  const leftWall=`<path d="
    M ${(cx-rx).toFixed(1)},${cy.toFixed(1)}
    A ${rx} ${ry} 0 0 0 ${cx.toFixed(1)},${(cy+ry).toFixed(1)}
    L ${cx.toFixed(1)},${(cy+ry-H).toFixed(1)}
    A ${rx} ${ry} 0 0 1 ${(cx-rx).toFixed(1)},${(cy-H).toFixed(1)}
    Z" fill="${dark}" stroke="${stroke}" stroke-width=".8"/>`;

  // Right wall (mid)
  const rightWall=`<path d="
    M ${(cx+rx).toFixed(1)},${cy.toFixed(1)}
    A ${rx} ${ry} 0 0 1 ${cx.toFixed(1)},${(cy+ry).toFixed(1)}
    L ${cx.toFixed(1)},${(cy+ry-H).toFixed(1)}
    A ${rx} ${ry} 0 0 0 ${(cx+rx).toFixed(1)},${(cy-H).toFixed(1)}
    Z" fill="${mid}" stroke="${stroke}" stroke-width=".8"/>`;

  // Top ellipse (light — roof)
  const topEllipse=`<ellipse cx="${cx.toFixed(1)}" cy="${(cy-H).toFixed(1)}" rx="${rx.toFixed(1)}" ry="${ry.toFixed(1)}" fill="${light}" stroke="${stroke}" stroke-width=".8"/>`;

  return leftWall+rightWall+topEllipse;
}

// ── TRIANGLE → PRISM ──
function shapePrism(cx, cy, H, color){
  const w = ISO_SCALE_X * 0.85;
  const dark  = shadeHex(color, .42);
  const mid   = shadeHex(color, .65);
  const light = shadeHex(color, 1.0);
  const stroke= shadeHex(color, .3);

  // Bottom triangle footprint (projected)
  const b0 = {x:cx,      y:cy - ISO_SCALE_Z*.5};  // front tip
  const b1 = {x:cx-w,    y:cy + ISO_SCALE_Z*.25};  // back-left
  const b2 = {x:cx+w,    y:cy + ISO_SCALE_Z*.25};  // back-right

  // Top triangle (shifted up by H)
  const t0 = {x:b0.x, y:b0.y - H};
  const t1 = {x:b1.x, y:b1.y - H};
  const t2 = {x:b2.x, y:b2.y - H};

  // Left face
  const left  = polygon([b0,b1,t1,t0], dark, stroke);
  // Right face
  const right = polygon([b0,b2,t2,t0], mid, stroke);
  // Top face
  const top   = polygon([t0,t1,t2], light, stroke);

  return left+right+top;
}

// ── HEXAGON → HEX PRISM ──
function shapeHexPrism(cx, cy, H, color){
  const r = ISO_SCALE_X * 0.72;
  const dark  = shadeHex(color, .40);
  const mid   = shadeHex(color, .62);
  const light = shadeHex(color, 1.0);
  const stroke= shadeHex(color, .3);

  // Hex points (flat-top), projected iso
  // 6 corners at angles 0,60,120,180,240,300 deg
  function hexPt(i, yOff=0){
    const a = (i*60 - 30) * Math.PI/180;
    const bx = Math.cos(a);
    const bz = Math.sin(a) * .45; // foreshorten depth
    return {
      x: cx + bx * r,
      y: cy + bz * r * .5 + yOff
    };
  }

  const bot = Array.from({length:6},(_,i)=>hexPt(i));
  const top = Array.from({length:6},(_,i)=>hexPt(i,-H));

  // Visible faces: front-left (0-1), front (1-2), front-right (2-3) wall panels
  // back faces hidden
  const faces=[
    polygon([bot[0],bot[1],top[1],top[0]], dark,  stroke),
    polygon([bot[1],bot[2],top[2],top[1]], mid,   stroke),
    polygon([bot[2],bot[3],top[3],top[2]], dark,  stroke),
  ];
  // Top hex
  const topFace = polygon(top, light, stroke, 1);

  return faces.join('')+topFace;
}

// ── DIAMOND → DIAMOND PRISM ──
function shapeDiamondPrism(cx, cy, H, color){
  const w = ISO_SCALE_X * 0.72;
  const d = ISO_SCALE_Z * 1.1;
  const dark  = shadeHex(color, .40);
  const mid   = shadeHex(color, .65);
  const light = shadeHex(color, 1.0);
  const stroke= shadeHex(color, .3);

  // Diamond footprint (rotated square)
  const b0 = {x:cx,   y:cy - d*.5};   // front
  const b1 = {x:cx+w, y:cy};           // right
  const b2 = {x:cx,   y:cy + d*.5};   // back
  const b3 = {x:cx-w, y:cy};           // left

  const t0 = {x:b0.x, y:b0.y-H};
  const t1 = {x:b1.x, y:b1.y-H};
  const t2 = {x:b2.x, y:b2.y-H};
  const t3 = {x:b3.x, y:b3.y-H};

  // Visible: front-right face, front-left face, top
  const right = polygon([b0,b1,t1,t0], mid,   stroke);
  const left  = polygon([b0,b3,t3,t0], dark,  stroke);
  const top   = polygon([t0,t1,t2,t3], light, stroke, 1);

  return left+right+top;
}

// ── DISPATCH ──
function drawBuilding(r, c, animate=false){
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;

  // Remove old
  el.querySelector('.tile-svg')?.remove();

  const cell=state[r][c];
  if(!cell) return; // empty tiles: just the base plate

  const team=TEAMS[cell.teamIdx];
  const H=getHeight(r,c);
  const cx=CELL/2, cy=CELL;

  // SVG canvas: tile-wide, extends up by 1.2×CELL
  const svgH=CELL*1.4;
  const svgEl=document.createElementNS(NS,'svg');
  svgEl.classList.add('tile-svg');
  svgEl.setAttribute('width',CELL);
  svgEl.setAttribute('height',svgH);
  svgEl.setAttribute('viewBox',`0 ${CELL-svgH} ${CELL} ${svgH}`);
  svgEl.style.cssText=`position:absolute;bottom:0;left:0;overflow:visible;pointer-events:none;`;

  // Shadow under building (subtle ellipse on tile)
  const shadowRx=(ISO_SCALE_X*.7).toFixed(1);
  const shadowRy=(ISO_SCALE_Z*.5).toFixed(1);
  const shadow=`<ellipse cx="${cx}" cy="${cy}" rx="${shadowRx}" ry="${shadowRy}" fill="rgba(0,0,0,.35)"/>`;

  let building='';
  if(team.shape==='circle')   building=shapeCylinder(cx,cy,H,team.color);
  if(team.shape==='triangle') building=shapePrism(cx,cy,H,team.color);
  if(team.shape==='hex')      building=shapeHexPrism(cx,cy,H,team.color);
  if(team.shape==='diamond')  building=shapeDiamondPrism(cx,cy,H,team.color);

  svgEl.innerHTML=shadow+building;

  if(animate){
    svgEl.classList.add('rising');
    setTimeout(()=>svgEl.classList.remove('rising'), 650);
  }

  el.appendChild(svgEl);
}

// ─────────────────────────────────────────────
// TILE BASE (floor plate)
// ─────────────────────────────────────────────
function renderBase(r,c){
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  const base=el.querySelector('.tile-base');
  const cell=state[r][c];

  if(!cell){
    base.style.cssText='position:absolute;inset:0;border-radius:3px;background:#0d1018;border:1px solid rgba(255,255,255,.04);';
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const isHome=cell.home;
  const isEdge=isEdgeCell(r,c);
  const bgA  = isHome?.20 : isEdge?.12 : .07;
  const brdA = isHome?.75 : isEdge?.45 : .15;
  const glow = isHome
    ? `0 0 18px ${rca(team,.65)}, 0 0 36px ${rca(team,.22)}`
    : isEdge ? `0 0 8px ${rca(team,.35)}` : 'none';

  base.style.cssText=`
    position:absolute;inset:0;border-radius:3px;
    background:${rca(team,bgA)};
    border:${isHome?'2px':'1px'} solid ${rca(team,brdA)};
    box-shadow:${glow};
    ${isHome?`animation:homeGlow 2.4s ease-in-out infinite;--g-base:${glow};--g-peak:0 0 28px ${rca(team,.85)},0 0 56px ${rca(team,.3)};`:''}
  `;
}

// ─────────────────────────────────────────────
// TERRITORY OUTLINES
// ─────────────────────────────────────────────
function updateOutlines(){
  const svg=document.getElementById('outline-svg');
  const W=(CELL+GAP)*SIZE-GAP;
  svg.setAttribute('width',W); svg.setAttribute('height',W);
  svg.innerHTML='';
  TEAMS.forEach((team,ti)=>{
    const cells=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(state[r][c]?.teamIdx===ti) cells.push([r,c]);
    if(!cells.length) return;
    const pad=2;
    cells.forEach(([r,c])=>{
      const x=c*(CELL+GAP), y=r*(CELL+GAP);
      const line=(x1,y1,x2,y2)=>{
        [[5,.12],[1.8,.95]].forEach(([w,op])=>{
          const l=document.createElementNS(NS,'line');
          [['x1',x1],['y1',y1],['x2',x2],['y2',y2],
           ['stroke',team.color],['stroke-width',w],
           ['stroke-opacity',op],['stroke-linecap','round']].forEach(([k,v])=>l.setAttribute(k,v));
          svg.appendChild(l);
        });
      };
      if(!same(r-1,c,ti)) line(x-pad,y-pad,  x+CELL+pad,y-pad);
      if(!same(r+1,c,ti)) line(x-pad,y+CELL+pad,x+CELL+pad,y+CELL+pad);
      if(!same(r,c-1,ti)) line(x-pad,y-pad,  x-pad,y+CELL+pad);
      if(!same(r,c+1,ti)) line(x+CELL+pad,y-pad,x+CELL+pad,y+CELL+pad);
    });
  });
}

// ─────────────────────────────────────────────
// BUILD DOM
// ─────────────────────────────────────────────
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');
  el.className='tile'+(state[r][c]?' owned':'');
  el.dataset.r=r; el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px;position:relative;overflow:visible;`;

  const base=document.createElement('div');
  base.className='tile-base';
  el.appendChild(base);

  el.addEventListener('mouseenter',()=>{
    if(state[r][c]) return;
    const t=TEAMS[activeTeam];
    base.style.background=`rgba(${t.r},${t.g},${t.b},.10)`;
    base.style.borderColor=`rgba(${t.r},${t.g},${t.b},.55)`;
    base.style.boxShadow=`0 0 14px rgba(${t.r},${t.g},${t.b},.3)`;
  });
  el.addEventListener('mouseleave',()=>{
    if(state[r][c]) return;
    base.style.cssText='position:absolute;inset:0;border-radius:3px;background:#0d1018;border:1px solid rgba(255,255,255,.04);';
  });
  el.addEventListener('click',()=>{
    if(state[r][c]) return;
    state[r][c]={teamIdx:activeTeam,home:false};
    el.classList.add('owned');
    renderBase(r,c);
    drawBuilding(r,c,true);
    // Update neighbours — height may change as adj count increases
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]){
        renderBase(nr,nc);
        drawBuilding(nr,nc,false);
      }
    });
    updateOutlines(); updateScores();
  });

  gridEl.appendChild(el);
  renderBase(r,c);
}

// Inject keyframes
document.head.insertAdjacentHTML('beforeend',
  `<style>@keyframes homeGlow{0%,100%{box-shadow:var(--g-base);}50%{box-shadow:var(--g-peak);}}</style>`);

// Init
requestAnimationFrame(()=>{
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) drawBuilding(r,c,false);
  updateOutlines();
});

// ─────────────────────────────────────────────
// SCORES
// ─────────────────────────────────────────────
function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.09);--tc-border:rgba(${t.r},${t.g},${t.b},.45);--tc-glow:rgba(${t.r},${t.g},${t.b},.22);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 6px rgba(${t.r},${t.g},${t.b},.9);"></div>
      <span class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.name}</span>
      <span class="tp-count">${count}F</span>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
</script>
</body>
</html>
