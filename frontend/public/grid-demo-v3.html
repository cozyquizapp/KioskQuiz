<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid v3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#07090f;
  min-height:100vh; color:#f1f5f9;
  font-family:'Space Grotesk',sans-serif;
  display:flex; align-items:center; justify-content:center;
  padding:32px; overflow:hidden;
}

.board-wrap { position:relative; flex-shrink:0; }

.iso-scene {
  perspective:1400px; perspective-origin:50% 20%;
  position:relative; z-index:2;
  transition:perspective .9s cubic-bezier(.4,0,.2,1);
}
.iso-grid {
  transform:rotateX(0deg) rotateZ(0deg);
  transform-style:preserve-3d; transform-origin:center center;
  display:grid; gap:3px; position:relative;
  transition:transform 1s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.iso-scene.is-iso { perspective:1100px; perspective-origin:50% -10%; }
.iso-grid.is-iso  { transform:rotateX(50deg) rotateZ(-45deg) scale(.88); }

/* Tile */
.tile {
  position:relative; transform-style:preserve-3d; cursor:pointer;
  transition:transform .2s ease;
}
.tile.owned { cursor:default; }
.tile:not(.owned):hover { transform:translateZ(3px); }
.iso-grid:not(.is-iso) .tile:not(.owned):hover { transform:scale(1.04); }

.tile-top {
  position:absolute; inset:0; border-radius:2px; z-index:2;
  transition:background .25s, border-color .25s, box-shadow .3s;
}

/* Building SVG overlay — screen space, above the grid */
#bld-svg {
  position:absolute; inset:0; pointer-events:none; z-index:200; overflow:visible;
}

/* Outline SVG */
#outline-svg {
  position:absolute; inset:0; pointer-events:none; z-index:100; overflow:visible;
}

/* Score bar */
.score-bar {
  position:absolute; bottom:-52px; left:0; right:0;
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
}
.team-pill {
  display:flex; align-items:center; gap:7px; padding:6px 14px; border-radius:8px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06);
  cursor:pointer; transition:all .2s; user-select:none; font-size:12px;
}
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 16px var(--tc-glow); }
.tp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tp-name { font-weight:700; }
.tp-count { color:#253040; font-weight:600; margin-left:2px; }

@keyframes homeGlow {
  0%,100% { box-shadow:var(--g-base); }
  50%      { box-shadow:var(--g-peak); }
}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;">
  <div style="font-size:11px;color:#2a3550;letter-spacing:.08em;margin-bottom:16px;">QUARTER QUIZ — CITY GRID v3</div>
  <div class="board-wrap" id="board-wrap">
    <div class="iso-scene" id="iso-scene">
      <div class="iso-grid" id="grid"></div>
    </div>
    <svg id="bld-svg"  xmlns="http://www.w3.org/2000/svg"></svg>
    <svg id="outline-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="score-bar" id="scorebar"></div>
  </div>
  <div style="height:52px"></div>
  <div style="font-size:11px;color:#1a2236;letter-spacing:.05em;">Team wählen → Feld klicken</div>
</div>

<script>
const SIZE=6, CELL=74, GAP=3;
const NS='http://www.w3.org/2000/svg';

// ── TEAMS — each has a neon color + unique 3D building shape ──
const TEAMS=[
  {color:'#00aaff', r:0,  g:170,b:255, name:'Die Clique',  shape:'cylinder'},
  {color:'#ff0080', r:255,g:0,  b:128, name:'Rote Karte',  shape:'prism'},
  {color:'#00ee66', r:0,  g:238,b:102, name:'Grüne Hölle', shape:'hexprism'},
  {color:'#ffcc00', r:255,g:204,b:0,   name:'Oranje',      shape:'diamond'},
  {color:'#bf5fff', r:191,g:95, b:255, name:'Team 5',      shape:'cylinder'},
  {color:'#ff6600', r:255,g:102,b:0,   name:'Team 6',      shape:'prism'},
];
let activeTeam=0;

// ── STATE ──
const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
function seed(r,c,t,home=false){ state[r][c]={teamIdx:t,home}; }
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);
seed(0,5,1,true);seed(0,4,1);seed(1,5,1);seed(1,4,1);
seed(5,0,2,true);seed(4,0,2);seed(5,1,2);seed(4,1,2);
seed(5,5,3,true);seed(4,5,3);seed(5,4,3);

// ── HELPERS ──
function rca(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjCount(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return 0;
  return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;
}
function isEdgeCell(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return false;
  return[[-1,0],[1,0],[0,-1],[0,1]].some(([dr,dc])=>!same(r+dr,c+dc,ti));
}

// Building height in screen pixels (used in SVG overlay)
function getBuildingH(r,c){
  const cell=state[r][c]; if(!cell) return 0;
  const base = cell.home?72 : adjCount(r,c)>=3?42 : adjCount(r,c)>=1?30 : 22;
  // Perspective scale: back rows appear taller
  const perspScale = 1.55 - (r/(SIZE-1))*0.9;
  return Math.round(base * perspScale);
}

// Color helpers
function hexToRgb(hex){
  return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
}
function shade(hex,f){
  const{r,g,b}=hexToRgb(hex);
  return`#${[r,g,b].map(v=>Math.min(255,Math.round(v*f)).toString(16).padStart(2,'0')).join('')}`;
}
function rgbaH(hex,a){
  const{r,g,b}=hexToRgb(hex);
  return`rgba(${r},${g},${b},${a})`;
}

// ── CORNER CACHE (screen-space corners of each tile) ──
let cornerCache={};
function buildCornerCache(){
  cornerCache={};
  const wrap=document.getElementById('board-wrap');
  const wr=wrap.getBoundingClientRect();
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if(!el) continue;
    const corners=[[0,0],[CELL,0],[CELL,CELL],[0,CELL]].map(([lx,ly])=>{
      const m=document.createElement('div');
      m.style.cssText=`position:absolute;left:${lx}px;top:${ly}px;width:1px;height:1px;`;
      el.appendChild(m);
      const mr=m.getBoundingClientRect();
      m.remove();
      return{x:mr.left-wr.left, y:mr.top-wr.top};
    });
    cornerCache[`${r},${c}`]=corners; // [TL, TR, BR, BL]
  }
}

// Center of tile in screen space
function tileCenter(r,c){
  const corners=cornerCache[`${r},${c}`];
  if(!corners) return null;
  return{
    x:(corners[0].x+corners[1].x+corners[2].x+corners[3].x)/4,
    y:(corners[0].y+corners[1].y+corners[2].y+corners[3].y)/4,
  };
}

// ── SVG HELPERS ──
function mkEl(tag,attrs){
  const el=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}
function polygon(pts,fill,stroke,sw=.7){
  return mkEl('polygon',{
    points:pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),
    fill, stroke, 'stroke-width':sw, 'stroke-linejoin':'round'
  });
}

// ── BUILDING SHAPES (screen space, anchor = center of tile top face) ──
// cx,cy = center of the tile's top face in screen space
// H = building height in pixels (goes UP = negative y)
// For iso view, the tile's top face is a rhombus.
// We derive building footprint from the actual rhombus corners.

function drawCylinder(cx, cy, H, color, tileW){
  // Cylinder: ellipse top + side walls
  const rx = tileW * 0.32;
  const ry = rx * 0.30;
  const dark  = shade(color, .38);
  const mid   = shade(color, .62);
  const light = color;
  const stroke= shade(color, .25);
  const glow  = rgbaH(color, .35);

  const els=[];

  // Left wall
  els.push(mkEl('path',{
    d:`M ${(cx-rx).toFixed(1)},${cy.toFixed(1)}
       A ${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 0 ${cx.toFixed(1)},${(cy+ry).toFixed(1)}
       L ${cx.toFixed(1)},${(cy+ry-H).toFixed(1)}
       A ${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 1 ${(cx-rx).toFixed(1)},${(cy-H).toFixed(1)} Z`,
    fill:dark, stroke, 'stroke-width':'.7'
  }));
  // Right wall
  els.push(mkEl('path',{
    d:`M ${(cx+rx).toFixed(1)},${cy.toFixed(1)}
       A ${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 1 ${cx.toFixed(1)},${(cy+ry).toFixed(1)}
       L ${cx.toFixed(1)},${(cy+ry-H).toFixed(1)}
       A ${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 0 ${(cx+rx).toFixed(1)},${(cy-H).toFixed(1)} Z`,
    fill:mid, stroke, 'stroke-width':'.7'
  }));
  // Top ellipse (neon roof)
  els.push(mkEl('ellipse',{
    cx:cx.toFixed(1), cy:(cy-H).toFixed(1),
    rx:rx.toFixed(1), ry:ry.toFixed(1),
    fill:light, stroke, 'stroke-width':'1',
  }));
  // Glow on roof
  els.push(mkEl('ellipse',{
    cx:cx.toFixed(1), cy:(cy-H).toFixed(1),
    rx:(rx*1.4).toFixed(1), ry:(ry*1.4).toFixed(1),
    fill:'none', stroke:glow, 'stroke-width':'4', opacity:'.5'
  }));

  return els;
}

function drawPrism(cx, cy, H, color, tileW){
  const w = tileW * 0.38;
  const d = tileW * 0.14;
  const dark  = shade(color, .38);
  const mid   = shade(color, .62);
  const light = color;
  const stroke= shade(color, .25);
  const glow  = rgbaH(color, .35);

  // Triangle footprint
  const b0={x:cx,   y:cy-d};       // front tip
  const b1={x:cx-w, y:cy+d*.6};   // back-left
  const b2={x:cx+w, y:cy+d*.6};   // back-right
  const t0={x:b0.x, y:b0.y-H};
  const t1={x:b1.x, y:b1.y-H};
  const t2={x:b2.x, y:b2.y-H};

  const els=[];
  els.push(polygon([b0,b1,t1,t0], dark, stroke));
  els.push(polygon([b0,b2,t2,t0], mid,  stroke));
  els.push(polygon([t0,t1,t2],    light,stroke, 1));
  // Glow outline on roof
  els.push(mkEl('polygon',{
    points:[t0,t1,t2].map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),
    fill:'none', stroke:glow, 'stroke-width':'5', opacity:'.4', 'stroke-linejoin':'round'
  }));
  return els;
}

function drawHexPrism(cx, cy, H, color, tileW){
  const r = tileW * 0.30;
  const dark  = shade(color, .38);
  const mid   = shade(color, .60);
  const light = color;
  const stroke= shade(color, .25);
  const glow  = rgbaH(color, .35);

  function hexPt(i, dy=0){
    const a=(i*60-30)*Math.PI/180;
    return{x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r*.38+dy};
  }
  const bot=Array.from({length:6},(_,i)=>hexPt(i));
  const top=Array.from({length:6},(_,i)=>hexPt(i,-H));

  const els=[];
  // 3 visible front faces
  [[0,1,dark],[1,2,mid],[2,3,dark]].forEach(([a,b,fill])=>{
    els.push(polygon([bot[a],bot[b],top[b],top[a]], fill, stroke));
  });
  // Top hex
  els.push(polygon(top, light, stroke, 1));
  // Glow
  els.push(mkEl('polygon',{
    points:top.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),
    fill:'none', stroke:glow, 'stroke-width':'5', opacity:'.4', 'stroke-linejoin':'round'
  }));
  return els;
}

function drawDiamondPrism(cx, cy, H, color, tileW){
  const w = tileW * 0.32;
  const d = tileW * 0.14;
  const dark  = shade(color, .38);
  const mid   = shade(color, .62);
  const light = color;
  const stroke= shade(color, .25);
  const glow  = rgbaH(color, .35);

  const b0={x:cx,   y:cy-d};    // front
  const b1={x:cx+w, y:cy};      // right
  const b2={x:cx,   y:cy+d};    // back
  const b3={x:cx-w, y:cy};      // left
  const t0={x:b0.x, y:b0.y-H};
  const t1={x:b1.x, y:b1.y-H};
  const t2={x:b2.x, y:b2.y-H};
  const t3={x:b3.x, y:b3.y-H};

  const els=[];
  els.push(polygon([b0,b3,t3,t0], dark, stroke));
  els.push(polygon([b0,b1,t1,t0], mid,  stroke));
  els.push(polygon([t0,t1,t2,t3], light,stroke, 1));
  els.push(mkEl('polygon',{
    points:[t0,t1,t2,t3].map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),
    fill:'none', stroke:glow, 'stroke-width':'5', opacity:'.4', 'stroke-linejoin':'round'
  }));
  return els;
}

// ── DRAW ALL BUILDINGS ──
let isIsoMode=false;
function updateBuildings(animateCell=null){
  const svg=document.getElementById('bld-svg');
  const wrap=document.getElementById('board-wrap');
  const wr=wrap.getBoundingClientRect();
  svg.setAttribute('width',wr.width); svg.setAttribute('height',wr.height);
  svg.innerHTML='';
  if(!isIsoMode) return;

  // Draw back rows first (painter's algorithm)
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const cell=state[r][c]; if(!cell) continue;
    const center=tileCenter(r,c); if(!center) continue;
    const team=TEAMS[cell.teamIdx];
    const H=getBuildingH(r,c);
    if(H<4) continue;

    const tileW=Math.abs(
      (cornerCache[`${r},${c}`][1].x - cornerCache[`${r},${c}`][0].x)
    ) * 1.4;

    const g=document.createElementNS(NS,'g');

    // SMIL rise animation on newly placed building
    const doAnim=animateCell&&animateCell.r===r&&animateCell.c===c;
    if(doAnim){
      const anim=document.createElementNS(NS,'animateTransform');
      anim.setAttribute('attributeName','transform');
      anim.setAttribute('type','translate');
      anim.setAttribute('values',`0,${H}; 0,-6; 0,0`);
      anim.setAttribute('keyTimes','0;0.7;1');
      anim.setAttribute('dur','0.7s');
      anim.setAttribute('calcMode','spline');
      anim.setAttribute('keySplines','0.1 0.8 0.2 1; 0.4 0 0.6 1');
      anim.setAttribute('fill','freeze');
      g.appendChild(anim);
      const animOp=document.createElementNS(NS,'animate');
      animOp.setAttribute('attributeName','opacity');
      animOp.setAttribute('values','0;1;1');
      animOp.setAttribute('keyTimes','0;0.2;1');
      animOp.setAttribute('dur','0.7s');
      animOp.setAttribute('fill','freeze');
      g.appendChild(animOp);
    }

    let shapeEls=[];
    if(team.shape==='cylinder')  shapeEls=drawCylinder(center.x,center.y,H,team.color,tileW);
    if(team.shape==='prism')     shapeEls=drawPrism(center.x,center.y,H,team.color,tileW);
    if(team.shape==='hexprism')  shapeEls=drawHexPrism(center.x,center.y,H,team.color,tileW);
    if(team.shape==='diamond')   shapeEls=drawDiamondPrism(center.x,center.y,H,team.color,tileW);

    shapeEls.forEach(el=>g.appendChild(el));
    svg.appendChild(g);
  }
}

// ── RENDER TILE BASE ──
function renderBase(r,c){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  const base=el.querySelector('.tile-top');

  if(!cell){
    base.style.cssText='position:absolute;inset:0;border-radius:2px;z-index:2;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);';
    return;
  }
  const team=TEAMS[cell.teamIdx];
  const isHome=cell.home;
  const isEdge=isEdgeCell(r,c);
  const bgA  = isHome?.22 : isEdge?.14 : .08;
  const brdA = isHome?.80 : isEdge?.50 : .12;
  const glow = isHome
    ? `0 0 16px ${rca(team,.6)}, 0 0 32px ${rca(team,.2)}`
    : isEdge ? `0 0 8px ${rca(team,.35)}` : 'none';

  base.style.cssText=`
    position:absolute;inset:0;border-radius:2px;z-index:2;
    background:${rca(team,bgA)};
    border:${isHome?'2px':'1px'} solid ${rca(team,brdA)};
    box-shadow:${glow};
    ${isHome?`animation:homeGlow 2.4s ease-in-out infinite;--g-base:${glow};--g-peak:0 0 26px ${rca(team,.85)},0 0 52px ${rca(team,.3)};`:''}
  `;
}

// ── TERRITORY OUTLINES ──
function updateOutlines(){
  const svg=document.getElementById('outline-svg');
  const W=(CELL+GAP)*SIZE-GAP;
  svg.setAttribute('width',W); svg.setAttribute('height',W);
  svg.innerHTML='';
  TEAMS.forEach((team,ti)=>{
    const cells=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(state[r][c]?.teamIdx===ti) cells.push([r,c]);
    if(!cells.length) return;
    const pad=2;
    cells.forEach(([r,c])=>{
      const x=c*(CELL+GAP), y=r*(CELL+GAP);
      const line=(x1,y1,x2,y2)=>{
        [[5,.12],[1.8,.95]].forEach(([w,op])=>{
          const l=document.createElementNS(NS,'line');
          [['x1',x1],['y1',y1],['x2',x2],['y2',y2],
           ['stroke',team.color],['stroke-width',w],
           ['stroke-opacity',op],['stroke-linecap','round']].forEach(([k,v])=>l.setAttribute(k,v));
          svg.appendChild(l);
        });
      };
      if(!same(r-1,c,ti)) line(x-pad,y-pad,    x+CELL+pad,y-pad);
      if(!same(r+1,c,ti)) line(x-pad,y+CELL+pad,x+CELL+pad,y+CELL+pad);
      if(!same(r,c-1,ti)) line(x-pad,y-pad,    x-pad,y+CELL+pad);
      if(!same(r,c+1,ti)) line(x+CELL+pad,y-pad,x+CELL+pad,y+CELL+pad);
    });
  });
}

// ── CAMERA ──
let cameraAnimating=false;
function triggerCamera(nr,nc){
  if(isIsoMode){
    cameraAnimating=true;
    setTimeout(()=>{ buildCornerCache(); updateBuildings({r:nr,c:nc}); cameraAnimating=false; },60);
    return;
  }
  cameraAnimating=true;
  const scene=document.getElementById('iso-scene');
  const grid =document.getElementById('grid');
  const bldSvg=document.getElementById('bld-svg');
  bldSvg.style.opacity='0';
  scene.classList.add('is-iso');
  grid.classList.add('is-iso');
  isIsoMode=true;
  setTimeout(()=>{
    buildCornerCache();
    updateOutlines();
    updateBuildings(null);
    bldSvg.style.transition='opacity .4s ease';
    bldSvg.style.opacity='1';
  },980);
  setTimeout(()=>{ updateBuildings({r:nr,c:nc}); },1380);
  setTimeout(()=>{ cameraAnimating=false; },2400);
}

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');
  el.className='tile'+(state[r][c]?' owned':'');
  el.dataset.r=r; el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px;`;

  const top=document.createElement('div'); top.className='tile-top';
  el.appendChild(top);

  el.addEventListener('mouseenter',()=>{
    if(state[r][c]) return;
    const t=TEAMS[activeTeam];
    top.style.background=`rgba(${t.r},${t.g},${t.b},.10)`;
    top.style.borderColor=`rgba(${t.r},${t.g},${t.b},.55)`;
    top.style.boxShadow=`0 0 14px rgba(${t.r},${t.g},${t.b},.3)`;
  });
  el.addEventListener('mouseleave',()=>{
    if(state[r][c]) return;
    top.style.cssText='position:absolute;inset:0;border-radius:2px;z-index:2;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);';
  });
  el.addEventListener('click',()=>{
    if(state[r][c]||cameraAnimating) return;
    state[r][c]={teamIdx:activeTeam,home:false};
    el.classList.add('owned');
    renderBase(r,c);
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr2=r+dr,nc2=c+dc;
      if(nr2>=0&&nr2<SIZE&&nc2>=0&&nc2<SIZE) renderBase(nr2,nc2);
    });
    updateOutlines(); updateScores();
    triggerCamera(r,c);
  });

  gridEl.appendChild(el);
  renderBase(r,c);
}

document.head.insertAdjacentHTML('beforeend',
  `<style>@keyframes homeGlow{0%,100%{box-shadow:var(--g-base);}50%{box-shadow:var(--g-peak);}}</style>`);

updateOutlines(); updateScores();

// ── SCORES ──
function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.slice(0,4).map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.09);--tc-border:rgba(${t.r},${t.g},${t.b},.45);--tc-glow:rgba(${t.r},${t.g},${t.b},.22);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 6px rgba(${t.r},${t.g},${t.b},.9);"></div>
      <span class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.name}</span>
      <span class="tp-count">${count}F</span>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
</script>
</body>
</html>
