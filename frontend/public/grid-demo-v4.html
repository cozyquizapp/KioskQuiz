<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid v4</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#07090f;
  min-height:100vh; color:#f1f5f9;
  font-family:'Space Grotesk',sans-serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px; overflow:hidden; gap:16px;
}

#city-svg {
  display:block;
  /* viewBox animates for the "camera" effect */
}

.score-bar {
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
}
.team-pill {
  display:flex; align-items:center; gap:7px; padding:6px 14px; border-radius:8px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06);
  cursor:pointer; user-select:none; font-size:12px;
  transition:background .2s, border-color .2s, box-shadow .2s;
}
.team-pill.active {
  background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 16px var(--tc-glow);
}
.tp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tp-name { font-weight:700; }
.tp-count { color:#253040; font-weight:600; margin-left:2px; }
</style>
</head>
<body>

<div style="font-size:11px;color:#2a3550;letter-spacing:.08em;">QUARTER QUIZ — CITY GRID v4</div>
<svg id="city-svg" xmlns="http://www.w3.org/2000/svg"></svg>
<div class="score-bar" id="scorebar"></div>
<div style="font-size:11px;color:#1a2236;letter-spacing:.05em;">Team wählen → Feld klicken</div>

<script>
const NS = 'http://www.w3.org/2000/svg';
const SIZE = 6;

// ── ISO GRID GEOMETRY ──
// Each tile is a rhombus. Camera looks from slightly above-right.
// Tile width (W) and height (H) in iso screen space:
const TW = 80;   // full tile width  (left-right)
const TH = 40;   // full tile height (top-bottom of rhombus = TW/2)
const BH = 14;   // base plate thickness (visible side wall)

// Iso offset per column (right) and per row (down-right):
// col → (+TW/2, +TH/2)
// row → (-TW/2, +TH/2)
function isoXY(r, c) {
  return {
    x: (c - r) * (TW / 2),
    y: (c + r) * (TH / 2),
  };
}

// The 4 corners of a tile's top face (rhombus), clockwise from top
function tileCorners(r, c) {
  const {x, y} = isoXY(r, c);
  return [
    {x: x,          y: y},           // top
    {x: x + TW/2,   y: y + TH/2},    // right
    {x: x,          y: y + TH},      // bottom
    {x: x - TW/2,   y: y + TH/2},    // left
  ];
}

// Grid bounding box (to set viewBox)
function gridBounds() {
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    tileCorners(r,c).forEach(p=>{
      minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
      maxX=Math.max(maxX,p.x); maxY=Math.max(maxY,p.y);
    });
  }
  return {minX, minY, maxX, maxY,
    w: maxX-minX, h: maxY-minY+BH+4};
}

const PAD = 40;
const bounds = gridBounds();
const VB_2D = `${bounds.minX-PAD} ${bounds.minY-PAD} ${bounds.w+PAD*2} ${bounds.h+PAD*2}`;
// Zoomed-in iso viewBox (tighter, shifts up a bit to account for tall buildings)
const VB_3D = `${bounds.minX-PAD*.4} ${bounds.minY-PAD*2.5} ${bounds.w+PAD*.8} ${bounds.h+PAD*3.5}`;

const SVG_W = 520, SVG_H = 480;

// ── TEAMS ──
const TEAMS = [
  {color:'#00aaff', r:0,  g:170,b:255, name:'Die Clique',  shape:'cylinder', symbol:'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z'},
  {color:'#ff0080', r:255,g:0,  b:128, name:'Rote Karte',  shape:'prism',    symbol:'M12 3L22 21H2L12 3z'},
  {color:'#00ee66', r:0,  g:238,b:102, name:'Grüne Hölle', shape:'hexprism', symbol:'M12 2l8.66 5v10L12 22l-8.66-5V7z'},
  {color:'#ffcc00', r:255,g:204,b:0,   name:'Oranje',      shape:'diamond',  symbol:'M12 2l10 10-10 10L2 12z'},
  {color:'#bf5fff', r:191,g:95, b:255, name:'Team 5',      shape:'cylinder', symbol:'M12 2l8 3v6c0 5-4 9-8 11C8 20 4 16 4 11V5z'},
  {color:'#ff6600', r:255,g:102,b:0,   name:'Team 6',      shape:'prism',    symbol:'M13 2L4.5 13.5H11L11 22L19.5 10.5H13z'},
];
let activeTeam = 0;

// ── STATE ──
const state = Array.from({length:SIZE}, ()=>Array(SIZE).fill(null));
function seed(r,c,t,home=false){ state[r][c]={teamIdx:t,home}; }
seed(0,0,0,true); seed(0,1,0); seed(1,0,0); seed(1,1,0); seed(2,0,0);
seed(0,5,1,true); seed(0,4,1); seed(1,5,1); seed(1,4,1);
seed(5,0,2,true); seed(4,0,2); seed(5,1,2); seed(4,1,2);
seed(5,5,3,true); seed(4,5,3); seed(5,4,3);

// ── HELPERS ──
function same(r,c,ti){ return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti; }
function adjCount(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return 0;
  return [[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;
}
function isEdgeCell(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return false;
  return [[-1,0],[1,0],[0,-1],[0,1]].some(([dr,dc])=>!same(r+dr,c+dc,ti));
}

function hexToRgb(hex){
  return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
}
function shade(hex,f){
  const{r,g,b}=hexToRgb(hex);
  return `#${[r,g,b].map(v=>Math.min(255,Math.round(v*f)).toString(16).padStart(2,'0')).join('')}`;
}
function rgba(hex,a){
  const{r,g,b}=hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function rca(t,a){ return `rgba(${t.r},${t.g},${t.b},${a})`; }

function mk(tag,attrs){
  const el=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}
function pts(arr){ return arr.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '); }

// Building height in iso pixels
function getBH(r,c){
  const cell=state[r][c]; if(!cell) return 0;
  if(cell.home) return 80;
  const adj=adjCount(r,c);
  if(adj>=3) return 48;
  if(adj>=1) return 34;
  return 24;
}

// ── SVG STRUCTURE ──
const svg = document.getElementById('city-svg');
svg.setAttribute('width', SVG_W);
svg.setAttribute('height', SVG_H);
svg.setAttribute('viewBox', VB_2D);
svg.style.transition = 'none';

// Layers (order matters for painter's algorithm)
const layerFloor    = mk('g',{id:'layer-floor'});    // tile bases
const layerOutlines = mk('g',{id:'layer-outlines'});  // territory borders
const layerBuildings= mk('g',{id:'layer-buildings'}); // 3D buildings
const layerSymbols  = mk('g',{id:'layer-symbols'});   // block center symbols (2D)
const layerHover    = mk('g',{id:'layer-hover'});     // hover highlight
const layerHit      = mk('g',{id:'layer-hit'});       // invisible click targets

[layerFloor,layerOutlines,layerBuildings,layerSymbols,layerHover,layerHit].forEach(l=>svg.appendChild(l));

// ── TILE FLOOR ──
function drawFloor(r,c){
  const old = svg.querySelector(`[data-floor="${r}-${c}"]`);
  if(old) old.remove();

  const cell=state[r][c];
  const corners=tileCorners(r,c);
  const {x,y}=isoXY(r,c);
  const team=cell?TEAMS[cell.teamIdx]:null;
  const isHome=cell?.home;
  const isEdge=cell?isEdgeCell(r,c):false;

  const g=mk('g',{'data-floor':`${r}-${c}`});

  // Top face (rhombus)
  const topFill = !cell ? '#0d1018'
    : isHome  ? rgba(team.color,.22)
    : isEdge  ? rgba(team.color,.15)
    :           rgba(team.color,.09);
  const topStroke = !cell ? 'rgba(255,255,255,.06)'
    : isHome  ? rgba(team.color,.85)
    : isEdge  ? rgba(team.color,.55)
    :           rgba(team.color,.20);
  const topSW = isHome?'2':isEdge?'1.5':'1';

  const top=mk('polygon',{
    points:pts(corners),
    fill:topFill, stroke:topStroke, 'stroke-width':topSW,
    'stroke-linejoin':'round'
  });
  g.appendChild(top);

  // Side walls — only draw if owned (give the tile a 3D base plate feel)
  if(cell){
    // Front-right wall (from right corner down)
    const fr=[
      corners[1],                             // right corner top
      corners[2],                             // bottom corner top
      {x:corners[2].x, y:corners[2].y+BH},   // bottom corner base
      {x:corners[1].x, y:corners[1].y+BH},   // right corner base
    ];
    // Front-left wall (from bottom corner to left corner)
    const fl=[
      corners[2],
      corners[3],
      {x:corners[3].x, y:corners[3].y+BH},
      {x:corners[2].x, y:corners[2].y+BH},
    ];
    const wallRFill = isHome ? rgba(team.color,.16) : rgba(team.color,.10);
    const wallLFill = isHome ? rgba(team.color,.10) : rgba(team.color,.06);
    const wallStroke = rgba(team.color, isHome?.4:isEdge?.25:.10);

    g.appendChild(mk('polygon',{points:pts(fr),fill:wallRFill,stroke:wallStroke,'stroke-width':'1','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts(fl),fill:wallLFill,stroke:wallStroke,'stroke-width':'1','stroke-linejoin':'round'}));
  }

  // Glow under home tile
  if(isHome){
    const glow=mk('polygon',{
      points:pts(corners), fill:'none',
      stroke:team.color,'stroke-width':'6','stroke-opacity':'.18',
      'stroke-linejoin':'round'
    });
    g.insertBefore(glow, g.firstChild);
  }

  layerFloor.appendChild(g);
}

// ── BUILDINGS ──
function drawBuilding(r,c,animate=false){
  const old=svg.querySelector(`[data-bld="${r}-${c}"]`);
  if(old) old.remove();

  const cell=state[r][c]; if(!cell) return;
  if(!isIsoMode) return; // buildings only in 3D mode

  const team=TEAMS[cell.teamIdx];
  const H=getBH(r,c);
  const corners=tileCorners(r,c);

  // Tile center (top of the rhombus = anchor point for building)
  const cx=(corners[0].x+corners[1].x+corners[2].x+corners[3].x)/4;
  const cy=(corners[0].y+corners[1].y+corners[2].y+corners[3].y)/4;

  // Building footprint matches tile rhombus (scaled down a bit)
  const S=0.72; // footprint scale relative to tile
  function scaled(corner){
    return {x:cx+(corner.x-cx)*S, y:cy+(corner.y-cy)*S};
  }
  const [C0,C1,C2,C3]=corners.map(scaled); // top, right, bottom, left
  const up=(p,h=H)=>({x:p.x, y:p.y-h});
  const T0=up(C0),T1=up(C1),T2=up(C2),T3=up(C3);

  const col=team.color;
  const roofCol   = col;
  const wallRight = shade(col,.55);
  const wallLeft  = shade(col,.38);
  const wallStroke= shade(col,.28);
  const glowCol   = rgba(col,.35);

  const g=mk('g',{'data-bld':`${r}-${c}`});

  if(animate){
    const anim=mk('animateTransform',{
      attributeName:'transform', type:'translate',
      values:`0,${H}; 0,-8; 0,0`,
      keyTimes:'0;0.72;1', dur:'0.75s',
      calcMode:'spline', keySplines:'0.1 0.8 0.2 1;0.4 0 0.6 1',
      fill:'freeze'
    });
    const animOp=mk('animate',{
      attributeName:'opacity', values:'0;1;1',
      keyTimes:'0;0.18;1', dur:'0.75s', fill:'freeze'
    });
    g.appendChild(anim);
    g.appendChild(animOp);
  }

  // Shape-specific building
  if(team.shape==='cylinder'){
    const rx=TW*.28*S, ry=TH*.3*S;
    // Left wall arc
    g.appendChild(mk('path',{
      d:`M${(cx-rx).toFixed(1)},${cy.toFixed(1)} A${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 0 ${cx.toFixed(1)},${(cy+ry).toFixed(1)} L${cx.toFixed(1)},${(cy+ry-H).toFixed(1)} A${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 1 ${(cx-rx).toFixed(1)},${(cy-H).toFixed(1)} Z`,
      fill:wallLeft, stroke:wallStroke,'stroke-width':'.8'
    }));
    // Right wall arc
    g.appendChild(mk('path',{
      d:`M${(cx+rx).toFixed(1)},${cy.toFixed(1)} A${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 1 ${cx.toFixed(1)},${(cy+ry).toFixed(1)} L${cx.toFixed(1)},${(cy+ry-H).toFixed(1)} A${rx.toFixed(1)} ${ry.toFixed(1)} 0 0 0 ${(cx+rx).toFixed(1)},${(cy-H).toFixed(1)} Z`,
      fill:wallRight, stroke:wallStroke,'stroke-width':'.8'
    }));
    // Top ellipse
    g.appendChild(mk('ellipse',{cx:cx.toFixed(1),cy:(cy-H).toFixed(1),rx:rx.toFixed(1),ry:ry.toFixed(1),fill:roofCol,stroke:wallStroke,'stroke-width':'1'}));
    g.appendChild(mk('ellipse',{cx:cx.toFixed(1),cy:(cy-H).toFixed(1),rx:(rx*1.5).toFixed(1),ry:(ry*1.5).toFixed(1),fill:'none',stroke:glowCol,'stroke-width':'4',opacity:'.5'}));

  } else if(team.shape==='prism'){
    // Triangle prism — use scaled tile corners
    g.appendChild(mk('polygon',{points:pts([C3,C0,T0,T3]),fill:wallLeft, stroke:wallStroke,'stroke-width':'.8','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([C0,C1,T1,T0]),fill:wallRight,stroke:wallStroke,'stroke-width':'.8','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([T0,T1,T3]),   fill:roofCol,  stroke:wallStroke,'stroke-width':'1', 'stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([T0,T1,T3]),   fill:'none',   stroke:glowCol,'stroke-width':'5',opacity:'.4','stroke-linejoin':'round'}));

  } else if(team.shape==='hexprism'){
    // Hexagonal prism — 3 visible front faces
    g.appendChild(mk('polygon',{points:pts([C3,C0,T0,T3]),fill:wallLeft, stroke:wallStroke,'stroke-width':'.8','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([C0,C1,T1,T0]),fill:shade(col,.48),stroke:wallStroke,'stroke-width':'.8','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([C1,C2,T2,T1]),fill:wallRight,stroke:wallStroke,'stroke-width':'.8','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([T0,T1,T2,T3]),fill:roofCol,  stroke:wallStroke,'stroke-width':'1', 'stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([T0,T1,T2,T3]),fill:'none',   stroke:glowCol,'stroke-width':'5',opacity:'.4','stroke-linejoin':'round'}));

  } else { // diamond
    g.appendChild(mk('polygon',{points:pts([C3,C0,T0,T3]),fill:wallLeft, stroke:wallStroke,'stroke-width':'.8','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([C0,C1,T1,T0]),fill:wallRight,stroke:wallStroke,'stroke-width':'.8','stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([T0,T1,T2,T3]),fill:roofCol,  stroke:wallStroke,'stroke-width':'1', 'stroke-linejoin':'round'}));
    g.appendChild(mk('polygon',{points:pts([T0,T1,T2,T3]),fill:'none',   stroke:glowCol,'stroke-width':'5',opacity:'.4','stroke-linejoin':'round'}));
  }

  // HQ symbol on roof
  if(cell.home && team.symbol){
    const sg=mk('g',{transform:`translate(${cx.toFixed(1)},${(cy-H-3).toFixed(1)}) scale(0.55)`});
    sg.appendChild(mk('path',{d:team.symbol,fill:'none',stroke:team.color,'stroke-width':'4.5','stroke-linecap':'round','stroke-linejoin':'round',transform:'translate(-12,-12)',opacity:'.35'}));
    sg.appendChild(mk('path',{d:team.symbol,fill:'none',stroke:'white','stroke-width':'1.5','stroke-linecap':'round','stroke-linejoin':'round',transform:'translate(-12,-12)',opacity:'.92'}));
    g.appendChild(sg);
  }

  layerBuildings.appendChild(g);
}

// ── TERRITORY OUTLINES (2D only) ──
function updateOutlines(){
  layerOutlines.innerHTML='';
  if(isIsoMode) return;
  TEAMS.forEach((team,ti)=>{
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      if(state[r][c]?.teamIdx!==ti) continue;
      const corners=tileCorners(r,c);
      const segs=[];
      // each edge of the rhombus: check if neighbour belongs to same team
      const neighbors=[[-1,-1],[0,1],[1,1],[0,-1]]; // top=r-1c-1? no — iso grid adjacency
      // Actually check 4 grid neighbours
      const dirs=[[-1,0],[0,1],[1,0],[0,-1]];
      // top edge shared with (r-1,c), right with (r,c+1), bottom with (r+1,c), left with (r,c-1)
      const edges=[
        [corners[0],corners[1]], // top-right edge → neighbour (r-1,c) ... actually just draw all border edges
        [corners[1],corners[2]],
        [corners[2],corners[3]],
        [corners[3],corners[0]],
      ];
      // neighbour for each edge
      const edgeNeighbour=[[-1,0],[0,1],[1,0],[0,-1]];
      edges.forEach(([a,b],i)=>{
        const [dr,dc]=edgeNeighbour[i];
        if(!same(r+dr,c+dc,ti)){
          [[6,.12],[1.8,.9]].forEach(([w,op])=>{
            layerOutlines.appendChild(mk('line',{
              x1:a.x.toFixed(1),y1:a.y.toFixed(1),
              x2:b.x.toFixed(1),y2:b.y.toFixed(1),
              stroke:team.color,'stroke-width':w,'stroke-opacity':op,'stroke-linecap':'round'
            }));
          });
        }
      });
    }
  });
}

// ── BLOCK SYMBOLS (2D mode, one per connected block) ──
function getBlocks(ti){
  const visited=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
  const blocks=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(state[r][c]?.teamIdx===ti&&!visited[r][c]){
      const block=[],q=[[r,c]]; visited[r][c]=true;
      while(q.length){
        const[cr,cc]=q.shift(); block.push([cr,cc]);
        [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
          const nr=cr+dr,nc=cc+dc;
          if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&!visited[nr][nc]&&state[nr][nc]?.teamIdx===ti){
            visited[nr][nc]=true; q.push([nr,nc]);
          }
        });
      }
      blocks.push(block);
    }
  }
  return blocks;
}
function blockCenter(block){
  const cx=block.reduce((s,[,c])=>s+c,0)/block.length;
  const cy=block.reduce((s,[r])=>s+r,0)/block.length;
  let best=block[0],bestD=Infinity;
  block.forEach(([r,c])=>{ const d=(r-cy)**2+(c-cx)**2; if(d<bestD){bestD=d;best=[r,c];} });
  return best;
}

function updateSymbols(){
  layerSymbols.innerHTML='';
  if(isIsoMode) return;
  TEAMS.forEach((team,ti)=>{
    if(!team.symbol) return;
    getBlocks(ti).forEach(block=>{
      const [cr,cc]=blockCenter(block);
      const corners=tileCorners(cr,cc);
      const cx=(corners[0].x+corners[1].x+corners[2].x+corners[3].x)/4;
      const cy=(corners[0].y+corners[1].y+corners[2].y+corners[3].y)/4;
      const n=block.length;
      const sc=Math.min(.45+n*.05,.72).toFixed(2);
      const sg=mk('g',{transform:`translate(${cx.toFixed(1)},${cy.toFixed(1)}) scale(${sc})`});
      sg.appendChild(mk('path',{d:team.symbol,fill:'none',stroke:team.color,'stroke-width':'5','stroke-linecap':'round','stroke-linejoin':'round',transform:'translate(-12,-12)',opacity:'.2'}));
      sg.appendChild(mk('path',{d:team.symbol,fill:'none',stroke:team.color,'stroke-width':'1.8','stroke-linecap':'round','stroke-linejoin':'round',transform:'translate(-12,-12)',opacity:'.95'}));
      layerSymbols.appendChild(sg);
    });
  });
}

// ── HOVER ──
let hoverEl=null;
function setHover(r,c,on){
  if(hoverEl){hoverEl.remove();hoverEl=null;}
  if(!on) return;
  const t=TEAMS[activeTeam];
  const corners=tileCorners(r,c);
  hoverEl=mk('polygon',{
    points:pts(corners),
    fill:rgba(t.color,.10),
    stroke:t.color,'stroke-width':'1.8','stroke-opacity':'.7',
    'stroke-linejoin':'round', 'pointer-events':'none'
  });
  layerHover.appendChild(hoverEl);
}

// ── HIT TARGETS ──
function buildHitTargets(){
  layerHit.innerHTML='';
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const corners=tileCorners(r,c);
    const hit=mk('polygon',{
      points:pts(corners),
      fill:'transparent', stroke:'none',
      'data-r':r, 'data-c':c,
      style:'cursor:pointer'
    });
    hit.addEventListener('mouseenter',()=>{ if(!state[r][c]) setHover(r,c,true); });
    hit.addEventListener('mouseleave',()=>setHover(r,c,false));
    hit.addEventListener('click',()=>claimTile(r,c));
    layerHit.appendChild(hit);
  }
}

// ── CAMERA / viewBox animation ──
let isIsoMode=false, cameraAnimating=false;

function animateViewBox(fromVB, toVB, duration, onDone){
  const parse=vb=>vb.split(' ').map(Number);
  const from=parse(fromVB), to=parse(toVB);
  const start=performance.now();
  function ease(t){ return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1; }
  function step(now){
    const raw=Math.min((now-start)/duration,1);
    const t=ease(raw);
    const cur=from.map((f,i)=>f+(to[i]-f)*t);
    svg.setAttribute('viewBox',cur.map(v=>v.toFixed(1)).join(' '));
    if(raw<1) requestAnimationFrame(step);
    else onDone&&onDone();
  }
  requestAnimationFrame(step);
}

function triggerCamera(r,c){
  if(isIsoMode){
    // Already in 3D — just redraw the new building
    drawBuilding(r,c,true);
    return;
  }
  cameraAnimating=true;
  isIsoMode=true;

  // Animate viewBox from 2D overview → 3D zoomed view
  animateViewBox(VB_2D, VB_3D, 900, ()=>{
    // After camera settles: draw all buildings
    for(let r2=0;r2<SIZE;r2++) for(let c2=0;c2<SIZE;c2++){
      drawFloor(r2,c2); // redraw floors with walls
      drawBuilding(r2,c2,false);
    }
    updateOutlines();   // clears outlines in 3D mode
    updateSymbols();    // clears symbols in 3D mode
    // Animate the newly placed building
    setTimeout(()=>{
      drawBuilding(r,c,true);
      cameraAnimating=false;
    },200);
  });
}

// ── CLAIM TILE ──
function claimTile(r,c){
  if(state[r][c]||cameraAnimating) return;
  setHover(r,c,false);
  state[r][c]={teamIdx:activeTeam,home:false};
  drawFloor(r,c);
  // Redraw neighbours (edge status changes → floor color/walls update)
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]){
      drawFloor(nr,nc);
      if(isIsoMode) drawBuilding(nr,nc,false);
    }
  });
  updateOutlines();
  updateSymbols();
  updateScores();
  triggerCamera(r,c);
}

// ── INIT DRAW ──
for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) drawFloor(r,c);
updateOutlines();
updateSymbols();
buildHitTargets();

// ── SCORES ──
function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.slice(0,4).map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.09);--tc-border:rgba(${t.r},${t.g},${t.b},.45);--tc-glow:rgba(${t.r},${t.g},${t.b},.22);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 6px rgba(${t.r},${t.g},${t.b},.9);"></div>
      <span class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.name}</span>
      <span class="tp-count">${count}F</span>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
</script>
