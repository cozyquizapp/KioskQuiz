<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body {
  width:100%; height:100%; overflow:hidden;
  background:#07090f; color:#f1f5f9;
  font-family:'Space Grotesk',sans-serif;
}
body {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:0;
}

/* ── SCENE ── */
.board-wrap { position:relative; }

.iso-scene {
  perspective:2000px;
  perspective-origin:50% 50%;
  position:relative; z-index:2;
  transition:perspective 1.6s cubic-bezier(.4,0,.15,1),
             perspective-origin 1.6s cubic-bezier(.4,0,.15,1);
}
.iso-scene.is-iso {
  perspective:1100px;
  perspective-origin:50% 10%;
}

.iso-grid {
  transform:rotateX(0deg) rotateZ(0deg) scale(1);
  transform-style:preserve-3d;
  transform-origin:center center;
  display:grid; gap:4px; position:relative;
  transition:transform 1.6s cubic-bezier(.4,0,.15,1);
  will-change:transform;
}
.iso-grid.is-iso {
  transform:rotateX(55deg) rotateZ(-45deg) scale(.62);
}

/* ── CELL ── */
.cell {
  position:relative; transform-style:preserve-3d; cursor:pointer;
  transition:transform .2s ease;
}
.cell.owned { cursor:default; }
.iso-grid:not(.is-iso) .cell.empty:hover { transform:scale(1.06); }
.iso-grid.is-iso .cell.empty:hover { transform:translateZ(6px); }

.tile-top {
  position:absolute; inset:0; border-radius:3px; z-index:2;
  transition:background .3s, border-color .3s, box-shadow .3s;
}
.tile-front {
  position:absolute; top:100%; left:0; right:0; height:10px;
  transform-origin:top center; transform:rotateX(-90deg); z-index:1;
}
.tile-right {
  position:absolute; top:0; bottom:0; left:100%; width:10px;
  transform-origin:left center; transform:rotateY(90deg); z-index:1;
}

/* Building SVG */
#bld-svg {
  position:absolute; inset:0;
  pointer-events:none; z-index:200; overflow:visible;
  transition:opacity .6s ease;
}

/* Camera toggle */
#cam-toggle {
  position:fixed; top:16px; right:16px; z-index:999;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  color:#8899aa; font-family:inherit; font-size:12px; font-weight:700;
  letter-spacing:.08em; padding:7px 14px; border-radius:8px;
  cursor:pointer; transition:all .2s; user-select:none;
}
#cam-toggle:hover { background:rgba(255,255,255,.1); color:#fff; }
#cam-toggle.is-3d { color:#00f5ff; border-color:rgba(0,245,255,.35); background:rgba(0,245,255,.06); }

/* Score bar */
.score-bar {
  display:flex; gap:10px; flex-wrap:wrap;
  justify-content:center; padding:16px 24px 0;
}
.team-pill {
  display:flex; align-items:center; gap:8px;
  padding:8px 20px; border-radius:10px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  cursor:pointer; transition:all .2s; user-select:none; font-size:14px;
}
.team-pill.active {
  background:var(--tc-bg);
  border-color:var(--tc-border);
  box-shadow:0 0 20px var(--tc-glow);
}
.tp-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.tp-name { font-weight:700; }
.tp-count { color:#2a3550; font-weight:700; margin-left:2px; }

@keyframes homeGlow {
  0%,100% { box-shadow:var(--gb); }
  50%      { box-shadow:var(--gp); }
}
</style>
</head>
<body>

<button id="cam-toggle" onclick="toggleCamera()">2D</button>

<div id="grid-area" style="flex:1;width:100%;display:flex;align-items:center;justify-content:center;min-height:0;padding:32px 32px 16px;">
  <div class="board-wrap" id="board-wrap">
    <div class="iso-scene" id="iso-scene">
      <div class="iso-grid" id="grid"></div>
    </div>
    <svg id="bld-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="score-bar" id="scorebar"></div>
<div style="height:20px;flex-shrink:0;"></div>

<script>
const SIZE=8, CELL=72, GAP=4;
const NS='http://www.w3.org/2000/svg';

// ── TEAMS ──
const TEAMS=Array(8).fill(null);
let activeTeam=0;

function mkTeam(color,r,g,b,name,shapePath){
  return{color,r,g,b,name,shapePath};
}
// 8 teams — distinct neon colors
TEAMS[0]=mkTeam('#00aaff',0,170,255,'Die Clique',    'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z');
TEAMS[1]=mkTeam('#ff0080',255,0,128,'Rote Karte',    'M12 3L22 21H2L12 3z');
TEAMS[2]=mkTeam('#00ee66',0,238,102,'Grüne Hölle',   'M12 2l8.66 5v10L12 22l-8.66-5V7z');
TEAMS[3]=mkTeam('#ffcc00',255,204,0,'Oranje',         'M12 2l10 10-10 10L2 12z');
TEAMS[4]=mkTeam('#ff6600',255,102,0,'Feuerwerk',      'M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07');
TEAMS[5]=mkTeam('#cc44ff',204,68,255,'Lila Gang',     'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z');
TEAMS[6]=mkTeam('#00ffee',0,255,238,'Aqua Force',     'M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z');
TEAMS[7]=mkTeam('#ff4444',255,68,68,'Rote Flut',      'M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm1 14h-2v-6h2v6zm0-8h-2V7h2v2z');

// ── STATE ──
// 8x8 grid — 8 teams start in corners + edge midpoints
const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
function seed(r,c,t,home=false){state[r][c]={teamIdx:t,home};}
const S=SIZE-1, M=Math.floor(SIZE/2)-1; // S=7, M=3
// Corners
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);
seed(0,S,1,true);seed(0,S-1,1);seed(1,S,1);seed(1,S-1,1);
seed(S,0,2,true);seed(S-1,0,2);seed(S,1,2);seed(S-1,1,2);
seed(S,S,3,true);seed(S-1,S,3);seed(S,S-1,3);seed(S-1,S-1,3);
// Edge midpoints
seed(0,M,4,true);seed(0,M+1,4);seed(1,M,4);seed(1,M+1,4);
seed(S,M,5,true);seed(S,M+1,5);seed(S-1,M,5);seed(S-1,M+1,5);
seed(M,0,6,true);seed(M+1,0,6);seed(M,1,6);seed(M+1,1,6);
seed(M,S,7,true);seed(M+1,S,7);seed(M,S-1,7);seed(M+1,S-1,7);

// ── HELPERS ──
function rca(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjCount(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null)return 0;
  return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;
}
function isEdge(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null)return false;
  return[[-1,0],[1,0],[0,-1],[0,1]].some(([dr,dc])=>!same(r+dr,c+dc,ti));
}
function getBH(r,c){
  const cell=state[r][c]; if(!cell)return 0;
  const base=cell.home?90:adjCount(r,c)>=3?52:adjCount(r,c)>=1?36:24;
  const persp=1.5-(r/(SIZE-1))*.85;
  return Math.round(base*persp);
}

// ── CORNER CACHE ──
let cornerCache={};
function buildCornerCache(){
  cornerCache={};
  const wr=document.getElementById('board-wrap').getBoundingClientRect();
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if(!el) continue;
    cornerCache[`${r},${c}`]=[[0,0],[CELL,0],[CELL,CELL],[0,CELL]].map(([lx,ly])=>{
      const m=document.createElement('div');
      m.style.cssText=`position:absolute;left:${lx}px;top:${ly}px;width:1px;height:1px;`;
      el.appendChild(m);
      const mr=m.getBoundingClientRect();
      m.remove();
      return{x:mr.left-wr.left, y:mr.top-wr.top};
    });
  }
}

function mkEl(tag,attrs){
  const el=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}

// ── DRAW ONE BUILDING ──
function drawBuildingSVG(parent, corners, H, team, isHQ){
  const col=team.color;
  const[C0,C1,C2,C3]=corners; // TL,TR,BR,BL in screen space
  const up=p=>({x:p.x, y:p.y-H});
  const T0=up(C0),T1=up(C1),T2=up(C2),T3=up(C3);

  // Filled faces — more opaque so each building reads as a distinct solid object
  const face=(pts,a,dark=false)=>{
    // Dark fill first (background), then colored fill on top
    parent.appendChild(mkEl('polygon',{
      points:pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),
      fill:`rgba(5,8,20,${dark?a*1.8:a*.6})`, stroke:'none'
    }));
    parent.appendChild(mkEl('polygon',{
      points:pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),
      fill:`rgba(${team.r},${team.g},${team.b},${a})`, stroke:'none'
    }));
  };
  face([T0,T1,T2,T3], .38);        // top (brightest)
  face([C1,C2,T2,T1], .22, true);  // right wall (mid shade)
  face([C3,C2,T2,T3], .14, true);  // left wall (darkest)

  // Only draw the visible silhouette edges — top face + vertical corners
  // Skip bottom edges (hidden behind tile, just clutter)
  const edges=[
    [T0,T1],[T1,T2],[T2,T3],[T3,T0], // top face
    [C0,T0],[C1,T1],[C2,T2],[C3,T3], // vertical pillars only
  ];
  edges.forEach(([a,b])=>{
    // Glow pass
    parent.appendChild(mkEl('line',{
      x1:a.x.toFixed(1),y1:a.y.toFixed(1),
      x2:b.x.toFixed(1),y2:b.y.toFixed(1),
      stroke:col,'stroke-width':'5','stroke-linecap':'round',opacity:'.18'
    }));
    // Sharp pass
    parent.appendChild(mkEl('line',{
      x1:a.x.toFixed(1),y1:a.y.toFixed(1),
      x2:b.x.toFixed(1),y2:b.y.toFixed(1),
      stroke:col,'stroke-width':'1.6','stroke-linecap':'round',opacity:'.9'
    }));
  });

  // Symbol ON ROOF — only for HQ
  // Carefully placed at the visual center of the top face parallelogram
  if(isHQ && team.shapePath){
    // Center of top face
    const cx = (T0.x+T1.x+T2.x+T3.x)/4;
    const cy = (T0.y+T1.y+T2.y+T3.y)/4;

    // Measure the roof face size to scale symbol correctly
    // Width of top face (T0→T1 distance)
    const roofW = Math.sqrt((T1.x-T0.x)**2+(T1.y-T0.y)**2);
    // Height of top face (T0→T3 distance)
    const roofH = Math.sqrt((T3.x-T0.x)**2+(T3.y-T0.y)**2);
    const roofSize = Math.min(roofW, roofH);

    // Scale so symbol fits inside the roof face (80% of smaller dimension)
    const sc = (roofSize * 0.80 / 24).toFixed(3);

    // The roof face is a parallelogram — we need to apply the same
    // shear/rotation as the roof face itself so the symbol "lies flat"
    // Compute the transform that maps the unit square to the parallelogram
    // Basis vectors of the roof: right = T1-T0, down = T3-T0
    const bRx = T1.x-T0.x, bRy = T1.y-T0.y;
    const bDx = T3.x-T0.x, bDy = T3.y-T0.y;
    // Normalize by tile size so the symbol fills correctly
    const norm = CELL;
    // SVG matrix: a=bRx/norm, b=bRy/norm, c=bDx/norm, d=bDy/norm
    // Applied to a symbol centered at 0,0 (after translate(-12,-12))
    // Then translate to roof center
    const a=(bRx/norm).toFixed(4), b2=(bRy/norm).toFixed(4);
    const cc2=(bDx/norm).toFixed(4), d=(bDy/norm).toFixed(4);
    const tx=cx.toFixed(1), ty=cy.toFixed(1);

    const sg=mkEl('g',{
      transform:`matrix(${a},${b2},${cc2},${d},${tx},${ty}) scale(${sc}) translate(-12,-12)`
    });
    // Glow
    sg.appendChild(mkEl('path',{
      d:team.shapePath, stroke:col,'stroke-width':'5',
      'stroke-linecap':'round','stroke-linejoin':'round',
      fill:'none', opacity:'.35'
    }));
    // Sharp white
    sg.appendChild(mkEl('path',{
      d:team.shapePath, stroke:'white','stroke-width':'1.8',
      'stroke-linecap':'round','stroke-linejoin':'round',
      fill:'none', opacity:'.95'
    }));
    parent.appendChild(sg);
  }
}

// ── UPDATE ALL BUILDINGS ──
let isIsoMode=false;

// Draw a single building group into the SVG, optionally with rise animation
// beginSec: SMIL begin offset in seconds (for staggered spawning)
function spawnBuilding(svg, r, c, beginSec=0, isNew=false){
  const cell=state[r][c]; if(!cell) return;
  const corners=cornerCache[`${r},${c}`]; if(!corners) return;
  const team=TEAMS[cell.teamIdx];
  const H=getBH(r,c); if(H<4) return;

  const g=document.createElementNS(NS,'g');

  const dur = isNew ? '2.4s' : '1.4s';
  const overshoot = isNew ? 24 : 12;

  const anim=mkEl('animateTransform',{
    attributeName:'transform', type:'translate',
    values:`0,${H+overshoot}; 0,-10; 0,3; 0,0`,
    keyTimes:'0;0.65;0.83;1',
    dur, begin:`${beginSec.toFixed(2)}s`,
    calcMode:'spline',
    keySplines:'0.04 0.9 0.15 1;0.4 0 0.6 1;0.4 0 0.6 1',
    fill:'freeze'
  });
  const animOp=mkEl('animate',{
    attributeName:'opacity', values:'0;0;1;1',
    keyTimes:'0;0.04;0.22;1',
    dur, begin:`${beginSec.toFixed(2)}s`, fill:'freeze'
  });
  g.appendChild(anim); g.appendChild(animOp);

  drawBuildingSVG(g, corners, H, team, cell.home);
  svg.appendChild(g);
}

function updateBuildings(newCell=null){
  const svg=document.getElementById('bld-svg');
  const wr=document.getElementById('board-wrap').getBoundingClientRect();
  svg.setAttribute('width',wr.width); svg.setAttribute('height',wr.height);
  svg.innerHTML='';
  if(!isIsoMode) return;

  // Collect all occupied cells except the new one
  const existing=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(!state[r][c]) continue;
    if(newCell && newCell.r===r && newCell.c===c) continue;
    existing.push([r,c]);
  }

  // Stagger existing buildings back-to-front (row 0 = back)
  // Slower stagger for epic sequential city build-up
  const staggerStep=0.22; // seconds between each
  existing.forEach(([r,c],i)=>{
    spawnBuilding(svg, r, c, i*staggerStep, false);
  });

  // New cell spawns last — after all existing are done
  if(newCell){
    const newBegin = existing.length * staggerStep + 0.5;
    spawnBuilding(svg, newCell.r, newCell.c, newBegin, true);
  }
}

// ── RENDER CELL ──
function renderCell(r,c){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  const top=el.querySelector('.tile-top');
  const front=el.querySelector('.tile-front');
  const right=el.querySelector('.tile-right');

  if(!cell){
    top.style.cssText='position:absolute;inset:0;border-radius:3px;z-index:2;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);';
    front.style.cssText='position:absolute;top:100%;left:0;right:0;height:10px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:#050810;border:1px solid rgba(255,255,255,.03);border-top:none;';
    right.style.cssText='position:absolute;top:0;bottom:0;left:100%;width:10px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:#040710;border:1px solid rgba(255,255,255,.02);border-left:none;';
    return;
  }
  const team=TEAMS[cell.teamIdx];
  const home=cell.home, edge=isEdge(r,c);
  const bgA =home?.22:edge?.15:.08;
  const brdA=home?.90:edge?.60:.15;
  const brdW=home?'2px':edge?'1.5px':'1px';
  const glow=home
    ?`0 0 20px ${rca(team,.7)},0 0 40px ${rca(team,.25)}`
    :edge?`0 0 12px ${rca(team,.45)}`:'none';

  top.style.cssText=`position:absolute;inset:0;border-radius:3px;z-index:2;
    background:${rca(team,bgA)};border:${brdW} solid ${rca(team,brdA)};
    box-shadow:${glow};
    ${home?`animation:homeGlow 2.4s ease-in-out infinite;--gb:${glow};--gp:0 0 28px ${rca(team,.9)},0 0 56px ${rca(team,.35)};`:''}`;
  const wf=`rgba(${team.r},${team.g},${team.b},${home?.18:edge?.10:.05})`;
  const wb=`1px solid rgba(${team.r},${team.g},${team.b},${home?.4:edge?.20:.06})`;
  front.style.cssText=`position:absolute;top:100%;left:0;right:0;height:10px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:${wf};border-left:${wb};border-bottom:${wb};border-right:${wb};`;
  right.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:10px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:${wf};border-top:${wb};border-right:${wb};border-bottom:${wb};`;
}

// ── CAMERA ──
let cameraAnimating=false;

function updateToggleBtn(){
  const btn=document.getElementById('cam-toggle');
  if(isIsoMode){ btn.textContent='2D'; btn.classList.add('is-3d'); }
  else          { btn.textContent='3D'; btn.classList.remove('is-3d'); }
}

function goTo3D(animateCell=null){
  if(isIsoMode){
    cameraAnimating=true;
    setTimeout(()=>{ buildCornerCache(); updateBuildings(animateCell); },80);
    // New building: stagger of existing + 2.4s rise
    const existingCount=state.flat().filter(Boolean).length;
    setTimeout(()=>{ cameraAnimating=false; }, 80 + existingCount*220 + 3000);
    return;
  }
  cameraAnimating=true;
  isIsoMode=true;
  updateToggleBtn();

  const scene=document.getElementById('iso-scene');
  const grid=document.getElementById('grid');
  const bldSvg=document.getElementById('bld-svg');

  bldSvg.style.transition='none';
  bldSvg.style.opacity='0';
  scene.classList.add('is-iso');
  grid.classList.add('is-iso');

  setTimeout(()=>{
    buildCornerCache();
    for(let r2=0;r2<SIZE;r2++) for(let c2=0;c2<SIZE;c2++) renderCell(r2,c2);
    bldSvg.style.transition='opacity .3s ease';
    bldSvg.style.opacity='1';
    // SMIL begin handles all staggering internally
    updateBuildings(animateCell||null);
  }, 1650);

  // Unlock after tilt + max stagger time
  const maxExisting=SIZE*SIZE;
  setTimeout(()=>{ cameraAnimating=false; }, 1650 + maxExisting*220 + 3000);
}

function goTo2D(){
  if(!isIsoMode) return;
  isIsoMode=false;
  updateToggleBtn();

  const scene=document.getElementById('iso-scene');
  const grid=document.getElementById('grid');
  const bldSvg=document.getElementById('bld-svg');

  bldSvg.style.transition='opacity .2s ease';
  bldSvg.style.opacity='0';
  scene.classList.remove('is-iso');
  grid.classList.remove('is-iso');

  setTimeout(()=>{
    for(let r2=0;r2<SIZE;r2++) for(let c2=0;c2<SIZE;c2++) renderCell(r2,c2);
    updateBuildings(); // clears in 2D mode
  }, 400);
}

function toggleCamera(){
  if(cameraAnimating) return;
  if(isIsoMode) goTo2D(); else goTo3D();
}

function triggerCamera(r,c){ goTo3D({r,c}); }

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');
  el.className='cell'+(state[r][c]?' owned':'');
  el.dataset.r=r; el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px;`;
  ['tile-top','tile-front','tile-right'].forEach(cn=>{
    const d=document.createElement('div'); d.className=cn; el.appendChild(d);
  });

  el.addEventListener('mouseenter',()=>{
    if(state[r][c]||!TEAMS[activeTeam]) return;
    const t=TEAMS[activeTeam];
    el.querySelector('.tile-top').style.background=`rgba(${t.r},${t.g},${t.b},.12)`;
    el.querySelector('.tile-top').style.borderColor=`rgba(${t.r},${t.g},${t.b},.7)`;
    el.querySelector('.tile-top').style.boxShadow=`0 0 20px rgba(${t.r},${t.g},${t.b},.45)`;
  });
  el.addEventListener('mouseleave',()=>{ if(!state[r][c]) renderCell(r,c); });
  el.addEventListener('click',()=>{
    if(state[r][c]||cameraAnimating||!TEAMS[activeTeam]) return;
    state[r][c]={teamIdx:activeTeam,home:false};
    el.classList.add('owned');
    renderCell(r,c);
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE) renderCell(nr,nc);
    });
    updateScores();
    triggerCamera(r,c);
  });

  gridEl.appendChild(el);
  renderCell(r,c);
}

document.head.insertAdjacentHTML('beforeend',
  `<style>@keyframes homeGlow{0%,100%{box-shadow:var(--gb);}50%{box-shadow:var(--gp);}}</style>`);

requestAnimationFrame(()=>requestAnimationFrame(()=>{
  buildCornerCache(); updateBuildings();
}));

// ── SCORES ──
function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    if(!t) return '';
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    if(!count) return '';
    const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.09);--tc-border:rgba(${t.r},${t.g},${t.b},.5);--tc-glow:rgba(${t.r},${t.g},${t.b},.25);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 8px rgba(${t.r},${t.g},${t.b},.95);"></div>
      <span class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.name}</span>
      <span class="tp-count">${count}F</span>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
// make sure activeTeam references a valid team on load
activeTeam=0;
updateScores();
</script>
</body>
</html>
