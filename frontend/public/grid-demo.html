<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#07090f;
  min-height:100vh; color:#f1f5f9;
  font-family:'Space Grotesk',sans-serif;
  display:flex; flex-direction:row;
  align-items:center; justify-content:center;
  gap:48px; padding:32px; overflow:hidden;
}

/* ── GRID SIDE ── */
.board-wrap { position:relative; flex-shrink:0; }
.iso-scene {
  perspective:2200px; perspective-origin:50% 50%;
  position:relative; z-index:2;
  transition:perspective .9s cubic-bezier(.4,0,.2,1);
}
.iso-grid {
  transform:rotateX(0deg) rotateZ(0deg);
  transform-style:preserve-3d; transform-origin:center center;
  display:grid; gap:3px; position:relative;
  transition:transform 1s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.iso-scene.is-iso { perspective:1400px; perspective-origin:50% 10%; }
.iso-grid.is-iso  { transform:rotateX(52deg) rotateZ(-45deg) scale(.9); }

.cell {
  position:relative; transform-style:preserve-3d; cursor:pointer;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.cell.owned { cursor:default; }
.cell.empty:hover { transform:translateZ(4px); }
.iso-grid:not(.is-iso) .cell.empty:hover { transform:scale(1.05); }

.tile-top {
  position:absolute; inset:0; z-index:2; border-radius:2px;
  transition:background .25s ease, border-color .25s ease, box-shadow .3s ease;
}
.tile-front { position:absolute; top:100%; left:0; right:0; height:8px; transform-origin:top center; transform:rotateX(-90deg); z-index:1; }
.tile-right  { position:absolute; top:0; bottom:0; left:100%; width:8px; transform-origin:left center; transform:rotateY(90deg); z-index:1; }

#bld-svg { position:absolute; inset:0; pointer-events:none; z-index:100; overflow:visible; }
.territory-svg { position:absolute; inset:0; pointer-events:none; z-index:50; overflow:visible; }

@keyframes dominantPulse { 0%,100%{box-shadow:var(--gs-base);} 50%{box-shadow:var(--gs-peak);} }
@keyframes winFlicker    { 0%,100%{opacity:1;} 46%{opacity:1;} 48%{opacity:.1;} 52%{opacity:1;} 80%{opacity:.5;} }
@keyframes claimPop      { 0%{transform:translateZ(0);} 35%{transform:translateZ(14px);} 65%{transform:translateZ(-2px);} 100%{transform:translateZ(0);} }

/* ── AVATAR BUILDER SIDE ── */
.avatar-panel {
  width:320px; flex-shrink:0;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px; padding:24px;
  display:flex; flex-direction:column; gap:20px;
}
.avatar-panel h3 { font-size:13px; font-weight:700; color:#4a5578; text-transform:uppercase; letter-spacing:.12em; }

/* Color picker */
.color-grid { display:flex; flex-wrap:wrap; gap:8px; }
.color-swatch {
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  border:2px solid transparent;
  transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  position:relative;
}
.color-swatch:hover { transform:scale(1.15); }
.color-swatch.taken { opacity:.25; cursor:not-allowed; }
.color-swatch.taken::after {
  content:'✕'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:13px; color:rgba(255,255,255,.7);
}
.color-swatch.selected { border-color:white; transform:scale(1.2); }

/* Shape picker */
.shape-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.shape-btn {
  aspect-ratio:1; border-radius:10px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:center;
  transition:all .15s ease;
}
.shape-btn:hover  { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.2); transform:scale(1.06); }
.shape-btn.selected { border-color:var(--sel-color,white); box-shadow:0 0 10px var(--sel-color,white); background:rgba(255,255,255,.06); }
.shape-btn.taken { opacity:.22; cursor:not-allowed; pointer-events:none; }
.shape-btn svg  { width:22px; height:22px; }

/* Team preview */
.team-preview {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-radius:10px;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
}
.preview-icon {
  width:44px; height:44px; border-radius:8px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  border:2px solid;
}
.preview-icon svg { width:26px; height:26px; }
.preview-label { font-size:12px; color:#3a4a68; }
.preview-name  { font-size:15px; font-weight:700; }

/* Confirm btn */
.confirm-btn {
  padding:11px 0; border-radius:10px; border:none; cursor:pointer;
  font-family:inherit; font-size:14px; font-weight:700; letter-spacing:.04em;
  transition:all .15s ease;
}
.confirm-btn:hover { transform:translateY(-1px); filter:brightness(1.15); }
.confirm-btn:disabled { opacity:.35; cursor:not-allowed; transform:none; }

/* Registered teams list */
.registered-list { display:flex; flex-direction:column; gap:6px; }
.reg-item {
  display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
  font-size:13px;
}
.reg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* Score bar */
.score-bar { position:absolute; bottom:-44px; left:0; right:0; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.team-pill {
  display:flex; align-items:center; gap:7px; padding:6px 12px; border-radius:8px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05);
  cursor:pointer; transition:all .15s ease; user-select:none; font-size:12px;
}
.team-pill:hover { transform:translateY(-1px); }
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 14px var(--tc-glow); }
.tp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tp-name { font-weight:700; }
.tp-count { color:#253040; font-weight:600; }
</style>
</head>
<body>

<!-- LEFT: Grid -->
<div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
  <div class="board-wrap" id="board-wrap">
    <div class="iso-scene" id="iso-scene">
      <div class="iso-grid" id="grid"></div>
    </div>
    <svg id="bld-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="score-bar" id="scorebar"></div>
  </div>
  <div style="height:44px"></div><!-- spacer for score-bar -->
  <div style="font-size:11px;color:#1a2236;letter-spacing:.05em;">Team auswählen → leeres Feld anklicken</div>
</div>

<!-- RIGHT: Avatar Builder -->
<div class="avatar-panel">
  <div>
    <h3>Team Builder</h3>
    <div style="font-size:12px;color:#2a3550;margin-top:4px;">Wähle Farbe + Symbol für dein Team</div>
  </div>

  <!-- Color selection -->
  <div>
    <div style="font-size:11px;color:#3a4a68;margin-bottom:8px;font-weight:600;">FARBE</div>
    <div class="color-grid" id="color-grid"></div>
  </div>

  <!-- Shape selection -->
  <div>
    <div style="font-size:11px;color:#3a4a68;margin-bottom:8px;font-weight:600;">SYMBOL</div>
    <div class="shape-grid" id="shape-grid"></div>
  </div>

  <!-- Preview -->
  <div class="team-preview" id="team-preview">
    <div class="preview-icon" id="preview-icon" style="border-color:#333;background:rgba(255,255,255,.03);">
      <svg id="preview-svg" viewBox="0 0 24 24" fill="none"></svg>
    </div>
    <div>
      <div class="preview-label">Dein Team</div>
      <div class="preview-name" id="preview-name" style="color:#3a4a68;">— wähle Farbe & Symbol</div>
    </div>
  </div>

  <!-- Confirm -->
  <button class="confirm-btn" id="confirm-btn" disabled>Team registrieren</button>

  <!-- Registered -->
  <div>
    <div style="font-size:11px;color:#3a4a68;margin-bottom:8px;font-weight:600;">REGISTRIERT</div>
    <div class="registered-list" id="registered-list">
      <div style="font-size:12px;color:#1e2840;">Noch keine Teams</div>
    </div>
  </div>
</div>

<script>
const SIZE=6, CELL=72, GAP=3;
const NS='http://www.w3.org/2000/svg';

// ── NEON COLORS ──
const NEON_COLORS=[
  {hex:'#00f5ff',r:0,  g:245,b:255,name:'Cyan'},
  {hex:'#ff0080',r:255,g:0,  b:128,name:'Pink'},
  {hex:'#00ff88',r:0,  g:255,b:136,name:'Grün'},
  {hex:'#ffee00',r:255,g:238,b:0,  name:'Gelb'},
  {hex:'#bf5fff',r:191,g:95, b:255,name:'Lila'},
  {hex:'#ff6600',r:255,g:102,b:0,  name:'Orange'},
  {hex:'#00aaff',r:0,  g:170,b:255,name:'Blau'},
  {hex:'#ff3333',r:255,g:51, b:51, name:'Rot'},
  {hex:'#44ffaa',r:68, g:255,b:170,name:'Mint'},
  {hex:'#ff99ff',r:255,g:153,b:255,name:'Rosa'},
];

// ── SVG SHAPE PATHS (viewBox 0 0 24 24) ──
const SHAPES=[
  {id:'circle',    name:'Kreis',    path:'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z'},
  {id:'triangle',  name:'Dreieck',  path:'M12 3L22 21H2L12 3z'},
  {id:'hex',       name:'Hexagon',  path:'M12 2l8.66 5v10L12 22l-8.66-5V7z'},
  {id:'star4',     name:'Stern',    path:'M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z'},
  {id:'diamond',   name:'Raute',    path:'M12 2l10 10-10 10L2 12z'},
  {id:'cross',     name:'Kreuz',    path:'M10 2h4v8h8v4h-8v8h-4v-8H2v-4h8z'},
  {id:'arrow',     name:'Pfeil',    path:'M5 12h14M13 6l6 6-6 6'},
  {id:'bolt',      name:'Blitz',    path:'M13 2L4.5 13.5H11L11 22L19.5 10.5H13z'},
  {id:'shield',    name:'Schild',   path:'M12 2l8 3v6c0 5-4 9-8 11C8 20 4 16 4 11V5z'},
  {id:'eye',       name:'Auge',     path:'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z'},
  {id:'crown',     name:'Krone',    path:'M2 19h20M2 19l3-9 4 5 3-9 3 9 4-5 3 9'},
  {id:'flame',     name:'Feuer',    path:'M12 2c0 6-6 8-6 14a6 6 0 0 0 12 0c0-6-6-8-6-14zM9 18a3 3 0 0 0 6 0'},
  {id:'moon',      name:'Mond',     path:'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z'},
  {id:'sword',     name:'Schwert',  path:'M14.5 2.5l7 7-14 14-3.5-3.5 10.5-10.5L12 8l-6 6-1.5-1.5 8.5-8.5zM3 21l3-1-2-2z'},
  {id:'wave',      name:'Welle',    path:'M2 12c2-4 4-4 6 0s4 4 6 0 4-4 6 0'},
];

// ── REGISTERED TEAMS (for this demo, maps to game TEAMS) ──
const TEAMS=Array(6).fill(null).map(()=>({color:'#5aadff',r:90,g:173,b:255,name:'?',inten:.85,shapeId:null}));
let registeredTeams=[]; // {teamIdx, color, shapeId, name}
let activeTeam=0;

const HEIGHTS={0:[56,70,46], 1:[18,24,14], 2:[34,42,26], 3:[48,58,38], 4:[80,96,64], 5:[14,18,10]};

const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));

function seed(r,c,t,home=false){ state[r][c]={teamIdx:t,hi:Math.floor(Math.random()*3),home,new:false}; }
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);
seed(0,5,1,true);seed(0,4,1);seed(1,5,1);seed(1,4,1);
seed(5,0,2,true);seed(4,0,2);seed(5,1,2);seed(4,1,2);
seed(5,5,3,true);seed(4,5,3);seed(5,4,3);

// Seed registered teams for demo
TEAMS[0]={color:'#00aaff',r:0,g:170,b:255,name:'Die Clique',inten:.85,shapeId:'shield',shapePath:SHAPES.find(s=>s.id==='shield').path};
TEAMS[1]={color:'#ff0080',r:255,g:0,b:128,name:'Rote Karte',inten:1.0,shapeId:'triangle',shapePath:SHAPES.find(s=>s.id==='triangle').path};
TEAMS[2]={color:'#00ff88',r:0,g:255,b:136,name:'Grüne Hölle',inten:.85,shapeId:'hex',shapePath:SHAPES.find(s=>s.id==='hex').path};
TEAMS[3]={color:'#ffee00',r:255,g:238,b:0,name:'Oranje',inten:.9,shapeId:'bolt',shapePath:SHAPES.find(s=>s.id==='bolt').path};

function rc(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjN(r,c,ti){return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;}
function isEdge(r,c,dr,dc){return!same(r+dr,c+dc,state[r][c]?.teamIdx);}

// ══════════════════════════════════════════════
// AVATAR BUILDER
// ══════════════════════════════════════════════
let selColor=null, selShape=null;
const takenColors=new Set(), takenShapes=new Set();

function buildAvatarUI(){
  // Colors
  const cg=document.getElementById('color-grid');
  NEON_COLORS.forEach(nc=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(takenColors.has(nc.hex)?' taken':'');
    sw.style.cssText=`background:${nc.hex};box-shadow:0 0 8px ${nc.hex}66;`;
    sw.title=nc.name;
    if(!takenColors.has(nc.hex)) sw.addEventListener('click',()=>selectColor(nc));
    cg.appendChild(sw);
  });

  // Shapes
  const sg=document.getElementById('shape-grid');
  SHAPES.forEach(sh=>{
    const btn=document.createElement('div');
    btn.className='shape-btn'+(takenShapes.has(sh.id)?' taken':'');
    btn.title=sh.name;
    btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="${sh.path}"/></svg>`;
    if(!takenShapes.has(sh.id)) btn.addEventListener('click',()=>selectShape(sh));
    sg.appendChild(btn);
  });
}

function selectColor(nc){
  if(takenColors.has(nc.hex)) return;
  selColor=nc;
  document.querySelectorAll('.color-swatch').forEach((sw,i)=>{
    sw.classList.toggle('selected', NEON_COLORS[i].hex===nc.hex);
    if(!takenColors.has(NEON_COLORS[i].hex)) sw.style.boxShadow=NEON_COLORS[i].hex===nc.hex?`0 0 16px ${nc.hex}, 0 0 32px ${nc.hex}66`:`0 0 8px ${NEON_COLORS[i].hex}66`;
  });
  updatePreview();
}

function selectShape(sh){
  if(takenShapes.has(sh.id)) return;
  selShape=sh;
  document.querySelectorAll('.shape-btn').forEach((btn,i)=>{
    const s=SHAPES[i];
    btn.classList.toggle('selected', s.id===sh.id);
    if(btn.classList.contains('selected')) btn.style.setProperty('--sel-color', selColor?.hex||'white');
    const col=selColor?.hex||'rgba(255,255,255,.5)';
    btn.querySelector('svg').setAttribute('stroke', s.id===sh.id ? col : 'rgba(255,255,255,.35)');
  });
  updatePreview();
}

function updatePreview(){
  const icon=document.getElementById('preview-icon');
  const svg=document.getElementById('preview-svg');
  const name=document.getElementById('preview-name');
  const btn=document.getElementById('confirm-btn');

  if(selColor){
    icon.style.borderColor=selColor.hex;
    icon.style.background=`${selColor.hex}18`;
    icon.style.boxShadow=`0 0 14px ${selColor.hex}66`;
  }
  if(selShape){
    svg.innerHTML=`<path d="${selShape.path}" stroke="${selColor?.hex||'white'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
  }

  if(selColor && selShape){
    name.textContent=`${selColor.name} · ${selShape.name}`;
    name.style.color=selColor.hex;
    btn.disabled=false;
    btn.style.cssText=`background:${selColor.hex}22;border:1.5px solid ${selColor.hex}88;color:${selColor.hex};box-shadow:0 0 14px ${selColor.hex}44;padding:11px 0;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.04em;transition:all .15s ease;`;
  } else {
    name.textContent='— wähle Farbe & Symbol';
    name.style.color='#3a4a68';
    btn.disabled=true;
    btn.style.cssText='padding:11px 0;border-radius:10px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#2a3550;cursor:not-allowed;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.04em;opacity:.4;';
  }
}

document.getElementById('confirm-btn').addEventListener('click',()=>{
  if(!selColor||!selShape) return;
  const idx=registeredTeams.length;
  if(idx>=6) return;

  // Register
  takenColors.add(selColor.hex);
  takenShapes.add(selShape.id);
  const team={hex:selColor.hex, r:selColor.r, g:selColor.g, b:selColor.b,
    name:`${selColor.name} ${selShape.name}`, inten:.88, shapeId:selShape.id, shapePath:selShape.path};
  registeredTeams.push(team);

  // Update TEAMS array
  TEAMS[idx]={color:team.hex, r:team.r, g:team.g, b:team.b, name:team.name, inten:team.inten, shapeId:team.shapeId, shapePath:team.shapePath};

  // Update registered list
  renderRegisteredList();

  // Reset selection
  selColor=null; selShape=null;
  document.getElementById('color-grid').innerHTML='';
  document.getElementById('shape-grid').innerHTML='';
  buildAvatarUI();
  updatePreview();
  updateScores();
});

function renderRegisteredList(){
  const list=document.getElementById('registered-list');
  if(!registeredTeams.length){
    list.innerHTML='<div style="font-size:12px;color:#1e2840;">Noch keine Teams</div>';
    return;
  }
  list.innerHTML=registeredTeams.map((t,i)=>`
    <div class="reg-item">
      <div class="reg-dot" style="background:${t.hex};box-shadow:0 0 6px ${t.hex}88;"></div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${t.hex}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="${SHAPES.find(s=>s.id===t.shapeId)?.path||''}"/>
      </svg>
      <span style="color:${t.hex};font-weight:600;">${t.name}</span>
      <span style="color:#1e2840;margin-left:auto;font-size:11px;">Team ${i+1}</span>
    </div>`).join('');
}

buildAvatarUI();

// ══════════════════════════════════════════════
// SVG BUILDING — PURE NEON LINES ONLY
// No fills, no gradients, no blur — just 12 sharp edges
// ══════════════════════════════════════════════
function mkEl(tag, attrs){
  const el=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}

function drawBuildingSVG(svg, corners, H, team, ghost, isHero=false){
  const col = ghost ? 'rgba(255,255,255,.10)' : team.color;

  const [C0,C1,C2,C3]=corners; // TL, TR, BR, BL of rhombus (screen space)
  const up=(p,h=H)=>({x:p.x,y:p.y-h});
  const T0=up(C0), T1=up(C1), T2=up(C2), T3=up(C3);

  // Visible edges in our iso view (rotateX52, rotateZ-45):
  // Top face: all 4 edges
  // Vertical: all 4 corners
  // Base: only front-left (C3→C0) and front-bottom (C3→C2) — back edges hidden
  const edges=[
    [T0,T1],[T1,T2],[T2,T3],[T3,T0], // top face
    [C0,T0],[C1,T1],[C2,T2],[C3,T3], // vertical edges
    [C3,C0],[C3,C2],                  // visible base edges
  ];

  edges.forEach(([a,b])=>{
    // glow layer
    svg.appendChild(mkEl('line',{
      x1:a.x.toFixed(1),y1:a.y.toFixed(1),
      x2:b.x.toFixed(1),y2:b.y.toFixed(1),
      stroke:col, 'stroke-width':'3.5', 'stroke-linecap':'round', opacity:'.22',
    }));
    // sharp layer
    svg.appendChild(mkEl('line',{
      x1:a.x.toFixed(1),y1:a.y.toFixed(1),
      x2:b.x.toFixed(1),y2:b.y.toFixed(1),
      stroke:col, 'stroke-width':'1.4', 'stroke-linecap':'round', opacity:'1',
    }));
  });

  // Symbol only on hero cell (highest/home building of each connected block)
  if(isHero && team.shapePath && H > 10){
    const cx=((T0.x+T1.x+T2.x+T3.x)/4).toFixed(1);
    const cy=((T0.y+T1.y+T2.y+T3.y)/4).toFixed(1);
    const s=Math.min(H*.45, 16);
    const g=mkEl('g',{transform:`translate(${cx},${cy}) scale(${(s/12).toFixed(2)})`});
    g.appendChild(mkEl('path',{d:team.shapePath,stroke:team.color,'stroke-width':'4','stroke-linecap':'round','stroke-linejoin':'round',fill:'none',transform:'translate(-12,-12)',opacity:'.22'}));
    g.appendChild(mkEl('path',{d:team.shapePath,stroke:team.color,'stroke-width':'1.5','stroke-linecap':'round','stroke-linejoin':'round',fill:'none',transform:'translate(-12,-12)',opacity:'.9'}));
    svg.appendChild(g);
  }
}

// ── CORNER CACHE ──
let cellCornerCache={};
function buildCornerCache(){
  cellCornerCache={};
  const wrap=document.getElementById('board-wrap');
  const wrapRect=wrap.getBoundingClientRect();
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if(!el) continue;
    const markers=[[0,0],[CELL,0],[CELL,CELL],[0,CELL]].map(([lx,ly])=>{
      const m=document.createElement('div');
      m.style.cssText=`position:absolute;left:${lx}px;top:${ly}px;width:1px;height:1px;pointer-events:none;`;
      el.appendChild(m);
      return m;
    });
    cellCornerCache[`${r},${c}`]=markers.map(m=>{
      const mr=m.getBoundingClientRect();
      return{x:mr.left-wrapRect.left, y:mr.top-wrapRect.top};
    });
    markers.forEach(m=>m.remove());
  }
}

// ── CONNECTED BLOCKS (flood-fill per team) ──
function getBlocks(teamIdx){
  const visited=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
  const blocks=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(state[r][c]?.teamIdx===teamIdx && !visited[r][c]){
      const block=[];
      const q=[[r,c]];
      visited[r][c]=true;
      while(q.length){
        const [cr,cc]=q.shift();
        block.push([cr,cc]);
        [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
          const nr=cr+dr,nc=cc+dc;
          if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&!visited[nr][nc]&&state[nr][nc]?.teamIdx===teamIdx){
            visited[nr][nc]=true; q.push([nr,nc]);
          }
        });
      }
      blocks.push(block);
    }
  }
  return blocks;
}

// Find the "hero" cell of a block: highest building (home preferred, else edge preferred)
function blockHeroCell(block){
  let best=null,bestScore=-1;
  block.forEach(([r,c])=>{
    const cell=state[r][c];
    if(!cell) return;
    const isHome=cell.home;
    const eTop=isEdge(r,c,-1,0),eBot=isEdge(r,c,1,0),eL=isEdge(r,c,0,-1),eR=isEdge(r,c,0,1);
    const isEdgeCell=eTop||eBot||eL||eR;
    const score=(isHome?1000:0)+(isEdgeCell?10:0)+HEIGHTS[cell.teamIdx%6][cell.hi%3];
    if(score>bestScore){bestScore=score;best=[r,c];}
  });
  return best;
}

// ── UPDATE SVG ──
let isIsoMode=false;
function updateBuildingSVG(animateCell=null){
  const svg=document.getElementById('bld-svg');
  const wrap=document.getElementById('board-wrap');
  const wr=wrap.getBoundingClientRect();
  svg.setAttribute('width',wr.width);
  svg.setAttribute('height',wr.height);
  svg.innerHTML='';
  if(!isIsoMode) return;

  // Collect hero cells per team (for roof symbols)
  const heroCells=new Set();
  TEAMS.forEach((_,ti)=>{
    getBlocks(ti).forEach(block=>{
      const h=blockHeroCell(block);
      if(h) heroCells.add(`${h[0]},${h[1]}`);
    });
  });

  // Draw only owned cells — no ghost buildings
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const cell=state[r][c];
    if(!cell) continue;
    const corners=cellCornerCache[`${r},${c}`];
    if(!corners) continue;

    const team=TEAMS[cell.teamIdx];
    const bh=HEIGHTS[cell.teamIdx%6][cell.hi%3];
    const isHome=cell.home;
    const eTop=isEdge(r,c,-1,0),eBot=isEdge(r,c,1,0),eL=isEdge(r,c,0,-1),eR=isEdge(r,c,0,1);
    const interior=!eTop&&!eBot&&!eL&&!eR&&!isHome;
    let H=isHome?Math.round(bh*1.6):interior?Math.round(bh*.55):bh;
    // Perspective scale: back rows appear taller
    const perspScale=1.65-(r/(SIZE-1))*1.0;
    H=Math.round(H*perspScale);

    const isHero=heroCells.has(`${r},${c}`);
    const doAnim=animateCell&&animateCell.r===r&&animateCell.c===c;
    const g=document.createElementNS(NS,'g');

    if(doAnim){
      const anim=document.createElementNS(NS,'animateTransform');
      anim.setAttribute('attributeName','transform');
      anim.setAttribute('type','translate');
      anim.setAttribute('values',`0,${H}; 0,-5; 0,0`);
      anim.setAttribute('keyTimes','0; 0.72; 1');
      anim.setAttribute('dur','1.1s');
      anim.setAttribute('calcMode','spline');
      anim.setAttribute('keySplines','0.12 0.8 0.3 1; 0.4 0 0.6 1');
      anim.setAttribute('fill','freeze');
      g.appendChild(anim);
      const animOp=document.createElementNS(NS,'animate');
      animOp.setAttribute('attributeName','opacity');
      animOp.setAttribute('values','0;1;1');
      animOp.setAttribute('keyTimes','0;0.25;1');
      animOp.setAttribute('dur','1.1s');
      animOp.setAttribute('fill','freeze');
      g.appendChild(animOp);
    }

    drawBuildingSVG(g,corners,H,team,false,isHero);
    svg.appendChild(g);
  }
}

// ── RENDER CELL ──
function renderCell(r,c){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  el.className='cell '+(cell?'owned':'empty');
  const tTop=el.querySelector('.tile-top');
  const tFront=el.querySelector('.tile-front');
  const tRight=el.querySelector('.tile-right');

  if(!cell){
    tTop.style.cssText=`position:absolute;inset:0;z-index:2;border-radius:2px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);`;
    tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:8px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:#050710;border:1px solid rgba(255,255,255,.02);border-top:none;`;
    tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:8px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:#040610;border:1px solid rgba(255,255,255,.015);border-left:none;`;
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const n=adjN(r,c,cell.teamIdx);
  const isHome=cell.home;
  const inten=team.inten;
  const eTop=isEdge(r,c,-1,0),eBot=isEdge(r,c,1,0),eL=isEdge(r,c,0,-1),eR=isEdge(r,c,0,1);
  const interior=!eTop&&!eBot&&!eL&&!eR&&!isHome;
  function rc2(a){return`rgba(${team.r},${team.g},${team.b},${a})`;}

  const bg=interior?rc2(.13):isHome?rc2(.28):rc2(.20);
  const border=interior?`1px solid ${rc2(.25)}`:isHome?`2px solid ${rc2(.75)}`:`1.5px solid ${rc2(.55)}`;
  const gsBase=isHome?`0 0 18px ${rc2(.65)},0 0 36px ${rc2(.28)}`:interior?`inset 0 0 10px rgba(0,0,0,.5)`:`0 0 12px ${rc2(.5)}`;
  const gsPeak=`0 0 24px ${rc2(.85)},0 0 48px ${rc2(.35)}`;

  tTop.style.cssText=`position:absolute;inset:0;z-index:2;border-radius:2px;
    background:${bg};border:${border};
    --gs-base:${gsBase};--gs-peak:${gsPeak};
    box-shadow:${gsBase};transform:translateZ(1px);transition:box-shadow .3s ease;
    ${(n>=3||isHome)?`animation:dominantPulse ${isHome?2.2:3}s ease-in-out infinite;`:''}`;
  tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:8px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:${rc2(.1)};border-left:1px solid ${rc2(.18)};border-bottom:1px solid ${rc2(.12)};`;
  tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:8px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:${rc2(.07)};border-top:1px solid ${rc2(.12)};border-right:1px solid ${rc2(.09)};`;
}

// ── TERRITORY OUTLINES + 2D SYMBOLS ──
function updateTerritoryOutlines(){
  document.querySelectorAll('.territory-svg').forEach(s=>s.remove());
  const totalW=(CELL+GAP)*SIZE-GAP;
  const svg=document.createElementNS(NS,'svg');
  svg.className='territory-svg';
  svg.setAttribute('width',totalW);svg.setAttribute('height',totalW);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:50;overflow:visible;';

  TEAMS.forEach((team,ti)=>{
    const cells=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(state[r][c]?.teamIdx===ti) cells.push([r,c]);
    if(!cells.length) return;

    // Territory border outlines
    const segs=[],pad=3;
    cells.forEach(([r,c])=>{
      const x=c*(CELL+GAP),y=r*(CELL+GAP);
      if(!same(r-1,c,ti)) segs.push([x-pad,y-pad,x+CELL+pad,y-pad]);
      if(!same(r+1,c,ti)) segs.push([x-pad,y+CELL+pad,x+CELL+pad,y+CELL+pad]);
      if(!same(r,c-1,ti)) segs.push([x-pad,y-pad,x-pad,y+CELL+pad]);
      if(!same(r,c+1,ti)) segs.push([x+CELL+pad,y-pad,x+CELL+pad,y+CELL+pad]);
    });
    segs.forEach(([x1,y1,x2,y2])=>{
      svg.appendChild(mkEl('line',{x1,y1,x2,y2,stroke:team.color,'stroke-width':'5','stroke-opacity':'.2','stroke-linecap':'round'}));
      svg.appendChild(mkEl('line',{x1,y1,x2,y2,stroke:team.color,'stroke-width':'1.8','stroke-opacity':'.9','stroke-linecap':'round'}));
    });

    // 2D symbols: one per connected block, centered, scaled by block size
    // Hide in iso mode (symbols shown on rooftops instead)
    if(team.shapePath && !isIsoMode){
      getBlocks(ti).forEach(block=>{
        const n=block.length;
        // Center of block in pixel space
        const cx=block.reduce((s,[,c])=>s+c*(CELL+GAP)+CELL/2,0)/n;
        const cy=block.reduce((s,[r])=>s+r*(CELL+GAP)+CELL/2,0)/n;
        // Scale: 1 cell = 18px, grows with block size (max 36px)
        const sz=Math.min(18+n*4, 36);
        const sc=(sz/24).toFixed(2);
        const g=mkEl('g',{transform:`translate(${cx.toFixed(1)},${cy.toFixed(1)}) scale(${sc})`});
        // glow
        g.appendChild(mkEl('path',{d:team.shapePath,stroke:team.color,'stroke-width':'6','stroke-linecap':'round','stroke-linejoin':'round',fill:'none',transform:'translate(-12,-12)',opacity:'.2'}));
        // sharp
        g.appendChild(mkEl('path',{d:team.shapePath,stroke:team.color,'stroke-width':'1.8','stroke-linecap':'round','stroke-linejoin':'round',fill:'none',transform:'translate(-12,-12)',opacity:'.95'}));
        svg.appendChild(g);
      });
    }
  });

  document.querySelector('.iso-grid').appendChild(svg);
}

// ── CAMERA SEQUENCE ──
let cameraAnimating=false;
function triggerCameraSequence(r,c){
  cameraAnimating=true;
  const scene=document.getElementById('iso-scene');
  const grid=document.getElementById('grid');
  const bldSvg=document.getElementById('bld-svg');
  bldSvg.style.transition='opacity 0.15s ease';
  bldSvg.style.opacity='0';
  scene.classList.add('is-iso');
  grid.classList.add('is-iso');
  isIsoMode=true;
  setTimeout(()=>{
    buildCornerCache();
    updateTerritoryOutlines(); // remove 2D symbols after camera tilts
    updateBuildingSVG(null);
    bldSvg.style.transition='opacity 0.4s ease';
    bldSvg.style.opacity='1';
  },1050);
  setTimeout(()=>{ updateBuildingSVG({r,c}); },1500);
  setTimeout(()=>{ cameraAnimating=false; },2800);
}

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;
for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');
  el.className='cell';el.dataset.r=r;el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px;`;
  ['tile-top','tile-front','tile-right'].forEach(cn=>{
    const d=document.createElement('div');d.className=cn;el.appendChild(d);
  });
  el.addEventListener('mouseenter',()=>{
    if(state[r][c]) return;
    const t=TEAMS[activeTeam];
    el.querySelector('.tile-top').style.background=`rgba(${t.r},${t.g},${t.b},.08)`;
    el.querySelector('.tile-top').style.borderColor=`rgba(${t.r},${t.g},${t.b},.4)`;
  });
  el.addEventListener('mouseleave',()=>{
    if(state[r][c]) return;
    el.querySelector('.tile-top').style.background='rgba(255,255,255,.02)';
    el.querySelector('.tile-top').style.borderColor='rgba(255,255,255,.05)';
  });
  el.addEventListener('click',()=>{
    if(state[r][c]||cameraAnimating) return;
    state[r][c]={teamIdx:activeTeam,hi:Math.floor(Math.random()*3),home:false,new:true};
    renderCell(r,c);
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE) renderCell(nr,nc);
    });
    updateTerritoryOutlines();
    updateScores();
    if(!isIsoMode){
      triggerCameraSequence(r,c);
    } else {
      cameraAnimating=true;
      setTimeout(()=>{ buildCornerCache(); updateBuildingSVG({r,c}); },80);
      setTimeout(()=>{ cameraAnimating=false; },1400);
    }
  });
  gridEl.appendChild(el);
  renderCell(r,c);
}

requestAnimationFrame(()=>requestAnimationFrame(()=>{
  buildCornerCache();
  updateTerritoryOutlines();
  updateBuildingSVG();
}));

function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.filter((_,i)=>state.flat().some(c=>c?.teamIdx===i)||i<registeredTeams.length).map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return `<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.07);--tc-border:rgba(${t.r},${t.g},${t.b},.35);--tc-glow:rgba(${t.r},${t.g},${t.b},.15);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 6px rgba(${t.r},${t.g},${t.b},.7);"></div>
      <span class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.name}</span>
      <span class="tp-count">${count}F</span>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
renderRegisteredList();
</script>
