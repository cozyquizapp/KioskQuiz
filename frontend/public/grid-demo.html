<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quartier Quiz — 3D Grid Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::after,*::before{box-sizing:border-box;margin:0;padding:0;transform-style:preserve-3d}
html,body{width:100%;height:100%;background:#0D0A06;color:#e2e8f0;font-family:'Nunito',system-ui,sans-serif}
body{overflow-y:auto;overflow-x:hidden}

.grain{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence baseFrequency=".85" type="fractalNoise"/></filter><rect width="200" height="200" filter="url(%23n)" opacity=".03"/></svg>')}
.firefly{position:fixed;pointer-events:none;z-index:1;width:4px;height:4px;border-radius:50%;
  background:#FEF08A;box-shadow:0 0 6px 2px rgba(254,240,138,.7);
  animation:ffmove var(--dur,6s) ease-in-out var(--del,0s) infinite}
@keyframes ffmove{0%,100%{transform:translate(0,0);opacity:.35}50%{transform:translate(var(--dx,20px),var(--dy,-15px));opacity:.7}}

.page{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;padding:24px 20px 80px;gap:24px}
.section-title{font-size:clamp(20px,3vw,28px);font-weight:900;color:#F59E0B;text-shadow:0 0 20px rgba(245,158,11,.25)}
.section-sub{font-size:clamp(11px,1.4vw,13px);color:#92400E;font-weight:700;margin-top:-16px}

/* ═══ 3D GRID ═══ */
.grid-scene{perspective:800px;perspective-origin:50% 35%;padding:60px 0 20px;cursor:grab;user-select:none}
.grid-scene.dragging{cursor:grabbing}
.grid-scene.dragging .iso-grid{transition:none}
.iso-grid{
  display:grid;gap:4px;
  transform:rotateX(var(--rx,55deg)) rotateZ(var(--rz,-45deg));
  transition:transform .15s ease-out;
}
.drag-hint{font-size:11px;color:#64748b;margin-top:-12px;font-weight:700;opacity:.7}
.tile{
  position:relative;
  cursor:pointer;transition:transform .15s ease;
}
.tile:not(.owned):hover .ground{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}

.ground{
  width:100%;height:100%;border-radius:3px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
}

/* ═══ 6-FACE 3D CUBE SYSTEM ═══ */
.cube{
  position:absolute;pointer-events:none;
  left:var(--ox,0px);top:var(--oy,0px);
  width:var(--bw,100%);height:var(--bd,100%);
}
.c-top{
  position:absolute;left:0;top:0;
  width:var(--bw);height:var(--bd);
  border-radius:var(--tr,2px);
  transform:translateZ(var(--bh,30px));
}
.c-front{
  position:absolute;left:0;bottom:0;
  width:var(--bw);height:var(--bh,30px);
  transform-origin:bottom center;
  transform:rotateX(-90deg);
}
.c-back{
  position:absolute;left:0;top:0;
  width:var(--bw);height:var(--bh,30px);
  transform-origin:top center;
  transform:rotateX(90deg);
}
.c-right{
  position:absolute;top:0;right:0;
  width:var(--bh,30px);height:var(--bd);
  transform-origin:center right;
  transform:rotateY(90deg);
}
.c-left{
  position:absolute;top:0;left:0;
  width:var(--bh,30px);height:var(--bd);
  transform-origin:center left;
  transform:rotateY(-90deg);
}
.c-emoji{
  position:absolute;left:0;top:0;
  width:var(--bw);height:var(--bd);
  transform:translateZ(calc(var(--bh,30px) + 2px));
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));
}

/* Pyramid spike (border trick) — sits on top of a cube via translateZ */
.pyramid{
  position:absolute;width:0;height:0;pointer-events:none;
}

/* Score bar */
.score-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.team-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;
  background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);
  cursor:pointer;transition:all .25s;user-select:none;font-size:12px}
.team-pill.active{background:var(--tc-bg);border-color:var(--tc-border);box-shadow:0 0 20px var(--tc-glow)}
.tp-emoji{font-size:16px;line-height:1}
.tp-name{font-weight:800;color:#475569;font-size:12px}
.team-pill.active .tp-name{color:var(--tc-text)}
.tp-count{font-weight:900;font-size:10px;color:#1C1917;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:5px}
.team-pill.active .tp-count{background:var(--tc-count-bg);color:var(--tc-text)}

/* ═══ SHOWCASE ═══ */
.showcases{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;width:100%;max-width:1200px}
.showcase-card{background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);border-radius:16px;
  padding:20px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.showcase-card:hover{border-color:rgba(255,255,255,.12)}
.sc-header{display:flex;align-items:center;gap:10px}
.sc-icon{font-size:28px;line-height:1}
.sc-title{font-size:16px;font-weight:900}
.sc-desc{font-size:12px;color:#64748b;line-height:1.5}
.sc-stage{position:relative;height:180px;border-radius:12px;overflow:hidden;
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center}
.sc-play{padding:10px 22px;border-radius:12px;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:800;
  background:var(--sc-color,#F59E0B);color:#0D0A06;
  box-shadow:0 4px 16px var(--sc-glow,rgba(245,158,11,.3));
  transition:all .2s;align-self:center}
.sc-play:hover{transform:scale(1.04);filter:brightness(1.15)}

/* Building type gallery — 4 columns × 2 rows */
.type-gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:700px}
.type-card{display:flex;flex-direction:column;align-items:center;gap:6px;
  background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);border-radius:14px;
  padding:14px 10px 10px}
.type-card:hover{border-color:rgba(255,255,255,.12)}
.tc-stage{perspective:400px;perspective-origin:50% 35%;height:100px;width:80px;
  display:flex;align-items:center;justify-content:center}
.tc-iso{transform:rotateX(55deg) rotateZ(-45deg);position:relative;width:46px;height:46px}
.tc-name{font-size:11px;font-weight:800;color:#94a3b8;text-align:center}

/* ═══ KEYFRAMES ═══ */
@keyframes stampRing{0%{transform:scale(.5);opacity:.8}100%{transform:scale(3);opacity:0}}
@keyframes shatterOut{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(.3) rotate(var(--sr,180deg))}}
@keyframes frostPulse{0%,100%{box-shadow:0 0 6px rgba(147,210,255,.4)}50%{box-shadow:0 0 16px rgba(147,210,255,.8)}}
@keyframes jokerBurst{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(2.5)}}
@keyframes starFall{0%{opacity:1;transform:translateY(var(--starY,-60px)) rotate(0)}100%{opacity:0;transform:translateY(20px) rotate(720deg)}}
@keyframes jokerGlow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.5)}50%{box-shadow:0 0 22px rgba(251,191,36,.9)}}
</style>
</head>
<body>
<div class="grain"></div>
<div id="fireflies"></div>

<div class="page">
<div class="section-title">Quartier Quiz</div>
<div class="section-sub">Klicke leere Felder zum Setzen — jedes Feld bekommt einen zufälligen Gebäudetyp</div>

<div class="drag-hint">🖱 Klicken + Ziehen = Perspektive drehen · Doppelklick = Reset</div>
<div class="grid-scene" id="gridscene">
  <div class="iso-grid" id="grid"></div>
</div>
<div class="score-bar" id="scorebar"></div>

<div class="section-title" style="margin-top:8px">Gebäudetypen</div>
<div class="section-sub">8 Silhouetten — jede sofort erkennbar</div>
<div class="type-gallery" id="typegallery"></div>

<div class="section-title" style="margin-top:8px">Animation Showcase</div>
<div class="section-sub">Klicke Play um jede Animation zu sehen</div>
<div class="showcases" id="showcases"></div>
</div>

<script>
const SIZE=7, CELL=56;

const TEAMS=[];
function mkTeam(hex,name,emoji){
  const m=hex.match(/#(..)(..)(..)/);
  const r=parseInt(m[1],16),g=parseInt(m[2],16),b=parseInt(m[3],16);
  return{color:hex,r,g,b,name,emoji};
}
TEAMS.push(mkTeam('#3B82F6','Fuchs','\u{1F98A}'));
TEAMS.push(mkTeam('#EF4444','Tiger','\u{1F42F}'));
TEAMS.push(mkTeam('#F97316','Eule','\u{1F989}'));
TEAMS.push(mkTeam('#22C55E','Frosch','\u{1F438}'));

function rca(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`}

// ══════════════════════════════════════════════════════════════════════════════
// 8 BUILDING TYPES — ALL kept well within tile bounds
// wf/df = fraction of tile for width/depth (max .78)
// hf = fraction of tile for height
// ══════════════════════════════════════════════════════════════════════════════
const BTYPES=[
  // 0: Haus — medium square block, simple
  {name:'Haus',    wf:.72, df:.72, hf:.38, tr:'2px', extra:null},
  // 1: Turm — narrow & tall with pyramid spire on top
  {name:'Turm',    wf:.40, df:.40, hf:.55, tr:'2px', extra:'spire'},
  // 2: Hochhaus — taller block, flat roof, antenna pole
  {name:'Hochhaus', wf:.62, df:.62, hf:.65, tr:'1px', extra:'antenna'},
  // 3: Laden — wide & flat with awning overhang
  {name:'Laden',   wf:.78, df:.60, hf:.25, tr:'2px', extra:'awning'},
  // 4: Fabrik — L-shape: tall part + low wing + chimney
  {name:'Fabrik',  wf:.48, df:.72, hf:.45, tr:'1px', extra:'lshape'},
  // 5: Kirche — narrow body with tall pyramid steeple
  {name:'Kirche',  wf:.45, df:.55, hf:.42, tr:'2px', extra:'steeple'},
  // 6: Burg — T-shape: main hall + cross wing + corner turret
  {name:'Burg',    wf:.45, df:.78, hf:.30, tr:'1px', extra:'tshape'},
  // 7: Silo — round, medium height, dome ring
  {name:'Silo',    wf:.48, df:.48, hf:.48, tr:'50%', extra:'dome'},
];

// ══ HELPER: create a mini cube (for extras like chimney, turret) ══
function mkMiniCube(parent, x, y, z, w, d, h, team, brightMul){
  const mc=document.createElement('div');mc.className='cube';
  mc.style.cssText=`--bw:${w}px;--bd:${d}px;--bh:${h}px;--ox:${x}px;--oy:${y}px;
    position:absolute;left:0;top:0;width:var(--bw);height:var(--bd);
    transform:translateZ(${z}px);pointer-events:none`;
  // Only 3 visible faces (top, front, right) — back/left hidden by main cube
  const t=document.createElement('div');t.className='c-top';
  t.style.cssText=`background:${rca(team,.70*brightMul)};border:1px solid ${rca(team,.50)}`;
  const f=document.createElement('div');f.className='c-front';
  f.style.cssText=`background:${rca(team,.42*brightMul)};border:1px solid ${rca(team,.30)}`;
  const r=document.createElement('div');r.className='c-right';
  r.style.cssText=`background:${rca(team,.25*brightMul)};border:1px solid ${rca(team,.25)}`;
  mc.appendChild(t);mc.appendChild(f);mc.appendChild(r);
  parent.appendChild(mc);
  return mc;
}

// ══ HELPER: create pyramid spire (border trick from article) ══
function mkPyramid(parent, x, y, z, base, height, team){
  const pyr=document.createElement('div');pyr.className='pyramid';
  // The pyramid sits centered at (x,y) lifted to z
  const half=Math.round(base/2);
  pyr.style.cssText=`left:${x}px;top:${y}px;
    transform:translateZ(${z}px) translateX(-${half}px) translateY(-${half}px);
    border-left:${half}px solid ${rca(team,.30)};
    border-right:${half}px solid ${rca(team,.22)};
    border-bottom:${height}px solid ${rca(team,.55)};
    border-top:${half}px solid ${rca(team,.75)}`;
  parent.appendChild(pyr);
}

// ══ BUILD 6-FACE CUBE ══
function buildCube(tileEl, cell, team, sz, btype, animate=false){
  tileEl.querySelectorAll('.cube,.pyramid').forEach(b=>b.remove());
  if(!cell||!team)return;

  const bt=btype||BTYPES[0];
  const bw=Math.round(sz*bt.wf);
  const bd=Math.round(sz*bt.df);
  let bh=Math.round(sz*bt.hf);

  // Home buildings slightly taller
  if(cell.home) bh=Math.round(bh*1.25);
  // Stack growth
  bh += cell.stacked*Math.round(sz*.18);
  // Joker bonus
  if(cell.joker) bh += Math.round(sz*.12);

  const ox=Math.round((sz-bw)/2);
  const oy=Math.round((sz-bd)/2);

  const cube=document.createElement('div');cube.className='cube';
  cube.style.cssText=`--bw:${bw}px;--bd:${bd}px;--bh:${bh}px;--ox:${ox}px;--oy:${oy}px;--tr:${bt.tr}`;

  const colTop=rca(team,.80), colFront=rca(team,.45), colRight=rca(team,.28);
  const colBack=rca(team,.20), colLeft=rca(team,.35);
  const bordTop=rca(team,.60), bordSide=rca(team,.30);

  const isSilo=(bt.extra==='dome');

  // 6 faces
  const top=document.createElement('div');top.className='c-top';
  if(isSilo){
    // Sphere gradient on top: radial light at 40% 30% for 3D dome illusion
    top.style.cssText=`background:radial-gradient(circle at 40% 30%, ${rca(team,0)} 4%, 57%, rgba(0,0,0,.55) 90%) ${colTop};
      border:1px solid ${bordTop};border-radius:50%`;
  } else {
    top.style.cssText=`background:${colTop};border:1px solid ${bordTop};border-radius:${bt.tr}`;
  }
  cube.appendChild(top);

  const front=document.createElement('div');front.className='c-front';
  if(isSilo){
    // Cylinder gradient on front: curved shading from center-bright to edge-dark
    const cylR=Math.round(bh*.15);
    front.style.cssText=`background:
      radial-gradient(50% ${cylR}px at 50% ${cylR}px, rgba(0,0,0,.12) 99.99%, transparent 0),
      radial-gradient(50% ${cylR}px at 50% calc(100% - ${cylR}px), rgba(255,255,255,.08) 99.99%, transparent 0),
      radial-gradient(ellipse at 50% 50%, ${rca(team,.52)} 0%, ${rca(team,.20)} 100%);
      border:none;border-radius:${Math.round(bw*.15)}px / ${cylR}px`;
  } else {
    front.style.cssText=`background:${colFront};border:1px solid ${bordSide}`;
  }
  cube.appendChild(front);

  const back=document.createElement('div');back.className='c-back';
  back.style.cssText=`background:${colBack};border:1px solid ${bordSide}`;
  cube.appendChild(back);

  const right=document.createElement('div');right.className='c-right';
  if(isSilo){
    // Cylinder gradient on right side too
    const cylR=Math.round(bh*.15);
    right.style.cssText=`background:
      radial-gradient(50% ${cylR}px at 50% ${cylR}px, rgba(0,0,0,.15) 99.99%, transparent 0),
      radial-gradient(50% ${cylR}px at 50% calc(100% - ${cylR}px), rgba(255,255,255,.06) 99.99%, transparent 0),
      radial-gradient(ellipse at 50% 50%, ${rca(team,.35)} 0%, ${rca(team,.12)} 100%);
      border:none;border-radius:${Math.round(bd*.15)}px / ${cylR}px`;
  } else {
    right.style.cssText=`background:${colRight};border:1px solid ${bordSide}`;
  }
  cube.appendChild(right);

  const left=document.createElement('div');left.className='c-left';
  left.style.cssText=`background:${colLeft};border:1px solid ${bordSide}`;
  cube.appendChild(left);

  // Windows on front face (only if tall enough)
  if(bh>=16 && bw>=16){
    const winRows=bh>=30?2:1;
    const winCols=bw>=24?2:1;
    for(let wr=0;wr<winRows;wr++){
      for(let wc=0;wc<winCols;wc++){
        const win=document.createElement('div');
        const wW=Math.max(3,Math.round(bw*.16));
        const wH=Math.max(3,Math.round(bh*.14));
        const gX=Math.round((bw-winCols*wW)/(winCols+1));
        const gY=Math.round((bh-winRows*wH)/(winRows+1));
        win.style.cssText=`position:absolute;width:${wW}px;height:${wH}px;
          left:${gX+wc*(wW+gX)}px;top:${gY+wr*(wH+gY)}px;
          background:rgba(255,255,200,.20);border:1px solid rgba(255,255,200,.06);
          border-radius:1px;pointer-events:none`;
        front.appendChild(win);
      }
    }
  }

  // ── EXTRAS ──
  const ex=bt.extra;

  if(ex==='spire'){
    // Pyramid spike on top of tower (border trick)
    const base=Math.round(bw*.7);
    const ph=Math.round(bh*.5);
    mkPyramid(cube, Math.round(bw/2), Math.round(bd/2), bh, base, ph, team);
  }

  if(ex==='antenna'){
    // Thin vertical pole + dot on top
    const ah=Math.round(bh*.35);
    const pole=document.createElement('div');
    pole.style.cssText=`position:absolute;left:${Math.round(bw/2)-1}px;top:${Math.round(bd/2)-1}px;
      width:2px;height:2px;transform:translateZ(${bh}px);pointer-events:none`;
    // Shaft going up
    const shaft=document.createElement('div');
    shaft.style.cssText=`position:absolute;left:0;bottom:0;width:2px;height:${ah}px;
      transform-origin:bottom center;transform:rotateX(-90deg);
      background:rgba(255,255,255,.45)`;
    // Dot at top
    const dot=document.createElement('div');
    dot.style.cssText=`position:absolute;left:-1px;top:-1px;width:4px;height:4px;
      transform:translateZ(${ah}px);background:${rca(team,.95)};border-radius:50%`;
    pole.appendChild(shaft);pole.appendChild(dot);
    cube.appendChild(pole);
  }

  if(ex==='awning'){
    // Flat overhang on front side — stays within tile bounds
    const aw=Math.min(bw+4, sz-2); // don't exceed tile
    const ad=Math.round(bd*.28);
    const ah=2;
    const aox=Math.round((bw-aw)/2); // center on building
    mkMiniCube(cube, aox, bd-Math.round(ad*.4), Math.round(bh*.65), aw, ad, ah, team, 1.1);
  }

  if(ex==='lshape'){
    // L-SHAPE: main cube is the tall vertical part (already rendered above).
    // Add a low horizontal wing extending to the right + chimney on top.
    const wingW=Math.round(sz*.30);  // wing width
    const wingD=Math.round(bd*.60);  // wing depth (shorter than main)
    const wingH=Math.round(bh*.55);  // wing is lower
    // Wing sits to the right of the main building, bottom-aligned
    mkMiniCube(cube, bw, bd-wingD, 0, wingW, wingD, wingH, team, 0.95);
    // Chimney on top of main building
    const cw=Math.round(bw*.22), cd=Math.round(bd*.18), ch=Math.round(bh*.35);
    mkMiniCube(cube, bw-cw-1, 1, bh, cw, cd, ch, team, 0.85);
  }

  if(ex==='steeple'){
    // Tall pyramid steeple centered on church roof
    const base=Math.round(Math.min(bw,bd)*.65);
    const ph=Math.round(bh*.7);
    mkPyramid(cube, Math.round(bw/2), Math.round(bd/2), bh, base, ph, team);
  }

  if(ex==='tshape'){
    // T-SHAPE: main cube is the vertical bar of the T.
    // Add a wider horizontal cross-bar at the top + corner turret with pyramid.
    const barW=Math.round(sz*.78);  // cross bar wider than tile center
    const barD=Math.round(bd*.35);  // cross bar shallow
    const barH=Math.round(bh*.85);  // slightly lower than main
    const barOx=Math.round((bw-barW)/2); // center the bar on the main cube
    mkMiniCube(cube, barOx, 0, 0, barW, barD, barH, team, 1.0);
    // Corner turret on the cross-bar right end
    const tw=Math.round(barW*.18), td=Math.round(barD*.55), th=Math.round(bh*.60);
    mkMiniCube(cube, barOx+barW-tw, 0, barH, tw, td, th, team, 1.05);
    // Tiny pyramid on turret
    const pb=Math.round(tw*.85), ph=Math.round(th*.45);
    const half=Math.round(pb/2);
    const pyr=document.createElement('div');pyr.className='pyramid';
    pyr.style.cssText=`position:absolute;
      left:${barOx+barW-tw+Math.round(tw/2)}px;top:${Math.round(td/2)}px;
      transform:translateZ(${barH+th}px) translateX(-${half}px) translateY(-${half}px);
      border-left:${half}px solid ${rca(team,.30)};
      border-right:${half}px solid ${rca(team,.22)};
      border-bottom:${ph}px solid ${rca(team,.55)};
      border-top:${half}px solid ${rca(team,.80)};
      pointer-events:none`;
    cube.appendChild(pyr);
  }

  if(ex==='dome'){
    // Dome highlight ring + subtle inner glow on top face
    const ring=document.createElement('div');
    ring.style.cssText=`position:absolute;left:${Math.round(bw*.08)}px;top:${Math.round(bd*.08)}px;
      width:${Math.round(bw*.84)}px;height:${Math.round(bd*.84)}px;
      transform:translateZ(${bh+1}px);
      border:1px solid ${rca(team,.25)};border-radius:50%;pointer-events:none;
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.15) 0%, transparent 60%)`;
    cube.appendChild(ring);
    // No windows for silo — remove any that were added
    front.querySelectorAll('div').forEach(w=>w.remove());
  }

  // ── Emoji on top ──
  const emoji=document.createElement('div');emoji.className='c-emoji';
  const emojiSz=cell.home?Math.round(sz*.32):Math.round(sz*.24);
  emoji.style.fontSize=emojiSz+'px';

  if(cell.frozen){
    emoji.innerHTML=`<span>${team.emoji}</span><span style="font-size:${Math.round(emojiSz*.5)}px;margin-left:-1px;filter:drop-shadow(0 0 3px rgba(147,210,255,.8))">❄️</span>`;
  } else if(cell.joker){
    emoji.textContent='⭐';
  } else {
    emoji.textContent=team.emoji;
  }
  cube.appendChild(emoji);

  // ── Frozen: ONLY roof gets ice, walls keep team color ──
  if(cell.frozen){
    top.style.background='rgba(147,210,255,.50)';
    top.style.border='2px solid rgba(147,210,255,.85)';
    top.style.animation='frostPulse 2.5s ease-in-out infinite';
    front.style.background=`linear-gradient(to bottom, rgba(147,210,255,.12), ${colFront})`;
    right.style.background=`linear-gradient(to bottom, rgba(147,210,255,.08), ${colRight})`;
  }

  // ── Joker: golden roof ──
  if(cell.joker){
    top.style.background='rgba(251,191,36,.55)';
    top.style.border='2px solid rgba(251,191,36,.9)';
    top.style.animation='jokerGlow 2s ease-in-out infinite';
  }

  // ── Stack badge ──
  if(cell.stacked>0 && !cell.joker){
    const badge=document.createElement('div');
    badge.style.cssText=`position:absolute;left:0;top:0;width:${bw}px;height:${bd}px;
      transform:translateZ(${bh+8}px);
      display:flex;align-items:center;justify-content:center;pointer-events:none`;
    const span=document.createElement('span');
    span.style.cssText='font-size:9px;padding:1px 4px;border-radius:3px;background:rgba(251,191,36,.95);color:#1C1917;font-weight:900;font-family:Nunito,sans-serif';
    span.textContent='\u00D7'+(cell.stacked+1);
    badge.appendChild(span);cube.appendChild(badge);
  }

  // ── Animate ──
  if(animate){
    cube.style.opacity='0';
    cube.style.transition='opacity .35s ease';
    requestAnimationFrame(()=>{cube.style.opacity='1'});
  }

  tileEl.appendChild(cube);
}

// ══ STATE ══
let activeTeam=0;
const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));

function seed(r,c,t,home=false){

}

seed(0,S,1,true);seed(0,S-1,1);seed(1,S,1);
seed(S,0,2,true);seed(S-1,0,2);seed(S,1,2);
seed(S,S,3,true);seed(S-1,S,3);seed(S,S-1,3);

// ══ RENDER TILE ══
function renderTile(r,c){
  const el=document.querySelector(`#grid [data-r="${r}"][data-c="${c}"]`);
  if(!el)return;
  const cell=state[r][c];
  const ground=el.querySelector('.ground');
  if(!cell){
    el.classList.remove('owned');
    ground.style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)';
    el.querySelectorAll('.cube,.pyramid').forEach(b=>b.remove());
    return;
  }
  el.classList.add('owned');
  const team=TEAMS[cell.teamIdx];
  ground.style.cssText=`width:100%;height:100%;border-radius:3px;background:${rca(team,.15)};border:1px solid ${rca(team,.35)};box-shadow:0 0 10px ${rca(team,.20)}`;
  buildCube(el,cell,team,CELL,BTYPES[cell.btype||0]);
}

// ══ BUILD DOM ══
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');el.className='tile';
  el.dataset.r=r;el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px`;
  const ground=document.createElement('div');ground.className='ground';
  el.appendChild(ground);
  el.addEventListener('click',()=>{
    if(state[r][c])return;
    const bt=Math.floor(Math.random()*BTYPES.length);
    state[r][c]={teamIdx:activeTeam,home:false,frozen:false,stacked:0,joker:false,btype:bt};
    renderTile(r,c);
    buildCube(el,state[r][c],TEAMS[activeTeam],CELL,BTYPES[bt],true);
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE)renderTile(nr,nc)});
    updateScores();
  });
  gridEl.appendChild(el);renderTile(r,c);
}

// ══ DRAG TO ROTATE ══
{
  const scene=document.getElementById('gridscene');
  let rx=55, rz=-45; // initial rotation matching CSS
  let dragging=false, startX=0, startY=0, startRx=0, startRz=0;
  let didDrag=false; // track if mouse moved significantly

  function applyRotation(){
    gridEl.style.setProperty('--rx', rx+'deg');
    gridEl.style.setProperty('--rz', rz+'deg');
  }

  scene.addEventListener('mousedown', e=>{
    // Don't hijack clicks on tiles — only start drag tracking
    dragging=true; didDrag=false;
    startX=e.clientX; startY=e.clientY;
    startRx=rx; startRz=rz;
    scene.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(Math.abs(dx)>3 || Math.abs(dy)>3) didDrag=true;
    // Horizontal drag = rotateZ, vertical drag = rotateX
    rz=startRz + dx*0.4;
    rx=startRx - dy*0.3;
    // Clamp rotateX: 15° (almost flat) to 75° (top-down)
    rx=Math.max(15, Math.min(75, rx));
    applyRotation();
  });

  window.addEventListener('mouseup', ()=>{
    if(!dragging) return;
    dragging=false;
    scene.classList.remove('dragging');
  });

  // If it was a drag (not click), prevent tile click
  scene.addEventListener('click', e=>{
    if(didDrag){ e.stopPropagation(); didDrag=false; }
  }, true);

  // Double-click to reset
  scene.addEventListener('dblclick', e=>{
    rx=55; rz=-45;
    applyRotation();
    e.preventDefault();
  });

  // Touch support
  scene.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) return;
    dragging=true; didDrag=false;
    startX=e.touches[0].clientX; startY=e.touches[0].clientY;
    startRx=rx; startRz=rz;
  }, {passive:true});

  window.addEventListener('touchmove', e=>{
    if(!dragging || e.touches.length!==1) return;
    const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
    if(Math.abs(dx)>3 || Math.abs(dy)>3) didDrag=true;
    rz=startRz + dx*0.4;
    rx=startRx - dy*0.3;
    rx=Math.max(15, Math.min(75, rx));
    applyRotation();
  }, {passive:true});

  window.addEventListener('touchend', ()=>{ dragging=false; });
}

// Scores
function updateScores(){
  document.getElementById('scorebar').innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}" style="--tc-bg:${rca(t,.08)};--tc-border:${rca(t,.45)};--tc-glow:${rca(t,.2)};--tc-text:${t.color};--tc-count-bg:${rca(t,.15)}" onclick="selectTeam(${i})"><span class="tp-emoji">${t.emoji}</span><span class="tp-name">${t.name}</span><span class="tp-count">${count}</span></div>`}).join('')}
window.selectTeam=i=>{activeTeam=i;updateScores()};updateScores();

// SHOWCASE SECTION
// ══════════════════════════════════════════════════════════════════════════════
const T_BLUE=TEAMS[0],T_RED=TEAMS[1];

function miniStage(stage,cols,rows,sz,cells){
  stage.innerHTML='';
  const scene=document.createElement('div');
  scene.style.cssText='perspective:500px;perspective-origin:50% 35%';
  const grid=document.createElement('div');
  grid.style.cssText=`display:grid;gap:3px;grid-template-columns:repeat(${cols},${sz}px);
    grid-template-rows:repeat(${rows},${sz}px);
    transform:rotateX(55deg) rotateZ(-45deg)`;
  const map={};
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const tile=document.createElement('div');tile.className='tile';
    tile.style.cssText=`width:${sz}px;height:${sz}px;position:relative`;
    const ground=document.createElement('div');ground.className='ground';
    ground.style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)';
    tile.appendChild(ground);grid.appendChild(tile);map[`${r},${c}`]=tile;
  }
  scene.appendChild(grid);stage.appendChild(scene);
  cells.forEach(([r,c,team,home,btIdx])=>{
    const tile=map[`${r},${c}`];if(!tile)return;
    const ground=tile.querySelector('.ground');
    ground.style.background=rca(team,.15);ground.style.borderColor=rca(team,.35);
    ground.style.boxShadow=`0 0 8px ${rca(team,.2)}`;
    const bi=btIdx!=null?btIdx:Math.floor(Math.random()*BTYPES.length);
    buildCube(tile,{home:!!home,frozen:false,stacked:0,joker:false,btype:bi},team,sz,BTYPES[bi]);
  });
  return{grid,map,stage,sz};
}

function fxRing(parent,color,delay=0){
  const ring=document.createElement('div');
  ring.style.cssText=`position:absolute;left:50%;top:50%;width:24px;height:24px;margin:-12px;
    border-radius:50%;border:2px solid ${color};pointer-events:none;z-index:20;
    animation:stampRing .7s ease-out ${delay}s both`;
  parent.appendChild(ring);setTimeout(()=>ring.remove(),900);
}
function fxShatter(parent,color,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,d=18+Math.random()*25;
    const p=document.createElement('div');
    p.style.cssText=`position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px;
      border-radius:1px;background:${color};pointer-events:none;z-index:20;
      --sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;--sr:${Math.random()*360}deg;
      animation:shatterOut .55s ease-out ${Math.random()*.08}s both`;
    parent.appendChild(p);setTimeout(()=>p.remove(),700);
  }
}

// ── PLACE ──
function playPlace(stage){
  const SZ=42;
  const bt=Math.floor(Math.random()*BTYPES.length);
  const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,0],[0,1,T_BLUE,false,2],[1,0,T_BLUE,false,4]]);
  const target=map['1,1'];
  setTimeout(()=>{
    const ground=target.querySelector('.ground');
    ground.style.background=rca(T_BLUE,.15);ground.style.borderColor=rca(T_BLUE,.35);
    ground.style.boxShadow=`0 0 8px ${rca(T_BLUE,.2)}`;
    buildCube(target,{home:false,frozen:false,stacked:0,joker:false,btype:bt},T_BLUE,SZ,BTYPES[bt],true);
    fxRing(target,T_BLUE.color,0);fxRing(target,T_BLUE.color,.12);
    fxShatter(target,T_BLUE.color,6);
  },500);
  setTimeout(()=>playPlace(stage),3500);
}

// ── STEAL ──
function playSteal(stage){
  const SZ=42;
  const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,1],[0,1,T_BLUE,false,3],[1,0,T_BLUE,false,0],[1,1,T_RED,false,6]]);
  const target=map['1,1'];
  setTimeout(()=>{
    fxShatter(target,T_RED.color,12);
    const flash=document.createElement('div');
    flash.style.cssText=`position:absolute;inset:-8px;border-radius:50%;z-index:19;pointer-events:none;
      background:radial-gradient(circle,rgba(239,68,68,.5),transparent 70%);animation:stampRing .5s ease-out both`;
    target.appendChild(flash);setTimeout(()=>flash.remove(),600);
    const oldBox=target.querySelector('.cube');
    if(oldBox){oldBox.style.transition='opacity .2s';oldBox.style.opacity='0';setTimeout(()=>oldBox.remove(),250);}
    setTimeout(()=>{
      const ground=target.querySelector('.ground');
      ground.style.background=rca(T_BLUE,.15);ground.style.borderColor=rca(T_BLUE,.35);
      const bt=Math.floor(Math.random()*BTYPES.length);
      buildCube(target,{home:false,frozen:false,stacked:0,joker:false,btype:bt},T_BLUE,SZ,BTYPES[bt],true);
    },300);
  },500);
  setTimeout(()=>playSteal(stage),3800);
}

// ── FREEZE ──
function playFreeze(stage){
  const SZ=42;
  const{map}=miniStage(stage,3,3,SZ,[[1,1,T_RED,false,0]]);
  const target=map['1,1'];
  setTimeout(()=>{
    for(let i=0;i<6;i++){
      const cr=document.createElement('div');
      const a=i*(Math.PI*2/6),d=22;
      cr.style.cssText=`position:absolute;left:50%;top:50%;font-size:10px;pointer-events:none;z-index:20;
        --sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;
        animation:shatterOut .7s ease-out ${i*.04}s both`;
      cr.textContent='\u2744';target.appendChild(cr);setTimeout(()=>cr.remove(),900);
    }
    setTimeout(()=>{
      const ground=target.querySelector('.ground');
      ground.style.background='rgba(147,210,255,.12)';ground.style.borderColor='rgba(147,210,255,.4)';
      buildCube(target,{home:false,frozen:true,stacked:0,joker:false,btype:0},T_RED,SZ,BTYPES[0]);
    },400);
  },500);
  setTimeout(()=>playFreeze(stage),4000);
}

// ── STACK ──
function playStack(stage){
  const SZ=42;
  const{map}=miniStage(stage,3,3,SZ,[[1,0,T_BLUE,false,3],[1,1,T_BLUE,false,2],[1,2,T_BLUE,false,5]]);
  const target=map['1,1'];
  let count=0;
  function once(){
    count++;
    fxRing(target,'#FBBF24',0);
    for(let i=0;i<3;i++){
      const p=document.createElement('div');
      p.style.cssText=`position:absolute;left:${42+Math.random()*16}%;top:30%;font-size:10px;color:#FBBF24;
        pointer-events:none;z-index:20;--starY:${-30-Math.random()*15}px;
        animation:starFall .6s ease-out ${i*.06}s both reverse`;
      p.textContent='\u25B2';target.appendChild(p);setTimeout(()=>p.remove(),800);
    }
    buildCube(target,{home:false,frozen:false,stacked:count,joker:false,btype:2},T_BLUE,SZ,BTYPES[2],true);
  }
  setTimeout(once,500);
  setTimeout(once,1200);
  setTimeout(once,1900);
  setTimeout(()=>playStack(stage),4200);
}

// ── JOKER ──
function playJoker(stage){
  const SZ=38;
  const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,4],[0,1,T_BLUE,false,1],[1,0,T_BLUE,false,7]]);
  setTimeout(()=>{
    const t=map['1,1'],g=t.querySelector('.ground');
    g.style.background=rca(T_BLUE,.15);g.style.borderColor=rca(T_BLUE,.35);
    buildCube(t,{home:false,frozen:false,stacked:0,joker:false,btype:0},T_BLUE,SZ,BTYPES[0],true);
  },500);
  setTimeout(()=>{
    [[0,0],[0,1],[1,0],[1,1]].forEach(([r,c],idx)=>{
      const tile=map[`${r},${c}`];
      const g=tile.querySelector('.ground');
      g.style.borderColor='rgba(251,191,36,.7)';g.style.boxShadow='0 0 12px rgba(251,191,36,.4)';
      buildCube(tile,{home:false,frozen:false,stacked:0,joker:true,btype:[4,1,7,0][idx]},T_BLUE,SZ,BTYPES[[4,1,7,0][idx]]);
    });
    for(let i=0;i<8;i++){
      const star=document.createElement('div');
      star.style.cssText=`position:absolute;left:${30+Math.random()*40}%;top:40%;
        font-size:${10+Math.random()*8}px;pointer-events:none;z-index:20;
        --starY:${-30-Math.random()*30}px;
        animation:starFall ${.4+Math.random()*.3}s ease-out ${Math.random()*.2}s both`;
      star.textContent='\u2B50';stage.appendChild(star);setTimeout(()=>star.remove(),900);
    }
    const cx=stage.offsetWidth/2,cy=stage.offsetHeight/2;
    for(let i=0;i<3;i++){
      const ring=document.createElement('div');
      ring.style.cssText=`position:absolute;left:${cx-16}px;top:${cy-16}px;width:32px;height:32px;
        border-radius:50%;border:2px solid #FBBF24;pointer-events:none;z-index:19;
        animation:jokerBurst .6s ease-out ${i*.1}s both`;
      stage.appendChild(ring);setTimeout(()=>ring.remove(),900);
    }
  },1200);
  setTimeout(()=>playJoker(stage),4800);
}
