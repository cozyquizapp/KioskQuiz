<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 40% 30%, #0d1020 0%, #050608 100%);
  min-height: 100vh;
  color: #f1f5f9;
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 40px;
}

h2 {
  font-size: 11px;
  color: #1e293b;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-weight: 700;
}

/* ── ISO SCENE ── */
.iso-scene {
  perspective: 1400px;
  perspective-origin: 50% 15%;
}

.iso-grid {
  transform: rotateX(52deg) rotateZ(-45deg);
  transform-style: preserve-3d;
  display: grid;
  gap: 3px;
}

/* ── CELL ── */
.cell {
  position: relative;
  transform-style: preserve-3d;
  cursor: pointer;
  transition: transform 0.15s ease;
}

/* Hover on empty — lift */
.cell.empty:hover .tile-top {
  background: rgba(255,255,255,0.06) !important;
  border-color: rgba(255,255,255,0.14) !important;
  box-shadow: inset 0 0 12px rgba(255,255,255,0.05) !important;
}
.cell.empty:hover {
  transform: translateZ(4px);
}

/* Hover on owned — subtle lift */
.cell.owned:hover {
  transform: translateZ(3px);
}

/* Ground tile top */
.tile-top {
  position: absolute;
  inset: 0;
  z-index: 2;
  border-radius: 1px;
  /* subtle inner depth */
  background: rgba(255,255,255,0.015);
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.2s ease;
}

/* Inner radial shadow for depth */
.tile-top::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 1px;
  background: radial-gradient(circle at 28% 28%, rgba(0,0,0,0.28), transparent 70%);
  pointer-events: none;
  z-index: 1;
}

/* Ground front */
.tile-front {
  position: absolute;
  top: 100%; left: 0; right: 0;
  transform-origin: top center;
  transform: rotateX(-90deg);
  z-index: 1;
  background: #07090e;
  border-left: 1px solid rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

/* Ground right */
.tile-right {
  position: absolute;
  top: 0; bottom: 0; left: 100%;
  transform-origin: left center;
  transform: rotateY(90deg);
  z-index: 1;
  background: #060810;
  border-top: 1px solid rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.02);
}

/* ── BUILDING ── */
.building {
  position: absolute;
  transform-style: preserve-3d;
  z-index: 20;
  pointer-events: none;
}

.bld-top, .bld-front, .bld-right { position: absolute; }

/* ── ANIMATIONS ── */
@keyframes growUp {
  0%   { transform: scaleZ(0); opacity: 0; }
  40%  { opacity: 1; }
  75%  { transform: scaleZ(1.06); }
  100% { transform: scaleZ(1); opacity: 1; }
}

@keyframes claimPulse {
  0%   { box-shadow: none; }
  40%  { box-shadow: var(--glow-strong); }
  100% { box-shadow: var(--glow-base); }
}

@keyframes winFlicker {
  0%,100% { opacity: 1; }
  44% { opacity: 1; }
  47% { opacity: 0.3; }
  50% { opacity: 1; }
  78% { opacity: 0.7; }
}

@keyframes influenceSpread {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.015); }
}

/* ── SCORE BAR ── */
.score-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.team-pill {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 16px;
  border-radius: 10px;
  background: #080a12;
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
}
.team-pill:hover { transform: translateY(-1px); }
.team-pill.active { border-color: var(--tc); box-shadow: 0 0 16px var(--tc-soft); }

.tp-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tp-name  { font-size: 13px; font-weight: 700; }
.tp-count { font-size: 11px; color: #2d3748; font-weight: 600; }

.hint {
  font-size: 11px;
  color: #161b28;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<h2>Quarter Quiz — City Grid · Klicke Team → dann Feld</h2>
<div class="iso-scene"><div class="iso-grid" id="grid"></div></div>
<div class="score-bar" id="scorebar"></div>
<div class="hint">Team auswählen → leeres Feld anklicken um Gebäude zu errichten</div>

<script>
const SIZE = 6;
const CELL = 72;
const GROUND_D = 10;
const BUILD_H_BASE = 30;

// Per-team shape personality
// Each team has a signature silhouette style
const TEAM_SHAPES = [
  // Blue — vertical towers, narrow
  [ {w:0.28,d:0.28,h:58,wr:4,wc:1}, {w:0.32,d:0.32,h:48,wr:3,wc:2}, {w:0.22,d:0.22,h:70,wr:5,wc:1} ],
  // Red — wide hard blocks
  [ {w:0.58,d:0.42,h:22,wr:2,wc:3}, {w:0.52,d:0.38,h:28,wr:2,wc:3}, {w:0.60,d:0.44,h:18,wr:1,wc:4} ],
  // Green — medium organic (rounded via CSS)
  [ {w:0.44,d:0.44,h:34,wr:2,wc:2,round:true}, {w:0.50,d:0.40,h:28,wr:2,wc:2,round:true}, {w:0.38,d:0.38,h:40,wr:3,wc:2,round:true} ],
  // Orange — asymmetric industrial
  [ {w:0.38,d:0.52,h:36,wr:2,wc:2}, {w:0.30,d:0.58,h:42,wr:3,wc:1}, {w:0.44,d:0.44,h:30,wr:2,wc:3} ],
  // Purple — slim spires
  [ {w:0.24,d:0.24,h:64,wr:4,wc:1}, {w:0.20,d:0.20,h:72,wr:5,wc:1}, {w:0.28,d:0.28,h:56,wr:3,wc:1} ],
  // Teal — docks, wide low
  [ {w:0.60,d:0.36,h:20,wr:1,wc:4}, {w:0.56,d:0.40,h:24,wr:2,wc:3}, {w:0.64,d:0.34,h:18,wr:1,wc:5} ],
];

// Ghost shapes (same variety, deterministic per cell)
const GHOST_SHAPES = [
  {w:0.38,d:0.38,h:30}, {w:0.28,d:0.28,h:48}, {w:0.52,d:0.36,h:22},
  {w:0.32,d:0.32,h:42}, {w:0.44,d:0.44,h:28}, {w:0.24,d:0.24,h:56},
];

const TEAMS = [
  { color: '#4d9fff', glow: 'rgba(77,159,255,0.55)',  soft: 'rgba(77,159,255,0.15)',  name: 'Die Clique',   wappen: '⚓' },
  { color: '#ff5555', glow: 'rgba(255,85,85,0.55)',   soft: 'rgba(255,85,85,0.15)',   name: 'Rote Karte',   wappen: '🔺' },
  { color: '#3ddc84', glow: 'rgba(61,220,132,0.55)',  soft: 'rgba(61,220,132,0.15)',  name: 'Grüne Hölle',  wappen: '🌿' },
  { color: '#ff9a3c', glow: 'rgba(255,154,60,0.65)',  soft: 'rgba(255,154,60,0.18)',  name: 'Oranje',       wappen: '⚡' },
  { color: '#b57bee', glow: 'rgba(181,123,238,0.55)', soft: 'rgba(181,123,238,0.15)', name: 'Nachtschicht', wappen: '☽' },
  { color: '#2dd4bf', glow: 'rgba(45,212,191,0.55)',  soft: 'rgba(45,212,191,0.15)',  name: 'Tiefsee',      wappen: '🐋' },
];

const state = Array.from({length:SIZE}, () => Array(SIZE).fill(null));
let activeTeam = 0;

// Seed initial state
function seed(r,c,t,home=false) {
  const shapes = TEAM_SHAPES[t];
  state[r][c] = { teamIdx:t, shapeIdx: Math.floor(Math.random()*shapes.length), home, new:false };
}
seed(0,0,0,true); seed(0,1,0); seed(1,0,0); seed(1,1,0);
seed(0,5,1,true); seed(0,4,1); seed(1,5,1); seed(1,4,1);
seed(5,0,2,true); seed(4,0,2); seed(5,1,2);
seed(5,5,3,true); seed(4,5,3); seed(5,4,3);

// ── HELPERS ──
function hexRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgba(hex,a) {
  const [r,g,b] = hexRgb(hex); return `rgba(${r},${g},${b},${a})`;
}

// Count adjacent same-team cells
function adjacentCount(r,c,teamIdx) {
  let n = 0;
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc]) => {
    const nr=r+dr, nc=c+dc;
    if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]?.teamIdx===teamIdx) n++;
  });
  return n;
}

// ── RENDER CELL ──
function renderCell(r,c) {
  const cell  = state[r][c];
  const el    = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if (!el) return;

  el.querySelectorAll('.building,.b-icon').forEach(e=>e.remove());
  el.className = 'cell ' + (cell ? 'owned' : 'empty');

  const tTop   = el.querySelector('.tile-top');
  const tFront = el.querySelector('.tile-front');
  const tRight = el.querySelector('.tile-right');

  if (!cell) {
    // Empty — visible but subtle, grid lines
    tTop.style.cssText = `
      position:absolute;inset:0;z-index:2;border-radius:1px;
      background: rgba(255,255,255,0.018);
      border: 1px solid rgba(255,255,255,0.07);
      transition: all 0.2s ease;
    `;
    tTop.style.setProperty('--after-bg','radial-gradient(circle at 28% 28%, rgba(0,0,0,0.28), transparent 70%)');
    tFront.style.background = '#07090e';
    tRight.style.background = '#060810';
    // Ghost building
    const gs = GHOST_SHAPES[(r*SIZE+c) % GHOST_SHAPES.length];
    buildBuilding(el, gs, null, true, false);
  } else {
    const team   = TEAMS[cell.teamIdx];
    const adj    = adjacentCount(r,c,cell.teamIdx);
    const isHome = cell.home;
    const isNew  = cell.new;

    // Strength: 0=solo, 1-2=claimed, 3-4=dominant
    const strength = isHome ? 3 : adj;

    const glowBase   = strength === 0 ? `0 0 8px ${team.glow}`
                     : strength <= 2  ? `0 0 12px ${team.glow}, 0 0 24px ${team.soft}`
                     :                  `0 0 20px ${team.glow}, 0 0 40px ${team.soft}, 0 0 60px ${rgba(team.color,0.08)}`;

    tTop.style.cssText = `
      position:absolute;inset:0;z-index:2;border-radius:1px;
      background: ${rgba(team.color, isHome ? 0.16 : strength > 2 ? 0.12 : 0.07)};
      border: ${isHome ? '2px' : '1px'} solid ${rgba(team.color, isHome ? 0.6 : 0.35)};
      box-shadow: ${glowBase}${isNew ? ', inset 0 0 20px '+team.glow : ''};
      ${strength >= 3 && !isHome ? `animation: influenceSpread 2.5s ease-in-out infinite;` : ''}
      transition: box-shadow 0.4s ease;
    `;
    tFront.style.background = rgba(team.color, 0.04);
    tFront.style.borderLeft = `1px solid ${rgba(team.color,0.15)}`;
    tFront.style.borderBottom = `1px solid ${rgba(team.color,0.1)}`;
    tRight.style.background = rgba(team.color, 0.03);

    const shapes = TEAM_SHAPES[cell.teamIdx];
    const s = shapes[cell.shapeIdx % shapes.length];
    const bs = isHome ? {...s, h:s.h*1.6, w:s.w*1.15, d:s.d*1.15} : s;
    buildBuilding(el, bs, team, false, isNew);

    if (isHome || cell.joker || cell.stuck) {
      const icon = document.createElement('div');
      icon.className = 'b-icon';
      icon.style.cssText = `position:absolute;bottom:4px;right:5px;font-size:10px;z-index:30;
        filter:drop-shadow(0 0 5px ${team.color});line-height:1;`;
      icon.textContent = cell.stuck ? '📌' : cell.joker ? '⭐' : team.wappen;
      el.appendChild(icon);
    }

    if (isNew) {
      tTop.style.animation = `claimPulse 1s ease-out both`;
      tTop.style.setProperty('--glow-strong', `0 0 30px ${team.glow}, 0 0 60px ${team.soft}`);
      tTop.style.setProperty('--glow-base', glowBase);
      cell.new = false;
    }
  }
}

function buildBuilding(el, s, team, ghost, animate) {
  const bw = CELL * s.w;
  const bd = CELL * s.d;
  const bh = s.h;
  const bx = (CELL - bw) / 2;
  const by = (CELL - bd) / 2;
  const rr = s.round ? '4px' : '1px';

  const color   = team ? team.color : '#2a3555';
  const bA      = ghost ? 0.15 : 0.9;
  const bgA     = ghost ? 0.0  : 0.08;
  const glowSz  = ghost ? 0    : (team ? 14 : 0);
  const glowC   = team ? team.glow : 'transparent';
  const glowS   = team ? team.soft : 'transparent';

  const bld = document.createElement('div');
  bld.className = 'building';
  if (animate) {
    bld.style.transformOrigin = 'center bottom';
    bld.style.animation = 'growUp 0.85s cubic-bezier(0.34,1.5,0.64,1) both';
  }

  // Top
  const top = document.createElement('div');
  top.className = 'bld-top';
  top.style.cssText = `
    left:${bx}px;top:${by}px;
    width:${bw}px;height:${bd}px;
    border:${ghost?'1px':'1.5px'} solid ${rgba(color,bA)};
    background:${rgba(color,bgA)};
    border-radius:${rr};
    ${!ghost?`box-shadow:0 0 ${glowSz}px ${glowC},inset 0 0 8px ${rgba(color,0.1)};`:''}
    z-index:3;
  `;

  // Front
  const front = document.createElement('div');
  front.className = 'bld-front';
  front.style.cssText = `
    left:${bx}px;top:${by+bd}px;
    width:${bw}px;height:${bh}px;
    border-left:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.85)};
    border-right:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.85)};
    border-bottom:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.6)};
    background:linear-gradient(to bottom,${rgba(color,bgA*1.8)},${rgba(color,bgA*0.6)});
    ${!ghost?`box-shadow:0 6px 16px ${glowS};`:''}
    transform-origin:top center;transform:rotateX(-90deg);
    overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-evenly;align-items:center;
    padding:3px 4px;gap:2px;
  `;

  // Windows
  if (!ghost && team && s.wr) {
    for (let wi=0;wi<s.wr;wi++) {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:2px;justify-content:center;width:100%;';
      for (let wj=0;wj<s.wc;wj++) {
        const w = document.createElement('div');
        const delay = (wi*s.wc+wj)*0.25 + Math.random()*0.5;
        w.style.cssText = `
          width:${s.wc>3?3:4}px;height:3px;border-radius:1px;flex-shrink:0;
          background:${color};
          box-shadow:0 0 4px ${glowC};
          animation:winFlicker ${2.5+Math.random()*2}s ease-in-out ${delay}s infinite;
        `;
        row.appendChild(w);
      }
      front.appendChild(row);
    }
  }

  // Right face
  const right = document.createElement('div');
  right.className = 'bld-right';
  right.style.cssText = `
    left:${bx+bw}px;top:${by}px;
    width:${bh}px;height:${bd}px;
    border-top:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.5)};
    border-right:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.5)};
    border-bottom:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.35)};
    background:${rgba(color,bgA*0.4)};
    transform-origin:left center;transform:rotateY(90deg);
    border-radius:0 ${rr} ${rr} 0;
  `;

  bld.appendChild(top); bld.appendChild(front); bld.appendChild(right);
  el.appendChild(bld);
}

// ── BUILD DOM ──
const gridEl = document.getElementById('grid');
gridEl.style.gridTemplateColumns = `repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows    = `repeat(${SIZE},${CELL}px)`;

for (let r=0;r<SIZE;r++) {
  for (let c=0;c<SIZE;c++) {
    const el = document.createElement('div');
    el.className = 'cell';
    el.dataset.r = r; el.dataset.c = c;
    el.style.width = CELL+'px'; el.style.height = CELL+'px';

    const tTop   = document.createElement('div'); tTop.className   = 'tile-top';
    const tFront = document.createElement('div'); tFront.className = 'tile-front';
    const tRight = document.createElement('div'); tRight.className = 'tile-right';
    tFront.style.height = GROUND_D+'px';
    tRight.style.width  = GROUND_D+'px';

    el.appendChild(tTop); el.appendChild(tFront); el.appendChild(tRight);

    el.addEventListener('click', () => {
      if (state[r][c]) return;
      const shapes = TEAM_SHAPES[activeTeam];
      state[r][c] = { teamIdx:activeTeam, shapeIdx:Math.floor(Math.random()*shapes.length), home:false, new:true };
      renderCell(r,c);
      // Re-render neighbours for influence glow update
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc]) => {
        const nr=r+dr,nc=c+dc;
        if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]) renderCell(nr,nc);
      });
      updateScores();
    });

    gridEl.appendChild(el);
    renderCell(r,c);
  }
}

// ── SCORES ──
function updateScores() {
  const bar = document.getElementById('scorebar');
  bar.innerHTML = TEAMS.map((t,i) => {
    const count = state.flat().filter(c=>c?.teamIdx===i).length;
    const active = i===activeTeam;
    return `<div class="team-pill${active?' active':''}"
      style="--tc:${t.glow};--tc-soft:${t.soft};"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 8px ${t.glow};"></div>
      <div>
        <div class="tp-name" style="color:${active?t.color:'#64748b'}">${t.wappen} ${t.name}</div>
        <div class="tp-count">${count} Felder${active?' · aktiv':''}</div>
      </div>
    </div>`;
  }).join('');
}

window.selectTeam = function(i) { activeTeam=i; updateScores(); };
updateScores();
</script>
</body>
</html>
