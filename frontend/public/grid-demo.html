<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:radial-gradient(ellipse at 50% 35%, #0c1018 0%, #03040a 100%);
  min-height:100vh; color:#f1f5f9;
  font-family:'Space Grotesk',sans-serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:36px; padding:40px; overflow:hidden;
}
h2 { font-size:11px; color:#1a2236; text-transform:uppercase; letter-spacing:.2em; font-weight:700; }

/* The board-wrap is the reference for the SVG overlay */
.board-wrap { position:relative; }

.iso-scene {
  perspective:2200px; perspective-origin:50% 50%;
  position:relative; z-index:2;
  transition: perspective .9s cubic-bezier(.4,0,.2,1);
}
.iso-grid {
  transform: rotateX(0deg) rotateZ(0deg) scale(1);
  transform-style:preserve-3d;
  transform-origin: center center;
  display:grid; gap:3px; position:relative;
  transition: transform 1s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}

/* Iso state — camera pulled back and tilted */
.iso-scene.is-iso {
  perspective: 1400px;
  perspective-origin: 50% 10%;
}
.iso-grid.is-iso {
  transform: rotateX(52deg) rotateZ(-45deg) scale(0.9);
}

/* Tiles — flat, no 3D buildings inside */
.cell {
  position:relative; transform-style:preserve-3d;
  cursor:pointer;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.cell.owned  { cursor:default; }
.cell.empty:hover { transform:translateZ(4px); }
/* In top-down mode, no Z hover */
.iso-grid:not(.is-iso) .cell.empty:hover { transform:scale(1.04); }

.tile-top {
  position:absolute; inset:0; z-index:2; border-radius:2px;
  transition:background .25s ease, border-color .25s ease, box-shadow .3s ease;
}
.tile-front {
  position:absolute; top:100%; left:0; right:0; height:8px;
  transform-origin:top center; transform:rotateX(-90deg); z-index:1;
}
.tile-right {
  position:absolute; top:0; bottom:0; left:100%; width:8px;
  transform-origin:left center; transform:rotateY(90deg); z-index:1;
}

/* SVG overlay — sits on top of the board-wrap in screen space */
#bld-svg {
  position:absolute; inset:0;
  pointer-events:none; z-index:100;
  overflow:visible;
}

/* Territory outline SVG */
.territory-svg {
  position:absolute; inset:0;
  pointer-events:none; z-index:50; overflow:visible;
}

@keyframes dominantPulse {
  0%,100% { box-shadow:var(--gs-base); }
  50%     { box-shadow:var(--gs-peak); }
}
@keyframes winFlicker {
  0%,100%{opacity:1;} 44%{opacity:1;} 47%{opacity:.12;} 52%{opacity:1;} 80%{opacity:.55;}
}
@keyframes claimPop {
  0%  { transform:translateZ(0); }
  35% { transform:translateZ(14px); }
  65% { transform:translateZ(-2px); }
  100%{ transform:translateZ(0); }
}

.score-bar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.team-pill {
  display:flex; align-items:center; gap:9px; padding:8px 16px; border-radius:10px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05);
  cursor:pointer; transition:all .15s ease; user-select:none;
}
.team-pill:hover { transform:translateY(-2px); }
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 18px var(--tc-glow); }
.tp-dot   { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.tp-name  { font-size:13px; font-weight:700; }
.tp-count { font-size:11px; color:#253040; font-weight:600; }
.hint     { font-size:11px; color:#111822; letter-spacing:.05em; }
</style>
</head>
<body>
<h2>Quarter Quiz — City Grid</h2>
<div class="board-wrap" id="board-wrap">
  <div class="iso-scene" id="iso-scene">
    <div class="iso-grid" id="grid"></div>
  </div>
  <!-- SVG overlay for buildings, rendered in screen-space -->
  <svg id="bld-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<div class="score-bar" id="scorebar"></div>
<div class="hint">Team auswählen → leeres Feld anklicken</div>

<script>
const SIZE=6, CELL=72, GAP=3;

const TEAMS=[
  {color:'#5aadff',r:90, g:173,b:255,name:'Die Clique',  wappen:'⚓',inten:.80},
  {color:'#ff5050',r:255,g:80, b:80, name:'Rote Karte',  wappen:'🔺',inten:1.0},
  {color:'#3ddc84',r:61, g:220,b:132,name:'Grüne Hölle', wappen:'🌿',inten:.85},
  {color:'#ffaa3c',r:255,g:170,b:60, name:'Oranje',      wappen:'⚡',inten:.92},
  {color:'#c084fc',r:192,g:132,b:252,name:'Nachtschicht',wappen:'☽', inten:.80},
  {color:'#2dd4bf',r:45, g:212,b:191,name:'Tiefsee',     wappen:'🐋',inten:.82},
];

// Building height per team (screen pixels after iso projection)
// Wide teams = low, slim teams = tall
const HEIGHTS={
  0:[58,72,46],   // Blue: tall towers
  1:[18,24,14],   // Red: squat blocks
  2:[34,42,26],   // Green: medium
  3:[48,58,38],   // Orange: tall-ish
  4:[82,96,66],   // Purple: spires
  5:[14,18,10],   // Teal: flat docks
};
const GHOST_H=[18,28,12,22,16,34,10,24];

const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
let activeTeam=0;

function seed(r,c,t,home=false){
  state[r][c]={teamIdx:t,hi:Math.floor(Math.random()*3),home,new:false};
}
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);
seed(0,5,1,true);seed(0,4,1);seed(1,5,1);seed(1,4,1);
seed(5,0,2,true);seed(4,0,2);seed(5,1,2);seed(4,1,2);
seed(5,5,3,true);seed(4,5,3);seed(5,4,3);

function rc(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjN(r,c,ti){return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;}
function isEdge(r,c,dr,dc){return!same(r+dr,c+dc,state[r][c]?.teamIdx);}

// ══════════════════════════════════════════════════════════════
// ISOMETRIC PROJECTION MATH
// Our CSS transform: rotateX(52deg) rotateZ(-45deg)
// We need to find the screen-space position of grid cells to
// draw SVG buildings at the correct location.
//
// The iso-grid element has a known CSS transform. We use
// getBoundingClientRect of each cell to find exact screen coords,
// then draw SVG polygons in the board-wrap's local coordinate space.
// ══════════════════════════════════════════════════════════════

function getCellScreenRect(r, c) {
  const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return null;
  const wrapRect = document.getElementById('board-wrap').getBoundingClientRect();
  const cellRect = el.getBoundingClientRect();
  // Return center in board-wrap local coords
  return {
    x: cellRect.left - wrapRect.left,
    y: cellRect.top  - wrapRect.top,
    w: cellRect.width,
    h: cellRect.height,
    cx: cellRect.left - wrapRect.left + cellRect.width/2,
    cy: cellRect.top  - wrapRect.top  + cellRect.height/2,
  };
}

// Get the 4 corners of a cell in screen space
// The iso transform turns a square into a rhombus/parallelogram.
// getBoundingClientRect gives us the bounding box, not the actual corners.
// We need the actual transformed corners — use getClientRects or DOMMatrix.
function getCellCorners(r, c) {
  const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return null;
  const wrap = document.getElementById('board-wrap');
  const wrapRect = wrap.getBoundingClientRect();

  // Use DOMMatrix to get actual transformed corner positions
  // The cell's local corners in its own space
  const localCorners = [
    {x:0,    y:0   },  // top-left
    {x:CELL, y:0   },  // top-right
    {x:CELL, y:CELL},  // bottom-right
    {x:0,    y:CELL},  // bottom-left
  ];

  // Get the cumulative transform matrix of the cell element
  const matrix = new DOMMatrix(getComputedStyle(el).transform);
  // Walk up to iso-grid and accumulate transforms
  let m = new DOMMatrix();
  let node = el;
  const stop = wrap;
  const matrices = [];
  while(node && node !== stop) {
    const t = getComputedStyle(node).transform;
    if(t && t !== 'none') matrices.unshift(new DOMMatrix(t));
    node = node.parentElement;
  }
  matrices.forEach(mx => m = m.multiply(mx));

  return localCorners.map(({x,y}) => {
    const pt = m.transformPoint(new DOMPoint(x, y));
    return {
      x: pt.x - wrapRect.left + wrap.getBoundingClientRect().left - wrapRect.left,
      y: pt.y - wrapRect.top  + wrap.getBoundingClientRect().top  - wrapRect.top,
    };
  });
}

// Simpler: just use getBoundingClientRect of a 1px point element at each corner
// by temporarily placing marker elements. Actually the simplest correct approach:
// query the actual screen-space position using element.getClientRects() on sub-divs.

// BEST approach: place a tiny absolute div at each corner of the cell,
// read its getBoundingClientRect. Do this once at init.
let cellCornerCache = {};

function buildCornerCache() {
  cellCornerCache = {};
  const wrap = document.getElementById('board-wrap');
  const wrapRect = wrap.getBoundingClientRect();

  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if(!el) continue;

    // Place 4 marker divs at corners
    const markers = [[0,0],[CELL,0],[CELL,CELL],[0,CELL]].map(([lx,ly])=>{
      const m = document.createElement('div');
      m.style.cssText = `position:absolute;left:${lx}px;top:${ly}px;width:1px;height:1px;pointer-events:none;`;
      el.appendChild(m);
      return m;
    });

    cellCornerCache[`${r},${c}`] = markers.map(m => {
      const mr = m.getBoundingClientRect();
      return { x: mr.left - wrapRect.left, y: mr.top - wrapRect.top };
    });

    markers.forEach(m => m.remove());
  }
}

// ── SVG BUILDING DRAWING ──
// Given the 4 screen-space corners of a tile (rhombus after iso transform),
// we draw an isometric box of height H pixels (in screen space, going UP).
//
// The 4 corners after rotateX(52)+rotateZ(-45) form a diamond/rhombus:
//   corners[0] = top     (grid top-left)
//   corners[1] = right   (grid top-right)
//   corners[2] = bottom  (grid bottom-right)
//   corners[3] = left    (grid bottom-left)
//
// "Up" in screen space = subtract from Y.
// The box has:
//   TOP face:   corners shifted up by H → parallelogram
//   LEFT face:  left half of bottom + left half of top (visible left wall)
//   RIGHT face: right half of bottom + right half of top (visible right wall)

const NS = 'http://www.w3.org/2000/svg';
function mkEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
  return el;
}
function pts(arr) { return arr.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '); }

function drawBuildingSVG(svg, corners, H, team, ghost, animate) {
  const cr = team?team.r:28, cg = team?team.g:36, cb = team?team.b:58;
  const inten = team?team.inten:1;

  // corners[0]=top, [1]=right, [2]=bottom, [3]=left (diamond orientation)
  const [cTop, cRight, cBottom, cLeft] = corners;

  // Shift each corner UP by H pixels
  const up = (p, h=H) => ({x:p.x, y:p.y - h});
  const tTop    = up(cTop);
  const tRight  = up(cRight);
  const tBottom = up(cBottom);
  const tLeft   = up(cLeft);

  const id = `b${Math.random().toString(36).slice(2,7)}`;

  if(ghost) {
    // Ghost: just the top face outline + two faint side edges
    const topFace = mkEl('polygon', {
      points: pts([tTop, tRight, tBottom, tLeft]),
      fill: `rgba(${cr},${cg},${cb},.04)`,
      stroke: `rgba(${cr},${cg},${cb},.18)`,
      'stroke-width': '1',
    });
    svg.appendChild(topFace);

    // Two vertical edges going down to ground
    [[tLeft,cLeft],[tBottom,cBottom]].forEach(([a,b])=>{
      svg.appendChild(mkEl('line',{
        x1:a.x, y1:a.y, x2:b.x, y2:b.y,
        stroke:`rgba(${cr},${cg},${cb},.12)`, 'stroke-width':'1',
      }));
    });
    return;
  }

  const defs = mkEl('defs',{});

  // ── GLOW FILTER ──
  const filtId = `gf_${id}`;
  const filt = mkEl('filter',{id:filtId, x:'-40%', y:'-40%', width:'180%', height:'180%'});
  const feBlur = mkEl('feGaussianBlur',{in:'SourceGraphic', stdDeviation:`${3*inten}`});
  filt.appendChild(feBlur);
  defs.appendChild(filt);

  // ── GRADIENTS ──
  // Left face gradient (medium bright)
  const lgLeft = `lg_l_${id}`;
  const gradLeft = mkEl('linearGradient',{id:lgLeft, x1:'0%',y1:'0%',x2:'0%',y2:'100%'});
  const ls1 = mkEl('stop',{offset:'0%'}); ls1.setAttribute('stop-color',`rgba(${cr},${cg},${cb},${.35*inten})`);
  const ls2 = mkEl('stop',{offset:'100%'}); ls2.setAttribute('stop-color',`rgba(${cr},${cg},${cb},${.08*inten})`);
  gradLeft.appendChild(ls1); gradLeft.appendChild(ls2);
  defs.appendChild(gradLeft);

  // Right face gradient (darker — shadow side)
  const lgRight = `lg_r_${id}`;
  const gradRight = mkEl('linearGradient',{id:lgRight, x1:'0%',y1:'0%',x2:'0%',y2:'100%'});
  const rs1 = mkEl('stop',{offset:'0%'}); rs1.setAttribute('stop-color',`rgba(${cr},${cg},${cb},${.18*inten})`);
  const rs2 = mkEl('stop',{offset:'100%'}); rs2.setAttribute('stop-color',`rgba(0,0,0,.3)`);
  gradRight.appendChild(rs1); gradRight.appendChild(rs2);
  defs.appendChild(gradRight);

  // Top face gradient (brightest)
  const lgTop = `lg_t_${id}`;
  const gradTop = mkEl('linearGradient',{id:lgTop, x1:'0%',y1:'0%',x2:'100%',y2:'100%'});
  const ts1 = mkEl('stop',{offset:'0%'}); ts1.setAttribute('stop-color',`rgba(255,255,255,${.2*inten})`);
  const ts2 = mkEl('stop',{offset:'60%'}); ts2.setAttribute('stop-color',`rgba(${cr},${cg},${cb},${.15*inten})`);
  const ts3 = mkEl('stop',{offset:'100%'}); ts3.setAttribute('stop-color',`rgba(0,0,0,.15)`);
  gradTop.appendChild(ts1); gradTop.appendChild(ts2); gradTop.appendChild(ts3);
  defs.appendChild(gradTop);

  svg.appendChild(defs);

  // ── LEFT FACE (ground-left → ground-bottom → top-bottom → top-left) ──
  // Visible left wall: left + bottom edges of the rhombus
  const leftFace = mkEl('polygon',{
    points: pts([cLeft, cBottom, tBottom, tLeft]),
    fill: `url(#${lgLeft})`,
    stroke: `rgba(${cr},${cg},${cb},${.6*inten})`,
    'stroke-width': '1.2',
    'stroke-linejoin': 'round',
  });
  svg.appendChild(leftFace);

  // ── RIGHT FACE (ground-bottom → ground-right → top-right → top-bottom) ──
  const rightFace = mkEl('polygon',{
    points: pts([cBottom, cRight, tRight, tBottom]),
    fill: `url(#${lgRight})`,
    stroke: `rgba(${cr},${cg},${cb},${.45*inten})`,
    'stroke-width': '1',
    'stroke-linejoin': 'round',
  });
  svg.appendChild(rightFace);

  // ── TOP FACE GLOW (blurred copy underneath) ──
  const topGlow = mkEl('polygon',{
    points: pts([tTop, tRight, tBottom, tLeft]),
    fill: `rgba(${cr},${cg},${cb},${.5*inten})`,
    filter: `url(#${filtId})`,
  });
  svg.appendChild(topGlow);

  // ── TOP FACE ──
  const topFace = mkEl('polygon',{
    points: pts([tTop, tRight, tBottom, tLeft]),
    fill: `url(#${lgTop})`,
    stroke: `rgba(255,255,255,${.7*inten})`,
    'stroke-width': '1.5',
    'stroke-linejoin': 'round',
  });
  svg.appendChild(topFace);

  // ── NEON EDGE LINES (sharp, on top of faces) ──
  // Vertical edges: all 4 corners ground→roof
  const vertEdges = [
    [cTop,tTop], [cRight,tRight], [cBottom,tBottom], [cLeft,tLeft]
  ];
  vertEdges.forEach(([a,b])=>{
    // glow
    svg.appendChild(mkEl('line',{
      x1:a.x,y1:a.y, x2:b.x,y2:b.y,
      stroke:`rgba(${cr},${cg},${cb},${.4*inten})`,
      'stroke-width':'3', 'stroke-linecap':'round',
    }));
    // sharp
    svg.appendChild(mkEl('line',{
      x1:a.x,y1:a.y, x2:b.x,y2:b.y,
      stroke:`rgba(${cr},${cg},${cb},${.9*inten})`,
      'stroke-width':'1', 'stroke-linecap':'round',
    }));
  });

  // ── WINDOW DOTS — only on left face (the one visible from our viewpoint) ──
  // Left face corners: cLeft(bl), cBottom(br), tBottom(tr), tLeft(tl)
  const wRows=3, wCols=2;
  for(let wi=0;wi<wRows;wi++) for(let wj=0;wj<wCols;wj++){
    const u=(wj+.5)/wCols, v=(wi+.5)/wRows;
    const px = cLeft.x*(1-u)*(1-v) + cBottom.x*u*(1-v) + tBottom.x*u*v + tLeft.x*(1-u)*v;
    const py = cLeft.y*(1-u)*(1-v) + cBottom.y*u*(1-v) + tBottom.y*u*v + tLeft.y*(1-u)*v;
    const dot = mkEl('circle',{
      cx:px.toFixed(1), cy:py.toFixed(1), r:'1.8',
      fill:`rgba(${cr},${cg},${cb},${.9*inten})`,
    });
    dot.style.animation=`winFlicker ${1.8+Math.random()*2.5}s ease-in-out ${(wi*wCols+wj)*.18+Math.random()*.3}s infinite`;
    svg.appendChild(dot);
  }
}

// ── BUILD SVG BUILDINGS OVERLAY ──
function updateBuildingSVG(animateCell=null) {
  const svg = document.getElementById('bld-svg');
  const wrap = document.getElementById('board-wrap');
  const wr = wrap.getBoundingClientRect();
  svg.setAttribute('width', wr.width);
  svg.setAttribute('height', wr.height);
  svg.innerHTML = '';

  // In top-down mode: no 3D buildings shown at all
  if(!isIsoMode) return;

  // Draw ghost buildings first (z-order: behind owned)
  for(let ghost=1;ghost>=0;ghost--) {
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
      const cell = state[r][c];
      const isGhost = !cell;
      if(isGhost !== !!ghost) continue;

      const corners = cellCornerCache[`${r},${c}`];
      if(!corners) continue;

      let H, team;
      if(isGhost) {
        H = GHOST_H[(r*SIZE+c)%GHOST_H.length];
        team = null;
      } else {
        team = TEAMS[cell.teamIdx];
        const heights = HEIGHTS[cell.teamIdx];
        const bh = heights[cell.hi%3];
        const isHome = cell.home;
        const eTop=isEdge(r,c,-1,0),eBot=isEdge(r,c,1,0),eL=isEdge(r,c,0,-1),eR=isEdge(r,c,0,1);
        const interior=!eTop&&!eBot&&!eL&&!eR&&!isHome;
        H = isHome ? Math.round(bh*1.6) : interior ? Math.round(bh*.45) : bh;
      }

      const doAnim = !isGhost && animateCell && animateCell.r===r && animateCell.c===c;
      const g = document.createElementNS(NS, 'g');

      if(doAnim) {
        // SMIL animation: translateY from +H to 0 (rises up), opacity 0→1
        // The building starts H pixels lower and rises to its final position
        const cy = corners.reduce((s,p)=>s+p.y,0)/4; // center Y of cell
        // Rise: starts below ground, eases up with overshoot
        // keyTimes: 0 = ground+H, 0.7 = final pos - 3px overshoot, 1 = final
        const anim = document.createElementNS(NS,'animateTransform');
        anim.setAttribute('attributeName','transform');
        anim.setAttribute('type','translate');
        anim.setAttribute('values',`0,${H}; 0,-4; 0,0`);
        anim.setAttribute('keyTimes','0; 0.72; 1');
        anim.setAttribute('dur','1.1s');
        anim.setAttribute('calcMode','spline');
        anim.setAttribute('keySplines','0.12 0.8 0.3 1; 0.4 0 0.6 1');
        anim.setAttribute('fill','freeze');
        g.appendChild(anim);

        // Opacity: fade in during first 30% of animation
        const animOp = document.createElementNS(NS,'animate');
        animOp.setAttribute('attributeName','opacity');
        animOp.setAttribute('values','0; 1; 1');
        animOp.setAttribute('keyTimes','0; 0.28; 1');
        animOp.setAttribute('dur','1.1s');
        animOp.setAttribute('fill','freeze');
        g.appendChild(animOp);
      }

      drawBuildingSVG(g, corners, H, team, isGhost, doAnim);
      svg.appendChild(g);
    }
  }
}

// ── RENDER CELL (tile only, no building div) ──
function renderCell(r,c,animate=false){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  el.className='cell '+(cell?'owned':'empty');

  const tTop=el.querySelector('.tile-top');
  const tFront=el.querySelector('.tile-front');
  const tRight=el.querySelector('.tile-right');

  if(!cell){
    tTop.style.cssText=`position:absolute;inset:0;z-index:2;border-radius:2px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.055);
      box-shadow:inset 0 2px 5px rgba(255,255,255,.03),inset 0 -4px 8px rgba(0,0,0,.5);`;
    tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:8px;
      transform-origin:top center;transform:rotateX(-90deg);z-index:1;
      background:#050710;border:1px solid rgba(255,255,255,.03);border-top:none;`;
    tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:8px;
      transform-origin:left center;transform:rotateY(90deg);z-index:1;
      background:#040610;border:1px solid rgba(255,255,255,.025);border-left:none;`;
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const n=adjN(r,c,cell.teamIdx);
  const isHome=cell.home;
  const inten=team.inten;
  const eTop=isEdge(r,c,-1,0),eBot=isEdge(r,c,1,0),eL=isEdge(r,c,0,-1),eR=isEdge(r,c,0,1);
  const interior=!eTop&&!eBot&&!eL&&!eR&&!isHome;

  const tileBg = interior
    ? `rgba(${team.r},${team.g},${team.b},.12)`
    : isHome
      ? `rgba(${team.r},${team.g},${team.b},.28)`
      : `rgba(${team.r},${team.g},${team.b},.18)`;
  const tileBorder = interior
    ? `1px solid ${rc(team,.2*inten)}`
    : isHome
      ? `2px solid ${rc(team,.7*inten)}`
      : `1px solid ${rc(team,.45*inten)}`;

  const gsBase = isHome
    ? `inset 0 3px 6px rgba(255,255,255,.04),0 0 18px ${rc(team,.6*inten)},0 0 36px ${rc(team,.25*inten)}`
    : interior
      ? `inset 0 2px 4px rgba(255,255,255,.015),inset 0 -3px 8px rgba(0,0,0,.6)`
      : `inset 0 3px 6px rgba(255,255,255,.04),0 0 12px ${rc(team,.5*inten)},0 0 24px ${rc(team,.2*inten)}`;
  const gsPeak = `inset 0 3px 6px rgba(255,255,255,.05),0 0 22px ${rc(team,.8*inten)},0 0 44px ${rc(team,.35*inten)}`;

  tTop.style.cssText=`position:absolute;inset:0;z-index:2;border-radius:2px;
    background:${tileBg};border:${tileBorder};
    --gs-base:${gsBase};--gs-peak:${gsPeak};
    box-shadow:${gsBase};transform:translateZ(1px);
    transition:box-shadow .35s ease;
    ${(n>=3||isHome)?`animation:dominantPulse ${isHome?2.2:3}s ease-in-out infinite;`:''}`;

  tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:8px;
    transform-origin:top center;transform:rotateX(-90deg);z-index:1;
    background:${interior?'#080c18':rc(team,.08)};
    border-left:1px solid ${rc(team,.14)};border-right:1px solid ${rc(team,.1)};border-bottom:1px solid ${rc(team,.07)};`;
  tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:8px;
    transform-origin:left center;transform:rotateY(90deg);z-index:1;
    background:${interior?'#060a16':rc(team,.05)};
    border-top:1px solid ${rc(team,.1)};border-right:1px solid ${rc(team,.08)};border-bottom:1px solid ${rc(team,.06)};`;

  if(animate){
    el.style.animation='claimPop .65s cubic-bezier(.34,1.56,.64,1) both';
    setTimeout(()=>el.style.animation='',750);
  }
}

// ── TERRITORY OUTLINE SVG ──
function updateTerritoryOutlines(){
  document.querySelectorAll('.territory-svg').forEach(s=>s.remove());
  const totalW=(CELL+GAP)*SIZE-GAP;
  const svg=document.createElementNS(NS,'svg');
  svg.className='territory-svg';
  svg.setAttribute('width',totalW);svg.setAttribute('height',totalW);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:50;overflow:visible;';
  TEAMS.forEach((team,ti)=>{
    const cells=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(state[r][c]?.teamIdx===ti) cells.push([r,c]);
    if(!cells.length) return;
    const segs=[]; const pad=3;
    cells.forEach(([r,c])=>{
      const x=c*(CELL+GAP), y=r*(CELL+GAP);
      if(!same(r-1,c,ti)) segs.push([x-pad,y-pad,x+CELL+pad,y-pad]);
      if(!same(r+1,c,ti)) segs.push([x-pad,y+CELL+pad,x+CELL+pad,y+CELL+pad]);
      if(!same(r,c-1,ti)) segs.push([x-pad,y-pad,x-pad,y+CELL+pad]);
      if(!same(r,c+1,ti)) segs.push([x+CELL+pad,y-pad,x+CELL+pad,y+CELL+pad]);
    });
    segs.forEach(([x1,y1,x2,y2])=>{
      const glow=mkEl('line',{x1,y1,x2,y2,stroke:team.color,'stroke-width':'7','stroke-opacity':String(.28*team.inten),'stroke-linecap':'round'});
      const line=mkEl('line',{x1,y1,x2,y2,stroke:team.color,'stroke-width':'1.8','stroke-opacity':String(.9*team.inten),'stroke-linecap':'round'});
      svg.appendChild(glow);svg.appendChild(line);
    });
  });
  document.querySelector('.iso-grid').appendChild(svg);
}

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++){
  for(let c=0;c<SIZE;c++){
    const el=document.createElement('div');
    el.className='cell';el.dataset.r=r;el.dataset.c=c;
    el.style.cssText=`width:${CELL}px;height:${CELL}px;`;
    ['tile-top','tile-front','tile-right'].forEach(cn=>{
      const d=document.createElement('div');d.className=cn;
      el.appendChild(d);
    });
    el.addEventListener('mouseenter',()=>{
      if(state[r][c]) return;
      const t=TEAMS[activeTeam];
      el.querySelector('.tile-top').style.background=`rgba(${t.r},${t.g},${t.b},.06)`;
      el.querySelector('.tile-top').style.borderColor=`rgba(${t.r},${t.g},${t.b},.32)`;
    });
    el.addEventListener('mouseleave',()=>{
      if(state[r][c]) return;
      el.querySelector('.tile-top').style.background='rgba(255,255,255,.02)';
      el.querySelector('.tile-top').style.borderColor='rgba(255,255,255,.055)';
    });
    el.addEventListener('click',()=>{
      if(state[r][c]) return;
      if(cameraAnimating) return;
      state[r][c]={teamIdx:activeTeam,hi:Math.floor(Math.random()*3),home:false,new:true};
      renderCell(r,c,false);
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE) renderCell(nr,nc,false);
      });
      updateTerritoryOutlines();
      updateScores();
      if(!isIsoMode){
        // First placement — epic tilt sequence
        triggerCameraSequence(r,c);
      } else {
        // Already in 3D — just animate the new building directly
        cameraAnimating = true;
        setTimeout(()=>{
          buildCornerCache();
          updateBuildingSVG({r,c});
        }, 80);
        setTimeout(()=>{ cameraAnimating = false; }, 1400);
      }
    });
    gridEl.appendChild(el);
    renderCell(r,c);
  }
}

// ── CAMERA SEQUENCE ──
let cameraAnimating = false;
let isIsoMode = false;

function triggerCameraSequence(r, c) {
  cameraAnimating = true;
  const scene  = document.getElementById('iso-scene');
  const grid   = document.getElementById('grid');
  const bldSvg = document.getElementById('bld-svg');

  // Phase 1: hide existing SVG buildings, tilt into iso
  bldSvg.style.transition = 'opacity 0.15s ease';
  bldSvg.style.opacity = '0';
  scene.classList.add('is-iso');
  grid.classList.add('is-iso');
  isIsoMode = true;

  // Phase 2: camera tilt done (1s) — show all existing buildings first
  setTimeout(()=>{
    buildCornerCache();
    updateBuildingSVG(null); // show all buildings, no animation yet
    bldSvg.style.transition = 'opacity 0.4s ease';
    bldSvg.style.opacity = '1';
  }, 1050);

  // Phase 3: short pause so player sees the scene, then NEW building rises
  setTimeout(()=>{
    updateBuildingSVG({r, c}); // redraw with animation on new building
  }, 1500);

  // Phase 4: animation done, unlock clicks — stay in 3D
  setTimeout(()=>{
    cameraAnimating = false;
  }, 2800);
}

// Wait for layout then build corner cache + draw buildings
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  buildCornerCache();
  updateTerritoryOutlines();
  updateBuildingSVG();
}));

function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return `<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.07);--tc-border:rgba(${t.r},${t.g},${t.b},.35);--tc-glow:rgba(${t.r},${t.g},${t.b},.15);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 8px rgba(${t.r},${t.g},${t.b},.6);"></div>
      <div>
        <div class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.wappen} ${t.name}</div>
        <div class="tp-count">${count} Felder${active?' · aktiv':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
</script>
