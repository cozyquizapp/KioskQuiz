<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#07090f;
  min-height:100vh; color:#f1f5f9;
  font-family:'Space Grotesk',sans-serif;
  display:flex; flex-direction:row;
  align-items:center; justify-content:center;
  gap:48px; padding:32px; overflow:hidden;
}

/* ── SCENE ── */
.board-wrap { position:relative; flex-shrink:0; }
.iso-scene {
  perspective:1800px; perspective-origin:50% 30%;
  position:relative; z-index:2;
  transition:perspective .9s cubic-bezier(.4,0,.2,1),
             perspective-origin .9s cubic-bezier(.4,0,.2,1);
}
.iso-scene.is-iso { perspective:1200px; perspective-origin:50% -20%; }

.iso-grid {
  transform:rotateX(0deg) rotateZ(0deg);
  transform-style:preserve-3d; transform-origin:center center;
  display:grid; gap:4px; position:relative;
  transition:transform 1s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.iso-grid.is-iso { transform:rotateX(55deg) rotateZ(-45deg) scale(.85); }

/* ── CELL ── */
.cell {
  position:relative; transform-style:preserve-3d; cursor:pointer;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  will-change:transform;
}
.cell.owned { cursor:default; }

/* Dim all tiles of non-active teams */
.cell.owned.dim    { filter:brightness(.45) saturate(.6); transition:filter .3s ease, transform .35s cubic-bezier(.34,1.56,.64,1); }
.cell.owned.bright { filter:brightness(1.25); transition:filter .3s ease, transform .35s cubic-bezier(.34,1.56,.64,1); }

/* Claim animation: tile flashes + expands then settles */
@keyframes claimFlash {
  0%   { transform:translateZ(var(--tz)); filter:brightness(1); }
  20%  { transform:translateZ(calc(var(--tz) + 22px)); filter:brightness(2.5); }
  55%  { transform:translateZ(calc(var(--tz) - 3px)); filter:brightness(1.1); }
  100% { transform:translateZ(var(--tz)); filter:brightness(1); }
}
.cell.claiming { animation:claimFlash .65s cubic-bezier(.34,1.56,.64,1) forwards; }

/* Top face */
.tile-top {
  position:absolute; inset:0; border-radius:3px; z-index:2;
  transition:background .3s, box-shadow .3s, border-color .3s;
}
/* Side faces */
.tile-front {
  position:absolute; left:0; right:0; top:100%;
  transform-origin:top center; transform:rotateX(-90deg); z-index:1;
}
.tile-right {
  position:absolute; top:0; bottom:0; left:100%;
  transform-origin:left center; transform:rotateY(90deg); z-index:1;
}

/* ── OVERLAYS ── */
.territory-svg, .symbol-layer {
  position:absolute; inset:0; pointer-events:none; overflow:visible;
}
.territory-svg { z-index:100; }
.symbol-layer  { z-index:200; }

/* ── SCORE BAR ── */
.score-bar {
  position:absolute; bottom:-52px; left:0; right:0;
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
}
.team-pill {
  display:flex; align-items:center; gap:7px; padding:6px 14px; border-radius:8px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05);
  cursor:pointer; transition:all .2s ease; user-select:none; font-size:12px;
}
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 16px var(--tc-glow); }
.tp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tp-name { font-weight:700; }
.tp-count { color:#253040; font-weight:600; margin-left:2px; }

/* ── AVATAR PANEL ── */
.avatar-panel {
  width:300px; flex-shrink:0;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px; padding:24px;
  display:flex; flex-direction:column; gap:20px;
}
.avatar-panel h3 { font-size:13px; font-weight:700; color:#4a5578; text-transform:uppercase; letter-spacing:.12em; }
.color-grid { display:flex; flex-wrap:wrap; gap:8px; }
.color-swatch {
  width:30px; height:30px; border-radius:50%; cursor:pointer;
  border:2px solid transparent;
  transition:transform .15s, border-color .15s, box-shadow .15s;
}
.color-swatch:hover { transform:scale(1.15); }
.color-swatch.taken { opacity:.22; cursor:not-allowed; }
.color-swatch.selected { border-color:white; transform:scale(1.2); }
.shape-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
.shape-btn {
  aspect-ratio:1; border-radius:9px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:center;
  transition:all .15s ease;
}
.shape-btn:hover  { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.2); }
.shape-btn.selected { border-color:var(--sel-color,white); box-shadow:0 0 10px var(--sel-color,white); }
.shape-btn.taken { opacity:.2; cursor:not-allowed; pointer-events:none; }
.shape-btn svg { width:20px; height:20px; }
.team-preview {
  display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
}
.preview-icon {
  width:42px; height:42px; border-radius:8px; border:2px solid;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.preview-icon svg { width:24px; height:24px; }
.confirm-btn {
  padding:11px 0; border-radius:10px; border:none; cursor:pointer;
  font-family:inherit; font-size:14px; font-weight:700; letter-spacing:.04em;
  transition:all .15s ease;
}
.confirm-btn:hover:not(:disabled) { transform:translateY(-1px); filter:brightness(1.15); }
.confirm-btn:disabled { opacity:.35; cursor:not-allowed; }
.registered-list { display:flex; flex-direction:column; gap:6px; }
.reg-item {
  display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05); font-size:13px;
}
.reg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
  <div class="board-wrap" id="board-wrap">
    <div class="iso-scene" id="iso-scene">
      <div class="iso-grid" id="grid"></div>
    </div>
    <div class="score-bar" id="scorebar"></div>
  </div>
  <div style="height:52px"></div>
  <div style="font-size:11px;color:#1a2236;letter-spacing:.05em;">Team wählen → Feld klicken</div>
</div>

<div class="avatar-panel">
  <div>
    <h3>Team Builder</h3>
    <div style="font-size:12px;color:#2a3550;margin-top:4px;">Farbe + Symbol wählen</div>
  </div>
  <div>
    <div style="font-size:11px;color:#3a4a68;margin-bottom:8px;font-weight:600;">FARBE</div>
    <div class="color-grid" id="color-grid"></div>
  </div>
  <div>
    <div style="font-size:11px;color:#3a4a68;margin-bottom:8px;font-weight:600;">SYMBOL</div>
    <div class="shape-grid" id="shape-grid"></div>
  </div>
  <div class="team-preview">
    <div class="preview-icon" id="preview-icon" style="border-color:#333;background:rgba(255,255,255,.03);">
      <svg id="preview-svg" viewBox="0 0 24 24" fill="none"></svg>
    </div>
    <div>
      <div style="font-size:12px;color:#3a4a68;">Dein Team</div>
      <div id="preview-name" style="font-size:15px;font-weight:700;color:#3a4a68;">— wähle Farbe & Symbol</div>
    </div>
  </div>
  <button class="confirm-btn" id="confirm-btn" disabled
    style="background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);color:#2a3550;">
    Team registrieren
  </button>
  <div>
    <div style="font-size:11px;color:#3a4a68;margin-bottom:8px;font-weight:600;">REGISTRIERT</div>
    <div class="registered-list" id="registered-list">
      <div style="font-size:12px;color:#1e2840;">Noch keine Teams</div>
    </div>
  </div>
</div>

<script>
const SIZE=6, CELL=72, GAP=4;
const NS='http://www.w3.org/2000/svg';

const NEON_COLORS=[
  {hex:'#00f5ff',r:0,  g:245,b:255,name:'Cyan'},
  {hex:'#ff0080',r:255,g:0,  b:128,name:'Pink'},
  {hex:'#00ff88',r:0,  g:255,b:136,name:'Grün'},
  {hex:'#ffee00',r:255,g:238,b:0,  name:'Gelb'},
  {hex:'#bf5fff',r:191,g:95, b:255,name:'Lila'},
  {hex:'#ff6600',r:255,g:102,b:0,  name:'Orange'},
  {hex:'#00aaff',r:0,  g:170,b:255,name:'Blau'},
  {hex:'#ff3333',r:255,g:51, b:51, name:'Rot'},
  {hex:'#44ffaa',r:68, g:255,b:170,name:'Mint'},
  {hex:'#ff99ff',r:255,g:153,b:255,name:'Rosa'},
];

const SHAPES=[
  {id:'circle',   name:'Kreis',   path:'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z'},
  {id:'triangle', name:'Dreieck', path:'M12 3L22 21H2L12 3z'},
  {id:'hex',      name:'Hexagon', path:'M12 2l8.66 5v10L12 22l-8.66-5V7z'},
  {id:'star4',    name:'Stern',   path:'M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z'},
  {id:'diamond',  name:'Raute',   path:'M12 2l10 10-10 10L2 12z'},
  {id:'cross',    name:'Kreuz',   path:'M10 2h4v8h8v4h-8v8h-4v-8H2v-4h8z'},
  {id:'arrow',    name:'Pfeil',   path:'M5 12h14M13 6l6 6-6 6'},
  {id:'bolt',     name:'Blitz',   path:'M13 2L4.5 13.5H11L11 22L19.5 10.5H13z'},
  {id:'shield',   name:'Schild',  path:'M12 2l8 3v6c0 5-4 9-8 11C8 20 4 16 4 11V5z'},
  {id:'eye',      name:'Auge',    path:'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z'},
  {id:'crown',    name:'Krone',   path:'M2 19h20M2 19l3-9 4 5 3-9 3 9 4-5 3 9'},
  {id:'flame',    name:'Feuer',   path:'M12 2c0 6-6 8-6 14a6 6 0 0 0 12 0c0-6-6-8-6-14z'},
  {id:'moon',     name:'Mond',    path:'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z'},
  {id:'sword',    name:'Schwert', path:'M14.5 2.5l7 7-14 14-3.5-3.5 10.5-10.5L12 8l-6 6-1.5-1.5 8.5-8.5z'},
  {id:'wave',     name:'Welle',   path:'M2 12c2-4 4-4 6 0s4 4 6 0 4-4 6 0'},
];

// ── TEAMS ──
const TEAMS=Array(6).fill(null);
let registeredTeams=[], activeTeam=0;

function mkTeam(colorIdx,shapeIdx,name){
  const nc=NEON_COLORS[colorIdx], sh=SHAPES[shapeIdx];
  return{color:nc.hex,r:nc.r,g:nc.g,b:nc.b,name,shapeId:sh.id,shapePath:sh.path};
}
TEAMS[0]=mkTeam(6,8,'Die Clique');
TEAMS[1]=mkTeam(1,1,'Rote Karte');
TEAMS[2]=mkTeam(2,2,'Grüne Hölle');
TEAMS[3]=mkTeam(3,7,'Oranje');

// ── STATE ──
const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
function seed(r,c,t,home=false){ state[r][c]={teamIdx:t,home,new:false}; }
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);
seed(0,5,1,true);seed(0,4,1);seed(1,5,1);seed(1,4,1);
seed(5,0,2,true);seed(4,0,2);seed(5,1,2);seed(4,1,2);
seed(5,5,3,true);seed(4,5,3);seed(5,4,3);

// ── HELPERS ──
function rca(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function isEdgeCell(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return false;
  return[[-1,0],[1,0],[0,-1],[0,1]].some(([dr,dc])=>!same(r+dr,c+dc,ti));
}
function adjCount(r,c){
  const ti=state[r][c]?.teamIdx; if(ti==null) return 0;
  return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;
}

// Height = Stärke:
// home (HQ)  → 44px  "stark / HQ"
// connected interior (adj=4) → 10px  "normales Feld, tief verbunden"
// edge (1-3 neighbours) → 24px  "verbunden aber exponiert"
// lone (adj=0) → 16px  "einzeln, mittel"
function getTZ(r,c){
  const cell=state[r][c]; if(!cell) return 0;
  if(cell.home) return 44;
  const adj=adjCount(r,c);
  if(adj===4) return 10;   // fully interior
  if(adj>=2)  return 22;   // connected
  if(adj===1) return 18;   // weakly connected
  return 15;               // lone
}

// ── CONNECTED BLOCKS ──
function getBlocks(teamIdx){
  const visited=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
  const blocks=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(state[r][c]?.teamIdx===teamIdx&&!visited[r][c]){
      const block=[],q=[[r,c]]; visited[r][c]=true;
      while(q.length){
        const[cr,cc]=q.shift(); block.push([cr,cc]);
        [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
          const nr=cr+dr,nc=cc+dc;
          if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&!visited[nr][nc]&&state[nr][nc]?.teamIdx===teamIdx){
            visited[nr][nc]=true; q.push([nr,nc]);
          }
        });
      }
      blocks.push(block);
    }
  }
  return blocks;
}

// Find the tile closest to the geometric center of the block
function blockCenterTile(block){
  const cx=block.reduce((s,[,c])=>s+c,0)/block.length;
  const cy=block.reduce((s,[r])=>s+r,0)/block.length;
  let best=block[0], bestD=Infinity;
  block.forEach(([r,c])=>{
    const d=(r-cy)**2+(c-cx)**2;
    if(d<bestD){bestD=d;best=[r,c];}
  });
  return best;
}

// ── RENDER CELL ──
let isIsoMode=false;

function renderCell(r,c){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  const tTop=el.querySelector('.tile-top');
  const tFront=el.querySelector('.tile-front');
  const tRight=el.querySelector('.tile-right');

  if(!cell){
    el.className='cell empty';
    el.style.setProperty('--tz','0px');
    el.style.transform='translateZ(0px)';
    tTop.style.cssText='position:absolute;inset:0;border-radius:3px;z-index:2;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);';
    tFront.style.cssText='display:none;';
    tRight.style.cssText='display:none;';
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const isHome=cell.home;
  const isEdge=isEdgeCell(r,c);
  const tz=getTZ(r,c);
  const wallH=Math.max(6,tz);

  el.style.setProperty('--tz',`${tz}px`);
  el.style.transform=`translateZ(${tz}px)`;

  // ── TOP FACE ──
  // Inner tiles: very subtle border (only show colour, not glow)
  // Edge tiles: full-colour border + glow → makes territory boundary obvious
  const bgA   = isHome?.30 : isEdge?.18 : .10;
  const brdA  = isHome?.90 : isEdge?.70 : .08;  // ← key: inner almost invisible
  const brdW  = isHome?'2px':isEdge?'1.5px':'1px';
  const glow  = isHome
    ? `0 0 18px ${rca(team,.7)}, 0 0 38px ${rca(team,.28)}`
    : isEdge
      ? `0 0 10px ${rca(team,.5)}`
      : 'none';

  tTop.style.cssText=`
    position:absolute;inset:0;border-radius:3px;z-index:2;
    background:${rca(team,bgA)};
    border:${brdW} solid ${rca(team,brdA)};
    box-shadow:${glow};
    ${isHome?`animation:homePulse 2.4s ease-in-out infinite;--glow-b:${glow};--glow-p:0 0 26px ${rca(team,.9)},0 0 52px ${rca(team,.38)};`:''}
  `;

  // ── SIDE FACES ──
  const wallBg = isHome?rca(team,.26):isEdge?rca(team,.15):rca(team,.06);
  const wallBrd = `1px solid ${rca(team, isHome?.55:isEdge?.35:.05)}`; // inner walls nearly invisible
  tFront.style.cssText=`display:block;position:absolute;left:0;right:0;top:100%;height:${wallH}px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;border-radius:0 0 2px 2px;background:${wallBg};border-left:${wallBrd};border-bottom:${wallBrd};border-right:${wallBrd};`;
  tRight.style.cssText=`display:block;position:absolute;top:0;bottom:0;left:100%;width:${wallH}px;transform-origin:left center;transform:rotateY(90deg);z-index:1;border-radius:0 2px 2px 0;background:${wallBg};border-top:${wallBrd};border-right:${wallBrd};border-bottom:${wallBrd};`;
}

// Apply dim/bright classes based on active team
function applyTeamFocus(){
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const cell=state[r][c]; if(!cell) continue;
    const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if(!el) continue;
    el.classList.remove('dim','bright');
    el.classList.add(cell.teamIdx===activeTeam?'bright':'dim');
  }
}

// ── SYMBOL OVERLAY — one per block, on center tile ──
function updateSymbols(){
  document.querySelectorAll('.symbol-layer').forEach(s=>s.remove());
  const totalW=(CELL+GAP)*SIZE-GAP;
  const svg=document.createElementNS(NS,'svg');
  svg.className='symbol-layer';
  svg.setAttribute('width',totalW); svg.setAttribute('height',totalW);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:200;overflow:visible;';

  TEAMS.forEach((team,ti)=>{
    if(!team?.shapePath) return;
    getBlocks(ti).forEach(block=>{
      const[cr,cc]=blockCenterTile(block);
      const cx=cc*(CELL+GAP)+CELL/2;
      const cy=cr*(CELL+GAP)+CELL/2;
      const n=block.length;
      const sz=Math.min(14+n*2,24); // small but grows slightly with territory
      const sc=(sz/24).toFixed(2);
      const g=document.createElementNS(NS,'g');
      g.setAttribute('transform',`translate(${cx.toFixed(1)},${cy.toFixed(1)}) scale(${sc})`);
      // glow pass
      const pg=document.createElementNS(NS,'path');
      pg.setAttribute('d',team.shapePath); pg.setAttribute('fill','none');
      pg.setAttribute('stroke',team.color); pg.setAttribute('stroke-width','5');
      pg.setAttribute('stroke-linecap','round'); pg.setAttribute('stroke-linejoin','round');
      pg.setAttribute('transform','translate(-12,-12)'); pg.setAttribute('opacity','.18');
      // sharp pass
      const ps=document.createElementNS(NS,'path');
      ps.setAttribute('d',team.shapePath); ps.setAttribute('fill','none');
      ps.setAttribute('stroke',team.color); ps.setAttribute('stroke-width','1.8');
      ps.setAttribute('stroke-linecap','round'); ps.setAttribute('stroke-linejoin','round');
      ps.setAttribute('transform','translate(-12,-12)'); ps.setAttribute('opacity','.95');
      g.appendChild(pg); g.appendChild(ps);
      svg.appendChild(g);
    });
  });

  document.getElementById('grid').appendChild(svg);
}

// Animate symbol flash on claim (pulse once)
function flashSymbol(teamIdx){
  const svgEl=document.querySelector('.symbol-layer');
  if(!svgEl) return;
  // find group matching team center tile
  // simpler: re-render with a brief opacity keyframe via animate element
  svgEl.querySelectorAll('g').forEach(g=>{
    const pathEl=g.querySelector('path:last-child');
    if(!pathEl) return;
    if(pathEl.getAttribute('stroke')!==TEAMS[teamIdx]?.color) return;
    const anim=document.createElementNS(NS,'animate');
    anim.setAttribute('attributeName','opacity');
    anim.setAttribute('values','1;0;1;0.95');
    anim.setAttribute('dur','0.5s');
    anim.setAttribute('fill','freeze');
    pathEl.appendChild(anim);
  });
}

// ── TERRITORY OUTLINES ──
function updateOutlines(){
  document.querySelectorAll('.territory-svg').forEach(s=>s.remove());
  const totalW=(CELL+GAP)*SIZE-GAP;
  const svg=document.createElementNS(NS,'svg');
  svg.className='territory-svg';
  svg.setAttribute('width',totalW); svg.setAttribute('height',totalW);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:100;overflow:visible;';

  TEAMS.forEach((team,ti)=>{
    if(!team) return;
    const cells=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(state[r][c]?.teamIdx===ti) cells.push([r,c]);
    if(!cells.length) return;
    const pad=3;
    cells.forEach(([r,c])=>{
      const x=c*(CELL+GAP),y=r*(CELL+GAP);
      const mkLine=(x1,y1,x2,y2)=>{
        // outer glow
        const lg=document.createElementNS(NS,'line');
        lg.setAttribute('x1',x1);lg.setAttribute('y1',y1);lg.setAttribute('x2',x2);lg.setAttribute('y2',y2);
        lg.setAttribute('stroke',team.color);lg.setAttribute('stroke-width','5');
        lg.setAttribute('stroke-opacity','.15');lg.setAttribute('stroke-linecap','round');
        svg.appendChild(lg);
        // sharp line
        const ls=document.createElementNS(NS,'line');
        ls.setAttribute('x1',x1);ls.setAttribute('y1',y1);ls.setAttribute('x2',x2);ls.setAttribute('y2',y2);
        ls.setAttribute('stroke',team.color);ls.setAttribute('stroke-width','1.8');
        ls.setAttribute('stroke-opacity','.9');ls.setAttribute('stroke-linecap','round');
        svg.appendChild(ls);
      };
      if(!same(r-1,c,ti)) mkLine(x-pad,y-pad,x+CELL+pad,y-pad);
      if(!same(r+1,c,ti)) mkLine(x-pad,y+CELL+pad,x+CELL+pad,y+CELL+pad);
      if(!same(r,c-1,ti)) mkLine(x-pad,y-pad,x-pad,y+CELL+pad);
      if(!same(r,c+1,ti)) mkLine(x+CELL+pad,y-pad,x+CELL+pad,y+CELL+pad);
    });
  });
  document.getElementById('grid').appendChild(svg);
}

// ── CAMERA ──
let cameraAnimating=false;
function triggerCamera(newR,newC){
  if(isIsoMode){ claimPop(newR,newC); return; }
  cameraAnimating=true;
  document.getElementById('iso-scene').classList.add('is-iso');
  document.getElementById('grid').classList.add('is-iso');
  isIsoMode=true;
  setTimeout(()=>{
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) renderCell(r,c);
    claimPop(newR,newC);
    cameraAnimating=false;
  },900);
}

function claimPop(r,c){
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  el.classList.remove('claiming'); void el.offsetWidth;
  el.classList.add('claiming');
  setTimeout(()=>el.classList.remove('claiming'),700);
}

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');
  el.className='cell'; el.dataset.r=r; el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px;`;
  ['tile-top','tile-front','tile-right'].forEach(cn=>{
    const d=document.createElement('div'); d.className=cn; el.appendChild(d);
  });

  el.addEventListener('mouseenter',()=>{
    if(state[r][c]||!TEAMS[activeTeam]) return;
    const t=TEAMS[activeTeam];
    el.querySelector('.tile-top').style.cssText=`
      position:absolute;inset:0;border-radius:3px;z-index:2;
      background:rgba(${t.r},${t.g},${t.b},.12);
      border:1.5px solid rgba(${t.r},${t.g},${t.b},.6);
      box-shadow:0 0 14px rgba(${t.r},${t.g},${t.b},.4), inset 0 0 8px rgba(${t.r},${t.g},${t.b},.08);
      outline:none;
    `;
    if(isIsoMode) el.style.transform=`translateZ(${TZ_HOVER}px)`;
  });
  el.addEventListener('mouseleave',()=>{
    if(state[r][c]) return;
    el.querySelector('.tile-top').style.cssText='position:absolute;inset:0;border-radius:3px;z-index:2;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);';
    if(isIsoMode) el.style.transform='translateZ(0px)';
  });
  el.addEventListener('click',()=>{
    if(state[r][c]||cameraAnimating||!TEAMS[activeTeam]) return;
    state[r][c]={teamIdx:activeTeam,home:false,new:true};
    renderCell(r,c);
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE) renderCell(nr,nc);
    });
    updateOutlines(); updateSymbols(); updateScores();
    applyTeamFocus();
    flashSymbol(activeTeam);
    triggerCamera(r,c);
  });

  gridEl.appendChild(el);
  renderCell(r,c);
}

const TZ_HOVER=10;

// Inject keyframes
const style=document.createElement('style');
style.textContent=`@keyframes homePulse{0%,100%{box-shadow:var(--glow-b);}50%{box-shadow:var(--glow-p);}}`;
document.head.appendChild(style);

// ── AVATAR BUILDER ──
let selColor=null, selShape=null;
const takenColors=new Set(), takenShapes=new Set();
[TEAMS[0],TEAMS[1],TEAMS[2],TEAMS[3]].filter(Boolean).forEach(t=>{
  takenColors.add(t.color); takenShapes.add(t.shapeId);
});

function buildAvatarUI(){
  const cg=document.getElementById('color-grid'); cg.innerHTML='';
  NEON_COLORS.forEach(nc=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(takenColors.has(nc.hex)?' taken':'');
    sw.style.cssText=`background:${nc.hex};box-shadow:0 0 8px ${nc.hex}55;`;
    sw.title=nc.name;
    if(!takenColors.has(nc.hex)) sw.addEventListener('click',()=>selectColor(nc));
    cg.appendChild(sw);
  });
  const sg=document.getElementById('shape-grid'); sg.innerHTML='';
  SHAPES.forEach(sh=>{
    const btn=document.createElement('div');
    btn.className='shape-btn'+(takenShapes.has(sh.id)?' taken':'');
    btn.title=sh.name;
    btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="${sh.path}"/></svg>`;
    if(!takenShapes.has(sh.id)) btn.addEventListener('click',()=>selectShape(sh));
    sg.appendChild(btn);
  });
}

function selectColor(nc){
  selColor=nc;
  document.querySelectorAll('.color-swatch').forEach((sw,i)=>{
    sw.classList.toggle('selected',NEON_COLORS[i].hex===nc.hex);
    if(!takenColors.has(NEON_COLORS[i].hex))
      sw.style.boxShadow=NEON_COLORS[i].hex===nc.hex?`0 0 16px ${nc.hex},0 0 32px ${nc.hex}55`:`0 0 8px ${NEON_COLORS[i].hex}55`;
  });
  document.querySelectorAll('.shape-btn:not(.taken)').forEach(btn=>{
    if(btn.classList.contains('selected')){
      btn.querySelector('svg').setAttribute('stroke',nc.hex);
      btn.style.setProperty('--sel-color',nc.hex);
    }
  });
  updatePreview();
}
function selectShape(sh){
  selShape=sh;
  document.querySelectorAll('.shape-btn:not(.taken)').forEach((btn,i)=>{
    const s=SHAPES.filter(s=>!takenShapes.has(s.id))[i];
    if(!s) return;
    btn.classList.toggle('selected',s.id===sh.id);
    btn.querySelector('svg').setAttribute('stroke',s.id===sh.id?(selColor?.hex||'white'):'rgba(255,255,255,.4)');
    if(s.id===sh.id) btn.style.setProperty('--sel-color',selColor?.hex||'white');
  });
  updatePreview();
}
function updatePreview(){
  const icon=document.getElementById('preview-icon');
  const svgEl=document.getElementById('preview-svg');
  const name=document.getElementById('preview-name');
  const btn=document.getElementById('confirm-btn');
  if(selColor){ icon.style.borderColor=selColor.hex; icon.style.background=`${selColor.hex}18`; icon.style.boxShadow=`0 0 14px ${selColor.hex}55`; }
  if(selShape){ svgEl.innerHTML=`<path d="${selShape.path}" stroke="${selColor?.hex||'white'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`; }
  if(selColor&&selShape){
    name.textContent=`${selColor.name} · ${selShape.name}`; name.style.color=selColor.hex;
    btn.disabled=false;
    btn.style.cssText=`background:${selColor.hex}22;border:1.5px solid ${selColor.hex}88;color:${selColor.hex};box-shadow:0 0 14px ${selColor.hex}44;padding:11px 0;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.04em;transition:all .15s ease;`;
  } else {
    name.textContent='— wähle Farbe & Symbol'; name.style.color='#3a4a68';
    btn.disabled=true;
    btn.style.cssText='padding:11px 0;border-radius:10px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#2a3550;cursor:not-allowed;font-family:inherit;font-size:14px;font-weight:700;';
  }
}
document.getElementById('confirm-btn').addEventListener('click',()=>{
  if(!selColor||!selShape) return;
  const idx=4+registeredTeams.length; if(idx>=6) return;
  takenColors.add(selColor.hex); takenShapes.add(selShape.id);
  const team={color:selColor.hex,r:selColor.r,g:selColor.g,b:selColor.b,
    name:`${selColor.name} ${selShape.name}`,shapeId:selShape.id,shapePath:selShape.path};
  registeredTeams.push(team); TEAMS[idx]=team;
  renderRegisteredList(); selColor=null; selShape=null;
  buildAvatarUI(); updatePreview(); updateScores();
});
function renderRegisteredList(){
  const list=document.getElementById('registered-list');
  if(!registeredTeams.length){ list.innerHTML='<div style="font-size:12px;color:#1e2840;">Noch keine Teams</div>'; return; }
  list.innerHTML=registeredTeams.map((t,i)=>`
    <div class="reg-item">
      <div class="reg-dot" style="background:${t.color};box-shadow:0 0 6px ${t.color}88;"></div>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${t.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${SHAPES.find(s=>s.id===t.shapeId)?.path||''}"/></svg>
      <span style="color:${t.color};font-weight:600;">${t.name}</span>
      <span style="color:#1e2840;margin-left:auto;font-size:11px;">Team ${i+5}</span>
    </div>`).join('');
}

// ── SCORES ──
function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    if(!t) return '';
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    if(!count&&i>=4&&!registeredTeams[i-4]) return '';
    const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.09);--tc-border:rgba(${t.r},${t.g},${t.b},.45);--tc-glow:rgba(${t.r},${t.g},${t.b},.22);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 6px rgba(${t.r},${t.g},${t.b},.9);"></div>
      <span class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.name}</span>
      <span class="tp-count">${count}F</span>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();applyTeamFocus();};

// ── INIT ──
buildAvatarUI();
updateOutlines();
updateSymbols();
updateScores();
applyTeamFocus();
renderRegisteredList();
</script>
</body>
</html>
