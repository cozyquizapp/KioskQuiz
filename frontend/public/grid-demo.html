<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quartier Quiz — 3D Grid Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
/* RESET — preserve-3d ONLY where needed, not globally */
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0D0A06;color:#e2e8f0;font-family:'Nunito',system-ui,sans-serif}
body{overflow-y:auto;overflow-x:hidden}

.grain{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence baseFrequency=".85" type="fractalNoise"/></filter><rect width="200" height="200" filter="url(%23n)" opacity=".03"/></svg>')}
.firefly{position:fixed;pointer-events:none;z-index:1;width:4px;height:4px;border-radius:50%;
  background:#FEF08A;box-shadow:0 0 6px 2px rgba(254,240,138,.7);
  animation:ffmove var(--dur,6s) ease-in-out var(--del,0s) infinite}
@keyframes ffmove{0%,100%{transform:translate(0,0);opacity:.35}50%{transform:translate(var(--dx,20px),var(--dy,-15px));opacity:.7}}

.page{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;padding:24px 20px 80px;gap:24px}
.section-title{font-size:clamp(20px,3vw,28px);font-weight:900;color:#F59E0B;text-shadow:0 0 20px rgba(245,158,11,.25)}
.section-sub{font-size:clamp(11px,1.4vw,13px);color:#92400E;font-weight:700;margin-top:-16px}

/* 3D GRID — preserve-3d only on grid + tiles + buildings */
.grid-scene{perspective:800px;perspective-origin:50% 35%;padding:60px 0 20px;cursor:grab;user-select:none}
.grid-scene.dragging{cursor:grabbing}
.grid-scene.dragging .iso-grid{transition:none}
.iso-grid{
  display:grid;gap:4px;
  transform-style:preserve-3d;
  transform:scale(var(--zoom,1)) rotateX(var(--rx,55deg)) rotateZ(var(--rz,-45deg));
  transition:transform .15s ease-out;
}
.drag-hint{font-size:11px;color:#64748b;margin-top:-12px;font-weight:700;opacity:.7}
.tile{position:relative;cursor:pointer;transition:transform .15s ease;transform-style:preserve-3d}
.tile:not(.owned):hover .ground{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}
.ground{width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}

/* Score bar */
.score-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.team-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .25s;user-select:none;font-size:12px}
.team-pill.active{background:var(--tc-bg);border-color:var(--tc-border);box-shadow:0 0 20px var(--tc-glow)}
.tp-emoji{font-size:16px;line-height:1}
.tp-name{font-weight:800;color:#475569;font-size:12px}
.team-pill.active .tp-name{color:var(--tc-text)}
.tp-count{font-weight:900;font-size:10px;color:#1C1917;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:5px}
.team-pill.active .tp-count{background:var(--tc-count-bg);color:var(--tc-text)}

/* Showcase */
.showcases{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;width:100%;max-width:1200px}
.showcase-card{background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.showcase-card:hover{border-color:rgba(255,255,255,.12)}
.sc-header{display:flex;align-items:center;gap:10px}
.sc-icon{font-size:28px;line-height:1}
.sc-title{font-size:16px;font-weight:900}
.sc-desc{font-size:12px;color:#64748b;line-height:1.5}
.sc-stage{position:relative;height:180px;border-radius:12px;overflow:hidden;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
.sc-play{padding:10px 22px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;background:var(--sc-color,#F59E0B);color:#0D0A06;box-shadow:0 4px 16px var(--sc-glow,rgba(245,158,11,.3));transition:all .2s;align-self:center}
.sc-play:hover{transform:scale(1.04);filter:brightness(1.15)}

/* Gallery 4x2 */
.type-gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:700px}
.type-card{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 10px 10px}
.type-card:hover{border-color:rgba(255,255,255,.12)}
.tc-stage{perspective:400px;perspective-origin:50% 35%;height:130px;width:110px;display:flex;align-items:center;justify-content:center}
.tc-iso{transform-style:preserve-3d;transform:rotateX(55deg) rotateZ(-45deg);position:relative}
.tc-name{font-size:11px;font-weight:800;color:#94a3b8;text-align:center}

/* Keyframes */
@keyframes stampRing{0%{transform:scale(.5);opacity:.8}100%{transform:scale(3);opacity:0}}
@keyframes shatterOut{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(.3) rotate(var(--sr,180deg))}}
@keyframes frostPulse{0%,100%{box-shadow:0 0 6px rgba(147,210,255,.4)}50%{box-shadow:0 0 16px rgba(147,210,255,.8)}}
@keyframes jokerGlow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.5)}50%{box-shadow:0 0 22px rgba(251,191,36,.9)}}
@keyframes starFall{0%{opacity:1;transform:translateY(var(--starY,-60px)) rotate(0)}100%{opacity:0;transform:translateY(20px) rotate(720deg)}}
</style>
</head>
<body>
<div class="grain"></div>
<div id="fireflies"></div>

<div class="page">
<div class="section-title">Quartier Quiz</div>
<div class="section-sub">Klicke leere Felder zum Setzen</div>

<div class="drag-hint">&#x1F5B1; Ziehen = Drehen · Mausrad = Zoom · Doppelklick = Reset</div>
<div class="grid-scene" id="gridscene">
  <div class="iso-grid" id="grid"></div>
</div>
<div class="score-bar" id="scorebar"></div>

<div class="section-title" style="margin-top:8px">Gebäudetypen</div>
<div class="section-sub">8 einzigartige Silhouetten</div>
<div class="type-gallery" id="typegallery"></div>

<div class="section-title" style="margin-top:8px">Animation Showcase</div>
<div class="section-sub">Klicke Play um jede Animation zu sehen</div>
<div class="showcases" id="showcases"></div>
</div>

<script>
const SIZE=7, CELL=64;

const TEAMS=[];
function mkTeam(hex,name,emoji){
  const m=hex.match(/#(..)(..)(..)/);
  const r=parseInt(m[1],16),g=parseInt(m[2],16),b=parseInt(m[3],16);
  return{color:hex,r,g,b,name,emoji};
}
TEAMS.push(mkTeam('#3B82F6','Fuchs','\u{1F98A}'));
TEAMS.push(mkTeam('#EF4444','Tiger','\u{1F42F}'));
TEAMS.push(mkTeam('#F97316','Eule','\u{1F989}'));
TEAMS.push(mkTeam('#22C55E','Frosch','\u{1F438}'));

function rgba(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`}

// ══════════════════════════════════════════════════════════════════════════════
// BUILDING SYSTEM — clean from scratch
// Each box() call creates ONE standalone 3D box with exactly 3 visible faces.
// No CSS variables, no class-based sizing, no nesting issues.
// ══════════════════════════════════════════════════════════════════════════════

// Create a single 3D box at position (x,y,z) with size (w,d,h).
// 5 faces: top, front, right, back, left — fully closed box.
function box(parent, x, y, z, w, d, h, topColor, frontColor, rightColor, backColor, leftColor, borderColor){
  const el=document.createElement('div');
  el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${d}px;transform-style:preserve-3d;transform:translateZ(${z}px);pointer-events:none`;

  // TOP face
  const top=document.createElement('div');
  top.style.cssText=`position:absolute;left:0;top:0;width:${w}px;height:${d}px;transform:translateZ(${h}px);background:${topColor};border:1px solid ${borderColor}`;

  // FRONT face — bottom edge
  const front=document.createElement('div');
  front.style.cssText=`position:absolute;left:0;bottom:0;width:${w}px;height:${h}px;transform-origin:bottom center;transform:rotateX(-90deg);background:${frontColor};border:1px solid ${borderColor}`;

  // RIGHT face — right edge
  const right=document.createElement('div');
  right.style.cssText=`position:absolute;top:0;right:0;width:${h}px;height:${d}px;transform-origin:center right;transform:rotateY(90deg);background:${rightColor};border:1px solid ${borderColor}`;

  // BACK face — top edge
  const back=document.createElement('div');
  back.style.cssText=`position:absolute;left:0;top:0;width:${w}px;height:${h}px;transform-origin:top center;transform:rotateX(90deg);background:${backColor};border:1px solid ${borderColor}`;

  // LEFT face — left edge
  const left=document.createElement('div');
  left.style.cssText=`position:absolute;top:0;left:0;width:${h}px;height:${d}px;transform-origin:center left;transform:rotateY(-90deg);background:${leftColor};border:1px solid ${borderColor}`;

  el.appendChild(top);el.appendChild(front);el.appendChild(right);el.appendChild(back);el.appendChild(left);
  parent.appendChild(el);
  return{el,top,front,right};
}

// Convenience: colored box using team colors — 5 faces, fully closed
function tbox(parent, x, y, z, w, d, h, team, bright){
  bright=bright||0;
  return box(parent, x, y, z, w, d, h,
    rgba(team, .90+bright),           // top: brightest
    rgba(team, .68+bright*.5),        // front: medium
    rgba(team, .42+bright*.3),        // right: darkest
    rgba(team, .52+bright*.3),        // back: medium-dark
    rgba(team, .58+bright*.4),        // left: medium
    rgba(team, .30)                   // border
  );
}

// Add window dots to a front face
function addWin(face, fw, fh, rows, cols){
  const wW=Math.max(3, Math.round(fw*.13));
  const wH=Math.max(3, Math.round(fh*.12));
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const gx=Math.round((fw-cols*wW)/(cols+1));
    const gy=Math.round((fh-rows*wH)/(rows+1));
    const w=document.createElement('div');
    w.style.cssText=`position:absolute;width:${wW}px;height:${wH}px;left:${gx+c*(wW+gx)}px;top:${gy+r*(wH+gy)}px;background:rgba(255,255,200,.28);border:1px solid rgba(255,255,200,.08);border-radius:1px;pointer-events:none`;
    face.appendChild(w);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// 8 BUILDING TYPES
// ══════════════════════════════════════════════════════════════════════════════
const BTYPES=[
  {name:'Haus',     id:0},
  {name:'Turm',     id:1},
  {name:'Hochhaus', id:2},
  {name:'Laden',    id:3},
  {name:'Fabrik',   id:4},
  {name:'Kirche',   id:5},
  {name:'Burg',     id:6},
  {name:'Silo',     id:7},
];

function buildBuilding(tileEl, cell, team, sz, btypeIdx, animate){
  // Clear old building
  Array.from(tileEl.children).forEach(ch=>{if(!ch.classList.contains('ground'))ch.remove()});
  if(!cell||!team)return;

  const bi=btypeIdx!=null?btypeIdx:0;
  let extra=cell.stacked*Math.round(sz*.14);
  if(cell.joker) extra+=Math.round(sz*.08);
  const hm=cell.home?1.2:1;

  let mainTop=null, mainEl=null, emojiZ=0;

  // ── 0: HAUS — wide, medium height ──
  if(bi===0){
    const w=Math.round(sz*.72), d=Math.round(sz*.68), h=Math.round(sz*.36*hm)+extra;
    const ox=Math.round((sz-w)/2), oy=Math.round((sz-d)/2);
    const b=tbox(tileEl, ox, oy, 0, w, d, h, team);
    mainEl=b.el; mainTop=b.top;
    addWin(b.front, w, h, 1, 2);
    emojiZ=h;
  }
  // ── 1: TURM — very narrow, very tall with stepped top ──
  else if(bi===1){
    const w=Math.round(sz*.30), d=Math.round(sz*.30), h=Math.round(sz*.90*hm)+extra;
    const ox=Math.round((sz-w)/2), oy=Math.round((sz-d)/2);
    const b=tbox(tileEl, ox, oy, 0, w, d, h, team);
    mainEl=b.el; mainTop=b.top;
    addWin(b.front, w, h, 4, 1);
    // Stepped tip: 2 smaller cubes stacked
    const w2=Math.round(w*.65), d2=Math.round(d*.65), h2=Math.round(h*.22);
    tbox(tileEl, ox+Math.round((w-w2)/2), oy+Math.round((d-d2)/2), h, w2, d2, h2, team, .08);
    const w3=Math.round(w2*.55), d3=Math.round(d2*.55), h3=Math.round(h2*.65);
    tbox(tileEl, ox+Math.round((w-w3)/2), oy+Math.round((d-d3)/2), h+h2, w3, d3, h3, team, .15);
    emojiZ=h+h2+h3;
  }
  // ── 2: HOCHHAUS — medium, tallest, antenna ──
  else if(bi===2){
    const w=Math.round(sz*.50), d=Math.round(sz*.50), h=Math.round(sz*.75*hm)+extra;
    const ox=Math.round((sz-w)/2), oy=Math.round((sz-d)/2);
    const b=tbox(tileEl, ox, oy, 0, w, d, h, team);
    mainEl=b.el; mainTop=b.top;
    addWin(b.front, w, h, 3, 2);
    // Antenna pole (simple div)
    const ah=Math.round(h*.35);
    const pole=document.createElement('div');
    pole.style.cssText=`position:absolute;left:${ox+Math.round(w/2)-1}px;top:${oy+Math.round(d/2)-1}px;width:3px;height:3px;transform-style:preserve-3d;transform:translateZ(${h}px);pointer-events:none`;
    const shaft=document.createElement('div');
    shaft.style.cssText=`position:absolute;left:0;bottom:0;width:3px;height:${ah}px;transform-origin:bottom center;transform:rotateX(-90deg);background:rgba(255,255,255,.6)`;
    pole.appendChild(shaft);tileEl.appendChild(pole);
    emojiZ=h;
  }
  // ── 3: LADEN — very wide, very flat + awning ──
  else if(bi===3){
    const w=Math.round(sz*.82), d=Math.round(sz*.62), h=Math.round(sz*.18*hm)+extra;
    const ox=Math.round((sz-w)/2), oy=Math.round((sz-d)/2);
    const b=tbox(tileEl, ox, oy, 0, w, d, h, team);
    mainEl=b.el; mainTop=b.top;
    // Awning — extends forward beyond the building
    const aw=w+8, ad=Math.round(d*.38), ah=Math.max(3, Math.round(sz*.035));
    tbox(tileEl, ox-4, oy+d-Math.round(ad*.2), Math.round(h*.55), aw, ad, ah, team, .15);
    emojiZ=h;
  }
  // ── 4: FABRIK — 2 boxes side by side, staircase ──
  else if(bi===4){
    const totalW=Math.round(sz*.78);
    const w1=Math.round(totalW*.55), w2=totalW-w1+2;
    const d=Math.round(sz*.62);
    const h1=Math.round(sz*.52*hm)+extra, h2=Math.round(h1*.50);
    const ox=Math.round((sz-totalW)/2), oy=Math.round((sz-d)/2);
    // Tall part
    const b=tbox(tileEl, ox, oy, 0, w1, d, h1, team);
    mainEl=b.el; mainTop=b.top;
    addWin(b.front, w1, h1, 2, 1);
    // Short part
    tbox(tileEl, ox+w1-2, oy, 0, w2, d, h2, team, -.05);
    // Chimney on tall part
    const cw=Math.round(w1*.30), cd=Math.round(d*.24), ch=Math.round(h1*.28);
    tbox(tileEl, ox+3, oy+3, h1, cw, cd, ch, team, -.10);
    emojiZ=h1+ch;
  }
  // ── 5: KIRCHE — narrow body + tall steeple + white cross ──
  else if(bi===5){
    const w=Math.round(sz*.44), d=Math.round(sz*.60);
    const h=Math.round(sz*.30*hm)+extra;
    const ox=Math.round((sz-w)/2), oy=Math.round((sz-d)/2);
    // Nave
    const b=tbox(tileEl, ox, oy, 0, w, d, h, team);
    mainEl=b.el; mainTop=b.top;
    // Steeple tower — tall and narrow
    const tw=Math.round(w*.50), td=Math.round(d*.38), th=Math.round(h*1.3);
    const tox=ox+Math.round((w-tw)/2), toy=oy+Math.round((d-td)/2);
    tbox(tileEl, tox, toy, h, tw, td, th, team, .06);
    // Spire tip
    const sw=Math.round(tw*.55), sd=Math.round(td*.55), sh=Math.round(th*.35);
    tbox(tileEl, tox+Math.round((tw-sw)/2), toy+Math.round((td-sd)/2), h+th, sw, sd, sh, team, .12);
    // White cross on very top
    const crossH=Math.round(sh*.80);
    const crossWrap=document.createElement('div');
    crossWrap.style.cssText=`position:absolute;left:${tox+Math.round(tw/2)-1}px;top:${toy+Math.round(td/2)-1}px;width:2px;height:2px;transform-style:preserve-3d;transform:translateZ(${h+th+sh}px);pointer-events:none`;
    const vBar=document.createElement('div');
    vBar.style.cssText=`position:absolute;left:0;bottom:0;width:3px;height:${crossH}px;transform-origin:bottom center;transform:rotateX(-90deg);background:rgba(255,255,255,.9);border-radius:1px`;
    const hBarLen=Math.round(crossH*.55);
    const hBar=document.createElement('div');
    hBar.style.cssText=`position:absolute;left:${-Math.round(hBarLen/2)+1}px;top:-1px;width:${hBarLen}px;height:3px;transform-style:preserve-3d;transform:translateZ(${Math.round(crossH*.6)}px);background:rgba(255,255,255,.9);border-radius:1px`;
    crossWrap.appendChild(vBar);crossWrap.appendChild(hBar);tileEl.appendChild(crossWrap);
    emojiZ=h+th+sh;
  }
  // ── 6: BURG — wide low wall + 2 corner towers ──
  else if(bi===6){
    const w=Math.round(sz*.78), d=Math.round(sz*.68);
    const h=Math.round(sz*.18*hm)+extra;
    const ox=Math.round((sz-w)/2), oy=Math.round((sz-d)/2);
    // Low wide wall
    const b=tbox(tileEl, ox, oy, 0, w, d, h, team);
    mainEl=b.el; mainTop=b.top;
    // 2 corner towers — much taller
    const tw=Math.round(w*.26), td=Math.round(d*.28), th=Math.round(h*2.5);
    tbox(tileEl, ox, oy, 0, tw, td, th, team, .06);
    tbox(tileEl, ox+w-tw, oy, 0, tw, td, th, team, .06);
    emojiZ=th;
  }
  // ── 7: SILO — round-looking cylinder ──
  else if(bi===7){
    // ── SILO: 3D cylinder — segments arranged as vertical walls around a circle ──
    // In our coordinate system: X=left/right, Y=top/bottom (depth), Z=up (height)
    // The "front" face technique: bottom-anchored, rotateX(-90deg) makes it vertical
    // We place many narrow "front" faces around a circle in X-Y, each standing upright in Z
    const radius=Math.round(sz*.22), h=Math.round(sz*.52*hm)+extra;
    const cx=Math.round(sz/2), cy=Math.round(sz/2);
    const segs=16;
    const segW=Math.round(2*Math.PI*radius/segs)+1;
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${cx}px;top:${cy}px;width:0;height:0;transform-style:preserve-3d;pointer-events:none`;
    for(let i=0;i<segs;i++){
      const angleDeg=(360/segs)*i;
      const angleRad=angleDeg*Math.PI/180;
      // Position on circle edge
      const px=Math.round(Math.sin(angleRad)*radius);
      const py=Math.round(-Math.cos(angleRad)*radius);
      // Shade based on angle — lighter facing top-left (isometric light direction)
      const shade=.30+.50*Math.max(0,Math.cos((angleDeg-210)*Math.PI/180));
      const seg=document.createElement('div');
      // Each segment: at circle edge, bottom-anchored, rotateX(-90deg) stands it up in Z
      seg.style.cssText=`position:absolute;left:${px-Math.round(segW/2)}px;bottom:${-py}px;width:${segW}px;height:${h}px;transform-origin:center bottom;transform:rotateZ(${angleDeg}deg) rotateX(-90deg);background:${rgba(team,shade)}`;
      el.appendChild(seg);
    }
    // Circular top — translateZ lifts it to height h
    const topSz=radius*2;
    const top=document.createElement('div');
    top.style.cssText=`position:absolute;left:${-radius}px;top:${-radius}px;width:${topSz}px;height:${topSz}px;transform:translateZ(${h}px);border-radius:50%;background:radial-gradient(circle at 38% 32%, ${rgba(team,1)} 0%, ${rgba(team,.60)} 60%, ${rgba(team,.30)} 100%);border:1px solid ${rgba(team,.40)}`;
    el.appendChild(top);
    tileEl.appendChild(el);
    mainEl=el; mainTop=top;
    emojiZ=h;
  }

  if(!mainEl) return;

  // ── Emoji ──
  const emoji=document.createElement('div');
  emoji.style.cssText=`position:absolute;left:0;top:0;width:${sz}px;height:${sz}px;transform-style:preserve-3d;transform:translateZ(${emojiZ+4}px);display:flex;align-items:center;justify-content:center;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));font-size:${cell.home?Math.round(sz*.30):Math.round(sz*.22)}px`;
  if(cell.frozen){
    const esz=cell.home?Math.round(sz*.30):Math.round(sz*.22);
    emoji.innerHTML=`<span>${team.emoji}</span><span style="font-size:${Math.round(esz*.5)}px;margin-left:-1px;filter:drop-shadow(0 0 3px rgba(147,210,255,.8))">&#x2744;&#xFE0F;</span>`;
  } else if(cell.joker){
    emoji.textContent='\u2B50';
  } else {
    emoji.textContent=team.emoji;
  }
  tileEl.appendChild(emoji);

  // ── Frozen roof ──
  if(cell.frozen && mainTop){
    mainTop.style.background='rgba(147,210,255,.55)';
    mainTop.style.border='2px solid rgba(147,210,255,.85)';
    mainTop.style.animation='frostPulse 2.5s ease-in-out infinite';
  }
  // ── Joker roof ──
  if(cell.joker && mainTop){
    mainTop.style.background='rgba(251,191,36,.60)';
    mainTop.style.border='2px solid rgba(251,191,36,.9)';
    mainTop.style.animation='jokerGlow 2s ease-in-out infinite';
  }
  // ── Stack badge ──
  if(cell.stacked>0 && !cell.joker){
    const badge=document.createElement('div');
    badge.style.cssText=`position:absolute;left:0;top:0;width:${sz}px;height:${sz}px;transform-style:preserve-3d;transform:translateZ(${emojiZ+15}px);display:flex;align-items:center;justify-content:center;pointer-events:none`;
    const sp=document.createElement('span');
    sp.style.cssText='font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(251,191,36,.95);color:#1C1917;font-weight:900;font-family:Nunito,sans-serif';
    sp.textContent='\u00D7'+(cell.stacked+1);
    badge.appendChild(sp);tileEl.appendChild(badge);
  }
  // ── Animate ──
  if(animate && mainEl){
    mainEl.style.opacity='0';mainEl.style.transition='opacity .35s ease';
    requestAnimationFrame(()=>{mainEl.style.opacity='1'});
  }
}

// Ghost team — light gray, used for empty tiles
const GHOST={color:'#9CA3AF',r:156,g:163,b:175,name:'',emoji:''};
// Pre-assign a random building type to each tile for ghost display
const ghostTypes=Array.from({length:SIZE},()=>Array.from({length:SIZE},()=>Math.floor(Math.random()*BTYPES.length)));

// ══ STATE ══
let activeTeam=0;
const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));

function seed(r,c,t,home=false){
  state[r][c]={teamIdx:t,home,frozen:false,stacked:0,joker:false,btype:home?0:Math.floor(Math.random()*BTYPES.length)};
}
const S=SIZE-1;
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);
seed(0,S,1,true);seed(0,S-1,1);seed(1,S,1);
seed(S,0,2,true);seed(S-1,0,2);seed(S,1,2);
seed(S,S,3,true);seed(S-1,S,3);seed(S,S-1,3);

// Fireflies
const ffC=document.getElementById('fireflies');
for(let i=0;i<16;i++){const el=document.createElement('div');el.className='firefly';
  el.style.left=Math.random()*100+'%';el.style.top=Math.random()*100+'%';
  el.style.setProperty('--dx',(Math.random()*60-30)+'px');el.style.setProperty('--dy',(Math.random()*60-30)+'px');
  el.style.setProperty('--dur',(4+Math.random()*6)+'s');el.style.setProperty('--del',(Math.random()*5)+'s');
  ffC.appendChild(el)}

// ══ RENDER ══
function renderTile(r,c){
  const el=document.querySelector(`#grid [data-r="${r}"][data-c="${c}"]`);
  if(!el)return;
  const cell=state[r][c];
  const ground=el.querySelector('.ground');
  Array.from(el.children).forEach(ch=>{if(!ch.classList.contains('ground'))ch.remove()});
  if(!cell){
    el.classList.remove('owned');
    ground.style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)';
    // Ghost building — gray, translucent wrapper so everything inside is affected
    const gbi=ghostTypes[r][c];
    const ghostWrap=document.createElement('div');
    ghostWrap.style.cssText=`position:absolute;left:0;top:0;width:${CELL}px;height:${CELL}px;transform-style:preserve-3d;opacity:0.22;pointer-events:none`;
    // Temporary ground placeholder so buildBuilding doesn't break
    const gGround=document.createElement('div');gGround.className='ground';
    ghostWrap.appendChild(gGround);
    buildBuilding(ghostWrap,{home:false,frozen:false,stacked:0,joker:false,btype:gbi},GHOST,CELL,gbi);
    // Remove the temp ground from ghost wrapper (we don't need it)
    gGround.remove();
    el.appendChild(ghostWrap);
    return;
  }
  el.classList.add('owned');
  const team=TEAMS[cell.teamIdx];
  ground.style.cssText=`width:100%;height:100%;border-radius:3px;background:${rgba(team,.15)};border:1px solid ${rgba(team,.35)};box-shadow:0 0 10px ${rgba(team,.20)}`;
  buildBuilding(el,cell,team,CELL,cell.btype||0);
}

// ══ BUILD DOM ══
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');el.className='tile';
  el.dataset.r=r;el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px`;
  const ground=document.createElement('div');ground.className='ground';
  el.appendChild(ground);
  el.addEventListener('click',()=>{
    if(state[r][c])return;
    const bt=Math.floor(Math.random()*BTYPES.length);
    state[r][c]={teamIdx:activeTeam,home:false,frozen:false,stacked:0,joker:false,btype:bt};
    renderTile(r,c);
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE)renderTile(nr,nc)});
    updateScores();
  });
  gridEl.appendChild(el);renderTile(r,c);
}

// ══ DRAG / ZOOM ══
{
  const scene=document.getElementById('gridscene');
  let rx=55, rz=-45, zoom=1;
  let dragging=false, startX=0, startY=0, startRx=0, startRz=0, didDrag=false;

  function applyTransform(){
    gridEl.style.setProperty('--rx',rx+'deg');
    gridEl.style.setProperty('--rz',rz+'deg');
    gridEl.style.setProperty('--zoom',zoom);
  }
  scene.addEventListener('mousedown',e=>{dragging=true;didDrag=false;startX=e.clientX;startY=e.clientY;startRx=rx;startRz=rz;scene.classList.add('dragging');e.preventDefault()});
  window.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-startX,dy=e.clientY-startY;if(Math.abs(dx)>3||Math.abs(dy)>3)didDrag=true;rz=startRz+dx*.4;rx=Math.max(15,Math.min(75,startRx-dy*.3));applyTransform()});
  window.addEventListener('mouseup',()=>{if(dragging){dragging=false;scene.classList.remove('dragging')}});
  scene.addEventListener('click',e=>{if(didDrag){e.stopPropagation();didDrag=false}},true);
  scene.addEventListener('dblclick',e=>{rx=55;rz=-45;zoom=1;applyTransform();e.preventDefault()});
  scene.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.4,Math.min(2.5,zoom+(e.deltaY>0?-.08:.08)));applyTransform()},{passive:false});
  scene.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;didDrag=false;startX=e.touches[0].clientX;startY=e.touches[0].clientY;startRx=rx;startRz=rz}},{passive:true});
  window.addEventListener('touchmove',e=>{if(!dragging||e.touches.length!==1)return;const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;if(Math.abs(dx)>3||Math.abs(dy)>3)didDrag=true;rz=startRz+dx*.4;rx=Math.max(15,Math.min(75,startRx-dy*.3));applyTransform()},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false});
  let pinchStart=0;
  scene.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchStart=Math.sqrt(dx*dx+dy*dy)}},{passive:true});
  scene.addEventListener('touchmove',e=>{if(e.touches.length===2&&pinchStart>0){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);zoom=Math.max(.4,Math.min(2.5,zoom*(dist/pinchStart)));pinchStart=dist;applyTransform();e.preventDefault()}},{passive:false});
}

// Scores
function updateScores(){
  document.getElementById('scorebar').innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}" style="--tc-bg:${rgba(t,.08)};--tc-border:${rgba(t,.45)};--tc-glow:${rgba(t,.2)};--tc-text:${t.color};--tc-count-bg:${rgba(t,.15)}" onclick="selectTeam(${i})"><span class="tp-emoji">${t.emoji}</span><span class="tp-name">${t.name}</span><span class="tp-count">${count}</span></div>`}).join('')}
window.selectTeam=i=>{activeTeam=i;updateScores()};updateScores();

// ══ GALLERY ══
const galEl=document.getElementById('typegallery');
BTYPES.forEach((bt,i)=>{
  const card=document.createElement('div');card.className='type-card';
  const stage=document.createElement('div');stage.className='tc-stage';
  const iso=document.createElement('div');iso.className='tc-iso';
  iso.style.width='66px';iso.style.height='66px';
  const ground=document.createElement('div');ground.className='ground';
  ground.style.cssText=`width:100%;height:100%;border-radius:3px;background:${rgba(TEAMS[i%4],.15)};border:1px solid ${rgba(TEAMS[i%4],.35)}`;
  iso.appendChild(ground);
  buildBuilding(iso,{home:false,frozen:false,stacked:0,joker:false,btype:i},TEAMS[i%4],66,i);
  stage.appendChild(iso);
  const label=document.createElement('div');label.className='tc-name';
  label.textContent=bt.name;
  card.appendChild(stage);card.appendChild(label);
  galEl.appendChild(card);
});

// ══ SHOWCASE ══
const T_BLUE=TEAMS[0],T_RED=TEAMS[1];
function miniStage(stage,cols,rows,sz,cells){
  stage.innerHTML='';
  const scene=document.createElement('div');
  scene.style.cssText='perspective:500px;perspective-origin:50% 35%';
  const grid=document.createElement('div');
  grid.style.cssText=`display:grid;gap:3px;grid-template-columns:repeat(${cols},${sz}px);grid-template-rows:repeat(${rows},${sz}px);transform-style:preserve-3d;transform:rotateX(55deg) rotateZ(-45deg)`;
  const map={};
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const tile=document.createElement('div');tile.className='tile';tile.style.cssText=`width:${sz}px;height:${sz}px;position:relative;transform-style:preserve-3d`;
    const ground=document.createElement('div');ground.className='ground';ground.style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)';
    tile.appendChild(ground);grid.appendChild(tile);map[`${r},${c}`]=tile;
  }
  scene.appendChild(grid);stage.appendChild(scene);
  cells.forEach(([r,c,team,home,btIdx])=>{
    const tile=map[`${r},${c}`];if(!tile)return;
    tile.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rgba(team,.15)};border:1px solid ${rgba(team,.35)};box-shadow:0 0 8px ${rgba(team,.2)}`;
    const bi=btIdx!=null?btIdx:0;
    buildBuilding(tile,{home:!!home,frozen:false,stacked:0,joker:false,btype:bi},team,sz,bi);
  });
  return{grid,map,stage,sz};
}
function fxRing(p,color,d){d=d||0;const r=document.createElement('div');r.style.cssText=`position:absolute;left:50%;top:50%;width:24px;height:24px;margin:-12px;border-radius:50%;border:2px solid ${color};pointer-events:none;z-index:20;animation:stampRing .7s ease-out ${d}s both`;p.appendChild(r);setTimeout(()=>r.remove(),900)}
function fxShatter(p,color,n){n=n||10;for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=18+Math.random()*25,el=document.createElement('div');el.style.cssText=`position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px;border-radius:1px;background:${color};pointer-events:none;z-index:20;--sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;--sr:${Math.random()*360}deg;animation:shatterOut .55s ease-out ${Math.random()*.08}s both`;p.appendChild(el);setTimeout(()=>el.remove(),700)}}

function playPlace(stage){const SZ=46,bt=Math.floor(Math.random()*BTYPES.length);const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,0],[0,1,T_BLUE,false,2],[1,0,T_BLUE,false,4]]);const target=map['1,1'];setTimeout(()=>{target.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rgba(T_BLUE,.15)};border:1px solid ${rgba(T_BLUE,.35)};box-shadow:0 0 8px ${rgba(T_BLUE,.2)}`;buildBuilding(target,{home:false,frozen:false,stacked:0,joker:false,btype:bt},T_BLUE,SZ,bt,true);fxRing(target,T_BLUE.color);fxRing(target,T_BLUE.color,.12);fxShatter(target,T_BLUE.color,6)},500);setTimeout(()=>playPlace(stage),3500)}
function playSteal(stage){const SZ=46;const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,1],[0,1,T_BLUE,false,3],[1,0,T_BLUE,false,0],[1,1,T_RED,false,6]]);const target=map['1,1'];setTimeout(()=>{fxShatter(target,T_RED.color,12);Array.from(target.children).forEach(ch=>{if(!ch.classList.contains('ground')){ch.style.transition='opacity .2s';ch.style.opacity='0';setTimeout(()=>ch.remove(),250)}});setTimeout(()=>{target.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rgba(T_BLUE,.15)};border:1px solid ${rgba(T_BLUE,.35)}`;const bt=Math.floor(Math.random()*BTYPES.length);buildBuilding(target,{home:false,frozen:false,stacked:0,joker:false,btype:bt},T_BLUE,SZ,bt,true)},300)},500);setTimeout(()=>playSteal(stage),3800)}
function playFreeze(stage){const SZ=46;const{map}=miniStage(stage,3,3,SZ,[[1,1,T_RED,false,0]]);const target=map['1,1'];setTimeout(()=>{for(let i=0;i<6;i++){const cr=document.createElement('div'),a=i*(Math.PI*2/6),d=22;cr.style.cssText=`position:absolute;left:50%;top:50%;font-size:10px;pointer-events:none;z-index:20;--sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;animation:shatterOut .7s ease-out ${i*.04}s both`;cr.textContent='\u2744';target.appendChild(cr);setTimeout(()=>cr.remove(),900)}setTimeout(()=>{target.querySelector('.ground').style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(147,210,255,.12);border:1px solid rgba(147,210,255,.4)';buildBuilding(target,{home:false,frozen:true,stacked:0,joker:false,btype:0},T_RED,SZ,0)},400)},500);setTimeout(()=>playFreeze(stage),4000)}
function playStack(stage){const SZ=46;const{map}=miniStage(stage,3,3,SZ,[[1,0,T_BLUE,false,3],[1,1,T_BLUE,false,2],[1,2,T_BLUE,false,5]]);const target=map['1,1'];let count=0;function once(){count++;fxRing(target,'#FBBF24');buildBuilding(target,{home:false,frozen:false,stacked:count,joker:false,btype:2},T_BLUE,SZ,2,true)}setTimeout(once,500);setTimeout(once,1200);setTimeout(once,1900);setTimeout(()=>playStack(stage),4200)}
function playJoker(stage){const SZ=42;const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,4],[0,1,T_BLUE,false,1],[1,0,T_BLUE,false,7]]);setTimeout(()=>{const t=map['1,1'];t.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rgba(T_BLUE,.15)};border:1px solid ${rgba(T_BLUE,.35)}`;buildBuilding(t,{home:false,frozen:false,stacked:0,joker:false,btype:0},T_BLUE,SZ,0,true)},500);setTimeout(()=>{[[0,0],[0,1],[1,0],[1,1]].forEach(([r,c],idx)=>{const tile=map[`${r},${c}`];tile.querySelector('.ground').style.cssText='width:100%;height:100%;border-radius:3px;border:1px solid rgba(251,191,36,.7);box-shadow:0 0 12px rgba(251,191,36,.4);background:rgba(251,191,36,.06)';const bts=[4,1,7,0];buildBuilding(tile,{home:false,frozen:false,stacked:0,joker:true,btype:bts[idx]},T_BLUE,SZ,bts[idx])});for(let i=0;i<8;i++){const star=document.createElement('div');star.style.cssText=`position:absolute;left:${30+Math.random()*40}%;top:40%;font-size:${10+Math.random()*8}px;pointer-events:none;z-index:20;--starY:${-30-Math.random()*30}px;animation:starFall ${.4+Math.random()*.3}s ease-out ${Math.random()*.2}s both`;star.textContent='\u2B50';stage.appendChild(star);setTimeout(()=>star.remove(),900)}},1200);setTimeout(()=>playJoker(stage),4800)}

const CARDS=[
  {icon:'\u{1F4CD}',title:'Setzen',color:'#22C55E',desc:'Leeres Feld erobern. Zufälliger Gebäudetyp.',play:playPlace},
  {icon:'\u26A1',title:'Klauen',color:'#EF4444',desc:'Gegnerisches Gebäude übernehmen.',play:playSteal},
  {icon:'\u2744\uFE0F',title:'Einfrieren',color:'#93D2FF',desc:'Feld schützen. Dach wird eisblau.',play:playFreeze},
  {icon:'\u{1F4CC}',title:'Stapeln',color:'#FBBF24',desc:'Gebäude wächst höher (3x).',play:playStack},
  {icon:'\u2B50',title:'Joker (2\u00D72)',color:'#F59E0B',desc:'Vier Felder = Quadrat. Sternenregen.',play:playJoker},
];
const scC=document.getElementById('showcases');
CARDS.forEach(card=>{
  const div=document.createElement('div');div.className='showcase-card';
  div.innerHTML=`<div class="sc-header"><span class="sc-icon">${card.icon}</span><span class="sc-title" style="color:${card.color}">${card.title}</span></div><div class="sc-desc">${card.desc}</div><div class="sc-stage"></div><button class="sc-play" style="--sc-color:${card.color};--sc-glow:${card.color}44">\u25B6 Play</button>`;
  const stageEl=div.querySelector('.sc-stage');
  function bind(){const btn=div.querySelector('.sc-play');btn.textContent='\u25B6 Play';btn.onclick=()=>{stageEl.innerHTML='';card.play(stageEl);btn.textContent='\u23F9 Stop';btn.onclick=()=>{stageEl.innerHTML='';bind()}}}
  bind();scC.appendChild(div);
});
</script>
