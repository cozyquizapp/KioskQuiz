<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 40% 30%, #0d1020 0%, #050608 100%);
  min-height: 100vh;
  color: #f1f5f9;
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 40px;
}

h2 {
  font-size: 13px;
  color: #1e293b;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-weight: 700;
}

/* ── ISO SCENE ── */
.iso-scene {
  perspective: 1400px;
  perspective-origin: 50% 15%;
}

.iso-grid {
  transform: rotateX(52deg) rotateZ(-45deg);
  transform-style: preserve-3d;
  display: grid;
  gap: 3px;
  position: relative;
}

/* ── CELL ── */
.cell {
  position: relative;
  transform-style: preserve-3d;
}

/* Ground tile top */
.tile-top {
  position: absolute;
  inset: 0;
  z-index: 2;
  border-radius: 1px;
}

/* Ground front */
.tile-front {
  position: absolute;
  top: 100%; left: 0; right: 0;
  transform-origin: top center;
  transform: rotateX(-90deg);
  z-index: 1;
  border-radius: 0 0 1px 1px;
}

/* Ground right */
.tile-right {
  position: absolute;
  top: 0; bottom: 0; left: 100%;
  transform-origin: left center;
  transform: rotateY(90deg);
  z-index: 1;
  border-radius: 0 1px 1px 0;
}

/* ── BUILDING WRAPPER ── */
.building {
  position: absolute;
  transform-style: preserve-3d;
  z-index: 20;
  pointer-events: none;
}

/* Building faces */
.bld-top, .bld-front, .bld-right {
  position: absolute;
}

/* ── GROW ANIMATION ── */
@keyframes growUp {
  0%   { transform: scaleZ(0) translateZ(0); opacity: 0; }
  30%  { opacity: 1; }
  70%  { transform: scaleZ(1.08) translateZ(0); }
  100% { transform: scaleZ(1) translateZ(0); opacity: 1; }
}

@keyframes glowPulse {
  0%,100% { opacity: 0.7; }
  50%      { opacity: 1; }
}

/* ── SCORE BAR ── */
.score-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.team-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 10px;
  background: #0a0c14;
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
  transition: transform 0.15s ease;
  user-select: none;
}
.team-pill:hover { transform: scale(1.04); }
.team-pill:active { transform: scale(0.97); }
.tp-dot { width: 10px; height: 10px; border-radius: 50%; }
.tp-name { font-size: 13px; font-weight: 700; }
.tp-count { font-size: 11px; color: #334155; font-weight: 600; }

.hint {
  font-size: 12px;
  color: #1e293b;
  text-align: center;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<h2>Quarter Quiz — City Grid Demo</h2>
<div class="iso-scene"><div class="iso-grid" id="grid"></div></div>
<div class="score-bar" id="scorebar"></div>
<div class="hint">Klicke auf ein leeres Feld um es zu besetzen · Klicke auf ein Team um es auszuwählen</div>

<script>
// ── CONFIG ──
const SIZE = 6;
const CELL = 70;
const GROUND_DEPTH = 10;

// Building shapes: [widthRatio, depthRatio, heightPx, windowRows, windowCols]
const SHAPES = [
  { w: 0.45, d: 0.45, h: 32, wr: 2, wc: 2 }, // small cube
  { w: 0.35, d: 0.35, h: 52, wr: 3, wc: 2 }, // tall tower
  { w: 0.55, d: 0.38, h: 24, wr: 2, wc: 3 }, // wide low
  { w: 0.40, d: 0.40, h: 44, wr: 3, wc: 2 }, // medium
  { w: 0.30, d: 0.30, h: 60, wr: 4, wc: 2 }, // skyscraper
];

const TEAMS = [
  { color: '#3b82f6', name: 'Die Clique',   wappen: '⚓' },
  { color: '#ef4444', name: 'Rote Karte',   wappen: '🔺' },
  { color: '#22c55e', name: 'Grüne Hölle',  wappen: '🌿' },
  { color: '#f97316', name: 'Oranje',       wappen: '⚡' },
  { color: '#8b5cf6', name: 'Nachtschicht', wappen: '☽' },
  { color: '#0d9488', name: 'Tiefsee',      wappen: '🐋' },
];

// Grid state: null = empty, { teamIdx, shapeIdx, home }
const state = Array.from({length:SIZE}, (_,r) =>
  Array.from({length:SIZE}, (_,c) => null)
);

let activeTeam = 0;

// Seed some initial cells
function seed(r,c,t,home=false) {
  const si = Math.floor(Math.random() * SHAPES.length);
  state[r][c] = { teamIdx: t, shapeIdx: si, home };
}
seed(0,0,0,true); seed(0,1,0); seed(1,0,0); seed(1,1,0);
seed(0,4,1); seed(0,5,1,true); seed(1,5,1); seed(1,4,1);
seed(5,0,2,true); seed(5,1,2); seed(4,0,2);
seed(5,5,3,true); seed(5,4,3); seed(4,5,3);

// ── HELPERS ──
function hexRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgba(hex, a) {
  const [r,g,b] = hexRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function rnd(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ── RENDER CELL ──
function renderCell(r, c) {
  const cell = state[r][c];
  const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if (!el) return;

  // Clear previous building
  el.querySelectorAll('.building,.b-icon').forEach(e => e.remove());
  el.classList.remove('owned');

  const tileTop   = el.querySelector('.tile-top');
  const tileFront = el.querySelector('.tile-front');
  const tileRight = el.querySelector('.tile-right');

  if (!cell) {
    // Empty — grey ghost buildings
    tileTop.style.background   = '#0c0e18';
    tileTop.style.border       = '1px solid #151825';
    tileFront.style.background = '#090b14';
    tileRight.style.background = '#0a0c16';

    // Random ghost building
    const si = (r * SIZE + c) % SHAPES.length;
    const s  = SHAPES[si];
    renderBuilding(el, s, null, true);
  } else {
    const team = TEAMS[cell.teamIdx];
    const s    = SHAPES[cell.shapeIdx];
    const isHome = cell.home;

    tileTop.style.background   = rgba(team.color, isHome ? 0.14 : 0.08);
    tileTop.style.border       = `1px solid ${rgba(team.color, 0.35)}`;
    tileTop.style.boxShadow    = `inset 0 0 ${isHome?20:10}px ${rgba(team.color, isHome?0.3:0.15)}`;
    tileFront.style.background = rgba(team.color, 0.04);
    tileFront.style.borderLeft = `1px solid ${rgba(team.color,0.12)}`;
    tileFront.style.borderBottom = `1px solid ${rgba(team.color,0.12)}`;
    tileRight.style.background = rgba(team.color, 0.03);

    renderBuilding(el, isHome ? {...s, h: s.h*1.5, w: s.w*1.1, d: s.d*1.1} : s, team, false, cell.new);
    cell.new = false;

    // Wappen on home
    if (isHome) {
      const icon = document.createElement('div');
      icon.className = 'b-icon';
      icon.style.cssText = `position:absolute;bottom:4px;right:5px;font-size:11px;z-index:30;filter:drop-shadow(0 0 6px ${team.color});`;
      icon.textContent = team.wappen;
      el.appendChild(icon);
    }
  }
}

function renderBuilding(el, s, team, ghost, animate) {
  const bw = CELL * s.w;
  const bd = CELL * s.d;
  const bh = s.h;
  const bx = (CELL - bw) / 2;
  const by = (CELL - bd) / 2;

  const color    = team ? team.color : '#2a3048';
  const borderA  = ghost ? 0.18 : 0.85;
  const bgA      = ghost ? 0.0  : 0.07;
  const glowA    = ghost ? 0.0  : 0.5;
  const glowSize = ghost ? 0    : 14;

  const bld = document.createElement('div');
  bld.className = 'building';
  bld.style.transformOrigin = 'bottom center';
  if (animate) {
    bld.style.animation = 'growUp 0.9s cubic-bezier(0.34,1.4,0.64,1) both';
  }

  // Top face
  const top = document.createElement('div');
  top.className = 'bld-top';
  top.style.cssText = `
    left:${bx}px; top:${by}px;
    width:${bw}px; height:${bd}px;
    border:${ghost?'1px':'1.5px'} solid ${rgba(color, borderA)};
    background:${rgba(color, bgA)};
    ${!ghost ? `box-shadow: 0 0 ${glowSize}px ${rgba(color, glowA)}, inset 0 0 8px ${rgba(color,0.12)};` : ''}
    border-radius:1px;
    z-index:3;
  `;

  // Front face
  const front = document.createElement('div');
  front.className = 'bld-front';
  front.style.cssText = `
    left:${bx}px; top:${by+bd}px;
    width:${bw}px; height:${bh}px;
    border-left:${ghost?'1px':'1.5px'} solid ${rgba(color, borderA)};
    border-right:${ghost?'1px':'1.5px'} solid ${rgba(color, borderA)};
    border-bottom:${ghost?'1px':'1.5px'} solid ${rgba(color, borderA*0.7)};
    background:linear-gradient(to bottom, ${rgba(color, bgA*1.5)}, ${rgba(color, bgA*0.5)});
    ${!ghost ? `box-shadow: 0 0 10px ${rgba(color, glowA*0.4)};` : ''}
    transform-origin:top center;
    transform:rotateX(-90deg);
    overflow:hidden;
    display:flex; flex-direction:column; justify-content:space-evenly; align-items:center;
    padding:3px 4px; gap:2px;
  `;

  // Windows on front
  if (!ghost) {
    for (let wi=0; wi<s.wr; wi++) {
      const row = document.createElement('div');
      row.style.cssText = `display:flex;gap:3px;`;
      for (let wj=0; wj<s.wc; wj++) {
        const win = document.createElement('div');
        win.style.cssText = `
          width:4px;height:3px;border-radius:1px;
          background:${color};
          box-shadow:0 0 5px ${rgba(color,0.8)};
          animation:glowPulse ${2+Math.random()*2}s ease-in-out ${Math.random()*2}s infinite;
          flex-shrink:0;
        `;
        row.appendChild(win);
      }
      front.appendChild(row);
    }
  }

  // Right face
  const right = document.createElement('div');
  right.className = 'bld-right';
  right.style.cssText = `
    left:${bx+bw}px; top:${by}px;
    width:${bh}px; height:${bd}px;
    border-top:${ghost?'1px':'1.5px'} solid ${rgba(color, borderA*0.6)};
    border-right:${ghost?'1px':'1.5px'} solid ${rgba(color, borderA*0.6)};
    border-bottom:${ghost?'1px':'1.5px'} solid ${rgba(color, borderA*0.4)};
    background:${rgba(color, bgA*0.5)};
    transform-origin:left center;
    transform:rotateY(90deg);
    border-radius:0 1px 1px 0;
  `;

  bld.appendChild(top);
  bld.appendChild(front);
  bld.appendChild(right);
  el.appendChild(bld);
}

// ── BUILD DOM ──
const gridEl = document.getElementById('grid');
gridEl.style.gridTemplateColumns = `repeat(${SIZE}, ${CELL}px)`;
gridEl.style.gridTemplateRows    = `repeat(${SIZE}, ${CELL}px)`;

for (let r=0; r<SIZE; r++) {
  for (let c=0; c<SIZE; c++) {
    const el = document.createElement('div');
    el.className = 'cell';
    el.dataset.r = r;
    el.dataset.c = c;
    el.style.width  = CELL + 'px';
    el.style.height = CELL + 'px';

    const tileTop   = document.createElement('div'); tileTop.className   = 'tile-top';
    const tileFront = document.createElement('div'); tileFront.className = 'tile-front';
    const tileRight = document.createElement('div'); tileRight.className = 'tile-right';

    tileFront.style.height = GROUND_DEPTH + 'px';
    tileRight.style.width  = GROUND_DEPTH + 'px';

    el.appendChild(tileTop);
    el.appendChild(tileFront);
    el.appendChild(tileRight);

    el.addEventListener('click', () => {
      if (state[r][c]) return; // already owned
      const si = Math.floor(Math.random() * SHAPES.length);
      state[r][c] = { teamIdx: activeTeam, shapeIdx: si, home: false, new: true };
      renderCell(r, c);
      updateScores();
    });

    gridEl.appendChild(el);
    renderCell(r, c);
  }
}

// ── SCORE BAR ──
function updateScores() {
  const bar = document.getElementById('scorebar');
  bar.innerHTML = TEAMS.map((t,i) => {
    const count = state.flat().filter(c => c?.teamIdx === i).length;
    const active = i === activeTeam;
    return `
      <div class="team-pill" onclick="selectTeam(${i})" style="
        border-color:${active ? rgba(t.color,0.5) : 'rgba(255,255,255,0.06)'};
        box-shadow:${active ? `0 0 16px ${rgba(t.color,0.2)}` : 'none'};
      ">
        <div class="tp-dot" style="background:${t.color};box-shadow:0 0 6px ${rgba(t.color,0.6)};"></div>
        <div>
          <div class="tp-name" style="color:${active?t.color:'#cbd5e1'}">${t.wappen} ${t.name}</div>
          <div class="tp-count">${count} Felder${active?' · aktiv':''}</div>
        </div>
      </div>`;
  }).join('');
}

function selectTeam(i) {
  activeTeam = i;
  updateScores();
}

updateScores();
</script>
</body>
</html>
