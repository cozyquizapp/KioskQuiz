<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at 50% 35%, #0c1018 0%, #03040a 100%);
  min-height: 100vh; color: #f1f5f9;
  font-family: 'Space Grotesk', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 36px; padding: 40px; overflow: hidden;
}
h2 { font-size:11px; color:#161d2e; text-transform:uppercase; letter-spacing:.2em; font-weight:700; }

.board-wrap { position:relative; padding:36px 40px 56px; }
.board-wrap::before {
  content:''; position:absolute; inset:0; border-radius:24px;
  background:radial-gradient(ellipse at 50% 40%, rgba(255,255,255,.026) 0%, transparent 68%);
  pointer-events:none;
}
.board-wrap::after {
  content:''; position:absolute; inset:0; border-radius:24px;
  background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size:20px 20px; pointer-events:none;
  mask-image:radial-gradient(ellipse at 50% 45%, black 28%, transparent 72%);
}

.iso-scene { perspective:1400px; perspective-origin:50% 10%; position:relative; z-index:2; }
.iso-grid {
  transform: rotateX(52deg) rotateZ(-45deg);
  transform-style: preserve-3d;
  display: grid; gap: 3px;
  position: relative;
}

/* ── CELL ── */
.cell {
  position: relative; transform-style: preserve-3d;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1);
}
.cell.owned  { cursor: default; }
.cell.empty:hover { transform: translateZ(5px); }
.cell.owned:hover { transform: translateZ(3px); }

/* Tile ground */
.tile-top {
  position: absolute; inset: 0; z-index: 2; border-radius: 2px;
  box-shadow: inset 0 4px 8px rgba(255,255,255,.04), inset 0 -5px 10px rgba(0,0,0,.5);
  transition: all .28s ease;
}
.tile-top::before {
  content:''; position:absolute; inset:0; border-radius:2px;
  border-top: 1px solid rgba(255,255,255,.15);
  border-left: 1px solid rgba(255,255,255,.08);
  pointer-events:none; z-index:3;
}
.tile-top::after {
  content:''; position:absolute; inset:0; border-radius:2px;
  background: radial-gradient(circle at 28% 26%, rgba(0,0,0,.22), transparent 60%);
  pointer-events:none; z-index:1;
}
.tile-front {
  position:absolute; top:100%; left:0; right:0;
  transform-origin:top center; transform:rotateX(-90deg); z-index:1;
  transition:all .28s ease;
}
.tile-right {
  position:absolute; top:0; bottom:0; left:100%;
  transform-origin:left center; transform:rotateY(90deg); z-index:1;
  transition:all .28s ease;
}

/* ── BUILDING — pure CSS 3D block, no rotateX tricks ── */
/* We render buildings as stacked absolute divs that simulate 3D via
   translateZ inside the already-transformed grid context              */
.building {
  position: absolute;
  transform-style: preserve-3d;
  pointer-events: none;
  z-index: 10;
}
/* The "extruded" block: top-face + two visible side faces */
.b-body {
  position: absolute;
  transform-style: preserve-3d;
}
/* Top face of building */
.b-face-top {
  position: absolute; border-radius: 2px;
}
/* Front face — translateZ trick: push down by height amount */
.b-face-front {
  position: absolute; border-radius: 0 0 2px 2px;
  transform-origin: top center;
}
/* Right face */
.b-face-right {
  position: absolute; border-radius: 0 2px 2px 0;
  transform-origin: left center;
}

/* Territory outline SVG overlay */
.territory-svg {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 50;
  overflow: visible;
}

/* ── ANIMATIONS ── */
@keyframes growUp {
  0%   { opacity: 0; transform: scaleZ(.02) translateZ(0); }
  40%  { opacity: 1; }
  80%  { transform: scaleZ(1.06) translateZ(0); }
  100% { transform: scaleZ(1) translateZ(0); opacity: 1; }
}
@keyframes claimPop {
  0%   { transform: translateZ(0); }
  30%  { transform: translateZ(14px); }
  65%  { transform: translateZ(-2px); }
  100% { transform: translateZ(0); }
}
@keyframes dominantPulse {
  0%,100% { box-shadow: var(--gs-base); }
  50%      { box-shadow: var(--gs-strong); }
}
@keyframes winFlicker {
  0%,100%{opacity:1;} 44%{opacity:1;} 47%{opacity:.2;} 50%{opacity:1;} 79%{opacity:.65;}
}

/* Score bar */
.score-bar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.team-pill {
  display:flex; align-items:center; gap:9px; padding:8px 16px; border-radius:10px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05);
  cursor:pointer; transition:all .15s ease; user-select:none;
}
.team-pill:hover { transform:translateY(-2px); }
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 18px var(--tc-glow); }
.tp-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.tp-name { font-size:13px; font-weight:700; }
.tp-count{ font-size:11px; color:#253040; font-weight:600; }
.hint    { font-size:11px; color:#111822; letter-spacing:.05em; }
</style>
</head>
<body>
<h2>Quarter Quiz — City Grid</h2>
<div class="board-wrap">
  <div class="iso-scene">
    <div class="iso-grid" id="grid"></div>
  </div>
</div>
<div class="score-bar" id="scorebar"></div>
<div class="hint">Team auswählen → leeres Feld anklicken</div>

<script>
const SIZE=6, CELL=72, GAP=3, GD=10;

const TEAMS=[
  {color:'#5aadff',r:90, g:173,b:255,name:'Die Clique',  wappen:'⚓',inten:.75},
  {color:'#ff5050',r:255,g:80, b:80, name:'Rote Karte',  wappen:'🔺',inten:1.0},
  {color:'#3ddc84',r:61, g:220,b:132,name:'Grüne Hölle', wappen:'🌿',inten:.82},
  {color:'#ffaa3c',r:255,g:170,b:60, name:'Oranje',      wappen:'⚡',inten:.9},
  {color:'#c084fc',r:192,g:132,b:252,name:'Nachtschicht',wappen:'☽', inten:.78},
  {color:'#2dd4bf',r:45, g:212,b:191,name:'Tiefsee',     wappen:'🐋',inten:.8},
];

// Building shapes: [widthRatio, depthRatio, heightPx]
// Height = how tall the building extrudes ABOVE the tile (in CSS px, before iso transform)
const SHAPES={
  0:[[.28,.28,38],[.24,.24,52],[.32,.32,44]],  // Blue: slim towers
  1:[[.58,.42,16],[.54,.40,20],[.62,.44,14]],  // Red: wide blocks
  2:[[.46,.46,26],[.50,.42,22],[.40,.40,32]],  // Green: organic medium
  3:[[.36,.52,30],[.28,.56,36],[.44,.44,24]],  // Orange: asymmetric
  4:[[.20,.20,52],[.18,.18,60],[.24,.24,44]],  // Purple: spires
  5:[[.62,.34,14],[.58,.36,18],[.66,.32,12]],  // Teal: docks
};
const GHOST_H=[[.38,.38,20],[.26,.26,36],[.52,.36,16],[.30,.30,30],[.44,.44,18],[.22,.22,42]];

const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
let activeTeam=0;

function seed(r,c,t,home=false){
  state[r][c]={teamIdx:t,si:Math.floor(Math.random()*SHAPES[t].length),home,new:false};
}
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);
seed(0,5,1,true);seed(0,4,1);seed(1,5,1);seed(1,4,1);
seed(5,0,2,true);seed(4,0,2);seed(5,1,2);seed(4,1,2);
seed(5,5,3,true);seed(4,5,3);seed(5,4,3);

function rc(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjN(r,c,ti){return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;}
function isEdge(r,c,dr,dc){return!same(r+dr,c+dc,state[r][c]?.teamIdx);}

// ── RENDER CELL ──
function renderCell(r,c,animate=false){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  el.querySelectorAll('.building,.b-icon').forEach(e=>e.remove());
  el.className='cell '+(cell?'owned':'empty');

  const tTop=el.querySelector('.tile-top');
  const tFront=el.querySelector('.tile-front');
  const tRight=el.querySelector('.tile-right');

  if(!cell){
    tTop.style.cssText='position:absolute;inset:0;z-index:2;border-radius:2px;background:rgba(255,255,255,.024);border:1px solid rgba(255,255,255,.07);box-shadow:inset 0 4px 8px rgba(255,255,255,.04),inset 0 -5px 10px rgba(0,0,0,.5);transition:all .2s ease;';
    tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:${GD}px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:#050710;border:1px solid rgba(255,255,255,.04);border-top:none;`;
    tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:${GD}px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:#040610;border:1px solid rgba(255,255,255,.03);border-left:none;`;
    drawBuilding(el,GHOST_H[(r*SIZE+c)%GHOST_H.length],null,false,false);
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const n=adjN(r,c,cell.teamIdx);
  const isHome=cell.home;
  const inten=team.inten;
  const eTop=isEdge(r,c,-1,0),eBot=isEdge(r,c,1,0),eL=isEdge(r,c,0,-1),eR=isEdge(r,c,0,1);
  const interior=!eTop&&!eBot&&!eL&&!eR&&!isHome;

  const glowBase = isHome
    ? `inset 0 4px 8px rgba(255,255,255,.05),inset 0 -5px 10px rgba(0,0,0,.5),0 0 20px ${rc(team,.75*inten)},0 0 40px ${rc(team,.32*inten)}`
    : interior
      ? `inset 0 2px 4px rgba(255,255,255,.02),inset 0 -3px 8px rgba(0,0,0,.55),inset 0 0 8px ${rc(team,.15*inten)}`
      : n===0
        ? `inset 0 4px 8px rgba(255,255,255,.04),inset 0 -5px 10px rgba(0,0,0,.48),0 0 10px ${rc(team,.5*inten)}`
        : `inset 0 4px 8px rgba(255,255,255,.05),inset 0 -5px 10px rgba(0,0,0,.5),0 0 16px ${rc(team,.7*inten)},0 0 32px ${rc(team,.28*inten)}`;

  const glowStrong=`inset 0 4px 8px rgba(255,255,255,.05),inset 0 -5px 10px rgba(0,0,0,.5),0 0 26px ${rc(team,.9*inten)},0 0 52px ${rc(team,.42*inten)}`;

  // Interior tiles: very dark/muted — makes the gap between them nearly invisible
  const tileBg = isHome ? rc(team,.18) : interior ? rc(team,.07) : rc(team,.07);
  const tileBorder = isHome
    ? `2px solid ${rc(team,.65)}`
    : interior
      ? `1px solid ${rc(team,.04)}` // nearly invisible border for interior
      : `1px solid ${rc(team,.4*inten)}`;

  tTop.style.cssText=`
    position:absolute;inset:0;z-index:2;border-radius:2px;
    background:${tileBg};
    border:${tileBorder};
    --gs-base:${glowBase};--gs-strong:${glowStrong};
    box-shadow:${glowBase};
    transform:translateZ(1px);
    transition:box-shadow .35s ease,border-color .35s ease;
    ${(n>=3||isHome)?`animation:dominantPulse ${isHome?2.4:3.2}s ease-in-out infinite;`:''}
  `;
  tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:${GD}px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:${rc(team,.06)};border-left:1px solid ${rc(team,.18)};border-right:1px solid ${rc(team,.12)};border-bottom:1px solid ${rc(team,.1)};`;
  tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:${GD}px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:${rc(team,.04)};border-top:1px solid ${rc(team,.12)};border-right:1px solid ${rc(team,.1)};border-bottom:1px solid ${rc(team,.07)};`;

  const shapes=SHAPES[cell.teamIdx];
  const sh=shapes[cell.si%shapes.length];
  const bs=isHome?[sh[0]*1.1,sh[1]*1.1,Math.round(sh[2]*1.7)]:sh;
  drawBuilding(el,bs,team,animate||cell.new,interior);
  if(cell.new) cell.new=false;

  if(isHome||cell.joker||cell.stuck){
    const icon=document.createElement('div');
    icon.className='b-icon';
    icon.style.cssText=`position:absolute;bottom:4px;right:5px;font-size:10px;z-index:30;filter:drop-shadow(0 0 6px ${team.color});line-height:1;`;
    icon.textContent=cell.stuck?'📌':cell.joker?'⭐':team.wappen;
    el.appendChild(icon);
  }
  if(animate){
    el.style.animation='claimPop .72s cubic-bezier(.34,1.56,.64,1) both';
    setTimeout(()=>el.style.animation='',800);
  }
}

// ── DRAW BUILDING ──
// Each building is a single CSS div using translateZ (works in the iso transform context).
// The top face floats at height H. To visually "connect" it to the tile:
//   - A vertical shadow div (no 3D) fades from team color at top to transparent at ground
//   - This simulates the wall in a way that's always correct regardless of view angle
// This approach works because the shadow div is in local 2D and just reads as a glow column.

function drawBuilding(el,sh,team,animate,interior){
  const [wr,dr,bh]=sh;
  const bw=Math.round(CELL*wr), bd=Math.round(CELL*dr);
  const bx=Math.round((CELL-bw)/2), by=Math.round((CELL-bd)/2);
  const ghost=!team;
  const cr=team?team.r:30, cg=team?team.g:40, cb=team?team.b:64;
  const inten=team?(team.inten*(interior?.5:1)):1;
  const dimH=interior?Math.round(bh*.7):bh;

  const bld=document.createElement('div');
  bld.className='building';
  bld.style.cssText=`position:absolute;inset:0;pointer-events:none;z-index:${10+dimH};transform-style:preserve-3d;`;
  if(animate) bld.style.animation='growUp .85s cubic-bezier(.34,1.5,.64,1) both';

  // ── GLOW PILLAR (2D, no 3D — creates visual connection between top face and tile) ──
  // Slightly wider/taller than top face; radiates the team color downward
  if(!ghost && dimH>6){
    const pillar=document.createElement('div');
    const pw=Math.round(bw*1.3), pd=Math.round(bd*1.3);
    const px=Math.round((CELL-pw)/2), py=Math.round((CELL-pd)/2);
    pillar.style.cssText=`
      position:absolute;
      left:${px}px;top:${py}px;
      width:${pw}px;height:${pd}px;
      background:radial-gradient(ellipse at 50% 50%,
        rgba(${cr},${cg},${cb},${.35*inten}) 0%,
        rgba(${cr},${cg},${cb},${.15*inten}) 40%,
        transparent 70%);
      border-radius:4px;
      transform:translateZ(${dimH*0.4}px);
      z-index:${8+dimH};
      pointer-events:none;
      filter:blur(${Math.round(dimH*0.18)}px);
    `;
    bld.appendChild(pillar);
  }

  // ── TOP FACE (translateZ = building height) ──
  const top=document.createElement('div');
  top.style.cssText=`
    position:absolute;
    left:${bx}px;top:${by}px;
    width:${bw}px;height:${bd}px;
    border-radius:${team?'3px':'1px'};
    transform:translateZ(${dimH}px);
    z-index:${20+dimH};
    ${ghost?`
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 0 6px rgba(255,255,255,.06);
    `:`
      background:linear-gradient(135deg,
        rgba(255,255,255,${.18*inten}) 0%,
        rgba(${cr},${cg},${cb},${.12*inten}) 45%,
        rgba(0,0,0,.28) 100%);
      border-top:  2px solid rgba(255,255,255,${.6*inten});
      border-left: 1.5px solid rgba(255,255,255,${.32*inten});
      border-right:1px solid rgba(0,0,0,.5);
      border-bottom:1px solid rgba(0,0,0,.55);
      box-shadow:
        0 0 ${Math.round(14*inten)}px rgba(${cr},${cg},${cb},${.7*inten}),
        0 0 ${Math.round(28*inten)}px rgba(${cr},${cg},${cb},${.3*inten}),
        inset 0 0 8px rgba(255,255,255,${.08*inten});
    `}
  `;
  if(!ghost){
    const fill=document.createElement('div');
    fill.style.cssText=`position:absolute;inset:0;border-radius:inherit;pointer-events:none;
      background:radial-gradient(circle at 30% 30%,rgba(${cr},${cg},${cb},${.25*inten}),transparent 65%);`;
    top.appendChild(fill);
    // Flicker windows — tiny dots on the face surface
    const winCount=Math.max(2,Math.round(bw/10));
    const winRows=Math.max(1,Math.round(bd/14));
    for(let wi=0;wi<winRows;wi++){
      for(let wj=0;wj<winCount;wj++){
        const w=document.createElement('div');
        const wx=Math.round(bw*(wj+0.5)/winCount)-1;
        const wy=Math.round(bd*(wi+0.5)/winRows)-1;
        w.style.cssText=`position:absolute;left:${wx}px;top:${wy}px;
          width:2px;height:2px;border-radius:1px;
          background:rgba(${cr},${cg},${cb},${.95*inten});
          box-shadow:0 0 3px rgba(${cr},${cg},${cb},.9);
          animation:winFlicker ${2.2+Math.random()*2.5}s ease-in-out ${(wi*winCount+wj)*.22+Math.random()*.5}s infinite;`;
        top.appendChild(w);
      }
    }
  }

  bld.appendChild(top);
  el.appendChild(bld);
}

// ── TERRITORY OUTLINE SVG ──
function updateTerritoryOutlines(){
  document.querySelectorAll('.territory-svg').forEach(s=>s.remove());

  const totalW=(CELL+GAP)*SIZE-GAP;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.className='territory-svg';
  svg.setAttribute('width',totalW);
  svg.setAttribute('height',totalW);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:50;overflow:visible;';

  // For each team, trace the outer boundary
  TEAMS.forEach((team,ti)=>{
    const cells=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(state[r][c]?.teamIdx===ti) cells.push([r,c]);
    if(!cells.length) return;

    // Draw border segments on each outer edge
    const segs=[];
    cells.forEach(([r,c])=>{
      const x=c*(CELL+GAP), y=r*(CELL+GAP);
      const pad=2;
      // Top edge
      if(!same(r-1,c,ti)) segs.push([x-pad,y-pad,x+CELL+pad,y-pad]);
      // Bottom edge
      if(!same(r+1,c,ti)) segs.push([x-pad,y+CELL+pad,x+CELL+pad,y+CELL+pad]);
      // Left edge
      if(!same(r,c-1,ti)) segs.push([x-pad,y-pad,x-pad,y+CELL+pad]);
      // Right edge
      if(!same(r,c+1,ti)) segs.push([x+CELL+pad,y-pad,x+CELL+pad,y+CELL+pad]);
    });

    segs.forEach(([x1,y1,x2,y2])=>{
      // Glow layer
      const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
      glow.setAttribute('x1',x1);glow.setAttribute('y1',y1);
      glow.setAttribute('x2',x2);glow.setAttribute('y2',y2);
      glow.setAttribute('stroke',team.color);
      glow.setAttribute('stroke-width','6');
      glow.setAttribute('stroke-opacity',String(.35*team.inten));
      glow.setAttribute('stroke-linecap','round');
      svg.appendChild(glow);
      // Sharp line
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1);line.setAttribute('y1',y1);
      line.setAttribute('x2',x2);line.setAttribute('y2',y2);
      line.setAttribute('stroke',team.color);
      line.setAttribute('stroke-width','2');
      line.setAttribute('stroke-opacity',String(.9*team.inten));
      line.setAttribute('stroke-linecap','round');
      svg.appendChild(line);
    });
  });

  document.querySelector('.iso-grid').appendChild(svg);
}

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++){
  for(let c=0;c<SIZE;c++){
    const el=document.createElement('div');
    el.className='cell';el.dataset.r=r;el.dataset.c=c;
    el.style.cssText=`width:${CELL}px;height:${CELL}px;`;
    ['tile-top','tile-front','tile-right'].forEach(cn=>{
      const d=document.createElement('div');d.className=cn;
      if(cn==='tile-front') d.style.height=GD+'px';
      if(cn==='tile-right') d.style.width=GD+'px';
      el.appendChild(d);
    });
    el.addEventListener('mouseenter',()=>{
      if(state[r][c]) return;
      const t=TEAMS[activeTeam];
      el.querySelector('.tile-top').style.background=`rgba(${t.r},${t.g},${t.b},.07)`;
      el.querySelector('.tile-top').style.borderColor=`rgba(${t.r},${t.g},${t.b},.38)`;
    });
    el.addEventListener('mouseleave',()=>{
      if(state[r][c]) return;
      el.querySelector('.tile-top').style.background='rgba(255,255,255,.024)';
      el.querySelector('.tile-top').style.borderColor='rgba(255,255,255,.07)';
    });
    el.addEventListener('click',()=>{
      if(state[r][c]) return;
      state[r][c]={teamIdx:activeTeam,si:Math.floor(Math.random()*SHAPES[activeTeam].length),home:false,new:true};
      renderCell(r,c,true);
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]) renderCell(nr,nc,false);
      });
      updateTerritoryOutlines();
      updateScores();
    });
    gridEl.appendChild(el);
    renderCell(r,c);
  }
}
updateTerritoryOutlines();

function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return `<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.07);--tc-border:rgba(${t.r},${t.g},${t.b},.35);--tc-glow:rgba(${t.r},${t.g},${t.b},.15);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 8px rgba(${t.r},${t.g},${t.b},.6);"></div>
      <div>
        <div class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.wappen} ${t.name}</div>
        <div class="tp-count">${count} Felder${active?' · aktiv':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
</script>
</body>
