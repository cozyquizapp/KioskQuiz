<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080a0f;
  color: #f1f5f9;
  font-family: 'Space Grotesk', sans-serif;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 80px;
}

.label {
  font-size: 11px;
  color: #1e293b;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 700;
  margin-bottom: 24px;
}

/* ═══════════════════════════════════════
   ISOMETRIC CITY GRID
═══════════════════════════════════════ */

.iso-scene {
  perspective: 1200px;
  perspective-origin: 50% 20%;
  padding: 60px 0 100px;
  display: flex;
  justify-content: center;
}

.iso-grid {
  transform: rotateX(55deg) rotateZ(-45deg);
  transform-style: preserve-3d;
  display: grid;
  gap: 4px;
  position: relative;
}

/* ── BASE BLOCK (empty) ── */
.b {
  position: relative;
  transform-style: preserve-3d;
}

/* Top face */
.b-top {
  position: absolute;
  inset: 0;
  background: #0d1117;
  border: 1px solid #1a1f2e;
  border-radius: 2px;
  z-index: 2;
}

/* Front face */
.b-front {
  position: absolute;
  left: 0; right: -1px;
  top: 100%;
  background: #090c12;
  border: 1px solid #141824;
  border-top: none;
  transform-origin: top;
  transform: rotateX(-90deg);
  z-index: 1;
}

/* Right face */
.b-right {
  position: absolute;
  top: 0; bottom: -1px;
  left: 100%;
  background: #0b0e16;
  border: 1px solid #141824;
  border-left: none;
  transform-origin: left;
  transform: rotateY(90deg);
  z-index: 1;
}

/* ── BUILDING (owned) ── */
.b-building {
  position: absolute;
  transform-style: preserve-3d;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.b.owned .b-building { opacity: 1; }

/* Building top */
.bb-top {
  position: absolute;
  border-radius: 2px;
  background: transparent;
  z-index: 3;
}

/* Building front */
.bb-front {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: transparent;
  transform-origin: top;
  transform: rotateX(-90deg);
  z-index: 2;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  align-items: center;
  gap: 2px;
  padding: 2px;
  overflow: hidden;
}

/* Building right */
.bb-right {
  position: absolute;
  top: 0; bottom: 0;
  left: 100%;
  background: transparent;
  transform-origin: left;
  transform: rotateY(90deg);
  z-index: 2;
}

/* Window row */
.win-row {
  display: flex;
  gap: 2px;
  width: 100%;
  justify-content: center;
}
.win {
  border-radius: 1px;
  background: rgba(255,255,255,0.9);
  animation: winFlicker 4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes winFlicker {
  0%,100% { opacity:1; }
  45% { opacity:1; }
  48% { opacity:0.4; }
  51% { opacity:1; }
  75% { opacity:0.8; }
}

/* Place animation */
@keyframes blockIn {
  0% { opacity:0; transform: translateZ(40px) scale(0.7); }
  60% { transform: translateZ(-4px) scale(1.04); }
  100% { opacity:1; transform: translateZ(0) scale(1); }
}
.b.new .b-building { animation: blockIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both; }

/* HOME — extra tall, brighter */
.b.home .b-building { filter: brightness(1.4); }
.b.home .b-top { border-color: rgba(255,255,255,0.15) !important; }

/* FROZEN */
.b.frozen .b-top {
  background: #0d1a2e !important;
  border-color: rgba(147,210,255,0.4) !important;
  box-shadow: inset 0 0 8px rgba(147,210,255,0.2);
}
.b.frozen .b-building { opacity: 0.4 !important; filter: hue-rotate(180deg) brightness(1.5); }

/* STUCK */
.b.stuck .b-top {
  box-shadow: inset 0 0 12px rgba(251,191,36,0.3) !important;
  border-color: rgba(251,191,36,0.4) !important;
}

/* Territory outer border glow */
.b.border-edge .b-top {
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18);
}

/* Wappen */
.b-wappen {
  position: absolute;
  bottom: 4px;
  right: 4px;
  font-size: 10px;
  z-index: 20;
  filter: drop-shadow(0 0 4px currentColor);
  line-height: 1;
}

/* Glow pulse on newly placed */
@keyframes glowPulse {
  0%,100% { box-shadow: none; }
  50% { box-shadow: 0 0 24px var(--glow), 0 0 48px var(--glow-soft); }
}
.b.new .b-top { animation: glowPulse 1.2s ease-in-out 2; }

</style>
</head>
<body>

<div class="label">Quarter Quiz — City Grid · Isometrisch · CSS 3D</div>

<div class="iso-scene" id="scene"></div>

<script>
// ── Team definitions ──
const TEAMS = [
  { id: 't1', color: '#3b82f6', glow: 'rgba(59,130,246,0.6)',  glowSoft: 'rgba(59,130,246,0.2)',  wappen: '⚓', name: 'Die Clique' },
  { id: 't2', color: '#22c55e', glow: 'rgba(34,197,94,0.6)',   glowSoft: 'rgba(34,197,94,0.2)',   wappen: '🌿', name: 'Grüne Hölle' },
  { id: 't3', color: '#ef4444', glow: 'rgba(239,68,68,0.6)',   glowSoft: 'rgba(239,68,68,0.2)',   wappen: '🔺', name: 'Rote Karte' },
  { id: 't4', color: '#f97316', glow: 'rgba(249,115,22,0.6)',  glowSoft: 'rgba(249,115,22,0.2)',  wappen: '⚡', name: 'Oranje' },
  { id: 't5', color: '#8b5cf6', glow: 'rgba(139,92,246,0.6)',  glowSoft: 'rgba(139,92,246,0.2)',  wappen: '👁', name: 'Kunstprojekt' },
  { id: 't6', color: '#0d9488', glow: 'rgba(13,148,136,0.6)',  glowSoft: 'rgba(13,148,136,0.2)',  wappen: '☽', name: 'Nachtschicht' },
];

// ── 6×6 grid state ──
// null = empty, { teamIdx, home, frozen, stuck, joker }
const SIZE = 6;
const CELL_PX = 72;
const DEPTH_PX = 18;
const BUILD_H = 28; // building height in px

const grid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));

// Place some teams
function place(r, c, teamIdx, opts = {}) {
  grid[r][c] = { teamIdx, ...opts };
}

// Team 0 (blue) — top-left
place(0,0,0,{home:true}); place(0,1,0); place(0,2,0);
place(1,0,0); place(1,1,0,{joker:true}); place(1,2,0);
place(2,0,0); place(2,1,0,{frozen:true});

// Team 1 (green) — bottom-left
place(3,0,1,{home:true}); place(3,1,1);
place(4,0,1); place(4,1,1); place(4,2,1);
place(5,0,1); place(5,1,1); place(5,2,1);

// Team 2 (red) — top-right
place(0,4,2); place(0,5,2);
place(1,3,2); place(1,4,2); place(1,5,2,{home:true});
place(2,4,2); place(2,5,2);

// Team 3 (orange) — bottom-right
place(3,3,3); place(3,4,3); place(3,5,3,{home:true});
place(4,3,3,{stuck:true}); place(4,4,3); place(4,5,3);
place(5,3,3); place(5,4,3); place(5,5,3);

// ── Compute territory borders ──
function isSameTeam(r, c, teamIdx) {
  if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return false;
  return grid[r][c]?.teamIdx === teamIdx;
}

// ── Render ──
const scene = document.getElementById('scene');
const isoGrid = document.createElement('div');
isoGrid.className = 'iso-grid';
isoGrid.style.gridTemplateColumns = `repeat(${SIZE}, ${CELL_PX}px)`;
isoGrid.style.gridTemplateRows = `repeat(${SIZE}, ${CELL_PX}px)`;
scene.appendChild(isoGrid);

for (let r = 0; r < SIZE; r++) {
  for (let c = 0; c < SIZE; c++) {
    const cell = grid[r][c];
    const team = cell ? TEAMS[cell.teamIdx] : null;

    const b = document.createElement('div');
    b.className = 'b';
    b.style.width = CELL_PX + 'px';
    b.style.height = CELL_PX + 'px';
    if (cell) {
      b.classList.add('owned', 'new');
      if (cell.home) b.classList.add('home');
      if (cell.frozen) b.classList.add('frozen');
      if (cell.stuck) b.classList.add('stuck');
      if (cell.joker) b.classList.add('joker');
      b.style.setProperty('--glow', team.glow);
      b.style.setProperty('--glow-soft', team.glowSoft);

      // border-edge: any side adjacent to different team or empty
      const top    = !isSameTeam(r-1, c, cell.teamIdx);
      const bottom = !isSameTeam(r+1, c, cell.teamIdx);
      const left   = !isSameTeam(r, c-1, cell.teamIdx);
      const right  = !isSameTeam(r, c+1, cell.teamIdx);
      if (top || bottom || left || right) b.classList.add('border-edge');
    }

    // Top face
    const bTop = document.createElement('div');
    bTop.className = 'b-top';
    if (team) {
      bTop.style.background = hexToRgba(team.color, cell.frozen ? 0.05 : 0.08);
      bTop.style.borderColor = hexToRgba(team.color, 0.3);
      if (!cell.frozen) {
        bTop.style.boxShadow = `inset 0 0 ${cell.home ? 24 : 12}px ${hexToRgba(team.color, cell.home ? 0.35 : 0.18)}`;
      }
    }

    // Front face
    const bFront = document.createElement('div');
    bFront.className = 'b-front';
    bFront.style.height = DEPTH_PX + 'px';
    if (team) {
      bFront.style.background = hexToRgba(team.color, 0.04);
      bFront.style.borderColor = hexToRgba(team.color, 0.15);
    } else {
      bFront.style.background = '#090c12';
      bFront.style.borderColor = '#141824';
    }

    // Right face
    const bRight = document.createElement('div');
    bRight.className = 'b-right';
    bRight.style.width = DEPTH_PX + 'px';
    if (team) {
      bRight.style.background = hexToRgba(team.color, 0.04);
      bRight.style.borderColor = hexToRgba(team.color, 0.15);
    } else {
      bRight.style.background = '#0b0e16';
      bRight.style.borderColor = '#141824';
    }

    b.appendChild(bTop);
    b.appendChild(bFront);
    b.appendChild(bRight);

    // Building
    if (team && !cell.frozen) {
      const bldg = document.createElement('div');
      bldg.className = 'b-building';
      const bh = cell.home ? BUILD_H * 1.5 : BUILD_H;
      const bw = cell.home ? CELL_PX * 0.55 : CELL_PX * 0.48;
      const bx = (CELL_PX - bw) / 2;
      const by = (CELL_PX - bw) / 2;

      // Building top
      const bbTop = document.createElement('div');
      bbTop.className = 'bb-top';
      bbTop.style.cssText = `
        left:${bx}px; top:${by}px;
        width:${bw}px; height:${bw}px;
        border: ${cell.home ? '2px' : '1.5px'} solid ${team.color};
        box-shadow: 0 0 ${cell.home ? 20 : 12}px ${team.glow}, inset 0 0 ${cell.home ? 12 : 6}px ${team.glowSoft};
        background: ${hexToRgba(team.color, cell.home ? 0.12 : 0.06)};
      `;

      // Building front face
      const bbFront = document.createElement('div');
      bbFront.className = 'bb-front';
      bbFront.style.cssText = `
        left:${bx}px; width:${bw}px; top:${by + bw}px;
        height:${bh}px;
        border-left: 1.5px solid ${hexToRgba(team.color, 0.7)};
        border-right: 1.5px solid ${hexToRgba(team.color, 0.7)};
        border-bottom: 1.5px solid ${hexToRgba(team.color, 0.7)};
        background: linear-gradient(to bottom, ${hexToRgba(team.color, 0.08)}, ${hexToRgba(team.color, 0.04)});
        box-shadow: 0 0 12px ${team.glowSoft};
      `;

      // Windows on front face
      const winCount = cell.home ? 3 : 2;
      for (let wi = 0; wi < winCount; wi++) {
        const row = document.createElement('div');
        row.className = 'win-row';
        const winsPerRow = cell.home ? 3 : 2;
        for (let wj = 0; wj < winsPerRow; wj++) {
          const win = document.createElement('div');
          win.className = 'win';
          win.style.cssText = `
            width:${cell.home ? 5 : 4}px;
            height:${cell.home ? 4 : 3}px;
            background: ${team.color};
            box-shadow: 0 0 4px ${team.glow};
            animation-delay: ${(wi * winsPerRow + wj) * 0.3}s;
          `;
          row.appendChild(win);
        }
        bbFront.appendChild(row);
      }

      // Building right face
      const bbRight = document.createElement('div');
      bbRight.className = 'bb-right';
      bbRight.style.cssText = `
        top:${by}px; left:${bx + bw}px;
        width:${bh}px; height:${bw}px;
        border-top: 1.5px solid ${hexToRgba(team.color, 0.5)};
        border-right: 1.5px solid ${hexToRgba(team.color, 0.5)};
        border-bottom: 1.5px solid ${hexToRgba(team.color, 0.5)};
        background: ${hexToRgba(team.color, 0.04)};
      `;

      bldg.appendChild(bbTop);
      bldg.appendChild(bbFront);
      bldg.appendChild(bbRight);
      b.appendChild(bldg);

      // Special icons
      if (cell.joker || cell.stuck || cell.home) {
        const wappen = document.createElement('div');
        wappen.className = 'b-wappen';
        wappen.style.color = team.color;
        wappen.textContent = cell.stuck ? '📌' : cell.joker ? '⭐' : team.wappen;
        b.appendChild(wappen);
      }
    }

    // Frozen icon
    if (cell?.frozen) {
      const ice = document.createElement('div');
      ice.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:20;';
      ice.textContent = '❄️';
      b.appendChild(ice);
    }

    isoGrid.appendChild(b);
  }
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Score bar ──
const scoreWrap = document.createElement('div');
scoreWrap.innerHTML = `
  <div class="label">Teams</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    ${TEAMS.map((t,i) => {
      const count = grid.flat().filter(c => c?.teamIdx === i).length;
      if (!count) return '';
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#0d1117;border-radius:10px;border:1px solid ${hexToRgba(t.color,0.2)};box-shadow:0 0 12px ${hexToRgba(t.color,0.08)};">
        <span style="font-size:16px;">${t.wappen}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:${t.color};">${t.name}</div>
          <div style="font-size:11px;color:#334155;">${count} Felder</div>
        </div>
      </div>`;
    }).join('')}
  </div>
`;
document.body.appendChild(scoreWrap);

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
</script>
</body>
</html>
