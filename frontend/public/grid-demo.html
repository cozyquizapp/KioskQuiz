<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at 50% 35%, #0c1018 0%, #03040a 100%);
  min-height: 100vh; color: #f1f5f9;
  font-family: 'Space Grotesk', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 36px; padding: 40px; overflow: hidden;
}
h2 { font-size:11px; color:#1a2236; text-transform:uppercase; letter-spacing:.2em; font-weight:700; }

.board-wrap { position:relative; padding:36px 40px 56px; }

.iso-scene { perspective:1400px; perspective-origin:50% 10%; position:relative; z-index:2; }
.iso-grid {
  transform: rotateX(52deg) rotateZ(-45deg);
  transform-style: preserve-3d;
  display: grid; gap: 3px;
  position: relative;
}

/* ── CELL ── */
.cell {
  position: relative; transform-style: preserve-3d;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1);
}
.cell.owned  { cursor: default; }
.cell.empty:hover { transform: translateZ(4px); }

/* ── TILE FACES ── */
.tile-top {
  position:absolute; inset:0; z-index:2; border-radius:2px;
  transition: background .25s ease, border-color .25s ease, box-shadow .3s ease;
}
.tile-front {
  position:absolute; top:100%; left:0; right:0;
  transform-origin:top center; transform:rotateX(-90deg); z-index:1;
}
.tile-right {
  position:absolute; top:0; bottom:0; left:100%;
  transform-origin:left center; transform:rotateY(90deg); z-index:1;
}

/* ── BUILDING wrapper — lives inside the iso cell, preserve-3d ── */
.building {
  position:absolute; inset:0;
  pointer-events:none; z-index:10;
  transform-style:preserve-3d;
}

/* ── Territory outline SVG ── */
.territory-svg {
  position:absolute; inset:0;
  pointer-events:none; z-index:50;
  overflow:visible;
}

/* ── ANIMATIONS ── */
@keyframes claimPop {
  0%  { transform:translateZ(0); }
  35% { transform:translateZ(16px); }
  65% { transform:translateZ(-3px); }
  100%{ transform:translateZ(0); }
}
@keyframes dominantPulse {
  0%,100% { box-shadow: var(--gs-base); }
  50%     { box-shadow: var(--gs-peak); }
}
@keyframes winFlicker {
  0%,100%{opacity:1;} 44%{opacity:1;} 47%{opacity:.15;} 52%{opacity:1;} 80%{opacity:.6;}
}
/* Building rise — translateZ from 0 to target stored in --bh */
@keyframes bldRise {
  0%   { transform:translateZ(0)   scaleX(.94) scaleY(.94); opacity:0; }
  15%  { opacity:1; }
  82%  { transform:translateZ(var(--bh)) scaleX(1.02) scaleY(1.02); }
  100% { transform:translateZ(var(--bh)) scaleX(1)    scaleY(1);    opacity:1; }
}
/* Edge lines fade in staggered */
@keyframes edgeIn {
  0%  { opacity:0; }
  100%{ opacity:1; }
}

/* Score bar */
.score-bar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.team-pill {
  display:flex; align-items:center; gap:9px; padding:8px 16px; border-radius:10px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05);
  cursor:pointer; transition:all .15s ease; user-select:none;
}
.team-pill:hover { transform:translateY(-2px); }
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 18px var(--tc-glow); }
.tp-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.tp-name { font-size:13px; font-weight:700; }
.tp-count{ font-size:11px; color:#253040; font-weight:600; }
.hint    { font-size:11px; color:#111822; letter-spacing:.05em; }
</style>
</head>
<body>
<h2>Quarter Quiz — City Grid</h2>
<div class="board-wrap">
  <div class="iso-scene">
    <div class="iso-grid" id="grid"></div>
  </div>
</div>
<div class="score-bar" id="scorebar"></div>
<div class="hint">Team auswählen → leeres Feld anklicken</div>

<script>
const SIZE=6, CELL=72, GAP=3, GD=8;

const TEAMS=[
  {color:'#5aadff',r:90, g:173,b:255,name:'Die Clique',  wappen:'⚓',inten:.80},
  {color:'#ff5050',r:255,g:80, b:80, name:'Rote Karte',  wappen:'🔺',inten:1.0},
  {color:'#3ddc84',r:61, g:220,b:132,name:'Grüne Hölle', wappen:'🌿',inten:.85},
  {color:'#ffaa3c',r:255,g:170,b:60, name:'Oranje',      wappen:'⚡',inten:.92},
  {color:'#c084fc',r:192,g:132,b:252,name:'Nachtschicht',wappen:'☽', inten:.80},
  {color:'#2dd4bf',r:45, g:212,b:191,name:'Tiefsee',     wappen:'🐋',inten:.82},
];

// Building height variants per team — tile is always CELL×CELL, only H differs
// Heights in px before iso compression (~55% visible)
// Team personality: blue=slim towers, red=squat blocks, green=medium, orange=tall, purple=spires, teal=low
const HEIGHTS={
  0:[56,70,48],   // Blue: tall-ish towers
  1:[22,28,18],   // Red: squat wide blocks
  2:[38,44,32],   // Green: medium
  3:[50,60,42],   // Orange: tall
  4:[80,92,68],   // Purple: tallest spires
  5:[18,22,14],   // Teal: low flat docks
};
const GHOST_H=[28,42,20,36,24,50,18,44];

const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
let activeTeam=0;

function seed(r,c,t,home=false){
  state[r][c]={teamIdx:t,hi:Math.floor(Math.random()*3),home,new:false};
}
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);
seed(0,5,1,true);seed(0,4,1);seed(1,5,1);seed(1,4,1);
seed(5,0,2,true);seed(4,0,2);seed(5,1,2);seed(4,1,2);
seed(5,5,3,true);seed(4,5,3);seed(5,4,3);

function rc(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjN(r,c,ti){return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;}
function isEdge(r,c,dr,dc){return!same(r+dr,c+dc,state[r][c]?.teamIdx);}

// ── RENDER CELL ──
function renderCell(r,c,animate=false){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  el.querySelectorAll('.building').forEach(e=>e.remove());
  el.className='cell '+(cell?'owned':'empty');

  const tTop=el.querySelector('.tile-top');
  const tFront=el.querySelector('.tile-front');
  const tRight=el.querySelector('.tile-right');

  if(!cell){
    // Empty tile — dark, subtle
    tTop.style.cssText=`position:absolute;inset:0;z-index:2;border-radius:2px;
      background:rgba(255,255,255,.022);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:inset 0 3px 6px rgba(255,255,255,.03),inset 0 -4px 8px rgba(0,0,0,.5);`;
    tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:${GD}px;
      transform-origin:top center;transform:rotateX(-90deg);z-index:1;
      background:#050710;border:1px solid rgba(255,255,255,.03);border-top:none;`;
    tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:${GD}px;
      transform-origin:left center;transform:rotateY(90deg);z-index:1;
      background:#040610;border:1px solid rgba(255,255,255,.025);border-left:none;`;
    drawBuilding(el, GHOST_H[(r*SIZE+c)%GHOST_H.length], null, false);
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const n=adjN(r,c,cell.teamIdx);
  const isHome=cell.home;
  const inten=team.inten;
  const eTop=isEdge(r,c,-1,0),eBot=isEdge(r,c,1,0),eL=isEdge(r,c,0,-1),eR=isEdge(r,c,0,1);
  const interior=!eTop&&!eBot&&!eL&&!eR&&!isHome;

  // ── TILE GROUND (always dark — building carries the color identity) ──
  const tileBg = interior
    ? 'rgba(12,16,26,.92)'
    : `rgba(${team.r},${team.g},${team.b},.06)`;
  const tileBorder = interior
    ? '1px solid rgba(255,255,255,.03)'
    : isHome
      ? `2px solid ${rc(team,.55*inten)}`
      : `1px solid ${rc(team,.3*inten)}`;

  const gsBase = isHome
    ? `inset 0 3px 6px rgba(255,255,255,.04),0 0 18px ${rc(team,.6*inten)},0 0 36px ${rc(team,.25*inten)}`
    : interior
      ? `inset 0 2px 4px rgba(255,255,255,.015),inset 0 -3px 8px rgba(0,0,0,.6)`
      : `inset 0 3px 6px rgba(255,255,255,.04),0 0 12px ${rc(team,.5*inten)},0 0 24px ${rc(team,.2*inten)}`;
  const gsPeak = `inset 0 3px 6px rgba(255,255,255,.05),0 0 22px ${rc(team,.8*inten)},0 0 44px ${rc(team,.35*inten)}`;

  tTop.style.cssText=`position:absolute;inset:0;z-index:2;border-radius:2px;
    background:${tileBg};border:${tileBorder};
    --gs-base:${gsBase};--gs-peak:${gsPeak};
    box-shadow:${gsBase};
    transform:translateZ(1px);
    transition:box-shadow .35s ease;
    ${(n>=3||isHome)?`animation:dominantPulse ${isHome?2.2:3}s ease-in-out infinite;`:''}`;

  tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:${GD}px;
    transform-origin:top center;transform:rotateX(-90deg);z-index:1;
    background:${interior?'#080c18':rc(team,.08)};
    border-left:1px solid ${rc(team,.14)};border-right:1px solid ${rc(team,.1)};border-bottom:1px solid ${rc(team,.08)};`;
  tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:${GD}px;
    transform-origin:left center;transform:rotateY(90deg);z-index:1;
    background:${interior?'#060a16':rc(team,.05)};
    border-top:1px solid ${rc(team,.1)};border-right:1px solid ${rc(team,.08)};border-bottom:1px solid ${rc(team,.06)};`;

  const heights=HEIGHTS[cell.teamIdx];
  const bh=heights[cell.hi%3];
  const finalH=isHome?Math.round(bh*1.55):interior?Math.round(bh*.5):bh;
  drawBuilding(el, finalH, team, animate||cell.new);
  if(cell.new) cell.new=false;

  if(isHome){
    const icon=document.createElement('div');
    icon.className='building'; // reuse class for positioning
    icon.style.cssText=`position:absolute;bottom:5px;right:6px;font-size:10px;
      z-index:30;filter:drop-shadow(0 0 5px ${team.color});line-height:1;pointer-events:none;`;
    icon.textContent=team.wappen;
    el.appendChild(icon);
  }
  if(animate){
    el.style.animation='claimPop .65s cubic-bezier(.34,1.56,.64,1) both';
    setTimeout(()=>el.style.animation='',750);
  }
}

// ── DRAW BUILDING ──
// Structure:
//   - Roof: full-tile rect at translateZ(H) — glowing neon face
//   - 4 vertical edges: stacked thin divs from z=0 to z=H — the wireframe walls
//   - Ghost: same structure, very faint, no glow
//
// Why stacked divs for edges: in the iso CSS 3D context (rotateX+rotateZ),
// translateZ moves elements straight "up" in screen space, so a series of
// thin rects at z=0,8,16... appear as a continuous vertical line from ground to roof.

function drawBuilding(el, H, team, animate){
  const ghost=!team;
  const cr=team?team.r:28, cg=team?team.g:36, cb=team?team.b:58;
  const inten=team?team.inten:1;

  const bld=document.createElement('div');
  bld.className='building';
  bld.style.transformStyle='preserve-3d';

  // ── ROOF ──
  const roof=document.createElement('div');
  if(ghost){
    roof.style.cssText=`position:absolute;inset:2px;border-radius:2px;
      transform:translateZ(${H}px);
      background:rgba(255,255,255,.015);
      border:1px solid rgba(255,255,255,.07);`;
  } else {
    roof.style.cssText=`position:absolute;inset:0;border-radius:2px;
      transform:translateZ(${H}px);
      background:linear-gradient(135deg,
        rgba(255,255,255,${.18*inten}) 0%,
        rgba(${cr},${cg},${cb},${.12*inten}) 55%,
        rgba(0,0,0,.18) 100%);
      border-top:  2px solid rgba(255,255,255,${.65*inten});
      border-left: 1.5px solid rgba(255,255,255,${.38*inten});
      border-right:1px solid rgba(${cr},${cg},${cb},${.55*inten});
      border-bottom:1px solid rgba(${cr},${cg},${cb},${.45*inten});
      box-shadow:
        0 0 ${Math.round(10*inten)}px rgba(${cr},${cg},${cb},${.65*inten}),
        0 0 ${Math.round(24*inten)}px rgba(${cr},${cg},${cb},${.25*inten}),
        inset 0 0 8px rgba(255,255,255,${.07*inten});`;
    // inner radial glow
    const fill=document.createElement('div');
    fill.style.cssText=`position:absolute;inset:0;border-radius:inherit;pointer-events:none;
      background:radial-gradient(ellipse at 35% 35%,
        rgba(${cr},${cg},${cb},${.22*inten}) 0%,transparent 65%);`;
    roof.appendChild(fill);
    // window dots
    const wc=Math.max(3,Math.round(CELL/15)), wr=Math.max(2,Math.round(CELL/18));
    for(let wi=0;wi<wr;wi++) for(let wj=0;wj<wc;wj++){
      const w=document.createElement('div');
      w.style.cssText=`position:absolute;
        left:${Math.round(CELL*(wj+.5)/wc)-1}px;
        top:${Math.round(CELL*(wi+.5)/wr)-1}px;
        width:2px;height:2px;border-radius:50%;
        background:rgba(${cr},${cg},${cb},${.85*inten});
        box-shadow:0 0 3px rgba(${cr},${cg},${cb},.75);
        animation:winFlicker ${1.8+Math.random()*3}s ease-in-out ${(wi*wc+wj)*.12+Math.random()*.35}s infinite;`;
      roof.appendChild(w);
    }
  }
  if(animate && !ghost){
    roof.style.setProperty('--bh', H+'px');
    roof.style.animation='bldRise .7s cubic-bezier(.22,1.3,.6,1) both';
  }
  bld.appendChild(roof);

  // ── VERTICAL EDGE LINES ──
  // 4 edges: left col, right col, top row, bottom row — each 2px wide
  // Stacked at STEPS z-levels from 0 to H
  const STEPS=Math.max(4, Math.round(H/7));
  const edgeA = ghost ? .06 : .7*inten;
  const edgeGlowA = ghost ? .02 : .28*inten;
  // [left, top, width, height]
  const EDGES=[
    [0,     0,     2,    CELL], // left
    [CELL-2,0,     2,    CELL], // right
    [0,     0,     CELL, 2   ], // top
    [0,     CELL-2,CELL, 2   ], // bottom
  ];
  for(let si=0;si<=STEPS;si++){
    const z=Math.round((si/STEPS)*H);
    const t=si/STEPS;
    // Brightness: dim at base, bright at roof
    const a = ghost ? edgeA : (.25+t*.55)*inten;
    const glowSz = ghost ? 0 : Math.round(2+t*5);
    const delay = animate&&!ghost ? `${(t*.4).toFixed(2)}s` : '0s';

    EDGES.forEach(([ex,ey,ew,eh])=>{
      const e=document.createElement('div');
      e.style.cssText=`position:absolute;left:${ex}px;top:${ey}px;
        width:${ew}px;height:${eh}px;
        transform:translateZ(${z}px);
        background:rgba(${cr},${cg},${cb},${a});
        ${glowSz?`box-shadow:0 0 ${glowSz}px rgba(${cr},${cg},${cb},${edgeGlowA});`:''}`;
      if(animate&&!ghost) e.style.animation=`edgeIn .12s ease-out ${delay} both`;
      bld.appendChild(e);
    });
  }

  el.appendChild(bld);
}

// ── TERRITORY OUTLINE SVG ──
function updateTerritoryOutlines(){
  document.querySelectorAll('.territory-svg').forEach(s=>s.remove());

  const totalW=(CELL+GAP)*SIZE-GAP;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.className='territory-svg';
  svg.setAttribute('width',totalW);svg.setAttribute('height',totalW);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:50;overflow:visible;';

  TEAMS.forEach((team,ti)=>{
    const cells=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(state[r][c]?.teamIdx===ti) cells.push([r,c]);
    if(!cells.length) return;

    const segs=[];
    const pad=3;
    cells.forEach(([r,c])=>{
      const x=c*(CELL+GAP), y=r*(CELL+GAP);
      if(!same(r-1,c,ti)) segs.push([x-pad,y-pad,x+CELL+pad,y-pad]);
      if(!same(r+1,c,ti)) segs.push([x-pad,y+CELL+pad,x+CELL+pad,y+CELL+pad]);
      if(!same(r,c-1,ti)) segs.push([x-pad,y-pad,x-pad,y+CELL+pad]);
      if(!same(r,c+1,ti)) segs.push([x+CELL+pad,y-pad,x+CELL+pad,y+CELL+pad]);
    });

    segs.forEach(([x1,y1,x2,y2])=>{
      const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
      glow.setAttribute('x1',x1);glow.setAttribute('y1',y1);
      glow.setAttribute('x2',x2);glow.setAttribute('y2',y2);
      glow.setAttribute('stroke',team.color);
      glow.setAttribute('stroke-width','7');
      glow.setAttribute('stroke-opacity',String(.28*team.inten));
      glow.setAttribute('stroke-linecap','round');
      svg.appendChild(glow);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1);line.setAttribute('y1',y1);
      line.setAttribute('x2',x2);line.setAttribute('y2',y2);
      line.setAttribute('stroke',team.color);
      line.setAttribute('stroke-width','1.8');
      line.setAttribute('stroke-opacity',String(.9*team.inten));
      line.setAttribute('stroke-linecap','round');
      svg.appendChild(line);
    });
  });

  document.querySelector('.iso-grid').appendChild(svg);
}

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++){
  for(let c=0;c<SIZE;c++){
    const el=document.createElement('div');
    el.className='cell';el.dataset.r=r;el.dataset.c=c;
    el.style.cssText=`width:${CELL}px;height:${CELL}px;`;
    ['tile-top','tile-front','tile-right'].forEach(cn=>{
      const d=document.createElement('div');d.className=cn;
      if(cn==='tile-front') d.style.height=GD+'px';
      if(cn==='tile-right') d.style.width=GD+'px';
      el.appendChild(d);
    });
    el.addEventListener('mouseenter',()=>{
      if(state[r][c]) return;
      const t=TEAMS[activeTeam];
      el.querySelector('.tile-top').style.background=`rgba(${t.r},${t.g},${t.b},.06)`;
      el.querySelector('.tile-top').style.borderColor=`rgba(${t.r},${t.g},${t.b},.32)`;
    });
    el.addEventListener('mouseleave',()=>{
      if(state[r][c]) return;
      el.querySelector('.tile-top').style.background='rgba(255,255,255,.022)';
      el.querySelector('.tile-top').style.borderColor='rgba(255,255,255,.06)';
    });
    el.addEventListener('click',()=>{
      if(state[r][c]) return;
      state[r][c]={teamIdx:activeTeam,hi:Math.floor(Math.random()*3),home:false,new:true};
      renderCell(r,c,true);
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]) renderCell(nr,nc,false);
      });
      updateTerritoryOutlines();
      updateScores();
    });
    gridEl.appendChild(el);
    renderCell(r,c);
  }
}
updateTerritoryOutlines();

function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return `<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.07);--tc-border:rgba(${t.r},${t.g},${t.b},.35);--tc-glow:rgba(${t.r},${t.g},${t.b},.15);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 8px rgba(${t.r},${t.g},${t.b},.6);"></div>
      <div>
        <div class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.wappen} ${t.name}</div>
        <div class="tp-count">${count} Felder${active?' · aktiv':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
</script>
</body>
</html>
