<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 50% 35%, #0c1018 0%, #03040a 100%);
  min-height: 100vh;
  color: #f1f5f9;
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 36px;
  padding: 40px;
  overflow: hidden;
}

h2 {
  font-size: 11px; color: #161d2e;
  text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700;
}

.board-wrap {
  position: relative; padding: 36px 40px 56px;
}
.board-wrap::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background: radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.026) 0%, transparent 68%);
  pointer-events: none; z-index: 0;
}
.board-wrap::after {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse at 50% 45%, black 28%, transparent 72%);
}

.iso-scene {
  perspective: 1400px; perspective-origin: 50% 10%;
  position: relative; z-index: 2;
}
.iso-grid {
  transform: rotateX(52deg) rotateZ(-45deg);
  transform-style: preserve-3d; display: grid; gap: 3px;
}

.cell {
  position: relative; transform-style: preserve-3d;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.cell.owned  { cursor: default; }
.cell.empty:hover { transform: translateZ(5px); }
.cell.owned:hover { transform: translateZ(3px); }

/* ── TILE FACES ── */
.tile-top {
  position: absolute; inset: 0; z-index: 2; border-radius: 2px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 5px 8px rgba(255,255,255,0.04), inset 0 -6px 12px rgba(0,0,0,0.48);
  transition: all 0.28s ease;
}
.tile-top::before {
  content: ''; position: absolute; inset: 0; border-radius: 2px;
  border-top: 1px solid rgba(255,255,255,0.14);
  border-left: 1px solid rgba(255,255,255,0.07);
  pointer-events: none; z-index: 3;
}
.tile-top::after {
  content: ''; position: absolute; inset: 0; border-radius: 2px;
  background: radial-gradient(circle at 28% 26%, rgba(0,0,0,0.2), transparent 60%);
  pointer-events: none; z-index: 1;
}
.tile-front {
  position: absolute; top: 100%; left: 0; right: 0;
  transform-origin: top center; transform: rotateX(-90deg); z-index: 1;
  background: #050710; transition: all 0.28s ease;
}
.tile-right {
  position: absolute; top: 0; bottom: 0; left: 100%;
  transform-origin: left center; transform: rotateY(90deg); z-index: 1;
  background: #040610; transition: all 0.28s ease;
}
.cell.empty .tile-top { background: rgba(255,255,255,0.022); }
.cell.empty:hover .tile-top {
  background: var(--preview-bg, rgba(255,255,255,0.04));
  border-color: var(--preview-border, rgba(255,255,255,0.14));
}

/* ── OUTER GLOW HALO ── */
.tile-glow {
  position: absolute; inset: -3px; border-radius: 3px;
  pointer-events: none; z-index: 1;
}

/* ── ANIMATIONS ── */
@keyframes growUp {
  0%   { transform: scaleZ(0) translateZ(-8px); opacity: 0; }
  45%  { opacity: 1; }
  78%  { transform: scaleZ(1.08); }
  100% { transform: scaleZ(1); opacity: 1; }
}
@keyframes claimPop {
  0%   { transform: translateZ(0); }
  28%  { transform: translateZ(14px); }
  65%  { transform: translateZ(-2px); }
  100% { transform: translateZ(0); }
}
@keyframes dominantPulse {
  0%,100% { box-shadow: var(--glow-base); }
  50%      { box-shadow: var(--glow-strong); }
}
@keyframes winFlicker {
  0%,100% { opacity:1; } 44% { opacity:1; } 47% { opacity:.2; } 50% { opacity:1; } 79% { opacity:.65; }
}
@keyframes edgePulse {
  0%,100% { opacity:.6; } 50% { opacity:.9; }
}

/* ── SCORE BAR ── */
.score-bar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.team-pill {
  display:flex; align-items:center; gap:9px; padding:8px 16px; border-radius:10px;
  background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05);
  cursor:pointer; transition:all .15s ease; user-select:none;
}
.team-pill:hover { transform:translateY(-2px); }
.team-pill.active { background:var(--tc-bg); border-color:var(--tc-border); box-shadow:0 0 18px var(--tc-glow); }
.tp-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.tp-name { font-size:13px; font-weight:700; }
.tp-count{ font-size:11px; color:#253040; font-weight:600; }
.hint    { font-size:11px; color:#111822; letter-spacing:.05em; }
</style>
</head>
<body>

<h2>Quarter Quiz — City Grid</h2>
<div class="board-wrap">
  <div class="iso-scene">
    <div class="iso-grid" id="grid"></div>
  </div>
</div>
<div class="score-bar" id="scorebar"></div>
<div class="hint">Team auswählen → leeres Feld anklicken</div>

<script>
const SIZE=6, CELL=72, GD=11;

const TEAMS=[
  {color:'#5aadff',r:90, g:173,b:255,glow:'rgba(90,173,255,0.55)',  soft:'rgba(90,173,255,0.16)', name:'Die Clique',  wappen:'⚓',inten:.75},
  {color:'#ff5050',r:255,g:80, b:80, glow:'rgba(255,80,80,0.7)',    soft:'rgba(255,80,80,0.2)',   name:'Rote Karte',  wappen:'🔺',inten:1.0},
  {color:'#3ddc84',r:61, g:220,b:132,glow:'rgba(61,220,132,0.6)',   soft:'rgba(61,220,132,0.18)', name:'Grüne Hölle', wappen:'🌿',inten:.82},
  {color:'#ffaa3c',r:255,g:170,b:60, glow:'rgba(255,170,60,0.68)',  soft:'rgba(255,170,60,0.2)',  name:'Oranje',      wappen:'⚡',inten:.9},
  {color:'#c084fc',r:192,g:132,b:252,glow:'rgba(192,132,252,0.58)', soft:'rgba(192,132,252,0.16)',name:'Nachtschicht',wappen:'☽',inten:.78},
  {color:'#2dd4bf',r:45, g:212,b:191,glow:'rgba(45,212,191,0.58)',  soft:'rgba(45,212,191,0.16)', name:'Tiefsee',     wappen:'🐋',inten:.8},
];

const SHAPES={
  0:[{w:.26,d:.26,h:58,wr:4,wc:1},{w:.30,d:.30,h:48,wr:3,wc:2},{w:.22,d:.22,h:70,wr:5,wc:1}],
  1:[{w:.60,d:.42,h:20,wr:1,wc:4},{w:.54,d:.40,h:26,wr:2,wc:3},{w:.62,d:.44,h:18,wr:1,wc:5}],
  2:[{w:.46,d:.46,h:32,wr:2,wc:2,rnd:true},{w:.50,d:.42,h:28,wr:2,wc:2,rnd:true},{w:.40,d:.40,h:40,wr:3,wc:2,rnd:true}],
  3:[{w:.36,d:.54,h:38,wr:2,wc:2},{w:.28,d:.58,h:44,wr:3,wc:1},{w:.46,d:.44,h:30,wr:2,wc:3}],
  4:[{w:.22,d:.22,h:66,wr:5,wc:1},{w:.18,d:.18,h:76,wr:6,wc:1},{w:.26,d:.26,h:56,wr:4,wc:1}],
  5:[{w:.64,d:.34,h:18,wr:1,wc:5},{w:.58,d:.38,h:22,wr:2,wc:4},{w:.66,d:.32,h:16,wr:1,wc:6}],
};
const GHOST=[
  {w:.38,d:.38,h:26},{w:.26,d:.26,h:44},{w:.52,d:.36,h:20},
  {w:.30,d:.30,h:38},{w:.44,d:.44,h:24},{w:.22,d:.22,h:52},
];

const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
let activeTeam=0;

function seed(r,c,t,home=false){
  state[r][c]={teamIdx:t,si:Math.floor(Math.random()*SHAPES[t].length),home,new:false};
}
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);seed(1,1,0);seed(2,0,0);
seed(0,5,1,true);seed(0,4,1);seed(1,5,1);seed(1,4,1);
seed(5,0,2,true);seed(4,0,2);seed(5,1,2);seed(4,1,2);
seed(5,5,3,true);seed(4,5,3);seed(5,4,3);

function rgba(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`;}
function same(r,c,ti){return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti;}
function adjN(r,c,ti){return[[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>same(r+dr,c+dc,ti)).length;}
function isEdge(r,c,dr,dc){return!same(r+dr,c+dc,state[r][c]?.teamIdx);}

function renderCell(r,c,animate=false){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  el.querySelectorAll('.building,.b-icon,.tile-glow').forEach(e=>e.remove());
  el.className='cell '+(cell?'owned':'empty');

  const tTop=el.querySelector('.tile-top');
  const tFront=el.querySelector('.tile-front');
  const tRight=el.querySelector('.tile-right');

  if(!cell){
    tTop.style.cssText='position:absolute;inset:0;z-index:2;border-radius:2px;background:rgba(255,255,255,0.022);border:1px solid rgba(255,255,255,0.06);box-shadow:inset 0 5px 8px rgba(255,255,255,0.04),inset 0 -6px 12px rgba(0,0,0,0.48);transition:all .2s ease;';
    tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:${GD}px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:#050710;border:1px solid rgba(255,255,255,0.04);border-top:none;`;
    tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:${GD}px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:#040610;border:1px solid rgba(255,255,255,0.03);border-left:none;`;
    buildBuilding(el,GHOST[(r*SIZE+c)%GHOST.length],null,false);
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const n=adjN(r,c,cell.teamIdx);
  const isHome=cell.home;
  const inten=team.inten;

  // Edge detection
  const eTop=isEdge(r,c,-1,0), eBot=isEdge(r,c,1,0);
  const eL=isEdge(r,c,0,-1),   eR=isEdge(r,c,0,1);
  const onEdge=eTop||eBot||eL||eR;
  const interior=!onEdge&&!isHome;

  // ── TILE TOP ──
  // Interior: transparent border, soft fill only
  // Edge: colored border + strong glow
  const tileBorder = interior
    ? `1px solid transparent`
    : isHome
      ? `2px solid ${rgba(team,.65)}`
      : `1px solid ${rgba(team,.42*inten)}`;

  const tileGlowBase = isHome
    ? `inset 0 5px 8px rgba(255,255,255,.05),inset 0 -6px 12px rgba(0,0,0,.5),0 0 20px ${rgba(team,.75*inten)},0 0 40px ${rgba(team,.32*inten)}`
    : interior
      ? `inset 0 5px 8px rgba(255,255,255,.04),inset 0 -6px 12px rgba(0,0,0,.48),inset 0 0 8px ${rgba(team,.2*inten)}`
      : n===0
        ? `inset 0 5px 8px rgba(255,255,255,.04),inset 0 -6px 12px rgba(0,0,0,.48),0 0 10px ${rgba(team,.5*inten)}`
        : `inset 0 5px 8px rgba(255,255,255,.05),inset 0 -6px 12px rgba(0,0,0,.5),0 0 16px ${rgba(team,.68*inten)},0 0 32px ${rgba(team,.28*inten)}`;

  const tileGlowStrong = isHome
    ? `inset 0 5px 8px rgba(255,255,255,.05),inset 0 -6px 12px rgba(0,0,0,.5),0 0 28px ${rgba(team,.9*inten)},0 0 56px ${rgba(team,.45*inten)}`
    : `inset 0 5px 8px rgba(255,255,255,.05),inset 0 -6px 12px rgba(0,0,0,.5),0 0 22px ${rgba(team,.88*inten)},0 0 44px ${rgba(team,.4*inten)}`;

  const tileBg = isHome
    ? rgba(team,.18)
    : interior
      ? rgba(team,.09)   // soft fill, no border distraction
      : rgba(team,.07);

  tTop.style.cssText=`
    position:absolute;inset:0;z-index:2;border-radius:2px;
    background:${tileBg};
    border:${tileBorder};
    --glow-base:${tileGlowBase};
    --glow-strong:${tileGlowStrong};
    box-shadow:${tileGlowBase};
    transform:translateZ(1px);
    transition:box-shadow .35s ease,border-color .35s ease;
    ${(n>=3||isHome)?`animation:dominantPulse ${isHome?2.4:3.2}s ease-in-out infinite;`:''}
  `;

  tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:${GD}px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:${rgba(team,.055)};border-left:1px solid ${rgba(team,.15)};border-right:1px solid ${rgba(team,.1)};border-bottom:1px solid ${rgba(team,.08)};`;
  tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:${GD}px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:${rgba(team,.04)};border-top:1px solid ${rgba(team,.1)};border-right:1px solid ${rgba(team,.08)};border-bottom:1px solid ${rgba(team,.06)};`;

  // ── OUTER GLOW HALO — edge tiles only ──
  if(onEdge){
    const halo=document.createElement('div');
    halo.className='tile-glow';
    const gs=`${rgba(team,.58*inten)}`;
    halo.style.cssText=`
      position:absolute;inset:-3px;border-radius:3px;pointer-events:none;z-index:1;
      box-shadow:
        ${eTop?`0 -9px 20px ${gs}`:``}
        ${eBot?`,0 9px 20px ${gs}`:``}
        ${eL?`,-9px 0 20px ${gs}`:``}
        ${eR?`,9px 0 20px ${gs}`:``};
      animation:edgePulse ${2.6+Math.random()*.8}s ease-in-out ${Math.random()*.5}s infinite;
    `;
    el.appendChild(halo);
  }

  // ── BUILDING — edge=full, interior=dimmer ──
  const shapes=SHAPES[cell.teamIdx];
  const s=shapes[cell.si%shapes.length];
  const bs=isHome?{...s,h:Math.round(s.h*1.65),w:s.w*1.15,d:s.d*1.15}:s;
  buildBuilding(el,bs,team,animate||cell.new,interior);
  if(cell.new) cell.new=false;

  if(isHome||cell.joker||cell.stuck){
    const icon=document.createElement('div');
    icon.className='b-icon';
    icon.style.cssText=`position:absolute;bottom:4px;right:5px;font-size:10px;z-index:30;filter:drop-shadow(0 0 6px ${team.color});line-height:1;`;
    icon.textContent=cell.stuck?'📌':cell.joker?'⭐':team.wappen;
    el.appendChild(icon);
  }

  if(animate){
    el.style.animation='claimPop .72s cubic-bezier(0.34,1.56,0.64,1) both';
    setTimeout(()=>el.style.animation='',800);
  }
}

function buildBuilding(el,s,team,animate,interior=false){
  const bw=CELL*s.w, bd=CELL*s.d, bh=s.h;
  const bx=(CELL-bw)/2, by=(CELL-bd)/2;
  const rr=s.rnd?'5px':'1px';
  const ghost=!team;
  const color=team?team.color:'#1e2840';
  const inten=team?team.inten:1;
  // Interior buildings are dimmer / shorter
  const opacityMod = interior ? 0.55 : 1;
  const heightMod  = interior ? 0.72 : 1;
  const bh2 = Math.round(bh*heightMod);

  const bld=document.createElement('div');
  bld.className='building';
  bld.style.opacity=String(opacityMod);

  if(animate){
    bld.style.transformOrigin='center bottom';
    bld.style.animation='growUp .88s cubic-bezier(0.34,1.5,0.64,1) both';
  }
  if(!ghost){
    // drop-shadow stronger on edge buildings
    const ds=interior
      ? `drop-shadow(0 0 3px ${rgba(team,.35*inten)})`
      : `drop-shadow(0 0 5px ${rgba(team,.6*inten)}) drop-shadow(0 0 10px ${rgba(team,.3*inten)})`;
    bld.style.filter=ds;
  }

  // ── TOP FACE — volume fill + light edge ──
  const top=document.createElement('div');
  top.style.cssText=`
    position:absolute;left:${bx}px;top:${by}px;
    width:${bw}px;height:${bd}px;border-radius:${rr};z-index:3;
    ${ghost
      ? `border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.02);`
      : `
        /* Face shading: top-left bright, bottom-right dark */
        background:linear-gradient(135deg,
          rgba(255,255,255,${.1*inten}) 0%,
          ${rgba(team,.08*inten)} 40%,
          rgba(0,0,0,.3) 100%);
        /* Isometric light edges */
        border-top:  1.5px solid rgba(255,255,255,${.42*inten});
        border-left: 1px   solid rgba(255,255,255,${.22*inten});
        border-right:1px   solid rgba(0,0,0,.45);
        border-bottom:1px  solid rgba(0,0,0,.55);
        box-shadow:0 0 ${Math.round(10*inten)}px ${rgba(team,.55*inten)},inset 0 0 6px ${rgba(team,.12)};
        /* Inner radial glow fill */
        `
    }
  `;
  // Inner glow fill pseudo — via extra div
  if(!ghost){
    const fill=document.createElement('div');
    fill.style.cssText=`position:absolute;inset:0;border-radius:${rr};pointer-events:none;z-index:1;
      background:radial-gradient(circle at 30% 30%,${rgba(team,.18*inten)},transparent 70%);`;
    top.appendChild(fill);
  }

  // ── FRONT FACE ──
  const front=document.createElement('div');
  front.style.cssText=`
    position:absolute;left:${bx}px;top:${by+bd}px;
    width:${bw}px;height:${bh2}px;overflow:hidden;
    ${ghost
      ? `border-left:1px solid rgba(255,255,255,.1);border-right:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.01);`
      : `
        border-left:  1.5px solid rgba(255,255,255,${.28*inten});
        border-right: 1px   solid rgba(0,0,0,.5);
        border-bottom:1px   solid rgba(0,0,0,.6);
        background:linear-gradient(to bottom,${rgba(team,.14*inten)},${rgba(team,.04)});
        box-shadow:0 6px 16px ${rgba(team,.2*inten)};
        `
    }
    transform-origin:top center;transform:rotateX(-90deg);
    display:flex;flex-direction:column;justify-content:space-evenly;
    align-items:center;padding:3px 4px;gap:2px;
  `;
  if(!ghost&&team&&s.wr){
    const rowCount=interior?Math.max(1,Math.round(s.wr*.6)):s.wr;
    for(let wi=0;wi<rowCount;wi++){
      const row=document.createElement('div');
      row.style.cssText='display:flex;gap:2px;justify-content:center;width:100%;';
      for(let wj=0;wj<s.wc;wj++){
        const w=document.createElement('div');
        const delay=(wi*(s.wc||1)+wj)*.22+Math.random()*.55;
        w.style.cssText=`width:${(s.wc||1)>4?3:4}px;height:3px;border-radius:1px;flex-shrink:0;
          background:${color};box-shadow:0 0 4px ${team.glow};
          animation:winFlicker ${2.2+Math.random()*2.5}s ease-in-out ${delay}s infinite;`;
        row.appendChild(w);
      }
      front.appendChild(row);
    }
  }

  // ── RIGHT FACE ──
  const right=document.createElement('div');
  right.style.cssText=`
    position:absolute;left:${bx+bw}px;top:${by}px;
    width:${bh2}px;height:${bd}px;border-radius:0 ${rr} ${rr} 0;
    ${ghost
      ? `border-top:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.01);`
      : `
        border-top:   1px solid rgba(255,255,255,${.14*inten});
        border-right: 1px solid rgba(0,0,0,.42);
        border-bottom:1px solid rgba(0,0,0,.52);
        background:linear-gradient(to right,${rgba(team,.06*inten)},rgba(0,0,0,.25));
        `
    }
    transform-origin:left center;transform:rotateY(90deg);
  `;

  bld.appendChild(top);bld.appendChild(front);bld.appendChild(right);
  el.appendChild(bld);
}

// ── DOM BUILD ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++){
  for(let c=0;c<SIZE;c++){
    const el=document.createElement('div');
    el.className='cell';el.dataset.r=r;el.dataset.c=c;
    el.style.cssText=`width:${CELL}px;height:${CELL}px;`;

    ['tile-top','tile-front','tile-right'].forEach(cn=>{
      const d=document.createElement('div');d.className=cn;
      if(cn==='tile-front') d.style.height=GD+'px';
      if(cn==='tile-right') d.style.width=GD+'px';
      el.appendChild(d);
    });

    el.addEventListener('mouseenter',()=>{
      if(state[r][c]) return;
      const t=TEAMS[activeTeam];
      el.style.setProperty('--preview-bg',   `rgba(${t.r},${t.g},${t.b},.07)`);
      el.style.setProperty('--preview-border',`rgba(${t.r},${t.g},${t.b},.38)`);
    });
    el.addEventListener('mouseleave',()=>{
      ['--preview-bg','--preview-border'].forEach(p=>el.style.removeProperty(p));
    });
    el.addEventListener('click',()=>{
      if(state[r][c]) return;
      state[r][c]={teamIdx:activeTeam,si:Math.floor(Math.random()*SHAPES[activeTeam].length),home:false,new:true};
      renderCell(r,c,true);
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]) renderCell(nr,nc,false);
      });
      updateScores();
    });

    gridEl.appendChild(el);
    renderCell(r,c);
  }
}

function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return `<div class="team-pill${active?' active':''}"
      style="--tc-bg:rgba(${t.r},${t.g},${t.b},.07);--tc-border:rgba(${t.r},${t.g},${t.b},.35);--tc-glow:rgba(${t.r},${t.g},${t.b},.15);"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 8px ${t.glow};"></div>
      <div>
        <div class="tp-name" style="color:${active?t.color:'#3a4560'}">${t.wappen} ${t.name}</div>
        <div class="tp-count">${count} Felder${active?' · aktiv':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
</script>
</body>
</html>
