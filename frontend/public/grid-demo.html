<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quartier Quiz — 3D Grid Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::after,*::before{box-sizing:border-box;margin:0;padding:0;transform-style:preserve-3d}
html,body{width:100%;height:100%;background:#0D0A06;color:#e2e8f0;font-family:'Nunito',system-ui,sans-serif}
body{overflow-y:auto;overflow-x:hidden}

.grain{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence baseFrequency=".85" type="fractalNoise"/></filter><rect width="200" height="200" filter="url(%23n)" opacity=".03"/></svg>')}
.firefly{position:fixed;pointer-events:none;z-index:1;width:4px;height:4px;border-radius:50%;
  background:#FEF08A;box-shadow:0 0 6px 2px rgba(254,240,138,.7);
  animation:ffmove var(--dur,6s) ease-in-out var(--del,0s) infinite}
@keyframes ffmove{0%,100%{transform:translate(0,0);opacity:.35}50%{transform:translate(var(--dx,20px),var(--dy,-15px));opacity:.7}}

.page{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;padding:24px 20px 80px;gap:24px}
.section-title{font-size:clamp(20px,3vw,28px);font-weight:900;color:#F59E0B;text-shadow:0 0 20px rgba(245,158,11,.25)}
.section-sub{font-size:clamp(11px,1.4vw,13px);color:#92400E;font-weight:700;margin-top:-16px}

/* ═══ 3D GRID ═══ */
.grid-scene{perspective:800px;perspective-origin:50% 35%;padding:60px 0 20px;cursor:grab;user-select:none}
.grid-scene.dragging{cursor:grabbing}
.grid-scene.dragging .iso-grid{transition:none}
.iso-grid{
  display:grid;gap:4px;
  transform:scale(var(--zoom,1)) rotateX(var(--rx,55deg)) rotateZ(var(--rz,-45deg));
  transition:transform .15s ease-out;
}
.drag-hint{font-size:11px;color:#64748b;margin-top:-12px;font-weight:700;opacity:.7}
.tile{position:relative;cursor:pointer;transition:transform .15s ease}
.tile:not(.owned):hover .ground{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}
.ground{width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}

/* ═══ 6-FACE CUBE ═══ */
.cube{position:absolute;pointer-events:none;left:var(--ox,0px);top:var(--oy,0px);width:var(--bw,100%);height:var(--bd,100%)}
.c-top{position:absolute;left:0;top:0;width:var(--bw);height:var(--bd);border-radius:var(--tr,2px);transform:translateZ(var(--bh,30px))}
.c-front{position:absolute;left:0;bottom:0;width:var(--bw);height:var(--bh,30px);transform-origin:bottom center;transform:rotateX(-90deg)}
.c-back{position:absolute;left:0;top:0;width:var(--bw);height:var(--bh,30px);transform-origin:top center;transform:rotateX(90deg)}
.c-right{position:absolute;top:0;right:0;width:var(--bh,30px);height:var(--bd);transform-origin:center right;transform:rotateY(90deg)}
.c-left{position:absolute;top:0;left:0;width:var(--bh,30px);height:var(--bd);transform-origin:center left;transform:rotateY(-90deg)}
.c-emoji{position:absolute;left:0;top:0;width:var(--bw);height:var(--bd);transform:translateZ(calc(var(--bh,30px) + 2px));display:flex;align-items:center;justify-content:center;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8))}

/* (unused CSS removed — buildings use cubes + border-radius now) */

/* Score bar */
.score-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.team-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .25s;user-select:none;font-size:12px}
.team-pill.active{background:var(--tc-bg);border-color:var(--tc-border);box-shadow:0 0 20px var(--tc-glow)}
.tp-emoji{font-size:16px;line-height:1}
.tp-name{font-weight:800;color:#475569;font-size:12px}
.team-pill.active .tp-name{color:var(--tc-text)}
.tp-count{font-weight:900;font-size:10px;color:#1C1917;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:5px}
.team-pill.active .tp-count{background:var(--tc-count-bg);color:var(--tc-text)}

/* Showcase */
.showcases{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;width:100%;max-width:1200px}
.showcase-card{background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.showcase-card:hover{border-color:rgba(255,255,255,.12)}
.sc-header{display:flex;align-items:center;gap:10px}
.sc-icon{font-size:28px;line-height:1}
.sc-title{font-size:16px;font-weight:900}
.sc-desc{font-size:12px;color:#64748b;line-height:1.5}
.sc-stage{position:relative;height:180px;border-radius:12px;overflow:hidden;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
.sc-play{padding:10px 22px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;background:var(--sc-color,#F59E0B);color:#0D0A06;box-shadow:0 4px 16px var(--sc-glow,rgba(245,158,11,.3));transition:all .2s;align-self:center}
.sc-play:hover{transform:scale(1.04);filter:brightness(1.15)}

/* Gallery 4×2 */
.type-gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:700px}
.type-card{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(27,21,16,.6);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 10px 10px}
.type-card:hover{border-color:rgba(255,255,255,.12)}
.tc-stage{perspective:400px;perspective-origin:50% 35%;height:120px;width:100px;display:flex;align-items:center;justify-content:center}
.tc-iso{transform:rotateX(55deg) rotateZ(-45deg);position:relative;width:60px;height:60px}
.tc-name{font-size:11px;font-weight:800;color:#94a3b8;text-align:center}

/* Keyframes */
@keyframes stampRing{0%{transform:scale(.5);opacity:.8}100%{transform:scale(3);opacity:0}}
@keyframes shatterOut{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(.3) rotate(var(--sr,180deg))}}
@keyframes frostPulse{0%,100%{box-shadow:0 0 6px rgba(147,210,255,.4)}50%{box-shadow:0 0 16px rgba(147,210,255,.8)}}
@keyframes jokerBurst{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(2.5)}}
@keyframes starFall{0%{opacity:1;transform:translateY(var(--starY,-60px)) rotate(0)}100%{opacity:0;transform:translateY(20px) rotate(720deg)}}
@keyframes jokerGlow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.5)}50%{box-shadow:0 0 22px rgba(251,191,36,.9)}}
</style>
</head>
<body>
<div class="grain"></div>
<div id="fireflies"></div>

<div class="page">
<div class="section-title">Quartier Quiz</div>
<div class="section-sub">Klicke leere Felder zum Setzen — verbundene Felder verschmelzen zu größeren Gebäuden</div>

<div class="drag-hint">🖱 Ziehen = Drehen · Mausrad = Zoom · Doppelklick = Reset</div>
<div class="grid-scene" id="gridscene">
  <div class="iso-grid" id="grid"></div>
</div>
<div class="score-bar" id="scorebar"></div>

<div class="section-title" style="margin-top:8px">Gebäudetypen</div>
<div class="section-sub">8 Formen — Einzelgebäude + Verbund-Morphing</div>
<div class="type-gallery" id="typegallery"></div>

<div class="section-title" style="margin-top:8px">Animation Showcase</div>
<div class="section-sub">Klicke Play um jede Animation zu sehen</div>
<div class="showcases" id="showcases"></div>
</div>

<script>
const SIZE=7, CELL=64;

const TEAMS=[];
function mkTeam(hex,name,emoji){
  const m=hex.match(/#(..)(..)(..)/);
  const r=parseInt(m[1],16),g=parseInt(m[2],16),b=parseInt(m[3],16);
  return{color:hex,r,g,b,name,emoji};
}
TEAMS.push(mkTeam('#3B82F6','Fuchs','\u{1F98A}'));
TEAMS.push(mkTeam('#EF4444','Tiger','\u{1F42F}'));
TEAMS.push(mkTeam('#F97316','Eule','\u{1F989}'));
TEAMS.push(mkTeam('#22C55E','Frosch','\u{1F438}'));

function rca(t,a){return`rgba(${t.r},${t.g},${t.b},${a})`}

// ══════════════════════════════════════════════════════════════════════════════
// 8 BUILDING TYPES — extreme silhouette differences
// ══════════════════════════════════════════════════════════════════════════════
const BTYPES=[
  {name:'Haus',     id:'haus'},      // wide, medium height cube
  {name:'Turm',     id:'turm'},      // very narrow, very tall
  {name:'Hochhaus', id:'hochhaus'},   // medium, tallest, antenna + window grid
  {name:'Laden',    id:'laden'},      // very wide, very flat + awning shelf
  {name:'Fabrik',   id:'fabrik'},     // 2 cubes side by side, different heights (staircase)
  {name:'Kirche',   id:'kirche'},     // narrow tall with cross on top
  {name:'Burg',     id:'burg'},       // wide low wall + 2 corner towers
  {name:'Silo',     id:'silo'},       // round cylinder
];

// ══ HELPERS ══
function mkCube(parent, x, y, z, w, d, h, team, bm){
  bm=bm||1;
  const mc=document.createElement('div');mc.className='cube';
  mc.style.cssText=`--bw:${w}px;--bd:${d}px;--bh:${h}px;--ox:${x}px;--oy:${y}px;
    position:absolute;left:0;top:0;width:var(--bw);height:var(--bd);
    transform:translateZ(${z}px);pointer-events:none`;
  const t=document.createElement('div');t.className='c-top';
  t.style.cssText=`background:${rca(team,.92*bm)};border:1px solid ${rca(team,.65)}`;
  const f=document.createElement('div');f.className='c-front';
  f.style.cssText=`background:${rca(team,.72*bm)};border:1px solid ${rca(team,.50)}`;
  const bk=document.createElement('div');bk.className='c-back';
  bk.style.cssText=`background:${rca(team,.55*bm)};border:1px solid ${rca(team,.40)}`;
  const r=document.createElement('div');r.className='c-right';
  r.style.cssText=`background:${rca(team,.48*bm)};border:1px solid ${rca(team,.35)}`;
  const l=document.createElement('div');l.className='c-left';
  l.style.cssText=`background:${rca(team,.62*bm)};border:1px solid ${rca(team,.45)}`;
  mc.appendChild(t);mc.appendChild(f);mc.appendChild(bk);mc.appendChild(r);mc.appendChild(l);
  parent.appendChild(mc);
  return{el:mc, top:t, front:f, right:r};
}

function addWindows(face, w, h, rows, cols){
  for(let wr=0;wr<rows;wr++)for(let wc=0;wc<cols;wc++){
    const win=document.createElement('div');
    const wW=Math.max(3,Math.round(w*.14)), wH=Math.max(3,Math.round(h*.10));
    const gX=Math.round((w-cols*wW)/(cols+1)), gY=Math.round((h-rows*wH)/(rows+1));
    win.style.cssText=`position:absolute;width:${wW}px;height:${wH}px;
      left:${gX+wc*(wW+gX)}px;top:${gY+wr*(wH+gY)}px;
      background:rgba(255,255,200,.25);border:1px solid rgba(255,255,200,.08);border-radius:1px;pointer-events:none`;
    face.appendChild(win);
  }
}

// ══ MAIN BUILD FUNCTION ══
function buildBuilding(tileEl, cell, team, sz, btype, animate=false){
  Array.from(tileEl.children).forEach(ch=>{if(!ch.classList.contains('ground'))ch.remove()});
  if(!cell||!team)return;

  const bt=btype||BTYPES[0];
  let stackBonus=cell.stacked*Math.round(sz*.15);
  if(cell.joker) stackBonus+=Math.round(sz*.10);
  const homeMul=cell.home?1.2:1;

  let mainTop, mainFront, mainEl;
  let emojiZ=0; // z position for emoji

  if(bt.id==='haus'){
    // ── HAUS: wide, medium height, simple house ──
    const bw=Math.round(sz*.75), bd=Math.round(sz*.70);
    const bh=Math.round(sz*.35*homeMul)+stackBonus;
    const ox=Math.round((sz-bw)/2), oy=Math.round((sz-bd)/2);
    const c=mkCube(tileEl, ox, oy, 0, bw, bd, bh, team);
    mainEl=c.el; mainTop=c.top; mainFront=c.front;
    if(bh>=16&&bw>=16) addWindows(c.front, bw, bh, 1, 2);
    emojiZ=bh;
  }
  else if(bt.id==='turm'){
    // ── TURM: very narrow, very tall — like a tower ──
    const bw=Math.round(sz*.32), bd=Math.round(sz*.32);
    const bh=Math.round(sz*.85*homeMul)+stackBonus;
    const ox=Math.round((sz-bw)/2), oy=Math.round((sz-bd)/2);
    const c=mkCube(tileEl, ox, oy, 0, bw, bd, bh, team);
    mainEl=c.el; mainTop=c.top; mainFront=c.front;
    // Pointed roof = a smaller cube on top, tapered
    const roofW=Math.round(bw*.60), roofD=Math.round(bd*.60);
    const roofH=Math.round(bh*.30);
    const rox=ox+Math.round((bw-roofW)/2), roy=oy+Math.round((bd-roofD)/2);
    mkCube(tileEl, rox, roy, bh, roofW, roofD, roofH, team, 1.1);
    // Even smaller tip
    const tipW=Math.round(roofW*.45), tipD=Math.round(roofD*.45);
    const tipH=Math.round(roofH*.70);
    const tox2=rox+Math.round((roofW-tipW)/2), toy2=roy+Math.round((roofD-tipD)/2);
    mkCube(tileEl, tox2, toy2, bh+roofH, tipW, tipD, tipH, team, 1.2);
    if(bh>=20) addWindows(c.front, bw, bh, 3, 1);
    emojiZ=bh+roofH+tipH;
  }
  else if(bt.id==='hochhaus'){
    // ── HOCHHAUS: medium width, very tall, grid windows, antenna ──
    const bw=Math.round(sz*.55), bd=Math.round(sz*.55);
    const bh=Math.round(sz*.72*homeMul)+stackBonus;
    const ox=Math.round((sz-bw)/2), oy=Math.round((sz-bd)/2);
    const c=mkCube(tileEl, ox, oy, 0, bw, bd, bh, team);
    mainEl=c.el; mainTop=c.top; mainFront=c.front;
    if(bh>=20&&bw>=14) addWindows(c.front, bw, bh, 3, 2);
    // Antenna
    const ah=Math.round(bh*.30);
    const pole=document.createElement('div');
    pole.style.cssText=`position:absolute;left:${ox+Math.round(bw/2)-1}px;top:${oy+Math.round(bd/2)-1}px;
      width:2px;height:2px;transform:translateZ(${bh}px);pointer-events:none`;
    const shaft=document.createElement('div');
    shaft.style.cssText=`position:absolute;left:0;bottom:0;width:2px;height:${ah}px;
      transform-origin:bottom center;transform:rotateX(-90deg);background:rgba(255,255,255,.6)`;
    const dot=document.createElement('div');
    dot.style.cssText=`position:absolute;left:-3px;top:-3px;width:8px;height:8px;
      transform:translateZ(${ah}px);background:${rca(team,1)};border-radius:50%;
      box-shadow:0 0 6px ${rca(team,.8)}`;
    pole.appendChild(shaft);pole.appendChild(dot);tileEl.appendChild(pole);
    emojiZ=bh;
  }
  else if(bt.id==='laden'){
    // ── LADEN: very wide, very flat — like a shop with awning ──
    const bw=Math.round(sz*.82), bd=Math.round(sz*.65);
    const bh=Math.round(sz*.18*homeMul)+stackBonus;
    const ox=Math.round((sz-bw)/2), oy=Math.round((sz-bd)/2);
    const c=mkCube(tileEl, ox, oy, 0, bw, bd, bh, team);
    mainEl=c.el; mainTop=c.top; mainFront=c.front;
    // Big awning extending forward — contrasting brightness
    const aw=bw+6, ad=Math.round(bd*.40), ah=Math.round(sz*.04);
    const aox=ox-3, aoy=oy+bd-Math.round(ad*.25);
    mkCube(tileEl, aox, aoy, Math.round(bh*.60), aw, ad, ah, team, 1.2);
    emojiZ=bh;
  }
  else if(bt.id==='fabrik'){
    // ── FABRIK: 2 boxes side by side, different heights (staircase) ──
    const totalW=Math.round(sz*.80);
    const w1=Math.round(totalW*.55), w2=totalW-w1;
    const bd=Math.round(sz*.65);
    const h1=Math.round(sz*.50*homeMul)+stackBonus;
    const h2=Math.round(h1*.55); // shorter part
    const ox=Math.round((sz-totalW)/2), oy=Math.round((sz-bd)/2);
    // Tall part
    const c=mkCube(tileEl, ox, oy, 0, w1, bd, h1, team);
    mainEl=c.el; mainTop=c.top; mainFront=c.front;
    // Short part next to it
    mkCube(tileEl, ox+w1-1, oy, 0, w2+1, bd, h2, team, 0.9);
    // Chimney on tall part
    const cw=Math.round(w1*.28), cd=Math.round(bd*.22), ch=Math.round(h1*.25);
    mkCube(tileEl, ox+2, oy+2, h1, cw, cd, ch, team, 0.85);
    if(h1>=20) addWindows(c.front, w1, h1, 2, 1);
    emojiZ=h1+ch;
  }
  else if(bt.id==='kirche'){
    // ── KIRCHE: narrow body + very tall steeple with cross ──
    const bw=Math.round(sz*.45), bd=Math.round(sz*.65);
    const bh=Math.round(sz*.32*homeMul)+stackBonus;
    const ox=Math.round((sz-bw)/2), oy=Math.round((sz-bd)/2);
    const c=mkCube(tileEl, ox, oy, 0, bw, bd, bh, team);
    mainEl=c.el; mainTop=c.top; mainFront=c.front;
    // Tall steeple tower
    const tw=Math.round(bw*.55), td=Math.round(bd*.40);
    const th=Math.round(bh*1.1);
    const tox=ox+Math.round((bw-tw)/2), toy=oy+Math.round((bd-td)/2);
    mkCube(tileEl, tox, toy, bh, tw, td, th, team, 1.05);
    // Cross on top (2 bars)
    const crossH=Math.round(th*.45);
    const barW=2, barH=crossH;
    // Vertical bar
    const crossWrap=document.createElement('div');
    crossWrap.style.cssText=`position:absolute;left:${tox+Math.round(tw/2)-1}px;top:${toy+Math.round(td/2)-1}px;
      width:2px;height:2px;transform:translateZ(${bh+th}px);pointer-events:none`;
    const vBar=document.createElement('div');
    vBar.style.cssText=`position:absolute;left:0;bottom:0;width:3px;height:${crossH}px;
      transform-origin:bottom center;transform:rotateX(-90deg);
      background:rgba(255,255,255,.85);border-radius:1px`;
    crossWrap.appendChild(vBar);
    // Horizontal bar
    const hBarLen=Math.round(crossH*.55);
    const hBar=document.createElement('div');
    hBar.style.cssText=`position:absolute;left:${-Math.round(hBarLen/2)+1}px;top:-1px;width:${hBarLen}px;height:3px;
      transform:translateZ(${Math.round(crossH*.65)}px);
      background:rgba(255,255,255,.85);border-radius:1px`;
    crossWrap.appendChild(hBar);
    tileEl.appendChild(crossWrap);
    emojiZ=bh+th;
  }
  else if(bt.id==='burg'){
    // ── BURG: wide low wall + 2 tall corner towers ──
    const bw=Math.round(sz*.80), bd=Math.round(sz*.70);
    const bh=Math.round(sz*.20*homeMul)+stackBonus; // low wall
    const ox=Math.round((sz-bw)/2), oy=Math.round((sz-bd)/2);
    // Low main wall
    const c=mkCube(tileEl, ox, oy, 0, bw, bd, bh, team);
    mainEl=c.el; mainTop=c.top; mainFront=c.front;
    // Left tower (taller)
    const tw=Math.round(bw*.28), td=Math.round(bd*.30);
    const th=Math.round(bh*2.2);
    mkCube(tileEl, ox, oy, 0, tw, td, th, team, 1.05);
    // Right tower (taller)
    mkCube(tileEl, ox+bw-tw, oy, 0, tw, td, th, team, 1.05);
    emojiZ=th;
  }
  else if(bt.id==='silo'){
    // ── SILO: cylinder with rounded top ──
    const bw=Math.round(sz*.48), bd=Math.round(sz*.48);
    const bh=Math.round(sz*.50*homeMul)+stackBonus;
    const ox=Math.round((sz-bw)/2), oy=Math.round((sz-bd)/2);
    // Use cube but with heavy border-radius on all faces to look round
    const mc=document.createElement('div');mc.className='cube';
    mc.style.cssText=`--bw:${bw}px;--bd:${bd}px;--bh:${bh}px;
      position:absolute;left:0;top:0;width:${bw}px;height:${bd}px;
      transform:translateZ(0px);pointer-events:none;
      left:${ox}px;top:${oy}px`;
    // Top — circle
    const t=document.createElement('div');t.className='c-top';
    t.style.cssText=`background:radial-gradient(circle at 38% 32%, ${rca(team,1)} 0%, ${rca(team,.70)} 60%, ${rca(team,.40)} 100%);
      border:1px solid ${rca(team,.65)};border-radius:50%`;
    // Front — with horizontal border-radius for curved look
    const f=document.createElement('div');f.className='c-front';
    f.style.cssText=`background:linear-gradient(90deg, ${rca(team,.40)} 0%, ${rca(team,.75)} 35%, ${rca(team,.75)} 65%, ${rca(team,.40)} 100%);
      border:1px solid ${rca(team,.50)};border-radius:${Math.round(bw/2)}px / 4px`;
    const bk=document.createElement('div');bk.className='c-back';
    bk.style.cssText=`background:linear-gradient(90deg, ${rca(team,.30)} 0%, ${rca(team,.55)} 35%, ${rca(team,.55)} 65%, ${rca(team,.30)} 100%);
      border:1px solid ${rca(team,.40)};border-radius:${Math.round(bw/2)}px / 4px`;
    // Right — with vertical border-radius
    const r=document.createElement('div');r.className='c-right';
    r.style.cssText=`background:linear-gradient(90deg, ${rca(team,.25)} 0%, ${rca(team,.50)} 35%, ${rca(team,.50)} 65%, ${rca(team,.25)} 100%);
      border:1px solid ${rca(team,.35)};border-radius:4px / ${Math.round(bd/2)}px`;
    const l=document.createElement('div');l.className='c-left';
    l.style.cssText=`background:linear-gradient(90deg, ${rca(team,.35)} 0%, ${rca(team,.62)} 35%, ${rca(team,.62)} 65%, ${rca(team,.35)} 100%);
      border:1px solid ${rca(team,.42)};border-radius:4px / ${Math.round(bd/2)}px`;
    mc.appendChild(t);mc.appendChild(f);mc.appendChild(bk);mc.appendChild(r);mc.appendChild(l);
    tileEl.appendChild(mc);
    mainEl=mc; mainTop=t;
    emojiZ=bh;
  }

  // ── Emoji on top ──
  if(mainEl){
    const bt2=bt;
    // Figure out bounds for emoji centering
    const bw2=mainEl.style.width?parseInt(mainEl.style.width):sz;
    const bd2=mainEl.style.height?parseInt(mainEl.style.height):sz;
    const ox2=parseInt(mainEl.style.left)||0;
    const oy2=parseInt(mainEl.style.top)||0;
    const emoji=document.createElement('div');
    emoji.style.cssText=`position:absolute;left:0;top:0;width:${sz}px;height:${sz}px;
      transform:translateZ(${emojiZ+3}px);display:flex;align-items:center;justify-content:center;
      pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));
      font-size:${cell.home?Math.round(sz*.30):Math.round(sz*.22)}px`;
    if(cell.frozen){
      const esz=cell.home?Math.round(sz*.30):Math.round(sz*.22);
      emoji.innerHTML=`<span>${team.emoji}</span><span style="font-size:${Math.round(esz*.5)}px;margin-left:-1px;filter:drop-shadow(0 0 3px rgba(147,210,255,.8))">❄️</span>`;
    } else if(cell.joker){
      emoji.textContent='⭐';
    } else {
      emoji.textContent=team.emoji;
    }
    tileEl.appendChild(emoji);
  }

  // ── Frozen: ice on roof only ──
  if(cell.frozen && mainTop){
    mainTop.style.background='rgba(147,210,255,.50)';
    mainTop.style.border='2px solid rgba(147,210,255,.85)';
    mainTop.style.animation='frostPulse 2.5s ease-in-out infinite';
  }
  // ── Joker: golden roof ──
  if(cell.joker && mainTop){
    mainTop.style.background='rgba(251,191,36,.55)';
    mainTop.style.border='2px solid rgba(251,191,36,.9)';
    mainTop.style.animation='jokerGlow 2s ease-in-out infinite';
  }
  // ── Stack badge ──
  if(cell.stacked>0 && !cell.joker){
    const badge=document.createElement('div');
    badge.style.cssText=`position:absolute;left:${ox}px;top:${oy}px;width:${bw}px;height:${bd}px;
      transform:translateZ(${bh+8}px);display:flex;align-items:center;justify-content:center;pointer-events:none`;
    const span=document.createElement('span');
    span.style.cssText='font-size:9px;padding:1px 4px;border-radius:3px;background:rgba(251,191,36,.95);color:#1C1917;font-weight:900;font-family:Nunito,sans-serif';
    span.textContent='\u00D7'+(cell.stacked+1);
    badge.appendChild(span);tileEl.appendChild(badge);
  }
  // ── Animate ──
  if(animate && mainEl){
    mainEl.style.opacity='0';mainEl.style.transition='opacity .35s ease';
    requestAnimationFrame(()=>{mainEl.style.opacity='1'});
  }
}

// ══ STATE ══
let activeTeam=0;
const state=Array.from({length:SIZE},()=>Array(SIZE).fill(null));

function seed(r,c,t,home=false){
  state[r][c]={teamIdx:t,home,frozen:false,stacked:0,joker:false,
    btype:home?0:Math.floor(Math.random()*BTYPES.length)};
}
const S=SIZE-1;
seed(0,0,0,true);seed(0,1,0);seed(1,0,0);
seed(0,S,1,true);seed(0,S-1,1);seed(1,S,1);
seed(S,0,2,true);seed(S-1,0,2);seed(S,1,2);
seed(S,S,3,true);seed(S-1,S,3);seed(S,S-1,3);

// Fireflies
const ffC=document.getElementById('fireflies');
for(let i=0;i<16;i++){const el=document.createElement('div');el.className='firefly';
  el.style.left=Math.random()*100+'%';el.style.top=Math.random()*100+'%';
  el.style.setProperty('--dx',(Math.random()*60-30)+'px');el.style.setProperty('--dy',(Math.random()*60-30)+'px');
  el.style.setProperty('--dur',(4+Math.random()*6)+'s');el.style.setProperty('--del',(Math.random()*5)+'s');
  ffC.appendChild(el)}

// ══ RENDER ══
function renderTile(r,c){
  const el=document.querySelector(`#grid [data-r="${r}"][data-c="${c}"]`);
  if(!el)return;
  const cell=state[r][c];
  const ground=el.querySelector('.ground');
  // Clear everything except ground
  Array.from(el.children).forEach(ch=>{if(!ch.classList.contains('ground'))ch.remove()});
  if(!cell){
    el.classList.remove('owned');
    ground.style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)';
    return;
  }
  el.classList.add('owned');
  const team=TEAMS[cell.teamIdx];
  ground.style.cssText=`width:100%;height:100%;border-radius:3px;background:${rca(team,.15)};border:1px solid ${rca(team,.35)};box-shadow:0 0 10px ${rca(team,.20)}`;
  buildBuilding(el,cell,team,CELL,BTYPES[cell.btype||0]);
}

// ══ BUILD DOM ══
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
  const el=document.createElement('div');el.className='tile';
  el.dataset.r=r;el.dataset.c=c;
  el.style.cssText=`width:${CELL}px;height:${CELL}px`;
  const ground=document.createElement('div');ground.className='ground';
  el.appendChild(ground);
  el.addEventListener('click',()=>{
    if(state[r][c])return;
    const bt=Math.floor(Math.random()*BTYPES.length);
    state[r][c]={teamIdx:activeTeam,home:false,frozen:false,stacked:0,joker:false,btype:bt};
    renderTile(r,c);
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE)renderTile(nr,nc)});
    updateScores();
  });
  gridEl.appendChild(el);renderTile(r,c);
}

// ══ DRAG / ZOOM ══
{
  const scene=document.getElementById('gridscene');
  let rx=55, rz=-45, zoom=1;
  let dragging=false, startX=0, startY=0, startRx=0, startRz=0, didDrag=false;

  function applyTransform(){
    gridEl.style.setProperty('--rx',rx+'deg');
    gridEl.style.setProperty('--rz',rz+'deg');
    gridEl.style.setProperty('--zoom',zoom);
  }
  scene.addEventListener('mousedown',e=>{dragging=true;didDrag=false;startX=e.clientX;startY=e.clientY;startRx=rx;startRz=rz;scene.classList.add('dragging');e.preventDefault()});
  window.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-startX,dy=e.clientY-startY;if(Math.abs(dx)>3||Math.abs(dy)>3)didDrag=true;rz=startRz+dx*.4;rx=Math.max(15,Math.min(75,startRx-dy*.3));applyTransform()});
  window.addEventListener('mouseup',()=>{if(dragging){dragging=false;scene.classList.remove('dragging')}});
  scene.addEventListener('click',e=>{if(didDrag){e.stopPropagation();didDrag=false}},true);
  scene.addEventListener('dblclick',e=>{rx=55;rz=-45;zoom=1;applyTransform();e.preventDefault()});
  scene.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.4,Math.min(2.5,zoom+(e.deltaY>0?-.08:.08)));applyTransform()},{passive:false});
  scene.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;didDrag=false;startX=e.touches[0].clientX;startY=e.touches[0].clientY;startRx=rx;startRz=rz}},{passive:true});
  window.addEventListener('touchmove',e=>{if(!dragging||e.touches.length!==1)return;const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;if(Math.abs(dx)>3||Math.abs(dy)>3)didDrag=true;rz=startRz+dx*.4;rx=Math.max(15,Math.min(75,startRx-dy*.3));applyTransform()},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false});
  let pinchStart=0;
  scene.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchStart=Math.sqrt(dx*dx+dy*dy)}},{passive:true});
  scene.addEventListener('touchmove',e=>{if(e.touches.length===2&&pinchStart>0){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);zoom=Math.max(.4,Math.min(2.5,zoom*(dist/pinchStart)));pinchStart=dist;applyTransform();e.preventDefault()}},{passive:false});
}

// Scores
function updateScores(){
  document.getElementById('scorebar').innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;const active=i===activeTeam;
    return`<div class="team-pill${active?' active':''}" style="--tc-bg:${rca(t,.08)};--tc-border:${rca(t,.45)};--tc-glow:${rca(t,.2)};--tc-text:${t.color};--tc-count-bg:${rca(t,.15)}" onclick="selectTeam(${i})"><span class="tp-emoji">${t.emoji}</span><span class="tp-name">${t.name}</span><span class="tp-count">${count}</span></div>`}).join('')}
window.selectTeam=i=>{activeTeam=i;updateScores()};updateScores();

// ══ GALLERY ══
const galEl=document.getElementById('typegallery');
BTYPES.forEach((bt,i)=>{
  const card=document.createElement('div');card.className='type-card';
  const stage=document.createElement('div');stage.className='tc-stage';
  const iso=document.createElement('div');iso.className='tc-iso';iso.style.cssText='width:60px;height:60px';
  const ground=document.createElement('div');ground.className='ground';
  ground.style.cssText=`width:100%;height:100%;border-radius:3px;background:${rca(TEAMS[i%4],.15)};border:1px solid ${rca(TEAMS[i%4],.35)}`;
  iso.appendChild(ground);
  buildBuilding(iso,{home:false,frozen:false,stacked:0,joker:false,btype:i},TEAMS[i%4],60,bt);
  stage.appendChild(iso);
  const label=document.createElement('div');label.className='tc-name';
  label.textContent=bt.name;
  card.appendChild(stage);card.appendChild(label);
  galEl.appendChild(card);
});

// ══ SHOWCASE ══
const T_BLUE=TEAMS[0],T_RED=TEAMS[1];
function miniStage(stage,cols,rows,sz,cells){
  stage.innerHTML='';
  const scene=document.createElement('div');
  scene.style.cssText='perspective:500px;perspective-origin:50% 35%';
  const grid=document.createElement('div');
  grid.style.cssText=`display:grid;gap:3px;grid-template-columns:repeat(${cols},${sz}px);grid-template-rows:repeat(${rows},${sz}px);transform:rotateX(55deg) rotateZ(-45deg)`;
  const map={};
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const tile=document.createElement('div');tile.className='tile';tile.style.cssText=`width:${sz}px;height:${sz}px;position:relative`;
    const ground=document.createElement('div');ground.className='ground';ground.style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)';
    tile.appendChild(ground);grid.appendChild(tile);map[`${r},${c}`]=tile;
  }
  scene.appendChild(grid);stage.appendChild(scene);
  cells.forEach(([r,c,team,home,btIdx])=>{
    const tile=map[`${r},${c}`];if(!tile)return;
    tile.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rca(team,.15)};border:1px solid ${rca(team,.35)};box-shadow:0 0 8px ${rca(team,.2)}`;
    const bi=btIdx!=null?btIdx:0;
    buildBuilding(tile,{home:!!home,frozen:false,stacked:0,joker:false,btype:bi},team,sz,BTYPES[bi]);
  });
  return{grid,map,stage,sz};
}
function fxRing(p,color,d=0){const r=document.createElement('div');r.style.cssText=`position:absolute;left:50%;top:50%;width:24px;height:24px;margin:-12px;border-radius:50%;border:2px solid ${color};pointer-events:none;z-index:20;animation:stampRing .7s ease-out ${d}s both`;p.appendChild(r);setTimeout(()=>r.remove(),900)}
function fxShatter(p,color,n=10){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=18+Math.random()*25,el=document.createElement('div');el.style.cssText=`position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px;border-radius:1px;background:${color};pointer-events:none;z-index:20;--sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;--sr:${Math.random()*360}deg;animation:shatterOut .55s ease-out ${Math.random()*.08}s both`;p.appendChild(el);setTimeout(()=>el.remove(),700)}}

function playPlace(stage){const SZ=42,bt=Math.floor(Math.random()*BTYPES.length);const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,0],[0,1,T_BLUE,false,2],[1,0,T_BLUE,false,4]]);const target=map['1,1'];setTimeout(()=>{target.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rca(T_BLUE,.15)};border:1px solid ${rca(T_BLUE,.35)};box-shadow:0 0 8px ${rca(T_BLUE,.2)}`;buildBuilding(target,{home:false,frozen:false,stacked:0,joker:false,btype:bt},T_BLUE,SZ,BTYPES[bt],true);fxRing(target,T_BLUE.color);fxRing(target,T_BLUE.color,.12);fxShatter(target,T_BLUE.color,6)},500);setTimeout(()=>playPlace(stage),3500)}
function playSteal(stage){const SZ=42;const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,1],[0,1,T_BLUE,false,3],[1,0,T_BLUE,false,0],[1,1,T_RED,false,6]]);const target=map['1,1'];setTimeout(()=>{fxShatter(target,T_RED.color,12);const oldCubes=target.querySelectorAll('.cube,.cylinder');oldCubes.forEach(b=>{b.style.transition='opacity .2s';b.style.opacity='0';setTimeout(()=>b.remove(),250)});setTimeout(()=>{target.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rca(T_BLUE,.15)};border:1px solid ${rca(T_BLUE,.35)}`;const bt=Math.floor(Math.random()*BTYPES.length);buildBuilding(target,{home:false,frozen:false,stacked:0,joker:false,btype:bt},T_BLUE,SZ,BTYPES[bt],true)},300)},500);setTimeout(()=>playSteal(stage),3800)}
function playFreeze(stage){const SZ=42;const{map}=miniStage(stage,3,3,SZ,[[1,1,T_RED,false,0]]);const target=map['1,1'];setTimeout(()=>{for(let i=0;i<6;i++){const cr=document.createElement('div'),a=i*(Math.PI*2/6),d=22;cr.style.cssText=`position:absolute;left:50%;top:50%;font-size:10px;pointer-events:none;z-index:20;--sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;animation:shatterOut .7s ease-out ${i*.04}s both`;cr.textContent='\u2744';target.appendChild(cr);setTimeout(()=>cr.remove(),900)}setTimeout(()=>{target.querySelector('.ground').style.cssText='width:100%;height:100%;border-radius:3px;background:rgba(147,210,255,.12);border:1px solid rgba(147,210,255,.4)';buildBuilding(target,{home:false,frozen:true,stacked:0,joker:false,btype:0},T_RED,SZ,BTYPES[0])},400)},500);setTimeout(()=>playFreeze(stage),4000)}
function playStack(stage){const SZ=42;const{map}=miniStage(stage,3,3,SZ,[[1,0,T_BLUE,false,3],[1,1,T_BLUE,false,2],[1,2,T_BLUE,false,5]]);const target=map['1,1'];let count=0;function once(){count++;fxRing(target,'#FBBF24');buildBuilding(target,{home:false,frozen:false,stacked:count,joker:false,btype:2},T_BLUE,SZ,BTYPES[2],true)}setTimeout(once,500);setTimeout(once,1200);setTimeout(once,1900);setTimeout(()=>playStack(stage),4200)}
function playJoker(stage){const SZ=38;const{map}=miniStage(stage,3,3,SZ,[[0,0,T_BLUE,false,4],[0,1,T_BLUE,false,1],[1,0,T_BLUE,false,7]]);setTimeout(()=>{const t=map['1,1'];t.querySelector('.ground').style.cssText=`width:100%;height:100%;border-radius:3px;background:${rca(T_BLUE,.15)};border:1px solid ${rca(T_BLUE,.35)}`;buildBuilding(t,{home:false,frozen:false,stacked:0,joker:false,btype:0},T_BLUE,SZ,BTYPES[0],true)},500);setTimeout(()=>{[[0,0],[0,1],[1,0],[1,1]].forEach(([r,c],idx)=>{const tile=map[`${r},${c}`];tile.querySelector('.ground').style.cssText='width:100%;height:100%;border-radius:3px;border:1px solid rgba(251,191,36,.7);box-shadow:0 0 12px rgba(251,191,36,.4);background:rgba(251,191,36,.06)';buildBuilding(tile,{home:false,frozen:false,stacked:0,joker:true,btype:[4,1,7,0][idx]},T_BLUE,SZ,BTYPES[[4,1,7,0][idx]])});for(let i=0;i<8;i++){const star=document.createElement('div');star.style.cssText=`position:absolute;left:${30+Math.random()*40}%;top:40%;font-size:${10+Math.random()*8}px;pointer-events:none;z-index:20;--starY:${-30-Math.random()*30}px;animation:starFall ${.4+Math.random()*.3}s ease-out ${Math.random()*.2}s both`;star.textContent='\u2B50';stage.appendChild(star);setTimeout(()=>star.remove(),900)}},1200);setTimeout(()=>playJoker(stage),4800)}

const CARDS=[
  {icon:'\u{1F4CD}',title:'Setzen',color:'#22C55E',desc:'Leeres Feld erobern. Zufälliger Gebäudetyp steigt aus dem Boden.',play:playPlace},
  {icon:'\u26A1',title:'Klauen',color:'#EF4444',desc:'Gegnerisches Gebäude übernehmen. Alte Farbe zerbröckelt, neues steigt auf.',play:playSteal},
  {icon:'\u2744\uFE0F',title:'Einfrieren',color:'#93D2FF',desc:'Feld schützen. Nur das Dach wird eisblau — Wände behalten die Teamfarbe.',play:playFreeze},
  {icon:'\u{1F4CC}',title:'Stapeln',color:'#FBBF24',desc:'Eigenes Feld verstärken. Gebäude wächst höher (3×).',play:playStack},
  {icon:'\u2B50',title:'Joker (2\u00D72)',color:'#F59E0B',desc:'Vier Felder = Quadrat. Goldene Burst-Ringe, Sternenregen.',play:playJoker},
];
const scC=document.getElementById('showcases');
CARDS.forEach(card=>{
  const div=document.createElement('div');div.className='showcase-card';
  div.innerHTML=`<div class="sc-header"><span class="sc-icon">${card.icon}</span><span class="sc-title" style="color:${card.color}">${card.title}</span></div><div class="sc-desc">${card.desc}</div><div class="sc-stage"></div><button class="sc-play" style="--sc-color:${card.color};--sc-glow:${card.color}44">\u25B6 Play</button>`;
  const stageEl=div.querySelector('.sc-stage');
  function bind(){const btn=div.querySelector('.sc-play');btn.textContent='\u25B6 Play';btn.onclick=()=>{stageEl.innerHTML='';card.play(stageEl);btn.textContent='\u23F9 Stop';btn.onclick=()=>{stageEl.innerHTML='';bind()}}}
  bind();scC.appendChild(div);
});
</script>
