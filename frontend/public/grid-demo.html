<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarter Quiz — City Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 50% 40%, #0e1220 0%, #04050a 100%);
  min-height: 100vh;
  color: #f1f5f9;
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 36px;
  padding: 40px;
  overflow: hidden;
}

h2 {
  font-size: 11px;
  color: #1a2035;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-weight: 700;
}

/* ── BOARD BASE ── */
.board-wrap {
  position: relative;
  padding: 32px;
}
.board-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.025) 0%, transparent 70%);
  pointer-events: none;
}
/* Subtle global grid pattern behind everything */
.board-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 80%);
}

/* ── ISO SCENE ── */
.iso-scene {
  perspective: 1400px;
  perspective-origin: 50% 12%;
  position: relative;
  z-index: 2;
}

.iso-grid {
  transform: rotateX(52deg) rotateZ(-45deg);
  transform-style: preserve-3d;
  display: grid;
  gap: 3px;
}

/* ── CELL ── */
.cell {
  position: relative;
  transform-style: preserve-3d;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── TILE FACES ── */
.tile-top {
  position: absolute; inset: 0; z-index: 2;
  border-radius: 1px;
  transition: all 0.25s ease;
}
/* Inner depth shadow */
.tile-top::after {
  content: '';
  position: absolute; inset: 0; border-radius: 1px;
  background: radial-gradient(circle at 28% 28%, rgba(0,0,0,0.32), transparent 65%);
  pointer-events: none; z-index: 1;
}

.tile-front {
  position: absolute; top: 100%; left: 0; right: 0;
  transform-origin: top center; transform: rotateX(-90deg);
  z-index: 1; transition: all 0.25s ease;
}
.tile-right {
  position: absolute; top: 0; bottom: 0; left: 100%;
  transform-origin: left center; transform: rotateY(90deg);
  z-index: 1; transition: all 0.25s ease;
}

/* ── EMPTY CELL ── */
.cell.empty .tile-top {
  background: rgba(255,255,255,0.022);
  border: 1px solid rgba(255,255,255,0.07);
}
.cell.empty .tile-front { background: #060810; border: 1px solid rgba(255,255,255,0.04); border-top: none; }
.cell.empty .tile-right { background: #050710; border: 1px solid rgba(255,255,255,0.03); border-left: none; }

/* hover on empty — preview active team color */
.cell.empty:hover { transform: translateZ(5px); }
.cell.empty:hover .tile-top {
  background: var(--preview-bg, rgba(255,255,255,0.04));
  border-color: var(--preview-border, rgba(255,255,255,0.15));
  box-shadow: var(--preview-glow, 0 0 14px rgba(255,255,255,0.1));
}

/* ── OWNED CELL ── */
.cell.owned { cursor: default; }
.cell.owned:hover { transform: translateZ(3px); }

/* ── EDGE BORDERS — outer territory stronger, inner weaker ── */
/* Applied via JS: data-edges="top,left" etc */
.cell[data-edge-top]    .tile-top { box-shadow: inset 0  3px 0 var(--edge-color) !important; }
.cell[data-edge-bottom] .tile-top { box-shadow: inset 0 -3px 0 var(--edge-color) !important; }
.cell[data-edge-left]   .tile-top { box-shadow: inset  3px 0 0 var(--edge-color) !important; }
.cell[data-edge-right]  .tile-top { box-shadow: inset -3px 0 0 var(--edge-color) !important; }

/* ── BUILDING ── */
.building {
  position: absolute; transform-style: preserve-3d;
  z-index: 20; pointer-events: none;
}
.bld-top, .bld-front, .bld-right { position: absolute; }

/* ── ANIMATIONS ── */
@keyframes growUp {
  0%   { transform: scaleZ(0) translateZ(-10px); opacity: 0; }
  50%  { opacity: 1; }
  80%  { transform: scaleZ(1.07) translateZ(0); }
  100% { transform: scaleZ(1) translateZ(0); }
}

@keyframes claimPop {
  0%   { transform: translateZ(0) scale(1); }
  25%  { transform: translateZ(12px) scale(1.04); }
  60%  { transform: translateZ(-2px) scale(0.99); }
  100% { transform: translateZ(0) scale(1); }
}

@keyframes idlePulse {
  0%,100% { opacity: 0.82; }
  50%      { opacity: 1; }
}

@keyframes winFlicker {
  0%,100% { opacity: 1; }
  44% { opacity: 1; }
  47% { opacity: 0.25; }
  50% { opacity: 1; }
  78% { opacity: 0.7; }
}

@keyframes dominantPulse {
  0%,100% { box-shadow: var(--glow-base); }
  50%      { box-shadow: var(--glow-strong); }
}

/* ── SCORE BAR ── */
.score-bar {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.team-pill {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer; transition: all 0.15s ease; user-select: none;
}
.team-pill:hover { transform: translateY(-2px); }
.team-pill.active {
  background: var(--tc-bg);
  border-color: var(--tc-border);
  box-shadow: 0 0 18px var(--tc-glow);
}
.tp-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.tp-name  { font-size: 13px; font-weight: 700; }
.tp-count { font-size: 11px; color: #2d3748; font-weight: 600; }

.hint { font-size: 11px; color: #141b28; letter-spacing: 0.05em; }
</style>
</head>
<body>

<h2>Quarter Quiz — City Grid</h2>

<div class="board-wrap">
  <div class="iso-scene">
    <div class="iso-grid" id="grid"></div>
  </div>
</div>

<div class="score-bar" id="scorebar"></div>
<div class="hint">Team auswählen → leeres Feld anklicken</div>

<script>
const SIZE = 6, CELL = 72, GD = 10;

const TEAMS = [
  { color:'#5aadff', glow:'rgba(90,173,255,0.6)',  soft:'rgba(90,173,255,0.18)',  name:'Die Clique',   wappen:'⚓', intensity:0.75 },
  { color:'#ff4f4f', glow:'rgba(255,79,79,0.7)',   soft:'rgba(255,79,79,0.2)',    name:'Rote Karte',   wappen:'🔺', intensity:1.0  },
  { color:'#3ddc84', glow:'rgba(61,220,132,0.6)',  soft:'rgba(61,220,132,0.18)',  name:'Grüne Hölle',  wappen:'🌿', intensity:0.82 },
  { color:'#ffaa3c', glow:'rgba(255,170,60,0.7)',  soft:'rgba(255,170,60,0.2)',   name:'Oranje',       wappen:'⚡', intensity:0.9  },
  { color:'#c084fc', glow:'rgba(192,132,252,0.6)', soft:'rgba(192,132,252,0.18)', name:'Nachtschicht', wappen:'☽', intensity:0.78 },
  { color:'#2dd4bf', glow:'rgba(45,212,191,0.6)',  soft:'rgba(45,212,191,0.18)',  name:'Tiefsee',      wappen:'🐋', intensity:0.8  },
];

// Per-team shape personalities
const SHAPES = {
  0: [ // Blue — narrow towers
    {w:.26,d:.26,h:60,wr:4,wc:1}, {w:.30,d:.30,h:50,wr:3,wc:2}, {w:.20,d:.20,h:72,wr:5,wc:1}
  ],
  1: [ // Red — wide brutal blocks
    {w:.60,d:.44,h:20,wr:1,wc:4}, {w:.54,d:.40,h:26,wr:2,wc:3}, {w:.62,d:.42,h:18,wr:1,wc:5}
  ],
  2: [ // Green — organic medium, rounded
    {w:.46,d:.46,h:34,wr:2,wc:2,rnd:true}, {w:.52,d:.42,h:28,wr:2,wc:2,rnd:true}, {w:.40,d:.40,h:42,wr:3,wc:2,rnd:true}
  ],
  3: [ // Orange — asymmetric industrial
    {w:.36,d:.54,h:38,wr:2,wc:2}, {w:.28,d:.60,h:44,wr:3,wc:1}, {w:.46,d:.46,h:30,wr:2,wc:3}
  ],
  4: [ // Purple — slim spires
    {w:.22,d:.22,h:68,wr:5,wc:1}, {w:.18,d:.18,h:78,wr:6,wc:1}, {w:.26,d:.26,h:58,wr:4,wc:1}
  ],
  5: [ // Teal — wide flat docks
    {w:.64,d:.34,h:18,wr:1,wc:5}, {w:.58,d:.38,h:22,wr:2,wc:4}, {w:.66,d:.32,h:16,wr:1,wc:6}
  ],
};

const GHOST = [
  {w:.38,d:.38,h:28}, {w:.26,d:.26,h:46}, {w:.54,d:.36,h:20},
  {w:.30,d:.30,h:40}, {w:.44,d:.44,h:26}, {w:.22,d:.22,h:54},
];

const state = Array.from({length:SIZE}, ()=>Array(SIZE).fill(null));
let activeTeam = 0;

function seed(r,c,t,home=false) {
  const sh = SHAPES[t]; state[r][c]={teamIdx:t,si:Math.floor(Math.random()*sh.length),home,new:false};
}
seed(0,0,0,true); seed(0,1,0); seed(1,0,0); seed(1,1,0); seed(2,0,0);
seed(0,5,1,true); seed(0,4,1); seed(1,5,1); seed(1,4,1);
seed(5,0,2,true); seed(4,0,2); seed(5,1,2); seed(4,1,2);
seed(5,5,3,true); seed(4,5,3); seed(5,4,3);

// ── HELPERS ──
function rgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}
function rgba(hex,a){const[r,g,b]=rgb(hex);return`rgba(${r},${g},${b},${a})`;}

function sameTeam(r,c,ti){ return r>=0&&r<SIZE&&c>=0&&c<SIZE&&state[r][c]?.teamIdx===ti; }
function adjCount(r,c,ti){ return [[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>sameTeam(r+dr,c+dc,ti)).length; }
function isEdge(r,c,dr,dc){ return !sameTeam(r+dr,c+dc,state[r][c]?.teamIdx); }

// ── UPDATE CELL EDGES ──
function updateEdges(el,r,c){
  const cell=state[r][c]; if(!cell) return;
  const team=TEAMS[cell.teamIdx];
  const edgeColor = rgba(team.color, 0.55);
  el.style.setProperty('--edge-color', edgeColor);
  el.removeAttribute('data-edge-top'); el.removeAttribute('data-edge-bottom');
  el.removeAttribute('data-edge-left'); el.removeAttribute('data-edge-right');
  if(isEdge(r,c,-1,0)) el.setAttribute('data-edge-top','');
  if(isEdge(r,c,1,0))  el.setAttribute('data-edge-bottom','');
  if(isEdge(r,c,0,-1)) el.setAttribute('data-edge-left','');
  if(isEdge(r,c,0,1))  el.setAttribute('data-edge-right','');
}

// ── RENDER CELL ──
function renderCell(r,c,animate=false){
  const cell=state[r][c];
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;
  el.querySelectorAll('.building,.b-icon').forEach(e=>e.remove());
  el.className='cell '+(cell?'owned':'empty');

  const tTop=el.querySelector('.tile-top');
  const tFront=el.querySelector('.tile-front');
  const tRight=el.querySelector('.tile-right');

  if(!cell){
    tTop.style.cssText='position:absolute;inset:0;z-index:2;border-radius:1px;background:rgba(255,255,255,0.022);border:1px solid rgba(255,255,255,0.07);transition:all 0.2s ease;';
    tFront.style.cssText='position:absolute;top:100%;left:0;right:0;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:#060810;border:1px solid rgba(255,255,255,0.04);border-top:none;';
    tRight.style.cssText='position:absolute;top:0;bottom:0;left:100%;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:#050710;border:1px solid rgba(255,255,255,0.03);border-left:none;';
    tFront.style.height=GD+'px'; tRight.style.width=GD+'px';
    buildGhost(el,(r*SIZE+c)%GHOST.length);
    return;
  }

  const team=TEAMS[cell.teamIdx];
  const adj=adjCount(r,c,cell.teamIdx);
  const isHome=cell.home;
  const inten=team.intensity;

  // Glow strength based on adjacency + home
  const glowBase   = isHome
    ? `0 0 22px ${rgba(team.color,0.75*inten)}, 0 0 44px ${rgba(team.color,0.35*inten)}`
    : adj===0
      ? `0 0 8px ${rgba(team.color,0.45*inten)}`
      : adj<=2
        ? `0 0 14px ${rgba(team.color,0.6*inten)}, 0 0 28px ${rgba(team.color,0.25*inten)}`
        : `0 0 20px ${rgba(team.color,0.75*inten)}, 0 0 40px ${rgba(team.color,0.35*inten)}, 0 0 64px ${rgba(team.color,0.12*inten)}`;

  const glowStrong = isHome
    ? `0 0 32px ${rgba(team.color,0.9*inten)}, 0 0 64px ${rgba(team.color,0.5*inten)}`
    : `0 0 28px ${rgba(team.color,0.9*inten)}, 0 0 56px ${rgba(team.color,0.45*inten)}, 0 0 80px ${rgba(team.color,0.18*inten)}`;

  tTop.style.cssText=`
    position:absolute;inset:0;z-index:2;border-radius:1px;
    background:${rgba(team.color,isHome?0.18:adj>2?0.13:0.07)};
    border:${isHome?'2px':'1px'} solid ${rgba(team.color,isHome?0.65:0.38)};
    --glow-base:${glowBase};
    --glow-strong:${glowStrong};
    box-shadow:${glowBase};
    transition:box-shadow 0.4s ease;
    ${(adj>=3||isHome)?`animation:dominantPulse ${isHome?2.5:3.5}s ease-in-out infinite;`:''}
  `;

  tFront.style.cssText=`position:absolute;top:100%;left:0;right:0;height:${GD}px;transform-origin:top center;transform:rotateX(-90deg);z-index:1;background:${rgba(team.color,0.04)};border-left:1px solid ${rgba(team.color,0.14)};border-bottom:1px solid ${rgba(team.color,0.1)};`;
  tRight.style.cssText=`position:absolute;top:0;bottom:0;left:100%;width:${GD}px;transform-origin:left center;transform:rotateY(90deg);z-index:1;background:${rgba(team.color,0.03)};border-top:1px solid ${rgba(team.color,0.1)};border-right:1px solid ${rgba(team.color,0.08)};`;

  updateEdges(el,r,c);

  const shapes=SHAPES[cell.teamIdx];
  const s=shapes[cell.si%shapes.length];
  const bs=isHome?{...s,h:Math.round(s.h*1.65),w:s.w*1.15,d:s.d*1.15}:s;
  buildBuilding(el,bs,team,animate||cell.new);
  if(cell.new) cell.new=false;

  if(isHome||cell.joker||cell.stuck){
    const icon=document.createElement('div');
    icon.className='b-icon';
    icon.style.cssText=`position:absolute;bottom:4px;right:5px;font-size:10px;z-index:30;filter:drop-shadow(0 0 6px ${team.color});line-height:1;`;
    icon.textContent=cell.stuck?'📌':cell.joker?'⭐':team.wappen;
    el.appendChild(icon);
  }

  if(animate){
    el.style.animation='claimPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both';
    setTimeout(()=>el.style.animation='',800);
  }
}

function buildGhost(el,gi){
  const s=GHOST[gi]; buildBuilding(el,s,null,false);
}

function buildBuilding(el,s,team,animate){
  const bw=CELL*s.w, bd=CELL*s.d, bh=s.h;
  const bx=(CELL-bw)/2, by=(CELL-bd)/2;
  const rr=s.rnd?'5px':'1px';
  const ghost=!team;
  const color=team?team.color:'#253050';
  const bA=ghost?0.14:0.92;
  const bgA=ghost?0:0.08;
  const inten=team?team.intensity:1;

  const bld=document.createElement('div');
  bld.className='building';
  if(animate){bld.style.transformOrigin='center bottom';bld.style.animation='growUp 0.9s cubic-bezier(0.34,1.5,0.64,1) both';}
  if(!ghost&&!animate){bld.style.animation=`idlePulse ${3+Math.random()*2}s ease-in-out ${Math.random()*2}s infinite`;}

  // Top face
  const top=document.createElement('div');
  top.className='bld-top';
  top.style.cssText=`
    left:${bx}px;top:${by}px;width:${bw}px;height:${bd}px;
    border:${ghost?'1px':'1.5px'} solid ${rgba(color,bA)};
    background:${rgba(color,bgA)};border-radius:${rr};z-index:3;
    ${!ghost?`box-shadow:0 0 ${Math.round(14*inten)}px ${team.glow},inset 0 0 8px ${rgba(color,0.12)};`:''}
  `;

  // Front face
  const front=document.createElement('div');
  front.className='bld-front';
  front.style.cssText=`
    left:${bx}px;top:${by+bd}px;width:${bw}px;height:${bh}px;
    border-left:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.85)};
    border-right:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.85)};
    border-bottom:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.55)};
    background:linear-gradient(to bottom,${rgba(color,bgA*1.8)},${rgba(color,bgA*0.5)});
    ${!ghost?`box-shadow:0 6px 18px ${team.soft};`:''}
    transform-origin:top center;transform:rotateX(-90deg);
    overflow:hidden;display:flex;flex-direction:column;
    justify-content:space-evenly;align-items:center;padding:3px 4px;gap:2px;
  `;

  if(!ghost&&team&&s.wr){
    for(let wi=0;wi<s.wr;wi++){
      const row=document.createElement('div');
      row.style.cssText='display:flex;gap:2px;justify-content:center;width:100%;';
      for(let wj=0;wj<s.wc;wj++){
        const w=document.createElement('div');
        const delay=(wi*(s.wc||1)+wj)*0.22+Math.random()*0.6;
        w.style.cssText=`width:${(s.wc||1)>4?3:4}px;height:3px;border-radius:1px;flex-shrink:0;
          background:${color};box-shadow:0 0 5px ${team.glow};
          animation:winFlicker ${2.2+Math.random()*2.5}s ease-in-out ${delay}s infinite;`;
        row.appendChild(w);
      }
      front.appendChild(row);
    }
  }

  // Right face
  const right=document.createElement('div');
  right.className='bld-right';
  right.style.cssText=`
    left:${bx+bw}px;top:${by}px;width:${bh}px;height:${bd}px;
    border-top:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.5)};
    border-right:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.5)};
    border-bottom:${ghost?'1px':'1.5px'} solid ${rgba(color,bA*0.32)};
    background:${rgba(color,bgA*0.4)};
    transform-origin:left center;transform:rotateY(90deg);border-radius:0 ${rr} ${rr} 0;
  `;

  bld.appendChild(top);bld.appendChild(front);bld.appendChild(right);
  el.appendChild(bld);
}

// ── BUILD DOM ──
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${SIZE},${CELL}px)`;
gridEl.style.gridTemplateRows=`repeat(${SIZE},${CELL}px)`;

for(let r=0;r<SIZE;r++){
  for(let c=0;c<SIZE;c++){
    const el=document.createElement('div');
    el.className='cell'; el.dataset.r=r; el.dataset.c=c;
    el.style.width=CELL+'px'; el.style.height=CELL+'px';

    const tTop=document.createElement('div');   tTop.className='tile-top';
    const tFront=document.createElement('div'); tFront.className='tile-front'; tFront.style.height=GD+'px';
    const tRight=document.createElement('div'); tRight.className='tile-right'; tRight.style.width=GD+'px';
    el.appendChild(tTop); el.appendChild(tFront); el.appendChild(tRight);

    el.addEventListener('mouseenter',()=>{
      if(state[r][c]) return;
      const t=TEAMS[activeTeam];
      el.style.setProperty('--preview-bg',rgba(t.color,0.06));
      el.style.setProperty('--preview-border',rgba(t.color,0.35));
      el.style.setProperty('--preview-glow',`0 0 16px ${rgba(t.color,0.3)}`);
    });
    el.addEventListener('mouseleave',()=>{
      el.style.removeProperty('--preview-bg');
      el.style.removeProperty('--preview-border');
      el.style.removeProperty('--preview-glow');
    });

    el.addEventListener('click',()=>{
      if(state[r][c]) return;
      const sh=SHAPES[activeTeam];
      state[r][c]={teamIdx:activeTeam,si:Math.floor(Math.random()*sh.length),home:false,new:true};
      renderCell(r,c,true);
      // Re-render neighbours — update their glow + edges
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&state[nr][nc]) renderCell(nr,nc,false);
      });
      updateScores();
    });

    gridEl.appendChild(el);
    renderCell(r,c);
  }
}

// ── SCORES ──
function updateScores(){
  const bar=document.getElementById('scorebar');
  bar.innerHTML=TEAMS.map((t,i)=>{
    const count=state.flat().filter(c=>c?.teamIdx===i).length;
    const active=i===activeTeam;
    return `<div class="team-pill${active?' active':''}"
      style="--tc-bg:${rgba(t.color,0.07)};--tc-border:${rgba(t.color,0.35)};--tc-glow:${rgba(t.color,0.15)};"
      onclick="selectTeam(${i})">
      <div class="tp-dot" style="background:${t.color};box-shadow:0 0 8px ${t.glow};"></div>
      <div>
        <div class="tp-name" style="color:${active?t.color:'#4a5568'}">${t.wappen} ${t.name}</div>
        <div class="tp-count">${count} Felder${active?' · aktiv':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.selectTeam=i=>{activeTeam=i;updateScores();};
updateScores();
</script>
</body>
</html>
